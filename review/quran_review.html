"", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:87-ms-q1", "language": "ms", "domain": "quran", "question": "Apa sebabnya Rasul-rasul dibunuh atau dustakan menurut ayat ini?", "gold_answer": "Sebabnya adalah apabila mereka datang membawa sesuatu kebenaran yang tidak disukai oleh hawa nafsu kamu, kamu menolakinya dengan sombong takbur.", "gold_passage_text": "Dan sesungguhnya Kami telah memberikan kepada Nabi Musa Kitab Taurat, dan Kami iringi kemudian daripadanya dengan beberapa orang Rasul, dan Kami berikan kepada Nabi Isa Ibni Maryam beberapa mukjizat serta Kami teguhkan kebenarannya dengan Ruhul-Qudus (Jibril). Maka patutkah, tiap-tiap kali datang kepada kamu seorang Rasul membawa sesuatu (kebenaran) yang tidak disukai oleh hawa nafsu kamu, kamu (dengan) sombong takbur (menolaknya), sehingga sebahagian dari Rasul-rasul itu kamu dustakan, dan sebahagian yang lain pula kamu membunuhnya?", "source_citation": "Quran 2:87 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:88-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang berkata bahawa hati mereka tertutup tidak dapat menerima Islam?", "gold_answer": "Mereka (kaum Yahudi).", "gold_passage_text": "Dan mereka (kaum Yahudi) berkata pula: \"Hati kami tertutup (tidak dapat menerima Islam)\". (Sebenarnya hati mereka tidak tertutup) bahkan Allah telah melaknatkan mereka disebabkan kekufuran mereka, oleh itu maka sedikit benar mereka yang beriman.", "source_citation": "Quran 2:88 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:88-ms-q1", "language": "ms", "domain": "quran", "question": "Mengapa Allah telah melaknatkan mereka?", "gold_answer": "Disebabkan kekufuran mereka.", "gold_passage_text": "Dan mereka (kaum Yahudi) berkata pula: \"Hati kami tertutup (tidak dapat menerima Islam)\". (Sebenarnya hati mereka tidak tertutup) bahkan Allah telah melaknatkan mereka disebabkan kekufuran mereka, oleh itu maka sedikit benar mereka yang beriman.", "source_citation": "Quran 2:88 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:89-ms-q0", "language": "ms", "domain": "quran", "question": "Apa yang dilakukan mereka setelah datang kepada mereka Nabi Muhammad dan Al Quran?", "gold_answer": "Mereka mengingkarinya.", "gold_passage_text": "Dan ketika datang kepada mereka sebuah Kitab dari Allah (Al Quran), yang mengesahkan apa yang ada pada mereka (Kitab Taurat), sedang mereka sebelum itu sentiasa memohon (kepada Allah) kemenangan atas kaum kafir musyrik (dengan kedatangan seorang Nabi pembawa Kitab itu). Setelah datang kepada mereka apa yang mereka sedia mengetahui kebenarannya (Nabi Muhammad dan Al Quran), mereka mengingkarinya; maka (dengan yang demikian), laknat Allah menimpa orang-orang yang kafir ingkar itu.", "source_citation": "Quran 2:89 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:9-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang hendak diperdayakan oleh mereka?", "gold_answer": "Allah dan orang-orang yang beriman.", "gold_passage_text": "Mereka hendak memperdayakan Allah dan orang-orang yang beriman, padahal mereka hanya memperdaya dirinya sendiri, sedang mereka tidak menyedarinya.", "source_citation": "Quran 2:9 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:9-ms-q1", "language": "ms", "domain": "quran", "question": "Siapakah yang sebenarnya diperdayakan oleh mereka?", "gold_answer": "Dirinya sendiri.", "gold_passage_text": "Mereka hendak memperdayakan Allah dan orang-orang yang beriman, padahal mereka hanya memperdaya dirinya sendiri, sedang mereka tidak menyedarinya.", "source_citation": "Quran 2:9 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:90-ms-q0", "language": "ms", "domain": "quran", "question": "Mengapa mereka mengingkari Al-Quran yang telah diturunkan oleh Allah?", "gold_answer": "kerana dengki bahawa Allah menurunkan dari limpah kurniaNya (wahyu) kepada Nabi Muhammad s.a.w", "gold_passage_text": "Sejahat-jahat perkara (yang mereka lakukan) ialah perbuatan mereka membeli kesenangan dirinya sendiri dengan mengingkari Al-Quran yang telah diturunkan oleh Allah, kerana dengki bahawa Allah menurunkan dari limpah kurniaNya (wahyu) kepada sesiapa yang dikehendakiNya di antara hamba-hambaNya (iaitu Nabi Muhammad s.a.w). Dengan sebab itu sudah sepatutnya mereka mendapat kemurkaan Allah bertalu-talu, dan orang-orang yang kafir itu akan beroleh azab sengsara yang menghinakan.", "source_citation": "Quran 2:90 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:92-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah yang datang membawa keterangan-keterangan (mukjizat) kepada kamu?", "gold_answer": "Nabi Musa.", "gold_passage_text": "Dan sesungguhnya telah datang kepada kamu Nabi Musa membawa keterangan-keterangan (mukjizat) kemudian kamu menyembah (patung) anak lembu sepeninggalannya, dan kamu (dengan perbuatan itu) adalah orang-orang yang zalim.", "source_citation": "Quran 2:92 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:93-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah perintah yang diberikan oleh Allah kepada mereka semasa perjanjian setia itu?", "gold_answer": "Ambilah dan amalkan ajaran Kitab Taurat yang Kami berikan kepada kamu itu dengan bersungguh-sungguh, dan dengarlah apa yang diperintahkan kepada kamu dengan mematuhinya.", "gold_passage_text": "Dan (ingatlah) ketika Kami mengikat perjanjian setia dengan kamu semasa Kami angkatkan bukit Tursina itu ke atas kamu (sambil kami berfirman): \"Ambilah (dan amalkanlah ajaran Kitab Taurat) yang Kami berikan kepada kamu itu dengan bersungguh-sungguh, dan dengarlah (apa yang diperintahkan kepada kamu dengan mematuhinya)\". Mereka menjawab: \"Kami dengar, dan kami menderhaka\". Sedang kegemaran menyembah (patung) anak lembu itu telah mesra dan sebati di dalam hati mereka, dengan sebab kekufuran mereka. Katakanlah (wahai Muhammad):\" Amatlah jahatnya apa yang disuruh oleh iman kamu itu kalaulah kamu orang-orang yang beriman\".", "source_citation": "Quran 2:93 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-1:1-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah yang diceritakan sebagai subjek dalam teks ini?", "gold_answer": "Allah", "gold_passage_text": "Dengan nama Allah, Yang Maha Pemurah, lagi Maha Mengasihani.", "source_citation": "Quran 1:1 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-1:1-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana sifat Allah digambarkan dalam teks ini?", "gold_answer": "Maha Pemurah, lagi Maha Mengasihani", "gold_passage_text": "Dengan nama Allah, Yang Maha Pemurah, lagi Maha Mengasihani.", "source_citation": "Quran 1:1 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-1:2-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang menerima pujian dalam ayat tersebut?", "gold_answer": "Allah", "gold_passage_text": "Segala puji tertentu bagi Allah, Tuhan yang memelihara dan mentadbirkan sekalian alam.", "source_citation": "Quran 1:2 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-1:2-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah fungsi Tuhan yang diterangkan dalam ayat tersebut?", "gold_answer": "Memelihara dan mentadbirkan sekalian alam", "gold_passage_text": "Segala puji tertentu bagi Allah, Tuhan yang memelihara dan mentadbirkan sekalian alam.", "source_citation": "Quran 1:2 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-1:3-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah kata yang digunakan untuk menghubungkan sifat-sifat tersebut?", "gold_answer": "lagi", "gold_passage_text": "Yang Maha Pemurah, lagi Maha Mengasihani.", "source_citation": "Quran 1:3 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-1:5-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah perkara yang kami mohonkan?", "gold_answer": "Pertolongan.", "gold_passage_text": "Engkaulah sahaja (Ya Allah) Yang Kami sembah, dan kepada Engkaulah sahaja kami memohon pertolongan.", "source_citation": "Quran 1:5 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-1:6-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah yang diminta untuk ditunjukkan?", "gold_answer": "Jalan yang lurus.", "gold_passage_text": "Tunjukilah kami jalan yang lurus.", "source_citation": "Quran 1:6 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:1-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah nama-nama huruf yang disenaraikan dalam teks ini?", "gold_answer": "Alif, Laam, Miim.", "gold_passage_text": "Alif, Laam, Miim.", "source_citation": "Quran 2:1 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:1-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah nama huruf yang disertakan dalam teks ini selain Alif?", "gold_answer": "Laam, Miim.", "gold_passage_text": "Alif, Laam, Miim.", "source_citation": "Quran 2:1 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:10-ms-q0", "language": "ms", "domain": "quran", "question": "Di mana terdapat penyakit syak dan hasad dengki mengikut teks?", "gold_answer": "Dalam hati mereka (golongan yang munafik itu)", "gold_passage_text": "Dalam hati mereka (golongan yang munafik itu) terdapat penyakit (syak dan hasad dengki), maka Allah tambahkan lagi penyakit itu kepada mereka; dan mereka pula akan beroleh azab seksa yang tidak terperi sakitnya, dengan sebab mereka berdusta (dan mendustakan kebenaran).", "source_citation": "Quran 2:10 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:10-ms-q1", "language": "ms", "domain": "quran", "question": "Apa sebab mereka akan beroleh azab seksa?", "gold_answer": "Dengan sebab mereka berdusta (dan mendustakan kebenaran)", "gold_passage_text": "Dalam hati mereka (golongan yang munafik itu) terdapat penyakit (syak dan hasad dengki), maka Allah tambahkan lagi penyakit itu kepada mereka; dan mereka pula akan beroleh azab seksa yang tidak terperi sakitnya, dengan sebab mereka berdusta (dan mendustakan kebenaran).", "source_citation": "Quran 2:10 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:11-ms-q0", "language": "ms", "domain": "quran", "question": "Apa nasihat yang diberikan kepada mereka?", "gold_answer": "\"Janganlah kamu membuat bencana dan kerosakan di muka bumi\"", "gold_passage_text": "Dan apabila dikatakan kepada mereka: \"Janganlah kamu membuat bencana dan kerosakan di muka bumi\", mereka menjawab: \" Sesungguhnya kami orang-orang yang hanya membuat kebaikan\".", "source_citation": "Quran 2:11 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:12-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah keadaan mereka terhadap perbuatan tersebut?", "gold_answer": "Mereka tidak menyedarinya.", "gold_passage_text": "Ketahuilah! Bahawa sesungguhnya mereka itulah orang-orang yang sebenar-benarnya membuat bencana dan kerosakan, tetapi mereka tidak menyedarinya.", "source_citation": "Quran 2:12 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:14-ms-q1", "language": "ms", "domain": "quran", "question": "Kepada siapa mereka kembali apabila mereka meninggalkan orang-orang yang beriman?", "gold_answer": "Kepada syaitan-syaitan mereka", "gold_passage_text": "Dan apabila mereka bertemu dengan orang-orang yang beriman, mereka berkata: \" Kami telah beriman \", dan manakala mereka kembali kepada syaitan-syaitan mereka, mereka berkata pula:\" Sesungguhnya kami tetap bersama kamu, sebenarnya kami hanya memperolok-olok (akan orang-orang yang beriman)\".", "source_citation": "Quran 2:14 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:15-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah yang memperolok-olok dan membiarkan mereka meraba-raba?", "gold_answer": "Allah", "gold_passage_text": "Allah (membalas) memperolok-olok, dan membiarkan mereka meraba-raba dalam kesesatan mereka (yang melampaui batas itu).", "source_citation": "Quran 2:15 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:15-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana kesesatan mereka dijelaskan dalam kurungan?", "gold_answer": "Melampaui batas itu", "gold_passage_text": "Allah (membalas) memperolok-olok, dan membiarkan mereka meraba-raba dalam kesesatan mereka (yang melampaui batas itu).", "source_citation": "Quran 2:15 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:17-ms-q0", "language": "ms", "domain": "quran", "question": "Apa perbandingan yang digunakan untuk menggambarkan golongan yang munafik dalam teks tersebut?", "gold_answer": "Seperti orang yang menyalakan api", "gold_passage_text": "Perbandingan hal mereka (golongan yang munafik itu) samalah seperti orang yang menyalakan api; apabila api itu menerangi sekelilingnya, (tiba-tiba) Allah hilangkan cahaya (yang menerangi) mereka, dan dibiarkannya mereka dalam gelap-gelita, tidak dapat melihat (sesuatu pun).", "source_citation": "Quran 2:17 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:19-ms-q0", "language": "ms", "domain": "quran", "question": "Kenapa mereka menyumbat jarinya ke dalam telinga masing-masing?", "gold_answer": "Kerana mereka takut mati.", "gold_passage_text": "Atau (bandingannya) seperti (orang-orang yang ditimpa) hujan lebat dari langit, bersama dengan gelap-gelita, dan guruh serta kilat; mereka menyumbat jarinya ke dalam telinga masing-masing dari mendengar suara petir, kerana mereka takut mati. (Masakan mereka boleh terlepas), sedang (pengetahuan dan kekuasaan) Allah meliputi orang-orang yang kafir itu.", "source_citation": "Quran 2:19 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:21-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimanakah tujuan bagi mereka untuk beribadat?", "gold_answer": "Supaya kamu (menjadi orang-orang yang) bertaqwa.", "gold_passage_text": "Wahai sekalian manusia! Beribadatlah kepada Tuhan kamu yang telah menciptakan kamu dan orang-orang yang terdahulu daripada kamu, supaya kamu (menjadi orang-orang yang) bertaqwa.", "source_citation": "Quran 2:21 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:24-ms-q1", "language": "ms", "domain": "quran", "question": "Siapakah yang menjadi sasaran atau tujuan disediakan api neraka ini?", "gold_answer": "Orang-orang kafir.", "gold_passage_text": "Maka kalau kamu tidak dapat membuatnya, dan sudah tentu kamu tidak dapat membuatnya, maka peliharalah diri kamu dari api neraka yang bahan-bahan bakarannya: manusia dan batu-batu (berhala), (iaitu neraka) yang disediakan untuk orang-orang kafir.", "source_citation": "Quran 2:24 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:25-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah perkataan yang diucapkan oleh mereka apabila diberikan satu pemberian dari buah-buahan syurga itu?", "gold_answer": "\"Inilah yang telah diberikan kepada kami dahulu\"", "gold_passage_text": "Dan berilah khabar gembira kepada orang-orang yang beriman dan beramal soleh, sesungguhnya mereka beroleh syurga yang mengalir di bawahnya beberapa sungai; tiap-tiap kali mereka diberikan satu pemberian dari sejenis buah-buahan syurga itu, mereka berkata: \"Inilah yang telah diberikan kepada kami dahulu\"; dan mereka diberikan rezeki itu yang sama rupanya (tetapi berlainan hakikatnya), dan disediakan untuk mereka dalam syurga itu pasangan-pasangan, isteri-isteri yang sentiasa bersih suci, sedang mereka pula kekal di dalamnya selama-lamanya.", "source_citation": "Quran 2:25 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:25-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana ciri-ciri pasangan-pasangan yang disediakan untuk mereka dalam syurga?", "gold_answer": "isteri-isteri yang sentiasa bersih suci", "gold_passage_text": "Dan berilah khabar gembira kepada orang-orang yang beriman dan beramal soleh, sesungguhnya mereka beroleh syurga yang mengalir di bawahnya beberapa sungai; tiap-tiap kali mereka diberikan satu pemberian dari sejenis buah-buahan syurga itu, mereka berkata: \"Inilah yang telah diberikan kepada kami dahulu\"; dan mereka diberikan rezeki itu yang sama rupanya (tetapi berlainan hakikatnya), dan disediakan untuk mereka dalam syurga itu pasangan-pasangan, isteri-isteri yang sentiasa bersih suci, sedang mereka pula kekal di dalamnya selama-lamanya.", "source_citation": "Quran 2:25 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:27-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah label yang diberikan kepada mereka?", "gold_answer": "Mereka itu ialah orang-orang yang rugi.", "gold_passage_text": "(Iaitu) orang-orang yang merombak (mencabuli) perjanjian Allah sesudah diperteguhkannya, dan memutuskan perkara yang disuruh Allah supaya diperhubungkan, dan mereka pula membuat kerosakan dan bencana di muka bumi. Mereka itu ialah orang-orang yang rugi.", "source_citation": "Quran 2:27 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:3-ms-q0", "language": "ms", "domain": "quran", "question": "Apa yang mereka beriman kepada?", "gold_answer": "perkara-perkara yang ghaib", "gold_passage_text": "Iaitu orang-orang yang beriman kepada perkara-perkara yang ghaib, dan mendirikan (mengerjakan) sembahyang serta membelanjakan (mendermakan) sebahagian dari rezeki yang Kami berikan kepada mereka.", "source_citation": "Quran 2:3 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:3-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah sumber rezeki yang dibelanjakan oleh mereka?", "gold_answer": "rezeki yang Kami berikan kepada mereka", "gold_passage_text": "Iaitu orang-orang yang beriman kepada perkara-perkara yang ghaib, dan mendirikan (mengerjakan) sembahyang serta membelanjakan (mendermakan) sebahagian dari rezeki yang Kami berikan kepada mereka.", "source_citation": "Quran 2:3 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:31-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang telah diajarkan segala nama benda-benda dan gunanya oleh 'Ia'?", "gold_answer": "Nabi Adam", "gold_passage_text": "Dan Ia telah mengajarkan Nabi Adam, akan segala nama benda-benda dan gunanya, kemudian ditunjukkannya kepada malaikat lalu Ia berfirman: \"Terangkanlah kepadaKu nama benda-benda ini semuanya jika kamu golongan yang benar\".", "source_citation": "Quran 2:31 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:31-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah ucapan 'Ia' kepada Nabi Adam?", "gold_answer": "Terangkanlah kepadaKu nama benda-benda ini semuanya jika kamu golongan yang benar", "gold_passage_text": "Dan Ia telah mengajarkan Nabi Adam, akan segala nama benda-benda dan gunanya, kemudian ditunjukkannya kepada malaikat lalu Ia berfirman: \"Terangkanlah kepadaKu nama benda-benda ini semuanya jika kamu golongan yang benar\".", "source_citation": "Quran 2:31 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:39-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana keadaan mereka selepas mendustakan ayat-ayat keterangan kami?", "gold_answer": "Mereka kekal di dalamnya.", "gold_passage_text": "Dan orang-orang kafir yang mendustakan ayat-ayat keterangan kami, mereka itu ialah ahli neraka, mereka kekal di dalamnya.", "source_citation": "Quran 2:39 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:4-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana keyakinan orang-orang yang beriman terhadap hari akhirat?", "gold_answer": "Mereka yakin akan (adanya) hari akhirat (dengan sepenuhnya).", "gold_passage_text": "Dan juga orang-orang yang beriman kepada Kitab \"Al-Quran\" yang diturunkan kepadamu (Wahai Muhammad), dan Kitab-kitab yang diturunkan dahulu daripadamu, serta mereka yakin akan (adanya) hari akhirat (dengan sepenuhnya).", "source_citation": "Quran 2:4 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:43-ms-q1", "language": "ms", "domain": "quran", "question": "Dengan siapa semua orang melakukan rukuk?", "gold_answer": "Bersama-sama orang-orang yang rukuk.", "gold_passage_text": "Dan dirikanlah kamu akan sembahyang dan keluarkanlah zakat, dan rukuklah kamu semua (berjemaah) bersama-sama orang-orang yang rukuk.", "source_citation": "Quran 2:43 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:46-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah mereka yang disifatkan dalam ayat tersebut?", "gold_answer": "Mereka yang percaya dengan yakin bahawa mereka akan menemui Tuhan mereka, dan bahawa mereka akan kembali kepadaNya.", "gold_passage_text": "(Iaitu) mereka yang percaya dengan yakin bahawa mereka akan menemui Tuhan mereka, dan bahawa mereka akan kembali kepadaNya.", "source_citation": "Quran 2:46 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:46-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah dua perkara yang dipercayai akan berlaku?", "gold_answer": "Bahawa mereka akan menemui Tuhan mereka, dan bahawa mereka akan kembali kepadaNya.", "gold_passage_text": "(Iaitu) mereka yang percaya dengan yakin bahawa mereka akan menemui Tuhan mereka, dan bahawa mereka akan kembali kepadaNya.", "source_citation": "Quran 2:46 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:50-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah tindakan yang diambil terhadap kamu dalam peristiwa belah laut ini?", "gold_answer": "Kami selamatkan kamu", "gold_passage_text": "Dan (kenangkanlah) ketika kami belahkan laut (Merah) untuk kamu lalui (kerana melarikan diri dari angkara Firaun), maka Kami selamatkan kamu dan Kami tenggelamkan Firaun bersama-sama tenteranya, sedang kamu semua menyaksikannya.", "source_citation": "Quran 2:50 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:50-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimanakah nasib Firaun dan tenteranya menurut perenggan tersebut?", "gold_answer": "Kami tenggelamkan Firaun bersama-sama tenteranya", "gold_passage_text": "Dan (kenangkanlah) ketika kami belahkan laut (Merah) untuk kamu lalui (kerana melarikan diri dari angkara Firaun), maka Kami selamatkan kamu dan Kami tenggelamkan Firaun bersama-sama tenteranya, sedang kamu semua menyaksikannya.", "source_citation": "Quran 2:50 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:51-ms-q0", "language": "ms", "domain": "quran", "question": "Apa yang dilakukan oleh 'kamu' selepas Nabi Musa pergi?", "gold_answer": "Menyembah (patung) anak lembu", "gold_passage_text": "Dan (kenangkanlah) ketika kami berjanji kepada Nabi Musa (untuk memberi Taurat kepadanya sesudah ia bersiap selama) empat puluh malam. Kemudian, setelah ia pergi, kamu menyembah (patung) anak lembu, dan kamu sebenarnya orang-orang yang zalim (terhadap diri sendiri).", "source_citation": "Quran 2:51 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:51-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimakah sifat diri 'kamu' yang disifatkan dalam teks ini?", "gold_answer": "Orang-orang yang zalim", "gold_passage_text": "Dan (kenangkanlah) ketika kami berjanji kepada Nabi Musa (untuk memberi Taurat kepadanya sesudah ia bersiap selama) empat puluh malam. Kemudian, setelah ia pergi, kamu menyembah (patung) anak lembu, dan kamu sebenarnya orang-orang yang zalim (terhadap diri sendiri).", "source_citation": "Quran 2:51 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:52-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah tujuan bagi 'kami' untuk maafkan kesalahan kamu?", "gold_answer": "Supaya kamu bersyukur.", "gold_passage_text": "Kemudian sesudah itu kami maafkan kesalahan kamu, supaya kamu bersyukur.", "source_citation": "Quran 2:52 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:56-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah tujuan yang dinyatakan dalam teks untuk membangkitkan kamu?", "gold_answer": "Supaya kamu bersyukur.", "gold_passage_text": "Kemudian kami bangkitkan kamu sesudah kamu mati (atau pengsan dari sambaran petir itu), supaya kamu bersyukur.", "source_citation": "Quran 2:56 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:57-ms-q0", "language": "ms", "domain": "quran", "question": "Apa yang diturunkan kepada mereka oleh Allah?", "gold_answer": "\"Mann\" dan \"Salwa\"", "gold_passage_text": "Dan Kami telah menaungi kamu dengan awan (dari panas matahari di padang pasir) dan Kami turunkan kepada kamu \"Mann\" dan \"Salwa\", (serta Kami berfirman): \"Makanlah dari makanan-makanan yang baik yang Kami telah kurniakan kepada kamu\". Dan tidaklah mereka menganiaya Kami (sebab mereka kufurkan nikmat itu), tetapi sebenarnya mereka adalah menganiaya diri sendiri.", "source_citation": "Quran 2:57 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:57-ms-q1", "language": "ms", "domain": "quran", "question": "Mengapa mereka sebenarnya menganiaya diri sendiri?", "gold_answer": "Sebab mereka kufurkan nikmat itu", "gold_passage_text": "Dan Kami telah menaungi kamu dengan awan (dari panas matahari di padang pasir) dan Kami turunkan kepada kamu \"Mann\" dan \"Salwa\", (serta Kami berfirman): \"Makanlah dari makanan-makanan yang baik yang Kami telah kurniakan kepada kamu\". Dan tidaklah mereka menganiaya Kami (sebab mereka kufurkan nikmat itu), tetapi sebenarnya mereka adalah menganiaya diri sendiri.", "source_citation": "Quran 2:57 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:58-ms-q0", "language": "ms", "domain": "quran", "question": "Kata-kata apa yang disarankan untuk diucapkan kepada Allah?", "gold_answer": "Ya Allah ampunilah dosa kami", "gold_passage_text": "Dan (kenangkanlah) ketika Kami berfirman: \"Masuklah kamu ke bandar ini, kemudian makanlah dari benda-benda yang ada di dalamnya dengan sepuas-puasnya, apa sahaja yang kamu sukai. Dan masuklah kamu melalui pintunya dengan tunduk (merendah diri); dan (mintalah ampun dengan) berkata: ' Ya Allah ampunilah dosa kami '; supaya kami ampunkan kesalahan-kesalahan kamu, dan Kami akan tambah pula pahala orang-orang yang berbuat baik\".", "source_citation": "Quran 2:58 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:58-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana cara yang diminta untuk masuk ke bandar tersebut?", "gold_answer": "Melalui pintunya dengan tunduk (merendah diri)", "gold_passage_text": "Dan (kenangkanlah) ketika Kami berfirman: \"Masuklah kamu ke bandar ini, kemudian makanlah dari benda-benda yang ada di dalamnya dengan sepuas-puasnya, apa sahaja yang kamu sukai. Dan masuklah kamu melalui pintunya dengan tunduk (merendah diri); dan (mintalah ampun dengan) berkata: ' Ya Allah ampunilah dosa kami '; supaya kami ampunkan kesalahan-kesalahan kamu, dan Kami akan tambah pula pahala orang-orang yang berbuat baik\".", "source_citation": "Quran 2:58 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:6-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah orang yang tidak akan beriman mengikut teks tersebut?", "gold_answer": "Orang-orang kafir", "gold_passage_text": "Sesungguhnya orang-orang kafir (yang tidak akan beriman), sama sahaja kepada mereka: sama ada engkau beri amaran kepadanya atau engkau tidak beri amaran, mereka tidak akan beriman.", "source_citation": "Quran 2:6 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:6-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah yang berlaku kepada mereka sama ada engkau beri amaran atau tidak beri amaran?", "gold_answer": "Mereka tidak akan beriman", "gold_passage_text": "Sesungguhnya orang-orang kafir (yang tidak akan beriman), sama sahaja kepada mereka: sama ada engkau beri amaran kepadanya atau engkau tidak beri amaran, mereka tidak akan beriman.", "source_citation": "Quran 2:6 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:63-ms-q1", "language": "ms", "domain": "quran", "question": "Mengapakah mereka diminta untuk menerima dan mengingati Taurat dengan bersungguh-sungguh?", "gold_answer": "Supaya kamu bertaqwa.", "gold_passage_text": "Dan (ingatlah), ketika Kami mengambil perjanjian setia kamu semasa Kami angkatkan Gunung Tursina di atas kamu (sambil Kami berfirman): \"Terimalah Taurat yang telah Kami berikan kepada kamu (serta amalkanlah) dengan bersungguh-sungguh, dan ingatlah (jangan lupakan) apa yang tersebut di dalamnya, supaya kamu bertaqwa.", "source_citation": "Quran 2:63 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:64-ms-q0", "language": "ms", "domain": "quran", "question": "Jika tidak kerana limpah kurnia Allah dan belas kasihanNya, nescaya menjadilah kamu dari golongan apakah?", "gold_answer": "Golongan orang-orang yang rugi.", "gold_passage_text": "Kemudian sesudah itu kamu membelakangkan perjanjian setia kamu itu (tidak menyempurnakannya); maka kalau tidaklah kerana limpah kurnia Allah dan belas kasihanNya kepada kamu (dengan membuka pintu taubat), nescaya menjadilah kamu dari golongan orang-orang yang rugi.", "source_citation": "Quran 2:64 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:66-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang menjadi sasaran hukuman pencegah?", "gold_answer": "Orang-orang yang ada pada masa itu dan orang-orang yang datang kemudian", "gold_passage_text": "Maka Kami jadikan apa yang berlaku itu sebagai suatu hukuman pencegah bagi orang-orang yang ada pada masa itu dan orang-orang yang datang kemudian, dan suatu pengajaran bagi orang-orang yang (hendak) bertaqwa.", "source_citation": "Quran 2:66 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:66-ms-q1", "language": "ms", "domain": "quran", "question": "Siapa yang menjadi sasaran pengajaran?", "gold_answer": "Orang-orang yang (hendak) bertaqwa", "gold_passage_text": "Maka Kami jadikan apa yang berlaku itu sebagai suatu hukuman pencegah bagi orang-orang yang ada pada masa itu dan orang-orang yang datang kemudian, dan suatu pengajaran bagi orang-orang yang (hendak) bertaqwa.", "source_citation": "Quran 2:66 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:69-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang menjawab permintaan mereka?", "gold_answer": "Nabi Musa", "gold_passage_text": "Mereka berkata lagi: \"Pohonkanlah kepada Tuhanmu untuk kami, supaya diterangkanNya kepada kami apa warnanya?\" Nabi Musa menjawab: \"Bahawasanya Allah berfirman: Bahawa (lembu betina) itu ialah seekor lembu kuning, kuning tua warnanya, lagi menyukakan orang-orang yang melihatnya\".", "source_citation": "Quran 2:69 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:69-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana Allah menerangkan warna lembu betina tersebut?", "gold_answer": "Bahawa (lembu betina) itu ialah seekor lembu kuning, kuning tua warnanya", "gold_passage_text": "Mereka berkata lagi: \"Pohonkanlah kepada Tuhanmu untuk kami, supaya diterangkanNya kepada kami apa warnanya?\" Nabi Musa menjawab: \"Bahawasanya Allah berfirman: Bahawa (lembu betina) itu ialah seekor lembu kuning, kuning tua warnanya, lagi menyukakan orang-orang yang melihatnya\".", "source_citation": "Quran 2:69 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:7-ms-q0", "language": "ms", "domain": "quran", "question": "Bagi mereka disediakan apa?", "gold_answer": "Azab seksa yang amat besar.", "gold_passage_text": "(Dengan sebab keingkaran mereka), Allah mematerikan atas hati mereka serta pendengaran mereka, dan pada penglihatan mereka ada penutupnya; dan bagi mereka pula disediakan azab seksa yang amat besar.", "source_citation": "Quran 2:7 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:70-ms-q0", "language": "ms", "domain": "quran", "question": "Kenapa mereka meminta agar Tuhan menerangkan mengenai lembu betina tersebut?", "gold_answer": "Kerana sesungguhnya lembu yang dikehendaki itu kesamaran kepada kami (susah kami memilihnya)", "gold_passage_text": "Mereka berkata lagi: \"Pohonkanlah kepada Tuhanmu untuk kami, supaya diterangkanNya kepada kami lembu betina yang mana satu? Kerana sesungguhnya lembu yang dikehendaki itu kesamaran kepada kami (susah kami memilihnya), dan kami insya Allah akan mendapat petunjuk (untuk mencari dan menyembelih lembu itu)\".", "source_citation": "Quran 2:70 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:70-ms-q1", "language": "ms", "domain": "quran", "question": "Untuk apa mereka akan mendapat petunjuk?", "gold_answer": "Untuk mencari dan menyembelih lembu itu", "gold_passage_text": "Mereka berkata lagi: \"Pohonkanlah kepada Tuhanmu untuk kami, supaya diterangkanNya kepada kami lembu betina yang mana satu? Kerana sesungguhnya lembu yang dikehendaki itu kesamaran kepada kami (susah kami memilihnya), dan kami insya Allah akan mendapat petunjuk (untuk mencari dan menyembelih lembu itu)\".", "source_citation": "Quran 2:70 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:71-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimanakah keadaan mereka ketika mereka menyembelih lembu yang tersebut?", "gold_answer": "Hampir-hampir mereka tidak dapat menunaikan (perintah Allah) itu.", "gold_passage_text": "Nabi Musa menjawab: \"Bahawasanya Allah berfirman: Sebenarnya (lembu yang dikehendaki itu) ialah lembu betina yang tidak pernah digunakan untuk membajak tanah (sawah bendang), dan tidak pula (digunakan mengangkut air) untuk menyiram tanaman; ia juga tidak cacat dan tidak ada belang pada warnanya\". Mereka berkata: \"Sekarang baharulah engkau dapat menerangkan sifat-sifatnya yang sebenar\". Maka mereka pun menyembelih lembu yang tersebut, dan hampir-hampir mereka tidak dapat menunaikan (perintah Allah) itu.", "source_citation": "Quran 2:71 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:72-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah yang akan mengungkap apa yang kamu sembunyikan?", "gold_answer": "Allah", "gold_passage_text": "Dan (ingatlah), ketika kamu membunuh seorang manusia, kemudian kamu tuduh-menuduh sesama sendiri tentang pembunuhan itu, padahal Allah tetap melahirkan apa yang kamu sembunyikan.", "source_citation": "Quran 2:72 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:73-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang berfirman bahawa mereka perlu memukul si mati dengan sebahagian anggota lembu?", "gold_answer": "Kami (Allah)", "gold_passage_text": "Maka Kami (Allah) berfirman: \"Pukulah si mati dengan sebahagian anggota lembu yang kamu sembelih itu\" (Mereka pun memukulnya dan ia kembali hidup). Demikianlah Allah menghidupkan orang-orang yang telah mati, dan memperlihatkan kepada kamu tanda-tanda kekuasaanNya, supaya kamu memahaminya.", "source_citation": "Quran 2:73 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:73-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah tujuan Allah menghidupkan orang-orang yang telah mati menurut pasca tersebut?", "gold_answer": "Supaya kamu memahaminya", "gold_passage_text": "Maka Kami (Allah) berfirman: \"Pukulah si mati dengan sebahagian anggota lembu yang kamu sembelih itu\" (Mereka pun memukulnya dan ia kembali hidup). Demikianlah Allah menghidupkan orang-orang yang telah mati, dan memperlihatkan kepada kamu tanda-tanda kekuasaanNya, supaya kamu memahaminya.", "source_citation": "Quran 2:73 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:74-ms-q0", "language": "ms", "domain": "quran", "question": "Apa yang disebutkan menjadi keras seperti batu dalam teks tersebut?", "gold_answer": "Hati kamu", "gold_passage_text": "Kemudian sesudah itu, hati kamu juga menjadi keras seperti batu, bahkan lebih keras lagi. Padahal di antara batu-batu itu ada yang terpancar dan mengalir air sungai daripadanya; dan ada pula di antaranya yang pecah-pecah terbelah lalu keluar mata air daripadanya; dan ada juga di antaranya yang jatuh ke bawah kerana takut kepada Allah; sedang Allah tidak sekali-kali lalai daripada apa yang kamu kerjakan.", "source_citation": "Quran 2:74 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:74-ms-q1", "language": "ms", "domain": "quran", "question": "Mengapa ada di antaranya yang jatuh ke bawah?", "gold_answer": "Kerana takut kepada Allah", "gold_passage_text": "Kemudian sesudah itu, hati kamu juga menjadi keras seperti batu, bahkan lebih keras lagi. Padahal di antara batu-batu itu ada yang terpancar dan mengalir air sungai daripadanya; dan ada pula di antaranya yang pecah-pecah terbelah lalu keluar mata air daripadanya; dan ada juga di antaranya yang jatuh ke bawah kerana takut kepada Allah; sedang Allah tidak sekali-kali lalai daripada apa yang kamu kerjakan.", "source_citation": "Quran 2:74 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:76-ms-q0", "language": "ms", "domain": "quran", "question": "Apa yang mereka kata apabila berjumpa dengan orang-orang yang beriman?", "gold_answer": "\"Kami telah beriman\"", "gold_passage_text": "Dan apabila mereka (orang-orang Yahudi pada zaman Rasulullah) bertemu dengan orang-orang yang beriman, mereka berkata: \"Kami telah beriman\"; dan apabila mereka berjumpa sesama sendiri, mereka berkata: \"Patutkah kamu ceritakan kepada mereka (orang-orang Islam) dengan apa yang telah diterangkan oleh Allah kepada kamu (di dalam Kitab Taurat mengenai kebenaran Nabi Muhammad) untuk menjadikannya hujah (bukti) yang dapat mengalahkah kamu di sisi Tuhan kamu? Tidakkah kamu berakal?\"", "source_citation": "Quran 2:76 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:76-ms-q1", "language": "ms", "domain": "quran", "question": "Apa yang diterangkan oleh Allah kepada mereka di dalam Kitab Taurat mengenai Nabi Muhammad?", "gold_answer": "Kebenaran Nabi Muhammad", "gold_passage_text": "Dan apabila mereka (orang-orang Yahudi pada zaman Rasulullah) bertemu dengan orang-orang yang beriman, mereka berkata: \"Kami telah beriman\"; dan apabila mereka berjumpa sesama sendiri, mereka berkata: \"Patutkah kamu ceritakan kepada mereka (orang-orang Islam) dengan apa yang telah diterangkan oleh Allah kepada kamu (di dalam Kitab Taurat mengenai kebenaran Nabi Muhammad) untuk menjadikannya hujah (bukti) yang dapat mengalahkah kamu di sisi Tuhan kamu? Tidakkah kamu berakal?\"", "source_citation": "Quran 2:76 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:79-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah tujuan mereka mengubah Kalam Allah dengan rekaan-rekaan mereka?", "gold_answer": "Supaya mereka dengan perbuatan itu dapat membeli keuntungan dunia yang sedikit.", "gold_passage_text": "Kecelakaan besar bagi orang-orang yang menulis Kitab Taurat dengan tangan mereka (lalu mengubah Kalam Allah dengan rekaan-rekaan mereka), kemudian mereka berkata: \"Ini ialah dari sisi Allah\", supaya mereka dengan perbuatan itu dapat membeli keuntungan dunia yang sedikit. Maka kecelakaan besar bagi mereka disebabkan apa yang ditulis oleh tangan mereka, dan kecelakaan besar bagi mereka dari apa yang mereka usahakan itu.", "source_citation": "Quran 2:79 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:8-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah keadaan sebenar mereka yang berkata tersebut?", "gold_answer": "Mereka sebenarnya tidak beriman.", "gold_passage_text": "Dan di antara manusia ada yang berkata: \"Kami telah beriman kepada Allah dan kepada hari akhirat\"; padahal mereka sebenarnya tidak beriman.", "source_citation": "Quran 2:8 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:81-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah nasib bagi sesiapa yang berbuat kejahatan dan diliputi oleh kesalahannya itu?", "gold_answer": "Mereka kekal di dalamnya", "gold_passage_text": "(Apa yang kamu katakan itu tidaklah benar), sesungguhnya sesiapa yang berbuat kejahatan dan ia diliputi (ditenggelamkan) oleh kesalahannya itu, maka merekalah ahli neraka, mereka kekal di dalamnya.", "source_citation": "Quran 2:81 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:84-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah kandungan perjanjian setia yang diterangkan dalam ayat tersebut?", "gold_answer": "\"(Bahawa) janganlah kamu menumpahkan darah (berbunuh-bunuhan) sesama sendiri, dan janganlah kamu usir-mengusir sesama sendiri dari kampung masing-masing\"", "gold_passage_text": "Dan (ingatlah), ketika Kami mengikat perjanjian setia dengan kamu: \"(Bahawa) janganlah kamu menumpahkan darah (berbunuh-bunuhan) sesama sendiri, dan janganlah kamu usir-mengusir sesama sendiri dari kampung masing-masing\". Kemudian kamu telah berikrar mematuhi perjanjian setia itu, dan kamu sendiri pula menjadi saksi (yang mengakui kebenarannya).", "source_citation": "Quran 2:84 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:89-ms-q1", "language": "ms", "domain": "quran", "question": "Siapa yang ditimpa oleh laknat Allah?", "gold_answer": "Orang-orang yang kafir ingkar itu.", "gold_passage_text": "Dan ketika datang kepada mereka sebuah Kitab dari Allah (Al Quran), yang mengesahkan apa yang ada pada mereka (Kitab Taurat), sedang mereka sebelum itu sentiasa memohon (kepada Allah) kemenangan atas kaum kafir musyrik (dengan kedatangan seorang Nabi pembawa Kitab itu). Setelah datang kepada mereka apa yang mereka sedia mengetahui kebenarannya (Nabi Muhammad dan Al Quran), mereka mengingkarinya; maka (dengan yang demikian), laknat Allah menimpa orang-orang yang kafir ingkar itu.", "source_citation": "Quran 2:89 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:90-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah azab yang akan beroleh orang-orang yang kafir itu?", "gold_answer": "azab sengsara yang menghinakan", "gold_passage_text": "Sejahat-jahat perkara (yang mereka lakukan) ialah perbuatan mereka membeli kesenangan dirinya sendiri dengan mengingkari Al-Quran yang telah diturunkan oleh Allah, kerana dengki bahawa Allah menurunkan dari limpah kurniaNya (wahyu) kepada sesiapa yang dikehendakiNya di antara hamba-hambaNya (iaitu Nabi Muhammad s.a.w). Dengan sebab itu sudah sepatutnya mereka mendapat kemurkaan Allah bertalu-talu, dan orang-orang yang kafir itu akan beroleh azab sengsara yang menghinakan.", "source_citation": "Quran 2:90 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:92-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah sebutan yang diberikan kepada mereka selepas menyembah anak lembu?", "gold_answer": "Orang-orang yang zalim.", "gold_passage_text": "Dan sesungguhnya telah datang kepada kamu Nabi Musa membawa keterangan-keterangan (mukjizat) kemudian kamu menyembah (patung) anak lembu sepeninggalannya, dan kamu (dengan perbuatan itu) adalah orang-orang yang zalim.", "source_citation": "Quran 2:92 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:93-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimanakah sebab kegemaran menyembah patung anak lembu itu telah mesra di dalam hati mereka?", "gold_answer": "Dengan sebab kekufuran mereka.", "gold_passage_text": "Dan (ingatlah) ketika Kami mengikat perjanjian setia dengan kamu semasa Kami angkatkan bukit Tursina itu ke atas kamu (sambil kami berfirman): \"Ambilah (dan amalkanlah ajaran Kitab Taurat) yang Kami berikan kepada kamu itu dengan bersungguh-sungguh, dan dengarlah (apa yang diperintahkan kepada kamu dengan mematuhinya)\". Mereka menjawab: \"Kami dengar, dan kami menderhaka\". Sedang kegemaran menyembah (patung) anak lembu itu telah mesra dan sebati di dalam hati mereka, dengan sebab kekufuran mereka. Katakanlah (wahai Muhammad):\" Amatlah jahatnya apa yang disuruh oleh iman kamu itu kalaulah kamu orang-orang yang beriman\".", "source_citation": "Quran 2:93 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}]</script>
<script>
const RECORDS = JSON.parse(document.getElementById('record-data').textContent);
const STORAGE_KEY = 'amragbench_review_state_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState();

function getRec(id) {
  return state[id] || { decision: '', corrected_question: '', corrected_answer: '', annotator_notes: '' };
}
function setRec(id, patch) {
  state[id] = Object.assign(getRec(id), patch);
  saveState(state);
  updateStats();
}

let currentFilter = 'all';
let searchTerm = '';

function matchesFilter(r) {
  const st = getRec(r.id);
  if (currentFilter === 'ms' && r.language !== 'ms') return false;
  if (currentFilter === 'flagged' && !r.lint_flags) return false;
  if (currentFilter === 'unreviewed' && st.decision) return false;
  if (searchTerm) {
    const hay = (r.question + ' ' + r.gold_answer + ' ' + r.gold_passage_text).toLowerCase();
    if (!hay.includes(searchTerm)) return false;
  }
  return true;
}

function sortedRecords() {
  let list = RECORDS.filter(matchesFilter);
  return list;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderCard(r) {
  const st = getRec(r.id);
  const isRtl = r.language === 'ar';
  const rtlClass = isRtl ? 'rtl' : '';
  const doneClass = st.decision === 'approve' ? 'done-approve' : st.decision === 'edit' ? 'done-edit' : st.decision === 'reject' ? 'done-reject' : '';
  const flagsHtml = r.lint_flags ? '<div class="flags">' + escapeHtml(r.lint_flags) + '</div>' : '';
  const langBadge = isRtl ? '<span class="badge badge-ar">ARABIC</span>' : '<span class="badge badge-ms">MALAY</span>';
  const flagBadge = r.lint_flags ? '<span class="badge badge-flag">FLAGGED</span>' : '';
  const citationExtra = r.draft_model ? ' &middot; drafted by ' + escapeHtml(r.draft_model) : '';

  return '' +
  '<div class="card ' + doneClass + '" data-id="' + escapeHtml(r.id) + '" tabindex="0">' +
    '<div class="card-top">' +
      '<div class="badges">' + langBadge + flagBadge + '<span class="id-text">' + escapeHtml(r.id) + '</span></div>' +
    '</div>' +
    '<div class="passage ' + rtlClass + '">' + escapeHtml(r.gold_passage_text) + '</div>' +
    '<div class="qa ' + rtlClass + '">' +
      '<div class="label">Question</div>' +
      '<div class="val">' + escapeHtml(r.question) + '</div>' +
    '</div>' +
    '<div class="qa ' + rtlClass + '">' +
      '<div class="label">Answer</div>' +
      '<div class="val">' + escapeHtml(r.gold_answer) + '</div>' +
    '</div>' +
    '<div class="citation">' + escapeHtml(r.source_citation) + citationExtra + '</div>' +
    flagsHtml +
    '<div class="actions">' +
      '<button class="btn-approve ' + (st.decision==='approve'?'sel':'') + '" data-action="approve">Approve</button>' +
      '<button class="btn-edit ' + (st.decision==='edit'?'sel':'') + '" data-action="edit">Edit</button>' +
      '<button class="btn-reject ' + (st.decision==='reject'?'sel':'') + '" data-action="reject">Reject</button>' +
    '</div>' +
    '<div class="edit-fields ' + (st.decision==='edit'?'show':'') + '">' +
      '<label>Corrected question</label>' +
      '<textarea class="' + rtlClass + '" data-field="corrected_question" placeholder="' + escapeHtml(r.question) + '" rows="2">' + escapeHtml(st.corrected_question) + '</textarea>' +
      '<label>Corrected answer</label>' +
      '<textarea class="' + rtlClass + '" data-field="corrected_answer" placeholder="' + escapeHtml(r.gold_answer) + '" rows="2">' + escapeHtml(st.corrected_answer) + '</textarea>' +
      '<label>Notes (optional, any decision)</label>' +
      '<textarea data-field="annotator_notes" rows="1">' + escapeHtml(st.annotator_notes) + '</textarea>' +
    '</div>' +
  '</div>';
}

function renderAll() {
  const list = sortedRecords();
  const container = document.getElementById('cardContainer');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state">No records match this filter.</div>';
  } else {
    container.innerHTML = list.map(renderCard).join('');
  }
  updateStats();
}

function updateStats() {
  const total = RECORDS.length;
  let nApprove=0, nEdit=0, nReject=0;
  RECORDS.forEach(r => {
    const d = getRec(r.id).decision;
    if (d === 'approve') nApprove++;
    else if (d === 'edit') nEdit++;
    else if (d === 'reject') nReject++;
  });
  const done = nApprove + nEdit + nReject;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statApprove').textContent = nApprove;
  document.getElementById('statEdit').textContent = nEdit;
  document.getElementById('statReject').textContent = nReject;
  const bar = document.getElementById('progressBar');
  const pct = x => total ? (x/total*100) : 0;
  bar.innerHTML = '<div class="pb-approve" style="width:' + pct(nApprove) + '%"></div><div class="pb-edit" style="width:' + pct(nEdit) + '%"></div><div class="pb-reject" style="width:' + pct(nReject) + '%"></div>';
}

document.getElementById('cardContainer').addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const action = e.target.dataset.action;
  if (action) {
    const current = getRec(id).decision;
    const next = current === action ? '' : action;
    setRec(id, { decision: next });
    card.className = 'card ' + (next === 'approve' ? 'done-approve' : next === 'edit' ? 'done-edit' : next === 'reject' ? 'done-reject' : '');
    card.querySelectorAll('.actions button').forEach(b => b.classList.remove('sel'));
    if (next) card.querySelector('[data-action="' + next + '"]').classList.add('sel');
    const ef = card.querySelector('.edit-fields');
    ef.classList.toggle('show', next === 'edit');
  }
});

document.getElementById('cardContainer').addEventListener('input', (e) => {
  const field = e.target.dataset.field;
  if (!field) return;
  const card = e.target.closest('.card');
  const id = card.dataset.id;
  setRec(id, { [field]: e.target.value });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

document.getElementById('searchBox').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase();
  renderAll();
});

document.addEventListener('keydown', (e) => {
  const active = document.activeElement;
  if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) return;
  const focused = document.activeElement.closest ? document.activeElement.closest('.card') : null;
  const cards = Array.from(document.querySelectorAll('.card'));
  if (cards.length === 0) return;
  let idx = focused ? cards.indexOf(focused) : -1;

  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx+1, cards.length-1); cards[idx].focus(); cards[idx].scrollIntoView({block:'center', behavior:'smooth'}); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx-1, 0); cards[idx].focus(); cards[idx].scrollIntoView({block:'center', behavior:'smooth'}); }
  else if (['a','A','e','E','r','R'].includes(e.key) && focused) {
    const map = {a:'approve', e:'edit', r:'reject'};
    const btn = focused.querySelector('[data-action="' + map[e.key.toLowerCase()] + '"]');
    if (btn) btn.click();
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const cols = ['id','language','domain','question','gold_answer','gold_passage_text','source_citation','draft_model','lint_flags','decision','corrected_question','corrected_answer','annotator_notes'];
  const csvEscape = (v) => {
    v = (v === undefined || v === null) ? '' : String(v);
    if (/[",\n]/.test(v)) v = '"' + v.replace(/"/g, '""') + '"';
    return v;
  };
  const lines = [cols.join(',')];
  RECORDS.forEach(r => {
    const st = getRec(r.id);
    const row = cols.map(c => {
      if (c === 'decision') return st.decision || '';
      if (c === 'corrected_question') return st.corrected_question || '';
      if (c === 'corrected_answer') return st.corrected_answer || '';
      if (c === 'annotator_notes') return st.annotator_notes || '';
      return r[c] !== undefined ? r[c] : '';
    });
    lines.push(row.map(csvEscape).join(','));
  });
  const csvContent = '﻿' + lines.join('\r\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'quran_review_completed.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

renderAll();
</script>
</body>
</html>
