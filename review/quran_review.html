<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AM-RAGBench Review Tool</title>
<style>
  :root {
    --bg: #faf9f7; --card-bg: #fff; --border: #e2ddd5; --text: #2b2622;
    --muted: #8a8078; --accent: #7a5c3e; --green: #3f7d54; --yellow: #b8860b; --red: #b5443a;
    --green-bg: #eef6f0; --yellow-bg: #fdf6e4; --red-bg: #fbecea;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  header { position: sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--border); padding:14px 20px; }
  h1 { font-size:17px; margin:0 0 8px 0; font-weight:600; }
  .stats { display:flex; gap:16px; font-size:13px; color:var(--muted); flex-wrap:wrap; align-items:center; }
  .stats b { color: var(--text); }
  .progress-bar { flex:1; min-width:140px; height:8px; background:#eee; border-radius:4px; overflow:hidden; display:flex; }
  .progress-bar div { height:100%; }
  .pb-approve { background: var(--green); } .pb-edit { background: var(--yellow); } .pb-reject { background: var(--red); }
  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center; }
  .controls button, .controls select, .controls input[type=text] {
    font-size:13px; padding:6px 10px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--text);
  }
  .controls button.active { background: var(--accent); color:#fff; border-color:var(--accent); }
  .controls input[type=text] { cursor:text; min-width:180px; }
  main { max-width:820px; margin:0 auto; padding:18px 20px 80px; }
  .card { background:var(--card-bg); border:1px solid var(--border); border-left:5px solid var(--border); border-radius:10px; padding:16px 18px; margin-bottom:14px; transition: border-color .15s; }
  .card.done-approve { border-left-color: var(--green); }
  .card.done-edit { border-left-color: var(--yellow); }
  .card.done-reject { border-left-color: var(--red); opacity:.6; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .badges { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .badge { font-size:11px; padding:2px 7px; border-radius:10px; font-weight:600; letter-spacing:.02em; }
  .badge-ar { background:#eef2fb; color:#3555a8; }
  .badge-ms { background:#fbeef2; color:#a83566; }
  .badge-flag { background:var(--red-bg); color:var(--red); }
  .id-text { font-size:11px; color:var(--muted); font-family: ui-monospace, Menlo, monospace; }
  .passage { background:#f6f3ee; border-radius:8px; padding:12px 14px; margin:8px 0; font-size:16px; line-height:1.7; }
  .rtl { direction: rtl; text-align:right; font-family: "Geeza Pro", "Traditional Arabic", "Arial", sans-serif; }
  .qa { margin:10px 0; }
  .qa .label { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:2px; }
  .qa .val { font-size:15px; }
  .qa.rtl .val { font-size:16px; }
  .citation { font-size:12px; color:var(--muted); margin-top:8px; }
  .flags { font-size:12px; color:var(--red); margin-top:6px; }
  .actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .actions button { flex:0 0 auto; padding:7px 14px; font-size:13px; border-radius:7px; border:1px solid var(--border); background:#fff; cursor:pointer; font-weight:600; }
  .btn-approve.sel, .btn-approve:hover { background:var(--green-bg); border-color:var(--green); color:var(--green); }
  .btn-edit.sel, .btn-edit:hover { background:var(--yellow-bg); border-color:var(--yellow); color:var(--yellow); }
  .btn-reject.sel, .btn-reject:hover { background:var(--red-bg); border-color:var(--red); color:var(--red); }
  .edit-fields { display:none; margin-top:10px; border-top:1px dashed var(--border); padding-top:10px; }
  .edit-fields.show { display:block; }
  .edit-fields label { font-size:11px; text-transform:uppercase; color:var(--muted); display:block; margin:8px 0 3px; }
  .edit-fields textarea { width:100%; font-size:14px; padding:8px; border-radius:6px; border:1px solid var(--border); font-family:inherit; resize:vertical; }
  .edit-fields textarea.rtl { direction:rtl; text-align:right; }
  .kbd-hint { font-size:11px; color:var(--muted); margin-left:auto; }
  .export-bar { position:sticky; bottom:0; background:#fff; border-top:1px solid var(--border); padding:12px 20px; display:flex; gap:10px; align-items:center; justify-content:center; }
  .export-bar button { font-size:14px; font-weight:600; padding:9px 18px; border-radius:8px; border:none; background:var(--accent); color:#fff; cursor:pointer; }
  .export-bar button:hover { opacity:.9; }
  .export-bar .note { font-size:12px; color:var(--muted); }
  .empty-state { text-align:center; color:var(--muted); padding:60px 0; font-size:14px; }
</style>
</head>
<body>

<header>
  <h1>AM-RAGBench &mdash; Human Review</h1>
  <div class="stats">
    <span><b id="statTotal">0</b> total</span>
    <span><b id="statDone">0</b> reviewed</span>
    <span style="color:var(--green)"><b id="statApprove">0</b> approve</span>
    <span style="color:var(--yellow)"><b id="statEdit">0</b> edit</span>
    <span style="color:var(--red)"><b id="statReject">0</b> reject</span>
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="controls">
    <button data-filter="all" class="filter-btn active">All</button>
    <button data-filter="ar" class="filter-btn">Arabic first</button>
    <button data-filter="ms" class="filter-btn">Malay only</button>
    <button data-filter="flagged" class="filter-btn">Flagged only</button>
    <button data-filter="unreviewed" class="filter-btn">Unreviewed only</button>
    <input type="text" id="searchBox" placeholder="Search question / answer / passage...">
    <span class="kbd-hint">Shortcuts: A = approve &nbsp; E = edit &nbsp; R = reject &nbsp; &darr;/&uarr; = next/prev card</span>
  </div>
</header>

<main id="cardContainer"></main>

<div class="export-bar">
  <button id="exportBtn">Export review CSV</button>
  <span class="note">Downloads a CSV in the exact format from_review_csv.py expects. Your progress also auto-saves in this browser.</span>
</div>

aphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:23-ms-q1", "language": "ms", "domain": "quran", "question": "Apakah tuntutan yang diminta kepada mereka yang menaruh syak?", "gold_answer": "Buat dan datangkanlah satu surah yang sebanding dengan Al-Quran itu, dan panggilah orang-orang yang kamu percaya boleh menolong kamu selain dari Allah.", "gold_passage_text": "Dan kalau kamu ada menaruh syak tentang apa yang Kami turunkan (Al-Quran) kepada hamba kami (Muhammad), maka cubalah buat dan datangkanlah satu surah yang sebanding dengan Al-Quran itu, dan panggilah orang-orang yang kamu percaya boleh menolong kamu selain dari Allah, jika betul kamu orang-orang yang benar.", "source_citation": "Quran 2:23 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:24-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah bahan-bahan bakar yang tertera untuk api neraka tersebut?", "gold_answer": "Manusia dan batu-batu (berhala).", "gold_passage_text": "Maka kalau kamu tidak dapat membuatnya, dan sudah tentu kamu tidak dapat membuatnya, maka peliharalah diri kamu dari api neraka yang bahan-bahan bakarannya: manusia dan batu-batu (berhala), (iaitu neraka) yang disediakan untuk orang-orang kafir.", "source_citation": "Quran 2:24 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:26-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang akan mengetahui bahawa perbandingan itu benar dari Tuhan mereka?", "gol ?", "gold_answer": "Pukulah batu itu dengan tongkatmu.", "gold_passage_text": "Dan (ingatlah) ketika Nabi Musa memohon supaya diberi air untuk kaumnya, maka Kami berfirman: \"Pukulah batu itu dengan tongkatmu\", (ia pun memukulnya), folalu terpancutlah dari batu itu dua belas mata air; sesungguhnya tiap-tiap satu puak (di antara mereka) telah mengetahui tempat minumnya masing-masing. (Dan Kami berfirman): \"Makanlah dan minumlah kamu dari rezeki Allah itu, dan janganlah kamu merebakkan bencana kerosakan di muka bumi\".", "source_citation": "Quran 2:60 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:60-ms-q1", "language": "ms", "domain": "quran", "question": "Berapa jumlah mata air yang terpancut dari batu itu?", "gold_answer": "Dua belas mata air.", "gold_passage_text": "Dan (ingatlah) ketika Nabi Musa memohon supaya diberi air untuk kaumnya, maka Kami berfirman: \"Pukulah batu itu dengan tongkatmu\", (ia pun memukulnya), folalu terpancutlah dari batu itu dua belas mata air; sesungguhnya tiap-tiap satu puak (di antara mereka) telah mengetahui tempat minumnya masing-masing. (Dan Kami berfirman): \"Makanlah dan minumlah kamu dari rezeki Allah itu, dan janganlah kamu merebakkan bencana kerosakan di muka bumi\".", "source_citation": "Quran 2:60 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:61-ms-q0", "language": "ms", "domain": "quran", "question": "Apa yang diminta oleh orang ramai supaya dikeluarkan oleh Tuhan?", "gold_answer": "Sebahagian dari apa yang tumbuh di bumi, termasuk sayur-sayuran, mentimun, bawang putih, adas, dan bawang merah.", "gold_passage_text": "Dan (kenangkanlah) ketika kamu berkata: \"Wahai Musa, kami tidak sabar (sudah jemu) dengan makanan yang semacam sahaja; maka pohonkanlah kepada Tuhanmu untuk kami, supaya dikeluarkan bagi kami sebahagian dari apa yang tumbuh di bumi; dari sayur-sayurannya, dan mentimunnya, dan bawang putihnya, dan adas (kacang dalnya), serta bawang merahnya\". Nabi Musa menjawab: \"Adakah kamu mahu menukar sesuatu yang kurang baik dengan meninggalkan yang lebih baik? Turunlah kamu ke bandar kerana di sana kamu boleh dapati apa yang kamu minta itu\". Dan mereka ditimpakan dengan kehinaan dan kepapaan, dan sudah sepatutnya mereka mendapat kemurkaan dari Allah. Yang demikian itu ialah disebabkan mereka kufur (mengingkari) ayat-ayat Allah (perintah-perintah dan mukjizat-mukjizat yang membuktikan kebesaranNya); dan mereka pula membunuh Nabi-nabi dengan tidak ada alasan yang benar. Yang demikian itu ialah disebabkan mereka menderhaka dan mereka pula sentiasa menceroboh.", "source_citation": "Quran 2:61 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:61-ms-q1", "language": "ms", "domain": "quran", "question": "Mengapa mereka layak mendapatkan kemurkaan dari Allah?", "gold_answer": "Kerana mereka kufur ayat-ayat Allah, membunuh Nabi-nabi dengan tidak ada alasan yang benar, menderhaka, dan sentiasa menceroboh.", "gold_passage_text": "Dan (kenangkanlah) ketika kamu berkata: \"Wahai Musa, kami tidak sabar (sudah jemu) dengan makanan yang semacam sahaja; maka pohonkanlah kepada Tuhanmu untuk kami, supaya dikeluarkan bagi kami sebahagian dari apa yang tumbuh di bumi; dari sayur-sayurannya, dan mentimunnya, dan bawang putihnya, dan adas (kacang dalnya), serta bawang merahnya\". Nabi Musa menjawab: \"Adakah kamu mahu menukar sesuatu yang kurang baik dengan meninggalkan yang lebih baik? Turunlah kamu ke bandar kerana di sana kamu boleh dapati apa yang kamu minta itu\". Dan mereka ditimpakan dengan kehinaan dan kepapaan, dan sudah sepatutnya mereka mendapat kemurkaan dari Allah. Yang demikian itu ialah disebabkan mereka kufur (mengingkari) ayat-ayat Allah (perintah-perintah dan mukjizat-mukjizat yang membuktikan kebesaranNya); dan mereka pula membunuh Nabi-nabi dengan tidak ada alasan yang benar. Yang demikian itu ialah disebabkan mereka menderhaka dan mereka pula sentiasa menceroboh.", "source_citation": "Quran 2:61 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:62-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah kumpulan yang disebutkan dalam ayat tersebut?", "gold_answer": "Orang-orang yang beriman, orang-orang Yahudi, orang-orang Nasora (Nasrani), dan orang-orang Saabien.", "gold_passage_text": "Sesungguhnya orang-orang yang beriman, dan orang-orang Yahudi dan orang-orang Nasora (Nasrani), dan orang-orang Saabien sesiapa di antara mereka itu beriman kepada Allah dan (beriman kepada) hari akhirat serta beramal soleh, maka bagi mereka pahala balasannya di sisi Tuhan mereka, dan tidak ada kebimbangan (dari berlakunya kejadian yang tidak baik) kepada mereka, dan mereka pula tidak akan berdukacita.", "source_citation": "Quran 2:62 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:62-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimanak  "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:67-ms-q0", "language": "ms", "domain": "quran", "question": "Apakah perintah yang Allah suruh Nabi Musa sampaikan kepada kaumnya?", "gold_answer": "Menyembelih seekor lembu betina.", "gold_passage_text": "Dan (ingatlah), ketika Nabi Musa berkata kepada kaumnya: \"Sesungguhnya Allah menyuruh supaya kamu menyembelih seekor lembu betina\". Mereka berkata: \"Adakah engkau hendak menjadikan kami ini permainan?\" Nabi Musa menjawab: \"Aku berlindung kepada Allah daripada menjadi salah seorang dari golongan yang jahil (yang melakukan sesuatu yang tidak patut)\".", "source_citation": "Quran 2:67 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:67-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimanakah Nabi Musa menjawab kecurigaan kaumnya?", "gold_answer": "Beliau berlindung kepada Allah daripada menjadi salah seorang dari golongan yang jahil.", "gold_passage_text": "Dan (ingatlah), ketika Nabi Musa berkata kepada kaumnya: \"Sesungguhnya Allah menyuruh supaya kamu menyembelih seekor lembu betina\". Mereka berkata: \"Adakah engkau hendak menjadikan kami ini permainan?\" Nabi Musa menjawab: \"Aku berlindung kepada Allah daripada menjadi salah seorang dari golongan yang jahil (yang melakukan sesuatu yang tidak patut)\".", "source_citation": "Quran 2:67 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:68-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang menjawab permintaan m estion": "Apakah dua kemungkinan yang dikemukakan dalam arahan kepada Muhammad?", "gold_answer": "Adakah mereka sudah mendapat janji dari Allah supaya Allah tidak akan menyalahi janjiNya, atau hanya mereka mengatakan sesuatu yang tidak mereka ketahui.", "gold_passage_text": "Dan mereka berkata: \"Kami tidak sekali-kali akan disentuh oleh api neraka kecuali beberapa hari yang tertentu\". Katakanlah (wahai Muhammad): \"Adakah kamu sudah mendapat janji dari Allah supaya (dengan itu) Allah tidak akan menyalahi janjiNya, atau hanya kamu mengatakan atas nama Allah sesuatu yang tidak kamu mengetahuinya?\"", "source_citation": "Quran 2:80 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:81-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah yang disebut sebagai ahli neraka dalam pasalan ini?", "gold_answer": "Sesiapa yang berbuat kejahatan dan ia diliputi oleh kesalahannya itu", "gold_passage_text": "(Apa yang kamu katakan itu tidaklah benar), sesungguhnya sesiapa yang berbuat kejahatan dan ia diliputi (ditenggelamkan) oleh kesalahannya itu, maka merekalah ahli neraka, mereka kekal di dalamnya.", "source_citation": "Quran 2:81 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:82-ms-q0", "language": "ms", "domain": "quran", "question": "Siapakah ahli syurga mengikut ayat ini?", "gold_answer": "Orang-orang yang beriman serta beramal soleh.", "gold_passage_text": "Dan orang-orang yang beriman serta beramal soleh, merekalah ahli syurga, mereka kekal di dalamnya.", "source_citation": "Quran 2:82 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:82-ms-q1", "language": "ms", "domain": "quran", "question": "Di manakah mereka kekal?", "gold_answer": "Di dalam syurga.", "gold_passage_text": "Dan orang-orang yang beriman serta beramal soleh, merekalah ahli syurga, mereka kekal di dalamnya.", "source_citation": "Quran 2:82 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:83-ms-q0", "language": "ms", "domain": "quran", "question": "Bagaimanakah kandungan perintah yang terdapat dalam perjanjian setia tersebut?", "gold_answer": "Janganlah kamu menyembah melainkan Allah, dan berbuat baiklah kepada kedua ibu bapa, dan kaum kerabat, dan anak-anak yatim, serta orang-orang miskin; dan katakanlah kepada sesama manusia perkataan-perkataan yang baik; dan dirikanlah sembahyang serta berilah zakat.", "gold_passage_text": "Dan (ingatlah wahai Muhammad), ketika Kami mengikat perjanjian setia dengan Bani Israil (dengan berfirman): \"Janganlah kamu menyembah melainkan Allah, dan berbuat baiklah kepada kedua ibu bapa, dan kaum kerabat, dan anak-anak yatim, serta orang-orang miskin; dan katakanlah kepada sesama manusia perkataan-perkataan yang baik; dan dirikanlah sembahyang serta berilah zakat\". Kemudian kamu berpaling membelakangkan (perjanjian setia kamu itu) kecuali sebahagian kecil dari kamu; dan sememangnya kamu orang-orang yang tidak menghiraukan perjanjian setianya.", "source_citation": "Quran 2:83 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:83-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana tindak balas Bani Israil terhadap perjanjian setia yang telah diikatkan?", "gold_answer": "Mereka berpaling membelakangkan perjanjian setia mereka, dan mereka adalah orang-orang yang tidak menghiraukan perjanjian setianya.", "gold_passage_text": "Dan (ingatlah wahai Muhammad), ketika Kami mengikat perjanjian setia dengan Bani Israil (dengan berfirman): \"Janganlah kamu menyembah melainkan Allah, dan berbuat baiklah kepada kedua ibu bapa, dan kaum kerabat, dan anak-anak yatim, serta orang-orang miskin; dan katakanlah kepada sesama manusia perkataan-perkataan yang baik; dan dirikanlah sembahyang serta berilah zakat\". Kemudian kamu berpaling membelakangkan (perjanjian setia kamu itu) kecuali sebahagian kecil dari kamu; dan sememangnya kamu orang-orang yang tidak menghiraukan perjanjian setianya.", "source_citation": "Quran 2:83 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:84-ms-q1", "language": "ms", "domain": "quran", "question": "Siapa yang menjadi saksi bagi kebenaran perjanjian setia tersebut?", "gold_answer": "\"Kamu sendiri\"", "gold_passage_text": "Dan (ingatlah), ketika Kami mengikat perjanjian setia dengan kamu: \"(Bahawa) janganlah kamu menumpahkan darah (berbunuh-bunuhan) sesama sendiri, dan janganlah kamu usir-mengusir sesama sendiri dari kampung masing-masing\". Kemudian kamu telah berikrar mematuhi perjanjian setia itu, dan kamu sendiri pula menjadi saksi (yang mengakui kebenarannya).", "source_citation": "Quran 2:84 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:85-ms-q0", "language": "ms", "domain": "quran", "question": "Siapa yang disebut dalam teks ini sebagai golongan yang melakukan pembunuhan sesama sendiri?", "gold_answer": "Bani Israil.", "gold_passage_text": "Kemudian kamu ini (wahai Bani Israil), kamu berbunuh-bunuhan sesama sendiri dan kamu usir satu puak dari kaum kamu keluar dari kampungnya; kamu pula saling bantu-membantu (dengan orang lain) untuk menentang mereka dengan melakukan dosa dan penganiayaan; padahal kalau mereka datang kepada kamu sebagai orang tawanan, kamu tebus mereka; sedang perbuatan mengusir mereka diharamkan juga atas kamu. Sesudah itu maka patutkah kamu hanya percaya kepada sebahagian (dari isi) Kitab Taurat dan mengingkari akan sebahagian yang lain? Maka tiadalah balasan bagi orang yang berbuat demikian itu dari antara kamu, selain dari kehinaan ketika hidup di dunia, dan pada hari kiamat akan ditolak mereka ke dalam azab seksa yang amat berat. Dan (ingatlah), Allah tidak sekali-kali lalai akan apa yang kamu lakukan.", "source_citation": "Quran 2:85 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "draft_model": "", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)", "decision": "", "corrected_question": "", "corrected_answer": "", "annotator_notes": ""}, {"id": "quran-2:85-ms-q1", "language": "ms", "domain": "quran", "question": "Bagaimana balasan yang diberikan kepada orang yang percaya hanya kepada sebahagian Kitab Taurat dan mengingkari sebahagian yang lain?", "gold_answer": "Tiadalah balasan bagi orang yang berbuat demikian itu, melainkan kehinaan ketika hidup di dunia, dan pada hari kiamat akan ditolak mereka ke dalam azab seksa yang amat berat.", "gold_passage_t
