<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AM-RAGBench -- Judge Agreement Check</title>
<style>
  :root {
    --bg: #faf9f7; --card-bg: #fff; --border: #e2ddd5; --text: #2b2622;

  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  header { position: sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--border); padding:14px 20px; }
  h1 { font-size:17px; margin:0 0 4px 0; font-weight:600; }
  .subtitle { font-size:13px; color:var(--muted); margin-bottom:10px; }
  .stats { display:flex; gap:16px; font-size:13px; color:var(--muted); flex-wrap:wrap; align-items:center; }
  .stats b { color: var(--text); }
  .agreement-rate { font-size:15px; font-weight:700; color:var(--accent); }
  .progress-bar { flex:1; min-width:140px; height:8px; background:#eee; border-radius:4px; overflow:hidden; display:flex; }
  .progress-bar div { height:100%; }
  .pb-agree { background: var(--green); } .pb-disagree { background: var(--red); }
  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center; }
  .controls button, .controls input[type=text] {
    font-size:13px; padding:6px 10px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--text);
  }
  .controls button.active { background: var(--accent); color:#fff; border-color:var(--accent); }
  .controls input[type=text] { cursor:text; min-width:180px; }
  main { max-width:840px; margin:0 auto; padding:18px 20px 80px; }
  .card { background:var(--card-bg); border:1px solid var(--border); border-left:5px solid var(--border); border-radius:10px; padding:16px 18px; margin-bottom:14px; }
  .card.done-agree { border-left-color: var(--green); }
  .card.done-disagree { border-left-color: var(--red); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .badges { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .badge { font-size:11px; padding:2px 7px; border-radius:10px; font-weight:600; letter-spacing:.02em; }
  .badge-domain { background:#f0e9dd; color:var(--accent); }
  .badge-ar { background:var(--blue-bg); color:var(--blue); }
  .badge-ms { background:#fbeef2; color:#a83566; }
  .badge-label { background:#f1eee8; color:#5a5148; font-family: ui-monospace, Menlo, monospace; }
  .id-text { font-size:11px; color:var(--muted); font-family: ui-monospace, Menlo, monospace; }
  .rtl { direction: rtl; text-align:right; font-family: "Geeza Pro", "Traditional Arabic", "Arial", sans-serif; }
  .block { margin:10px 0; }
  .block .label { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:2px; }
  .block .val { font-size:15px; }
  .passage-box { background:#f6f3ee; border-radius:8px; padding:10px 12px; font-size:14px; line-height:1.6; max-height:220px; overflow-y:auto; white-space:pre-wrap; }
  .judge-label-box { display:inline-block; padding:4px 10px; border-radius:6px; font-weight:700; font-size:13px; font-family: ui-monospace, Menlo, monospace; }
  .lbl-SUPPORTED { background:var(--green-bg); color:var(--green); }
  .lbl-PARTIALLY_SUPPORTED { background:#fdf6e4; color:#b8860b; }
  .lbl-UNSUPPORTED { background:var(--red-bg); color:var(--red); }
  .lbl-CONTRADICTED { background:#3a1f1f; color:#ffb3a7; }
  .lbl-ABSTAINED { background:#eee; color:#666; }
  .lbl-JUDGE_PARSE_FAILED { background:#333; color:#fff; }
  .actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .actions button { flex:0 0 auto; padding:7px 14px; font-size:13px; border-radius:7px; border:1px solid var(--border); background:#fff; cursor:pointer; font-weight:600; }
  .btn-agree.sel, .btn-agree:hover { background:var(--green-bg); border-color:var(--green); color:var(--green); }
  .btn-disagree.sel, .btn-disagree:hover { background:var(--red-bg); border-color:var(--red); color:var(--red); }
  .disagree-fields { display:none; margin-top:10px; border-top:1px dashed var(--border); padding-top:10px; }
  .disagree-fields.show { display:block; }
  .disagree-fields label { font-size:11px; text-transform:uppercase; color:var(--muted); display:block; margin:8px 0 3px; }
  .disagree-fields select, .disagree-fields textarea { width:100%; font-size:14px; padding:8px; border-radius:6px; border:1px solid var(--border); font-family:inherit; }
  .export-bar { position:sticky; bottom:0; background:#fff; border-top:1px solid var(--border); padding:12px 20px; display:flex; gap:10px; align-items:center; justify-content:center; }
  .export-bar button { font-size:14px; font-weight:600; padding:9px 18px; border-radius:8px; border:none; background:var(--accent); color:#fff; cursor:pointer; }
  .export-bar .note { font-size:12px; color:var(--muted); }
  .empty-state { text-align:center; color:var(--muted); padding:60px 0; font-size:14px; }
</style>
</head>
<body>

<header>
  <h1>AM-RAGBench &mdash; Judge Agreement Check</h1>
  <div class="subtitle">Stratified sample across all faithfulness labels &amp; both domains. For each card: do you agree with the judge's label?</div>
  <div class="stats">
    <span><b id="statTotal">0</b> total</span>
    <span><b id="statDone">0</b> reviewed</span>
    <span class="agreement-rate" id="agreementRate">--</span>
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="controls">
    <button data-filter="all" class="filter-btn active">All</button>
    <button data-filter="quran" class="filter-btn">Quran only</button>
    <button data-filter="wiki" class="filter-btn">Wikipedia only</button>
    <button data-filter="unreviewed" class="filter-btn">Unreviewed only</button>
    <input type="text" id="searchBox" placeholder="Search question / answer...">
  </div>
</header>

<main id="cardContainer"></main>

<div class="export-bar">
  <button id="exportBtn">Export agreement CSV</button>
  <span class="note">Downloads your agree/disagree decisions for computing the reported human-agreement rate.</span>
</div>

<script>
const RECORDS = JSON.parse(document.getElementById('record-data').textContent);
const STORAGE_KEY = 'amragbench_agreement_review_v1';
const VALID_LABELS = ['SUPPORTED','PARTIALLY_SUPPORTED','UNSUPPORTED','CONTRADICTED','ABSTAINED'];

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState();

function getRec(id) {
  return state[id] || { decision: '', corrected_label: '', notes: '' };
}
function setRec(id, patch) {
  state[id] = Object.assign(getRec(id), patch);
  saveState(state);
  updateStats();
}

let currentFilter = 'all';
let searchTerm = '';

function matchesFilter(r) {
  const st = getRec(r.id);
  if (currentFilter === 'quran' && r.domain !== 'quran') return false;
  if (currentFilter === 'wiki' && r.domain !== 'wiki') return false;
  if (currentFilter === 'unreviewed' && st.decision) return false;
  if (searchTerm) {
    const hay = (r.question + ' ' + r.gold_answer + ' ' + r.generated_answer).toLowerCase();
    if (!hay.includes(searchTerm)) return false;
  }
  return true;
}

function sortedRecords() {
  return RECORDS.filter(matchesFilter);
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function labelOptionsHtml(selected) {
  return VALID_LABELS.map(l => '<option value="' + l + '"' + (l===selected?' selected':'') + '>' + l + '</option>').join('');
}

function renderCard(r) {
  const st = getRec(r.id);
  const isRtl = r.language === 'ar';
  const rtlClass = isRtl ? 'rtl' : '';
  const doneClass = st.decision === 'agree' ? 'done-agree' : st.decision === 'disagree' ? 'done-disagree' : '';
  const langBadge = isRtl ? '<span class="badge badge-ar">ARABIC</span>' : '<span class="badge badge-ms">MALAY</span>';
  const domainBadge = '<span class="badge badge-domain">' + (r.domain === 'quran' ? 'QURAN' : 'WIKIPEDIA') + '</span>';
  const retrievalNote = r.retrieval_hit ? '' : ' &middot; <span style="color:var(--red)">retrieval MISS (passage below is NOT the gold passage)</span>';

  return '' +
  '<div class="card ' + doneClass + '" data-id="' + escapeHtml(r.id) + '" tabindex="0">' +
    '<div class="card-top">' +
      '<div class="badges">' + domainBadge + langBadge + '<span class="judge-label-box lbl-' + r.faithfulness_label + '">' + r.faithfulness_label + '</span></div>' +
      '<span class="id-text">' + escapeHtml(r.id) + '</span>' +
    '</div>' +
    '<div class="block ' + rtlClass + '"><div class="label">Question</div><div class="val">' + escapeHtml(r.question) + '</div></div>' +
    '<div class="block ' + rtlClass + '"><div class="label">Gold answer (ground truth)</div><div class="val">' + escapeHtml(r.gold_answer) + '</div></div>' +
    '<div class="block ' + rtlClass + '"><div class="label">Model-generated answer</div><div class="val">' + escapeHtml(r.generated_answer) + '</div></div>' +
    '<div class="block ' + rtlClass + '"><div class="label">Passage the model actually saw' + retrievalNote + '</div><div class="passage-box">' + escapeHtml(r.passage) + '</div></div>' +
    '<div class="actions">' +
      '<button class="btn-agree ' + (st.decision==='agree'?'sel':'') + '" data-action="agree">Agree with judge</button>' +
      '<button class="btn-disagree ' + (st.decision==='disagree'?'sel':'') + '" data-action="disagree">Disagree</button>' +
    '</div>' +
    '<div class="disagree-fields ' + (st.decision==='disagree'?'show':'') + '">' +
      '<label>What should the label actually be?</label>' +
      '<select data-field="corrected_label">' + labelOptionsHtml(st.corrected_label) + '</select>' +
      '<label>Notes (optional)</label>' +
      '<textarea data-field="notes" rows="2">' + escapeHtml(st.notes) + '</textarea>' +
    '</div>' +
  '</div>';
}

function renderAll() {
  const list = sortedRecords();
  const container = document.getElementById('cardContainer');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state">No records match this filter.</div>';
  } else {
    container.innerHTML = list.map(renderCard).join('');
  }
  updateStats();
}

function updateStats() {
  const total = RECORDS.length;
  let nAgree=0, nDisagree=0;
  RECORDS.forEach(r => {
    const d = getRec(r.id).decision;
    if (d === 'agree') nAgree++;
    else if (d === 'disagree') nDisagree++;
  });
  const done = nAgree + nDisagree;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  const bar = document.getElementById('progressBar');
  const pct = x => total ? (x/total*100) : 0;
  bar.innerHTML = '<div class="pb-agree" style="width:' + pct(nAgree) + '%"></div><div class="pb-disagree" style="width:' + pct(nDisagree) + '%"></div>';
  const rateEl = document.getElementById('agreementRate');
  if (done === 0) {
    rateEl.textContent = 'agreement rate: -- (not started)';
  } else {
    rateEl.textContent = 'agreement rate so far: ' + (100*nAgree/done).toFixed(1) + '% (' + nAgree + '/' + done + ')';
  }
}

document.getElementById('cardContainer').addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const action = e.target.dataset.action;
  if (action) {
    const current = getRec(id).decision;
    const next = current === action ? '' : action;
    setRec(id, { decision: next });
    card.className = 'card ' + (next === 'agree' ? 'done-agree' : next === 'disagree' ? 'done-disagree' : '');
    card.querySelectorAll('.actions button').forEach(b => b.classList.remove('sel'));
    if (next) card.querySelector('[data-action="' + next + '"]').classList.add('sel');
    const df = card.querySelector('.disagree-fields');
    df.classList.toggle('show', next === 'disagree');
  }
});

document.getElementById('cardContainer').addEventListener('change', (e) => {
  const field = e.target.dataset.field;
  if (!field) return;
  const card = e.target.closest('.card');
  const id = card.dataset.id;
  setRec(id, { [field]: e.target.value });
});
document.getElementById('cardContainer').addEventListener('input', (e) => {
  const field = e.target.dataset.field;
  if (!field || e.target.tagName !== 'TEXTAREA') return;
  const card = e.target.closest('.card');
  const id = card.dataset.id;
  setRec(id, { [field]: e.target.value });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

document.getElementById('searchBox').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase();
  renderAll();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const cols = ['id','domain','language','question','gold_answer','generated_answer','passage','retrieval_hit','faithfulness_label','human_decision','human_corrected_label','human_notes'];
  const csvEscape = (v) => {
    v = (v === undefined || v === null) ? '' : String(v);
    if (/[",\n]/.test(v)) v = '"' + v.replace(/"/g, '""') + '"';
    return v;
  };
  const lines = [cols.join(',')];
  RECORDS.forEach(r => {
    const st = getRec(r.id);
    const row = [
      r.id, r.domain, r.language, r.question, r.gold_answer, r.generated_answer,
      r.passage, r.retrieval_hit, r.faithfulness_label,
      st.decision || '', st.corrected_label || '', st.notes || '',
    ];
    lines.push(row.map(csvEscape).join(','));
  });
  const csvContent = '﻿' + lines.join('\r\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'agreement_review_completed.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

renderAll();
</script>
</body>
</html>
