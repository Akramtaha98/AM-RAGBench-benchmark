/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:46-ar-q0", "domain": "quran", "language": "ar", "question": "من هم الأشخاص الذين يصفهم النص؟", "gold_answer": "الذين يظنون أنهم ملاقو ربهم وأنهم إليه راجعون", "gold_passage_text": "الذين يظنون أنهم ملاقو ربهم وأنهم إليه راجعون", "source_citation": "Quran 2:46 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1361-1-q1", "domain": "wiki", "language": "ar", "question": "هل تندرج الهند ضمن الدولة الأعضاء في الأمم المتحدة بناءً على النص؟", "gold_answer": "نعم", "gold_passage_text": "|-\n||' – جمهورية الهند\n| دولة عضو في الأمم المتحدة\n| لا\n|الهند هي دولة اتحادية مكونة من ولايات الهند ومناطقها.\n|-\n||' – جمهورية هندوراس\n| دولة عضو في الأمم المتحدة\n| لا", "source_citation": "https://ar.wikipedia.org/?curid=1361 (Wikipedia, CC BY-SA, article id 1361)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-90-0-q1", "domain": "wiki", "language": "ar", "question": "لماذا تفضل بعض العلماء أن العناكب صديق للإنسان على الرغم من أن الإنسان لا يحبها؟", "gold_answer": "لأن العناكب تقضي معظم وقتها في اصطياد الحشرات والفتك بها، مما يجعلها ضرورية لتوازن النظم البيئي.", "gold_passage_text": "الضرر\nلا تسبب أذى للإنسان، باستثناء بعض الأنواع (حوالي 200 من 40,000 نوع فقط) ومن أشهرها الأرملة السوداء. فالعناكب، وإن كانت مخلوقات غير محبوبة لدى الإنسان، إلا أنها صديقة له، بل وذهب البعض إلى حد القول بأنه لولاها لما كان للإنسان مستقر على الأرض؛ ذلك لأنها تقضي معظم وقتها في اصطياد الحشرات والفتك بها. فلولاها لتكاثرت الحشرات وأتت على الأخضر واليابس.", "source_citation": "https://ar.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:1-ar-q0", "domain": "quran", "language": "ar", "question": "ما هي العبارة التي تبدأ النص؟", "gold_answer": "بسم الله الرحمن الرحيم", "gold_passage_text": "بسم الله الرحمن الرحيم الم", "source_citation": "Quran 2:1 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:48-ar-q0", "domain": "quran", "language": "ar", "question": "كيف يكون هذا اليوم الذي يخشونه؟", "gold_answer": "لا تجزي نفس عن نفس شيئا ولا يقبل منها شفاعة ولا يؤخذ منها عدل ولا هم ينصرون", "gold_passage_text": "واتقوا يوما لا تجزي نفس عن نفس شيئا ولا يقبل منها شفاعة ولا يؤخذ منها عدل ولا هم ينصرون", "source_citation": "Quran 2:48 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:85-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا يُنتظر الفريق يوم القيامة؟", "gold_answer": "يردون إلى أشد العذاب", "gold_passage_text": "ثم أنتم هؤلاء تقتلون أنفسكم وتخرجون فريقا منكم من ديارهم تظاهرون عليهم بالإثم والعدوان وإن يأتوكم أسارى تفادوهم وهو محرم عليكم إخراجهم ۚ أفتؤمنون ببعض الكتاب وتكفرون ببعض ۚ فما جزاء من يفعل ذلك منكم إلا خزي في الحياة الدنيا ۖ ويوم القيامة يردون إلى أشد العذاب ۗ وما الله بغافل عما تعملون", "source_citation": "Quran 2:85 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1360-1-q2", "domain": "wiki", "language": "ar", "question": "ما هو اسم الدولة التي تطلعت عليها عرشها قابوس في عام 1970، ولماذا؟", "gold_answer": "تطلعت عرشها قابوس بعد انقلاب غير دموي في العام المذكور، وتغير اسم البلاد فيما بعد إلى سلطنة عمان.", "gold_passage_text": "كان قابوس هو الابن الوحيد لوالده سعيد بن تيمور (سلطان مسقط وعمان)، تلقى تعليمه في سوفولك، إنجلترا. ثم خدم لفترة وجيزة في الجيش البريطاني بعد تخرجه من أكاديمية ساندهيرست العسكرية الملكية. عاد إلى عُمان عام 1966 وتعرض لقيود كبيرة من والده. وفي عام 1970، اعتلى قابوس عرش عمان بعد الإطاحة بوالده في انقلاب غير دموي وتغير اسم البلاد فيما بعد إلى سلطنة عمان.", "source_citation": "https://ar.wikipedia.org/?curid=1360 (Wikipedia, CC BY-SA, article id 1360)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:51-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا فعلوا بعد أن وُعد موسى؟", "gold_answer": "اتخذتم العجل", "gold_passage_text": "وإذ واعدنا موسى أربعين ليلة ثم اتخذتم العجل من بعده وأنتم ظالمون", "source_citation": "Quran 2:51 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1432-2-q2", "domain": "wiki", "language": "ar", "question": "ما هو السيلدينافيل، وما هي نسبته من الأدوية الأكثر وصفًا في الولايات المتحدة؟", "gold_answer": "هو السيلدينافيل، وهو الدواء رقم 151 من أكثر الأدوية وصفًا في الولايات المتحدة بأكثر من 3 ملايين وصفة طبية.", "gold_passage_text": "اكتشفت شركة فايزر هذا الدواء لأول مرةٍ عام 1989 أثناء بحثها عن علاجٍ للذبحة الصدرية. وتمت الموافقة على استخدامه طبيًا في الولايات المتحدة والاتحاد الأوروبي عام 1998. وفي عام 2023، كان السيلدينافيل الدواء رقم 151 من حيث الأكثر وصفًا في الولايات المتحدة، بأكثر من 3 ملايين وصفة طبية. وهو متوفر دواءً عامًا. يُتاح أيضًا في المملكة المتحدة دواءًا يُصرف من الصيدليات.", "source_citation": "https://ar.wikipedia.org/?curid=1432 (Wikipedia, CC BY-SA, article id 1432)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:28-ar-q1", "domain": "quran", "language": "ar", "question": "إلى من تُرجعون في النهاية؟", "gold_answer": "إليه", "gold_passage_text": "كيف تكفرون بالله وكنتم أمواتا فأحياكم ۖ ثم يميتكم ثم يحييكم ثم إليه ترجعون", "source_citation": "Quran 2:28 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-1:3-ar-q0", "domain": "quran", "language": "ar", "question": "ما هي الكلمات الموجودة في النص؟", "gold_answer": "الرحمن الرحيم", "gold_passage_text": "الرحمن الرحيم", "source_citation": "Quran 1:3 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:82-ar-q0", "domain": "quran", "language": "ar", "question": "من هم أصحاب الجنة المذكورون في هذا النص؟", "gold_answer": "أولئك الذين آمنوا وعملوا الصالحات", "gold_passage_text": "والذين آمنوا وعملوا الصالحات أولئك أصحاب الجنة ۖ هم فيها خالدون", "source_citation": "Quran 2:82 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1367-2-q0", "domain": "wiki", "language": "ar", "question": "في أي مكان يقع النظام الثاني من خطوط مترو الأنفاق وتبلغ كثافته فيه أعلى من أي مدينة أخرى؟", "gold_answer": "في طوكيو، حيث هو المترو الأكثر ازدحاماً من حيث كثافة المستخدمين في العالم.", "gold_passage_text": "تعتبر موسكو مركزاً اقتصادياً رئيسياً، فهي تحتوي العديد من المؤسسات العلمية والتعليمية، والعديد من المرافق الرياضية كذلك. فهي تمتلك نظام نقل معقد يشمل أربعة مطارات دولية، تسعة محطات للسكك الحديدية، ونظام المترو الثاني أكثر ازدحاماً في العالم (بعد طوكيو) الذي يشتهر بهندسته المعمارية والأعمال الفنية. المترو هو المترو أكثر ازدحاماً المشغل بالفرد في العالم.", "source_citation": "https://ar.wikipedia.org/?curid=1367 (Wikipedia, CC BY-SA, article id 1367)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1313-2-q0", "domain": "wiki", "language": "ar", "question": "كيف كان صوت الدول الأعضاء في مجلس الجامعة بشأن قراراتها؟", "gold_answer": "كانت القرارات تلزم الدول التي صوتت لهذه القرارات فقط.", "gold_passage_text": "لكل دولةٍ عضوٌ صوتٌ واحدٌ في مجلس الجامعة، ولكن القرارات تلزم الدول التي صوتت لهذه القرارات فقط. كانت أهداف الجامعة في عام 1945:\n* التعزيز والتنسيق في البرامج السياسية والبرامج الثقافية والاقتصادية والاجتماعية لأعضائها.\n* التوسط في حل النزاعات التي تنشأ بين دولها، أو النزاعات بين دولها وأطرافٍ ثالثة.\n* الدول التي وقعت على اتفاقِ الدفاع المشترك والتعاون الاقتصادي في 13 أبريل 1950 ملزمةٌ على تنسيق تدابير الدفاع العسكري.", "source_citation": "https://ar.wikipedia.org/?curid=1313 (Wikipedia, CC BY-SA, article id 1313)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-79-1-q0", "domain": "wiki", "language": "ar", "question": "كيف ينتج صوت الحرف F بشكل فسيولوجي وفقًا للتصنيف الصوتي المذكور في النص؟", "gold_answer": "يتم إنتاجه بتقريب رؤوس أسنان ثنايا الفك العلوي من الشفة السفلية ودفع الهواء بينهما. وينتج حرف احتكاكي غير صفيري، وهو شفوي طبقي شبه صامت.", "gold_passage_text": "طريقة نطق الحرف F (فونيم)\nلنطق الحرف (F) نحتاج لجميع أعضاء جهاز النطق؛ بالإضافة الي أعضاء أخرى اساسية مثل الدماغ لتشكّل منظومة متكاملة لإنتاج صوت الحرف؛ خصوصا الشفهِ السفلاء والاسنان العلوية الامامية. وينتج صوت الحرف (F) بتقريب رؤوس أسنان ثنايا الفك العلوي (أطراف الثنايا العليا) من الشفة السفلية ودفع الهواء بينهما. وهُو حرف احتكاكي غير صفيري؛ شفوي طبقي شبه صامت.", "source_citation": "https://ar.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1216-1-q0", "domain": "wiki", "language": "ar", "question": "متى تتركز الغالبية العظمى من سكان فنلندا، وما هو عدد السكان في هذه المنطقة؟", "gold_answer": "تتركز الغالبية العظمى من سكان فنلندا في المنطقة الجنوبية، حيث يقطن بها حوالي 5.5 مليون شخص.", "gold_passage_text": "يقيم حوالي 5.5 مليون شخص في فنلندا حيث تتركز الغالبية في المنطقة الجنوبية. تعد البلاد الثامنة من حيث المساحة في أوروبا وأقل بلدان الاتحاد الأوروبي كثافة سكانية. فنلندا جمهورية برلمانية ذات حكومة مركزية مقرها العاصمة هِلْسِنْكِي وحكومات محلية في 336 بلدية. يعيش في منطقة هلسنكي الكبرى حوالي مليون شخص (والتي تضم هلسنكي وإسبو وكاونياينن وفانتا)، ويتم إنتاج ثلث الناتج المحلي الإجمالي للبلاد في تلك المنطقة. من بين غيرها من المدن الكبرى تامبيري وتوركو وأولو ويوفاسكولا ولهتي وكووبيو وكوفولا.", "source_citation": "https://ar.wikipedia.org/?curid=1216 (Wikipedia, CC BY-SA, article id 1216)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:66-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا يشمل هذا النكال؟", "gold_answer": "لما بين يديها وما خلفها", "gold_passage_text": "فجعلناها نكالا لما بين يديها وما خلفها وموعظة للمتقين", "source_citation": "Quran 2:66 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1413-2-q2", "domain": "wiki", "language": "ar", "question": "ما هي شروط أو التزامات الحكومة الأفغانية التي لم تطلبها قبيل تأكيد دعم قلب الدين حكمتيار؟", "gold_answer": "دون شروط مسبقة", "gold_passage_text": "بعد سقوط كابل في 15 أغسطس 2021 بعد هجوم طالبان على الحكومة الأفغانية، استعادت طالبان السيطرة الفعالة على حكم أفغانستان، وقد أعلن قلب الدين حكمتيار زعيم «الحزب الإسلامي الأفغاني» أحد فصائل الإخوان المسلمون في أفغانستان دعمه لحكومة طالبان المرتقبة دون شروط مسبقة وقال «نحن أشقاء مع طالبان ويوجد بيننا توافق في الآراء».", "source_citation": "https://ar.wikipedia.org/?curid=1413 (Wikipedia, CC BY-SA, article id 1413)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1413-1-q0", "domain": "wiki", "language": "ar", "question": "من هو الطالبان الذين يتم احتسابهم في المعاداة السامية، وهل دعمتهم باكستان أم ضدتهم؟", "gold_answer": "يشمل ذلك زعيم القاعدة أسامة بن لادن طالبان. نفتت باكستان ذلك، وأصبحت ضدتهم بعد هجمات 11 سبتمبر.", "gold_passage_text": "يزعم المجتمع الدولي والحكومة الأفغانية على نطاق واسع أن المخابرات الباكستانية والقوات المسلحة الباكستانية قدمت الدعم لطالبان أثناء تأسيسها وفترة وجودها في السلطة، واستمرت في دعمهم أثناء التمرد. ونفت باكستان ذلك وصرحت بأنها أسقطت كل الدعم للجماعة بعد هجمات 11 سبتمبر. وفي سنة 2001 ورد أن 2500 عربي تحت قيادة زعيم القاعدة أسامة بن لادن قاتلوا مع طالبان.", "source_citation": "https://ar.wikipedia.org/?curid=1413 (Wikipedia, CC BY-SA, article id 1413)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:34-ar-q0", "domain": "quran", "language": "ar", "question": "من هو الذي أبى أن يسجد لآدم؟", "gold_answer": "إبليس", "gold_passage_text": "وإذ قلنا للملائكة اسجدوا لآدم فسجدوا إلا إبليس أبى واستكبر وكان من الكافرين", "source_citation": "Quran 2:34 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1185-0-q0", "domain": "wiki", "language": "ar", "question": "كم هي عدد السنفور المذكور في الجملة الأولى؟", "gold_answer": "عدد صغير جداً أو عدد غير محدد بشكل دقيق.", "gold_passage_text": "السنافر (جمع سنفور) هي شخصيات خيالية صغيرة الحجم، زرقاء اللون، وتعيش في الغابة، ابتكرها الرسام البلجيكي بيير كوليفورد المعروف باسم بييو (). أُلفت حول السنافر الكثير من أفلام الرسوم المتحركة لتعرض في التلفزيون.", "source_citation": "https://ar.wikipedia.org/?curid=1185 (Wikipedia, CC BY-SA, article id 1185)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-77-1-q1", "domain": "wiki", "language": "ar", "question": "ما هو التغيير الذي تم إجراؤه على شكل الحرف سنة 114 ميلادي؟", "gold_answer": "لم يعد شكل الحرف كما كان قبل ذلك ليصبح الشكل الذي نعرفه اليوم.", "gold_passage_text": "كان الساميون الذين عاشوا 1500 ق.م. قد ادخلوا هذا الحرف إلى لغتهم من الكتابة الهيرغليفية لغة المصريين القدماء. بعدها أدخله الإغريق إلى لغتهم وأسموه ألفا، وآخرهم الرومان اللذين عدلوا على شكل الحرف سنة 114 ميلادي ليصبح شكله ما نعرفه اليوم.", "source_citation": "https://ar.wikipedia.org/?curid=77 (Wikipedia, CC BY-SA, article id 77)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1364-0-q0", "domain": "wiki", "language": "ar", "question": "ما هو اللقب الذي يمنح الفيزيائي لينوس باولنغ الذي أثار ذكرى لينوس بينيديكت تورفالدس؟", "gold_answer": "جائزة نوبل.", "gold_passage_text": "لينوس بينيديكت تورفالدس (هلسنكي، 28 ديسمبر 1969) مهندس برمجيات فنلندي، اشتهر بأنه من وضع النواة المعروفة بـ لينُكس. سُمي على اسم الفيزيائي لينوس باولنغ الحائز على جائزة نوبل.", "source_citation": "https://ar.wikipedia.org/?curid=1364 (Wikipedia, CC BY-SA, article id 1364)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:79-ar-q1", "domain": "quran", "language": "ar", "question": "ما هو ما يُذْكَر في النص عن هؤلاء الأشخاص؟", "gold_answer": "فويل لهم مما كتبت أيديهم وويل لهم مما يكسبون", "gold_passage_text": "فويل للذين يكتبون الكتاب بأيديهم ثم يقولون هذا من عند الله ليشتروا به ثمنا قليلا ۖ فويل لهم مما كتبت أيديهم وويل لهم مما يكسبون", "source_citation": "Quran 2:79 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1296-0-q0", "domain": "wiki", "language": "ar", "question": "من هي الحكومة المذكورة في بداية النص؟", "gold_answer": "الأردن", "gold_passage_text": "الأردن\n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n*", "source_citation": "https://ar.wikipedia.org/?curid=1296 (Wikipedia, CC BY-SA, article id 1296)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1367-1-q0", "domain": "wiki", "language": "ar", "question": "في أي منطقة تقع مدينة موسكو geographically؟", "gold_answer": "تقع في المنطقة الفيدرالية المركزية في المنطقة الأوروبية من روسيا.", "gold_passage_text": "تقع على نهر موسكفا في المنطقة الفيدرالية المركزية في المنطقة الأوروبية من روسيا. موسكو تقع على ملتقى ثلاث منصات جيولوجية. تاريخياً، كانت موسكو عاصمة الاتحاد السوفيتي، والإمبراطورية الروسية (لثلاث سنين 1728–1730)، روسيا القيصرية، ودوقية موسكو، وهي موقع كرملن موسكو، أحد مواقع التراث العالمي في المدينة، الذي يخدم الرئيس الروسي كمنزل. البرلمان الروسي (مجلس الدوما ومجلس الاتحاد) والحكومة الروسية يقعون في المدينة أيضاً.", "source_citation": "https://ar.wikipedia.org/?curid=1367 (Wikipedia, CC BY-SA, article id 1367)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:41-ar-q1", "domain": "quran", "language": "ar", "question": "Q2: ماذا يُحذر النص من أن يشتروا بآياتي ثمنا قليلاً؟", "gold_answer": "A2: أن تشتروا بآياتي ثمنا قليلاً.", "gold_passage_text": "وآمنوا بما أنزلت مصدقا لما معكم ولا تكونوا أول كافر به ۖ ولا تشتروا بآياتي ثمنا قليلا وإياي فاتقون", "source_citation": "Quran 2:41 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1341-2-q1", "domain": "wiki", "language": "ar", "question": "ما هي الأحداث الرئيسية التي مرت بها ألمانيا في القرنين السادس عشر والسبعين بعد الميلاد؟", "gold_answer": "في القرن السادس عشر أصبحت ألمانيا الشمالية مركزًا للإصلاح البروتستانتي، وفي عام 1957م أصبحت عضوًا مؤسسًا في السوق الأوروبية المشتركة.", "gold_passage_text": "شكلت ألمانيا جزءاً مركزيًّا في الإمبراطورية الرومانية المقدسة التي دامت حتى عام 1806م، وخلال القرن السادس عشر أصبحت ألمانيا الشمالية مركز الإصلاح البروتستانتي. انقسمت ألمانيا بعد الحرب العالمية الثانية إلى قسمين: ألمانيا الشرقية وألمانيا الغربية. وأعيد توحيدهما عام 1990م. في عام 1957م أصبحت ألمانيا الغربية عضواً مؤسساً في السوق الأوروبية المشتركة، والذي أصبح عام 1993م الاتحاد الأوروبي. وفي عام 1999م أصبحت عُملة ألمانيا اليورو () كما أصبحت إحدى الدول الأوربية المنتمية إلى اتفاقية شينجن والتي تسمح لسكان الدول الأوروبيَّة المنتمية إلى هذه الاتفاقية بالتنقل منها واليها دون تأشيرة ودون رقابة على الحدود.", "source_citation": "https://ar.wikipedia.org/?curid=1341 (Wikipedia, CC BY-SA, article id 1341)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-1:1-ar-q0", "domain": "quran", "language": "ar", "question": "ما هو الاسم المذكور في النص؟", "gold_answer": "الله", "gold_passage_text": "بسم الله الرحمن الرحيم", "source_citation": "Quran 1:1 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:22-ar-q0", "domain": "quran", "language": "ar", "question": "ماذا فعل الله بالأرض والسماء؟", "gold_answer": "جعل لكم الأرض فراشا والسماء بناء", "gold_passage_text": "الذي جعل لكم الأرض فراشا والسماء بناء وأنزل من السماء ماء فأخرج به من الثمرات رزقا لكم ۖ فلا تجعلوا لله أندادا وأنتم تعلمون", "source_citation": "Quran 2:22 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1271-2-q0", "domain": "wiki", "language": "ar", "question": "ما هي الطريقة التي يتلقاها الزائر عند استخدام برامج وكي للتعديل على مواضيع الموقع؟", "gold_answer": "يتمتع الزائر بالحرية لإدخال الموضوعات جماعيًا بلغة ترميز بسيطة وبشكل بسيط باستخدام المتصفح.", "gold_passage_text": "تتيح برامج الويكي للزوار أن يحرروا مواضيع الموقع جماعيًا وبلغة ترميز بسيطة وباستخدام المتصفح. ما يميز مواقع الويكي بشكل عام هو سهولة إنشاء مواضيع جديدة أو تحديث مواضيع قديمة وتعديلها دون الحاجة إلى وجود رقابة توافق على إنشاء الصفحات أو تعديلها عادةً، وبعض مواقع الويكي لا تتطلب حتى تسجيل الدخول في الموقع لإنشاء أو تعديل مواضيع فيها مميزات إضافية.", "source_citation": "https://ar.wikipedia.org/?curid=1271 (Wikipedia, CC BY-SA, article id 1271)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:66-ar-q0", "domain": "quran", "language": "ar", "question": "من هم المستهدفون بهذه الموعظة؟", "gold_answer": "المتقين", "gold_passage_text": "فجعلناها نكالا لما بين يديها وما خلفها وموعظة للمتقين", "source_citation": "Quran 2:66 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:81-ar-q1", "domain": "quran", "language": "ar", "question": "ما وضعهم في النار كما ورد في النص؟", "gold_answer": "هم فيها خالدون", "gold_passage_text": "بلى من كسب سيئة وأحاطت به خطيئته فأولئك أصحاب النار ۖ هم فيها خالدون", "source_citation": "Quran 2:81 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1433-2-q0", "domain": "wiki", "language": "ar", "question": "ما هي الشركة التي سيتم إنشاؤها من خلال عملية الاندماج الإلغاء؟", "gold_answer": "سيتم إنشاء شركة فايزر.", "gold_passage_text": "في عام 2016، كان من المتوقع أن تندمج شركة فايزر. مع ألرغان بي ال سي لإنشاء شركة فايزر بي ال سي ومقرها أيرلندا في صفقة تبلغ قيمتها 160 مليار دولار أمريكي. تم إلغاء الاندماج في أبريل 2016، بسبب القواعد الجديدة من وزارة الخزانة الأمريكية ضد الانقلابات الضريبية، وهي طريقة لتجنب الضرائب من خلال الاندماج مع شركة أجنبية. قامت الشركة بعمل ثاني أكبر تسوية صيدلانية مع وزارة العدل الأمريكيَّة.", "source_citation": "https://ar.wikipedia.org/?curid=1433 (Wikipedia, CC BY-SA, article id 1433)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:91-ar-q0", "domain": "quran", "language": "ar", "question": "ماذا قالوا عندما قيل لهم آمنوا بما أنزل الله؟", "gold_answer": "قالوا نؤمن بما أنزل علينا ويكفرون بما وراءه", "gold_passage_text": "وإذا قيل لهم آمنوا بما أنزل الله قالوا نؤمن بما أنزل علينا ويكفرون بما وراءه وهو الحق مصدقا لما معهم ۗ قل فلم تقتلون أنبياء الله من قبل إن كنتم مؤمنين", "source_citation": "Quran 2:91 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1369-2-q1", "domain": "wiki", "language": "ar", "question": "ما هي الفترة التي حكمها اليمن بموجب النظام الذي وصفه بأنه «الإقطاعي»؟", "gold_answer": "من 1978 حتى اندلاع الاحتجاجات في 2011.", "gold_passage_text": "اندلعت احتجاجات شعبية مطالبة بإسقاط نظام علي عبد الله صالح في 2011، والذي حَكم اليمن منذ 1978. وُصف ذلك النظام «بالإقطاعي الذي تطور ليصبح خليطاً من الكليبتوقراطية والبلوتوقراطية». تقدمت السعودية بمبادرة للحفاظ على نفوذها عبر شخصيات من ذلك النظام، وافق عليها المجتمع الدولي للاستمرار في عمليات مكافحة الإرهاب. تنحى الرئيس صالح ومُنح و500 من أعوانه حصانة من الملاحقة القانونية عبر مجلس النواب. أُنتخب نائبه عبد ربه منصور هادي في انتخابات مرشح واحد في 21 فبراير 2012 لرئاسة مرحلة انتقالية لمدة سنتين. انعقدت جلسات الحوار الوطني اليمني في 18 مارس 2013 واختتمت بالتوقيع على وثيقة الحوار الوطني الشامل، ومُددت فترة رئاسة هادي لسنة أخرى من قِبَل المشاركين خلال ذلك المؤتمر.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1348-1-q1", "domain": "wiki", "language": "ar", "question": "في أي سنة خدم الشخص المذكور كأمينا عاماً للجامعة العربية؟", "gold_answer": "عام 2001.", "gold_passage_text": "عمل مديرا لإدارة الهيئات الدولية بوزارة الخارجية المصرية عام 1977 ومندوبا دائما لمصر لدى الأمم المتحدة عام 1990 ووزيراً للخارجية عام 1991 وأميناً عاماً للجامعة العربية عام 2001.", "source_citation": "https://ar.wikipedia.org/?curid=1348 (Wikipedia, CC BY-SA, article id 1348)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1389-1-q0", "domain": "wiki", "language": "ar", "question": "أي من الشخصيات التالية كان يُذكر في النص كأغنى شخص في العالم في عام 2017؟", "gold_answer": "جيف بيزوس غيتس", "gold_passage_text": "أُدرِج غيتس منذ عام 1987 في قائمة فوربس لأغنى أثرياء العالم. حصل على لقب فوربس لأغنى شخص في العالم في كل سنة منذ عام 1995 حتى عام 2017 باستثناء الفترة منذ عام 2010 حتى عام 2013. تفوق عليه مؤسس شركة أمازون والرئيس التنفيذي جيف بيزوس، الذي قُدِّرت ثروته الصافية بقيمة 90.6 مليار دولار أمريكي مقارنة بصافي ثروة غيتس البالغة 89.9 مليار دولار أمريكي في ذلك الوقت من أكتوبر عام 2017. قُدِّرت ثروة غيتس صافية اعتبارًا من أكتوبر عام 2021 بحوالي 129 مليار دولار أمريكي، مما جعله رابع أغنى شخص في العالم.", "source_citation": "https://ar.wikipedia.org/?curid=1389 (Wikipedia, CC BY-SA, article id 1389)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:68-ar-q0", "domain": "quran", "language": "ar", "question": "ماذا طلبوا من ربه ليبيّن لهم؟", "gold_answer": "ادعوا ربك يبيّن لهم ما هي", "gold_passage_text": "قالوا ادع لنا ربك يبين لنا ما هي ۚ قال إنه يقول إنها بقرة لا فارض ولا بكر عوان بين ذلك ۖ فافعلوا ما تؤمرون", "source_citation": "Quran 2:68 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1343-1-q1", "domain": "wiki", "language": "ar", "question": "ما هو أكبر عدد من الطلاب البالغ عددهما حوالي 200,000 طالب في Berlin؟", "gold_answer": "حوالي 200,000 طالب من جميع أنحاء العالم.", "gold_passage_text": "برلين تضم أربع جامعات، وأربع مدارس فنون وعشرة كليات تقنية وما يقارب 200,000 طالب من جميع أنحاء العالم وحوالي 70 مرافق بحثية مما جعلها أكبر مدينة جامعية في ألمانيا.", "source_citation": "https://ar.wikipedia.org/?curid=1343 (Wikipedia, CC BY-SA, article id 1343)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:56-ar-q1", "domain": "quran", "language": "ar", "question": "متى تم بعثناكم؟", "gold_answer": "من بعد موتكم", "gold_passage_text": "ثم بعثناكم من بعد موتكم لعلكم تشكرون", "source_citation": "Quran 2:56 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:62-ar-q1", "domain": "quran", "language": "ar", "question": "من هم الجماعات التي ذكرت في النص والتي تستحق الأجر عند ربهم؟", "gold_answer": "الذين آمنوا والذين هادوا والنصارى والصابئين", "gold_passage_text": "إن الذين آمنوا والذين هادوا والنصارى والصابئين من آمن بالله واليوم الآخر وعمل صالحا فلهم أجرهم عند ربهم ولا خوف عليهم ولا هم يحزنون", "source_citation": "Quran 2:62 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:37-ar-q1", "domain": "quran", "language": "ar", "question": "كيف وصف الله نفسه في نهاية النص؟", "gold_answer": "التواب الرحيم", "gold_passage_text": "فتلقى آدم من ربه كلمات فتاب عليه ۚ إنه هو التواب الرحيم", "source_citation": "Quran 2:37 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1364-1-q1", "domain": "wiki", "language": "ar", "question": "What profession did his mother have according to the passage?", "gold_answer": "His mother, Anna Toffels, was a translator and graphic editor for a Finnish newspaper.", "gold_passage_text": "في منتصف السبعينيات، ذهب والده نيلس تورفالدس ذو الميول الشيوعية إلى موسكو ودرس وأقام في موسكو عاماً كاملاً، بعدها عمل في الصحافة، ووالدته آنا تورفالدس كانت تعمل لصحيفة فنلندية كـمترجمة ومنشئة للرسومات الإخبارية، كما أن جدّه كان يعمل في صحيفة فنلندية، وخاله كان يعمل في التلفزيون الفنلندي.", "source_citation": "https://ar.wikipedia.org/?curid=1364 (Wikipedia, CC BY-SA, article id 1364)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:59-ar-q0", "domain": "quran", "language": "ar", "question": "ما الذي يُنزل من السماء على الذين ظلموا؟", "gold_answer": "رجزا", "gold_passage_text": "فبدل الذين ظلموا قولا غير الذي قيل لهم فأنزلنا على الذين ظلموا رجزا من السماء بما كانوا يفسقون", "source_citation": "Quran 2:59 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1430-1-q0", "domain": "wiki", "language": "ar", "question": "ما هو نادي بدأ مسيرته المهنية فيه قبل أن يتأهل ليوفنتوس?", "gold_answer": "كان (نادي يانكريك في هولندا)", "gold_passage_text": "بدأ زيدان مسيرته المهنية في نادي كان قبل أن يثبت نفسه كواحد من أفضل اللاعبين في الدوري الفرنسي مع بوردو. في عام 1996، انتقل إلى يوفنتوس حيث فاز معهم بألقاب من بينها لقبان في الدوري الإيطالي. انتقل إلى ريال مدريد مقابل رسوم انتقال قياسية في ذلك الوقت بلغت 77.5 مليون يورو في عام 2001، والذي ظل مسجل باسمه على مدار السنوات الثماني التالية. في إسبانيا، فاز زيدان بالعديد من الألقاب، بما في ذلك لقب الدوري الإسباني ودوري أبطال أوروبا. في نهائي دوري أبطال أوروبا 2002، سجل هدفًا بالقدم اليسرى والذي يُعتبر أحد أعظم الأهداف في تاريخ المسابقة.", "source_citation": "https://ar.wikipedia.org/?curid=1430 (Wikipedia, CC BY-SA, article id 1430)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:30-ar-q0", "domain": "quran", "language": "ar", "question": "من هو الشخص الذي قال للملائكة إنه سيضع في الأرض خليفة؟", "gold_answer": "ربك", "gold_passage_text": "وإذ قال ربك للملائكة إني جاعل في الأرض خليفة ۖ قالوا أتجعل فيها من يفسد فيها ويسفك الدماء ونحن نسبح بحمدك ونقدس لك ۖ قال إني أعلم ما لا تعلمون", "source_citation": "Quran 2:30 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:92-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا فعل \"أنتم\" بعد موسى؟", "gold_answer": "اتخاذتم العجل", "gold_passage_text": "ولقد جاءكم موسى بالبينات ثم اتخذتم العجل من بعده وأنتم ظالمون", "source_citation": "Quran 2:92 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1443-0-q1", "domain": "wiki", "language": "ar", "question": "ما هي السمات الأساسية التي يلاحظها نجيب محفوظ عن المجتمع المصري؟", "gold_answer": "أنه مجتمع قديم وقوي حافظ على التقاليد القديمة أثناء التحديث، مما يمكنه استيعاب وجدم جوانب الثقافة الغربية دون خوف.", "gold_passage_text": "تتشابك مسيرة نجيب محفوظ الأدبية مع تاريخ الرواية الحديثة في مصر والعالم العربي. في مطلع القرن العشرين، خطت الرواية العربية خطواتها الأولى في مجتمع وثقافة اكتشفت هذا النوع الأدبي من خلال ترجمة الروايات الأوروبية من القرن التاسع عشر. ومع ذلك، بالنسبة لنجيب محفوظ، فإن مجتمعًا قويًا وقديمًا مثل المجتمع المصري، بعد أن حافظ على التقاليد القديمة أثناء التحديث، يمكنه أن يستوعب ويدمج، دون خوف، بعض جوانب الثقافة الغربية. لأن هذا الكاتب استمع قبل كل شيء، في عمله، إلى هذا الشعب المصري، وإلى مغامراته الحميمة وتاريخه.", "source_citation": "https://ar.wikipedia.org/?curid=1443 (Wikipedia, CC BY-SA, article id 1443)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:19-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا يفعلون عند حدوث الصواعق؟", "gold_answer": "يجعلون أصابعهم في آذانهم", "gold_passage_text": "أو كصيب من السماء فيه ظلمات ورعد وبرق يجعلون أصابعهم في آذانهم من الصواعق حذر الموت ۚ والله محيط بالكافرين", "source_citation": "Quran 2:19 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1351-0-q1", "domain": "wiki", "language": "ar", "question": "في أي تاريخ أعلنت غينيا استقلالها عن فرنسا؟", "gold_answer": "في 2 أكتوبر", "gold_passage_text": "أكتوبر\n* 1 أكتوبر - انضمام المغرب وتونس إلى جامعة الدول العربية.\n* 2 أكتوبر - غينيا تعلن استقلالها عن فرنسا.\nديسمبر\n* 1 ديسمبر - استقلال جمهورية إفريقيا الوسطى عن فرنسا.", "source_citation": "https://ar.wikipedia.org/?curid=1351 (Wikipedia, CC BY-SA, article id 1351)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:55-ar-q0", "domain": "quran", "language": "ar", "question": "ما هو الشرط الذي وضعوه أن يرونه لكي يؤمنوا؟", "gold_answer": "نرى الله جهرة", "gold_passage_text": "وإذ قلتم يا موسى لن نؤمن لك حتى نرى الله جهرة فأخذتكم الصاعقة وأنتم تنظرون", "source_citation": "Quran 2:55 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:15-ar-q1", "domain": "quran", "language": "ar", "question": "ما هو الوصف الخاص بهم المذكور في الجملة؟", "gold_answer": "في طغيانهم يعمهون", "gold_passage_text": "الله يستهزئ بهم ويمدهم في طغيانهم يعمهون", "source_citation": "Quran 2:15 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1208-1-q0", "domain": "wiki", "language": "ar", "question": "ما عدد السكان والعدد العائلي في مدينة مارشال حسب تعداد عام 2000؟", "gold_answer": "بلغ عدد السكان 23,935 نسمة، والعدد العائلي 6,029 عائلة.", "gold_passage_text": "تعداد عام 2000\nبلغ عدد سكان مارشال 23,935 نسمة بحسب تعداد عام 2000، وبلغ عدد الأسر 8,730 أسرة وعدد العائلات 6,029 عائلة مقيمة في المدينة. في حين سجلت الكثافة السكانية . وبلغ عدد الوحدات السكنية 9,923 وحدة بمتوسط كثافة قدره .\nوتوزع التركيب العرقي للمدينة بنسبة 54.66% من البيض و38.59% من الأمريكيين الأفارقة و0.39% من الأمريكيين الأصليين و0.55% من الأمريكيين ذوي الأصول الآسيوية و0.04% من سكان جزر المحيط الهادئ و4.83% من الأعراق الأخرى و0.94% من عرقين مختلطين أو أكثر و8.64% من الهسبانيون أو اللاتينيون من أي عرق.", "source_citation": "https://ar.wikipedia.org/?curid=1208 (Wikipedia, CC BY-SA, article id 1208)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:28-ar-q0", "domain": "quran", "language": "ar", "question": "ما كانت حالهم قبل أن يُحيهم الله؟", "gold_answer": "كانوا أمواتا", "gold_passage_text": "كيف تكفرون بالله وكنتم أمواتا فأحياكم ۖ ثم يميتكم ثم يحييكم ثم إليه ترجعون", "source_citation": "Quran 2:28 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1443-0-q0", "domain": "wiki", "language": "ar", "question": "في أي سياق أدبي نشأت المسيرة الأدبية نجيب محفوظ من خلال الترجمة؟", "gold_answer": "من خلال ترجمة الروايات الأوروبية من القرن التاسع عشر.", "gold_passage_text": "تتشابك مسيرة نجيب محفوظ الأدبية مع تاريخ الرواية الحديثة في مصر والعالم العربي. في مطلع القرن العشرين، خطت الرواية العربية خطواتها الأولى في مجتمع وثقافة اكتشفت هذا النوع الأدبي من خلال ترجمة الروايات الأوروبية من القرن التاسع عشر. ومع ذلك، بالنسبة لنجيب محفوظ، فإن مجتمعًا قويًا وقديمًا مثل المجتمع المصري، بعد أن حافظ على التقاليد القديمة أثناء التحديث، يمكنه أن يستوعب ويدمج، دون خوف، بعض جوانب الثقافة الغربية. لأن هذا الكاتب استمع قبل كل شيء، في عمله، إلى هذا الشعب المصري، وإلى مغامراته الحميمة وتاريخه.", "source_citation": "https://ar.wikipedia.org/?curid=1443 (Wikipedia, CC BY-SA, article id 1443)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:17-ar-q0", "domain": "quran", "language": "ar", "question": "ما هو التشبيه الذي ورد في النص لوصف حالتهم؟", "gold_answer": "كمثل الذي استوقد نارا", "gold_passage_text": "مثلهم كمثل الذي استوقد نارا فلما أضاءت ما حوله ذهب الله بنورهم وتركهم في ظلمات لا يبصرون", "source_citation": "Quran 2:17 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1343-1-q2", "domain": "wiki", "language": "ar", "question": "ما هي أكبر مدينة جامعية في ألمانيا حسب عدد المرافق البحثية المذكورة في النص؟", "gold_answer": "Berlin، لأنها تحتوي على حوالي 70 مرافقة بحثية.", "gold_passage_text": "برلين تضم أربع جامعات، وأربع مدارس فنون وعشرة كليات تقنية وما يقارب 200,000 طالب من جميع أنحاء العالم وحوالي 70 مرافق بحثية مما جعلها أكبر مدينة جامعية في ألمانيا.", "source_citation": "https://ar.wikipedia.org/?curid=1343 (Wikipedia, CC BY-SA, article id 1343)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:45-ar-q0", "domain": "quran", "language": "ar", "question": "ما هي الوسيلة التي يُوصى بالاستعانة بها في النص؟", "gold_answer": "الصبر والصلاة", "gold_passage_text": "واستعينوا بالصبر والصلاة ۚ وإنها لكبيرة إلا على الخاشعين", "source_citation": "Quran 2:45 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1216-1-q1", "domain": "wiki", "language": "ar", "question": "ما هي العاصمة الرئيسية لفرنلندا ولماذا تُعتبر مركز الحكم؟", "gold_answer": "العاصمة الرئيسية هي هلسنكي، وتكون المقر لفرنلندا الجمهورية برلمانية ذات الحكومة المركزية.", "gold_passage_text": "يقيم حوالي 5.5 مليون شخص في فنلندا حيث تتركز الغالبية في المنطقة الجنوبية. تعد البلاد الثامنة من حيث المساحة في أوروبا وأقل بلدان الاتحاد الأوروبي كثافة سكانية. فنلندا جمهورية برلمانية ذات حكومة مركزية مقرها العاصمة هِلْسِنْكِي وحكومات محلية في 336 بلدية. يعيش في منطقة هلسنكي الكبرى حوالي مليون شخص (والتي تضم هلسنكي وإسبو وكاونياينن وفانتا)، ويتم إنتاج ثلث الناتج المحلي الإجمالي للبلاد في تلك المنطقة. من بين غيرها من المدن الكبرى تامبيري وتوركو وأولو ويوفاسكولا ولهتي وكووبيو وكوفولا.", "source_citation": "https://ar.wikipedia.org/?curid=1216 (Wikipedia, CC BY-SA, article id 1216)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1330-1-q1", "domain": "wiki", "language": "ar", "question": "في أي مجالات تُعد بيروت مؤثرة ثقافيًا كما ينص النص؟", "gold_answer": "تُعد بيروت مؤثرة ثقافيًا في مجالات الصحافة الحرة، والمسارح، دور النشر، معرض الفنون، والمتاحف، بالإضافة إلى كونها تضم عددًا كبيرًا من الجامعات الدولية.", "gold_passage_text": "بيروت هي مركز الثقل السياسي اللبناني حيث مقر معظم الدوائر السياسية مثل البرلمان ورئاسة الحكومة بالإضافة لمراكز معظم الوزارات والدوائر الحكومية. تلعب الدور الرئيسي في الحركة الاقتصادية اللبنانية. وتعد المدينة إحدى أهم المؤثرات الثقافية في منطقة الشرق الأوسط والوطن العربي لغناها بالأنشطة الثقافية مثل الصحافة الحرة والمسارح ودور النشر ومعارض الفنون والمتاحف وعدد كبير من الجامعات الدولية.", "source_citation": "https://ar.wikipedia.org/?curid=1330 (Wikipedia, CC BY-SA, article id 1330)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:51-ar-q0", "domain": "quran", "language": "ar", "question": "ما هي المدة التي وُعد بها موسى؟", "gold_answer": "أربعين ليلة", "gold_passage_text": "وإذ واعدنا موسى أربعين ليلة ثم اتخذتم العجل من بعده وأنتم ظالمون", "source_citation": "Quran 2:51 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1380-1-q0", "domain": "wiki", "language": "ar", "question": "ما هي الأعياد والمناسبات المذكورة في النص؟", "gold_answer": "رأس السنة في التقويم القبطي، رأس السنة في التقويم الإثيوبي، اليوم الوطني في منطقة كتالونيا، ويوم المعلم في أمريكا اللاتينية.", "gold_passage_text": "أعياد ومناسبات\n* رأس السنة في التقويم القبطي.\n* رأس السنة في التقويم الإثيوبي.\n* اليوم الوطني في منطقة كتالونيا.\n* يوم المعلم في أمريكا اللاتينية.", "source_citation": "https://ar.wikipedia.org/?curid=1380 (Wikipedia, CC BY-SA, article id 1380)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:45-ar-q1", "domain": "quran", "language": "ar", "question": "من هي الفئة التي تُفهم فيها أن الصبر والصلاة ليستا كبيرة؟", "gold_answer": "الخاشعين", "gold_passage_text": "واستعينوا بالصبر والصلاة ۚ وإنها لكبيرة إلا على الخاشعين", "source_citation": "Quran 2:45 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1353-1-q2", "domain": "wiki", "language": "ar", "question": "متى كانت تسمية دمشق مقتصدة على المدينة القديمة فقط؟", "gold_answer": "تتوقف التسمية على المدينة القديمة حتى القرن الوسطى.", "gold_passage_text": "هناك عدة نظريات في شرح معنى اسم دمشق، أوفرها انتشارًا كون اللفظة سامية قديمة بمعنى الأرض المسقية؛ يعود ذلك لموقع المدينة الجغرافي في سهل خصيب يرويه نهر بردى وفروعه العديدة، مشكلاً بذلك غوطة دمشق؛ وأيضًا يتميز موقع المدينة بوجود جبل قاسيون فيها. اقتصرت تسمية دمشق على المدينة القديمة حتى القرون الوسطى، حين أخذت المدينة بالتوسّع خارجها، حاليًا تتألف دمشق من خمسة عشر منطقة سكنية متصلة بمحيطها من الضواحي لتشكل ما يعرف باسم دمشق الكبرى.", "source_citation": "https://ar.wikipedia.org/?curid=1353 (Wikipedia, CC BY-SA, article id 1353)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1369-0-q1", "domain": "wiki", "language": "ar", "question": "متى تم تسمية اليمن 'الجُمْهُوْرِيَّةُ اليَمَنِيَّةُ'؟", "gold_answer": "لم يتم ذكر التاريخ في النصوص المقدمة؛ النص يشير فقط إلى أن التسمية تعكس النظم التي تم إنجازه في اليمن.", "gold_passage_text": "اليَمَنُ (أو رَسْمِيًّا: الجُمْهُوْرِيَّةُ اليَمَنِيَّةُ)، هي دولة عربية تقع جنوب غرب شبه الجزيرة العربية في غرب آسيا. تبلغ مساحتها حوالي 555،000 كيلومترًا مربعًا، ويبلغ عدد سكانها 32،684،503 نسمة حسب الإسقاط السكاني لعام 2023. يحد اليمن من الشمال المملكة العربية السعودية ومن الشرق سلطنة عمان، ولها ساحل جنوبي على بحر العرب وساحل غربي على البحر الأحمر. ولدى اليمن أكثر من مائتي جزيرة في البحر الأحمر وبحر العرب أكبرها جزيرتي سقطرى وحنيش. ينص الدستور اليمني على ديمقراطية الدولة وإقرارها التعددية الحزبية والسياسية وتبنيها نظامًا اقتصاديًا حرًا والالتزام بالمواثيق والعهود الدولية المنصوص عليها في الإعلان العالمي لحقوق الإنسان وأن الشريعة الإسلامية هي مصدر جميع التشريعات. اليمن عضو في جامعة الدول العربية والأمم المتحدة وحركة عدم الانحياز ومنظمة التعاون الإسلامي ومنظمة التجارة العالمية.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1185-1-q1", "domain": "wiki", "language": "ar", "question": "كيف يختلف شخصيات سنفور الحالم و سنفور القوي من حيث التسميات؟", "gold_answer": "يختلف سنفور الحالم عن سنفور القوي فقط في أن سنفور الحالم يرتدي نظارة بينما لا يُذكر عن سنفور القوي وجود نظارة.", "gold_passage_text": "الشخصيات\nتمثل عائلة السنافر الكثير من الشخصيات مختلفة الطباع وهم كثر فهناك بابا سنفور وسنفور الحالم وسنفور القوي وسنفور المفكر (الذي يرتدي نظارة) وسنفور الأكول وسنفور الغضبان وسنفور الكسول وسنفور الشاعر وسنفور الرسام وسنفور المازح وسنفور الموسيقي العازف وسنفور العبقري وسنفور المغرور وسنفور المزارع وسنفور المغامر وسنفور الطفل وسنفورة الجميلة.", "source_citation": "https://ar.wikipedia.org/?curid=1185 (Wikipedia, CC BY-SA, article id 1185)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1438-2-q0", "domain": "wiki", "language": "ar", "question": "توفي بغداد كمعظم عاصمة للعالم بعد عام 1258?", "gold_answer": "فقدت هذه المكانة منذ عام 1258 عندما غزاها المغول والتتار.", "gold_passage_text": "كانت بغداد أكبر مدينة في العالم لمُعظم فَترة حُكْم بَنو العَباس خلال العصر الذهبي الإسلامي، بِحَيث بلغَ عَدد سُكانها أكثر من مِليون نَسمة. وصلت مدينة بغداد لذروتها في عصر الخليفة العباسي الخامس هارون الرشيد وارتبطت باسمه في روايات ألف ليلة وليلة ذات الشهرة العالمية، حيث باتت عاصمة العالم القديم. وقد فقدت هذه المكانة منذ عام 1258 عندما غزاها المغول والتتار. مع حلول بدايات القرن السادس عشر، تبادل الصفويون والعثمانيون السيطرة على المدينة، حتى انتزعها العثمانيون أخيراً في عام 1535، فظلت تحت حكمهم قرابة 4 قرون. وفي عام 1917، سيطر الإنجليز على المدينة، وقد خضعت كمعظم مناطق العراق الأخرى تحت الانتداب البريطاني، ثم أصبحت عاصمة للمملكة العراقية عام 1921، والجمهورية العراقية عام 1958.", "source_citation": "https://ar.wikipedia.org/?curid=1438 (Wikipedia, CC BY-SA, article id 1438)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:63-ar-q0", "domain": "quran", "language": "ar", "question": "ما هي الأوامر المذكورة في النص؟", "gold_answer": "خذوا ما آتيناكم بقوة واذكروا ما فيه", "gold_passage_text": "وإذ أخذنا ميثاقكم ورفعنا فوقكم الطور خذوا ما آتيناكم بقوة واذكروا ما فيه لعلكم تتقون", "source_citation": "Quran 2:63 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1442-2-q2", "domain": "wiki", "language": "ar", "question": "عَلِق لغةً من العِلْق: هو المال الذي يكرَم عليك. إذا لم يكن عليه ثيابٌ فيها خير، ماذا يُقال عنه؟", "gold_answer": "العلاقة يُقال عليه: إنه ليس عِلاقاً مضرّةً، أي لا مال يُكرَم عليه.", "gold_passage_text": "شرح المعنى\nالمُعلّقات لغةً من العِلْق: وهي المال الذي يُكرَم عليك، تضُنُّ به، تقول: هذا عِلْقُ مَضَنَّة. وما عليه عِلقةٌ إذا لم يكن عليه ثيابٌ فيها خير، والعِلْقُ: هو النفيس من كلّ شيء، وفي حديث حذيفة: «فما بالُ هؤلاء الذين يسرقون أعلاقنا» أي نفائسَ أموالنا. والعَلَق هو كلّ ما عُلِّق.", "source_citation": "https://ar.wikipedia.org/?curid=1442 (Wikipedia, CC BY-SA, article id 1442)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:33-ar-q0", "domain": "quran", "language": "ar", "question": "من هو الشخص الذي وجه له الله الأمر بأن يُخبرهم بأسمائهم؟", "gold_answer": "آدم.", "gold_passage_text": "قال يا آدم أنبئهم بأسمائهم ۖ فلما أنبأهم بأسمائهم قال ألم أقل لكم إني أعلم غيب السماوات والأرض وأعلم ما تبدون وما كنتم تكتمون", "source_citation": "Quran 2:33 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1318-2-q0", "domain": "wiki", "language": "ar", "question": "كيف يُعرّف الوصف المعطى في النص على أنه جزء من علم الجبر؟", "gold_answer": "تُعَرّف هذه الوصفة بأنها جزء من علم الجبر مثل الجبر الخطي أو الجبر الابتدائي أو الجبر المجرد، أي أنه يدرس هياكل جبرية مع المادة.", "gold_passage_text": "يوجد لذلك الوصف نفس الاختلاف:\n* بدون المادة. تعني جزء من علم الجبر، مثل الجبر الخطي، الجبر الابتدائي (قواعد معالجة-الرموز التي تدرس في مناهج الرياضيات كجزء من التعليم الأساسي والتعليم الثانوي) أو الجبر المجرد (دراسة الهياكل الجبرية مع المادة).\n* فهذا يعني إنه مثيل لبعض التراكيب المجردة، مثل جبر تبادلي أو الجبر الترابطي.\n* كما هو الحال في الجملة: الجبر التبادلي هو دراسة الحلقات، الحلقات التبادلية، التي تعرف كلها بالجبر التبادلي على الأعداد الصحيحة.", "source_citation": "https://ar.wikipedia.org/?curid=1318 (Wikipedia, CC BY-SA, article id 1318)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:39-ar-q0", "domain": "quran", "language": "ar", "question": "من هم أصحاب النار؟", "gold_answer": "الذين كفروا وكذبوا بآياتنا", "gold_passage_text": "والذين كفروا وكذبوا بآياتنا أولئك أصحاب النار ۖ هم فيها خالدون", "source_citation": "Quran 2:39 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:78-ar-q1", "domain": "quran", "language": "ar", "question": "كيف يصف النص فهمهم للكتاب؟", "gold_answer": "أنهم لا يعلمونه إلا أماني وإن هم إلا يظنون", "gold_passage_text": "ومنهم أميون لا يعلمون الكتاب إلا أماني وإن هم إلا يظنون", "source_citation": "Quran 2:78 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:17-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا فعل الله بنورهم بعد أن تضاءت ما حوله؟", "gold_answer": "ذهب بنورهم وتركهم في ظلمات لا يبصرون", "gold_passage_text": "مثلهم كمثل الذي استوقد نارا فلما أضاءت ما حوله ذهب الله بنورهم وتركهم في ظلمات لا يبصرون", "source_citation": "Quran 2:17 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1360-0-q1", "domain": "wiki", "language": "ar", "question": "ما هي أهم المهن التي مارسها قابوس بن سعيد آل سعيد قبل وفاته؟", "gold_answer": "أدرك قابوس بن سعيد آل سعيد منصب رئيس مجلس الوزراء، ووزير الدفاع، والقائد الأعلى للقوات المسلحة.", "gold_passage_text": "قابوس بن سعيد آل سعيد (18 نوفمبر 1940 - 10 يناير 2020) كان السلطان التاسع لسلطنة عُمان، حكم من 23 يوليو 1970 حتى وفاته في عام 2020، وهو الحاكم الثالث عشر من أسرة آل بو سعيد، وهو أيضا رئيس مجلس الوزراء، ووزير الدفاع، والقائد الأعلى للقوات المسلحة. عُدَّ صاحب أطول فترة حكم في الشرق الأوسط والعالم العربي وقت وفاته، بعد أن حكم ما يقرب من خمسين عاما.", "source_citation": "https://ar.wikipedia.org/?curid=1360 (Wikipedia, CC BY-SA, article id 1360)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:57-ar-q0", "domain": "quran", "language": "ar", "question": "ماذا أنزل الله عليكم لتأكلوا من طيبات؟", "gold_answer": "المن والسلوى.", "gold_passage_text": "وظللنا عليكم الغمام وأنزلنا عليكم المن والسلوى ۖ كلوا من طيبات ما رزقناكم ۖ وما ظلمونا ولكن كانوا أنفسهم يظلمون", "source_citation": "Quran 2:57 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1250-2-q1", "domain": "wiki", "language": "ar", "question": "ما هي الجهة التي اعتمد ابن خلدون على أساتزها لإكمال تعليمه؟", "gold_answer": "تونس", "gold_passage_text": "نشأ ابن خلدون على تراث أسرته عريقة العلم؛ فدأب على الدراسة في حِجر أبيه الذي كان معلمه الأول، فقرأ القرآن وحفظه ودرس القراءت السبع والحديث والتفسير والفقه إضافةً للنحو واللّغة مستثمراً أساتذة تونس التي كانت من أبرز مراكز العلوم والآداب في بلاد المغرب. ذكر ابن خلدون أسماء شيوخه في كلِّ علمٍ واهتم بترجمة أعمالهم وتحدث عن بعض الكُتب التي درسها، ويبدو ممّا درسه أنّه تخصص بالفقه المالكي وعلم اللّغة والشعر قبل أن يدخل في الفلسفة والمنطق حتّى بلوغه. وبعدها انتشر الفناء الكبير أو الطاعون الجارف كما يسميه ابن خلدون، وعمّ الوباء ديار الإسلام من سمرقند حتّى المغرب الأقصى، كما انتشر في إيطاليا والبلاد الأوروبية الأُخرى، وقد كابد ابن خلدون الحُزنَ بسبب الوباء إذ فقد معظم معلميه وشيوخه إضافةً لوالديه.", "source_citation": "https://ar.wikipedia.org/?curid=1250 (Wikipedia, CC BY-SA, article id 1250)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1270-0-q0", "domain": "wiki", "language": "ar", "question": "ما هو هدف التطوير الأصلي لبرنامج الميدياويكي؟", "gold_answer": "خدمة احتياجات ويكيبيديا، الموسوعة الحرة.", "gold_passage_text": "ميدياويكي هو برنامج لإدارة مواقع الويكي مستخدم في كل مشاريع مؤسسة ويكيميديا، وكل الويكيات المستضافة في ويكيا، بالإضافة إلى مواقع أخرى كثيرة. طُوّر برنامج الميدياويكي في الأصل ليخدم احتياجات ويكيبيديا، الموسوعة الحرة، لكنه الآن يستخدم لإدارة المعرفة وإدارة المحتوى. والجدير بالذكر أن نوفل (Novell) تستعمل الميدياويكي لتشغيل العديد من مواقعها التي تتلقّى الكثير من الزيارات.", "source_citation": "https://ar.wikipedia.org/?curid=1270 (Wikipedia, CC BY-SA, article id 1270)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:92-ar-q0", "domain": "quran", "language": "ar", "question": "من هو من جاء بالبينات؟", "gold_answer": "موسى", "gold_passage_text": "ولقد جاءكم موسى بالبينات ثم اتخذتم العجل من بعده وأنتم ظالمون", "source_citation": "Quran 2:92 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1372-2-q0", "domain": "wiki", "language": "ar", "question": "من هو المؤسس الذي سيطر على سمرقند وتولى عرشها في العصور الوسطى؟", "gold_answer": "تمورلنك", "gold_passage_text": "عقب سيطرته على سمرقند في العصور الوسطى، أعلنها تيمورلنك، مؤسس إمبراطورية تيمور العظمى، عاصمة لدولته. وأحضر تيمورلنك أفضل المعمارين، والفنانين والحرفيين من شتى بقاع الأرض من الشرق إلى الغرب ومن الشمال إلى الجنوب، لبناء سمرقند بأفضل شكل ممكن، ما جعلها مركز ثقل العالم في تلك المرحلة من التاريخ. وتحولت المدينة إلى مركز علمي عالمي في عهد ابنه أولوغ بيك. ونجحت المدينة في نيل إعجاب كل من زارها على مر القرون الماضية، لا سيما أنها كانت من أهم أجزاء طريق الحرير. ولا تزال المدينة التي حظيت بمكانة واسعة في أشعار ومدائح وروايات الشعراء والكتّاب، تحافظ على رونقها التاريخي في يومنا الحالي.", "source_citation": "https://ar.wikipedia.org/?curid=1372 (Wikipedia, CC BY-SA, article id 1372)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:77-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا يعلم الله؟", "gold_answer": "ما يسرون وما يعلنون", "gold_passage_text": "أولا يعلمون أن الله يعلم ما يسرون وما يعلنون", "source_citation": "Quran 2:77 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-76-1-q0", "domain": "wiki", "language": "ar", "question": "لماذا تستخدم المدارس، وقطاع الأعمال، والمستشفيات، ودوائر التلفاز المغلقة إشارات الهواتف المحمولة عبر أسلاك خاصة؟", "gold_answer": "لأن هذه الأجهزة تستطيع فقط استقبال الإشارات الموجودة في الدوائر الخاصة، ولا تستطيع أجهزة أخرى الموجودة في المنطقة التقاط تلك الإشارات بالطريقة العادية.", "gold_passage_text": "كما توجد استخدامات أخرى للتلفاز غير بث البرامج للمنازل. فمثلاً، تستخدم المدارس، وقطاع الأعمال، والمستشفيات، وغيرها من المنظمات دوائر التلفاز المغلقة. وترسل الإشارات في مثل هذه الدوائر عبر أسلاك إلى أجهزة تلفاز بعينها، ولا تستطيع بقيّة الأجهزة الموجودة في المنطقة التقاط تلك الإشارات بالطريقة العادية.", "source_citation": "https://ar.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:27-ar-q1", "domain": "quran", "language": "ar", "question": "ما هو الفعل الذي يمارسونه في الأرض؟", "gold_answer": "يفسدون في الأرض", "gold_passage_text": "الذين ينقضون عهد الله من بعد ميثاقه ويقطعون ما أمر الله به أن يوصل ويفسدون في الأرض ۚ أولئك هم الخاسرون", "source_citation": "Quran 2:27 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1414-2-q0", "domain": "wiki", "language": "ar", "question": "كانت بي بي سي قد رفضت بث ما نوع المساعدة التي وجهتها إلى قطاع غزة في الهجوم الإسرائيلي عام 2009؟", "gold_answer": "رفضت بي بي سي بث 'مناشدة إنسانية' لصاحبة قطاع غزة.", "gold_passage_text": "بعد الهجوم الإسرائيلي على قطاع غزة 2009 رفضت بي بي سي بث «مناشدة إنسانية لصالح قطاع غزة» الأمر الذي فهمه البعض على أنه «انحياز لصالح إسرائيل» حيث انتقدت من كثير من الجهات من بينها الحكومة البريطانية حيث وصف وزير الصحة امتناعها بث نداء الاستغاثة «بالمؤسف» ، فيما نفت البي بي سي تهمة الانحياز معللة الأمر بكون المناشدة التي وجهتها لجنة الطوارئ الخاصة بالكوارث المؤلفة من 13 وكالة إغاثة «ستُقَوض الحياد الذي يميز تغطية الإذاعة» حسب رأيها.", "source_citation": "https://ar.wikipedia.org/?curid=1414 (Wikipedia, CC BY-SA, article id 1414)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:56-ar-q0", "domain": "quran", "language": "ar", "question": "ما هو الغرض من بعثناكم؟", "gold_answer": "لعلكم تشكرون", "gold_passage_text": "ثم بعثناكم من بعد موتكم لعلكم تشكرون", "source_citation": "Quran 2:56 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:60-ar-q1", "domain": "quran", "language": "ar", "question": "كم عدد العيون التي انفجرت من الحجر؟", "gold_answer": "اثنتا عشرة عينا", "gold_passage_text": "وإذ استسقى موسى لقومه فقلنا اضرب بعصاك الحجر ۖ فانفجرت منه اثنتا عشرة عينا ۖ قد علم كل أناس مشربهم ۖ كلوا واشربوا من رزق الله ولا تعثوا في الأرض مفسدين", "source_citation": "Quran 2:60 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1416-1-q1", "domain": "wiki", "language": "ar", "question": "ما هو التحالف الذي تعتقد القاعدة أنه يتأمر لتدمير الإسلام؟", "gold_answer": "تحالفًا مسيحيًا - يهوديًا.", "gold_passage_text": "تشمل أهداف القاعدة إنهاء النفوذ الأجنبي في البلدان الإسلامية، وإعادة الخلافة الإسلامية، وتطبيق الشريعة الإسلامية. وتعتقد القاعدة أن هناك تحالفًا مسيحيًا - يهوديًا يتآمر لتدمير الإسلام.", "source_citation": "https://ar.wikipedia.org/?curid=1416 (Wikipedia, CC BY-SA, article id 1416)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1253-2-q0", "domain": "wiki", "language": "ar", "question": "من هو الملك الذي أسست المملكة الأردنية الهاشمية له؟", "gold_answer": "أبو العلاء صالح بن الحسين", "gold_passage_text": "أسّس الأمير عبد الله بن الحسين عام 1921، إمارة شرق الأردن بمساعدة المملكة المتحدة وكانت خاضعة آنذاك لحكم المملكة المتحدة في منطقة فلسطين الانتدابية، استقلت عام 1946 ونودي بالأمير عبد الله ملكًا عليها، فعُرفت منذ ذلك الحين باسم المملكة الأردنية الهاشمية. النظام في المملكة الأردنية الهاشمية هو نظام ملكي دستوري مع حكومة تمثيلية. الملك يمارس سلطته التنفيذية من خلال رئيس الوزراء ومجلس الوزراء، الذي في الوقت نفسه، هو مسؤول أمام مجلس النواب (المنتخب) ومجلس الأعيان (المُعَّين من قبل الملك) الذين يشكلان السلطة التشريعية للدولة. هناك أيضًا السلطة القضائية المستقلة. الأردن عضو مؤسس في جامعة الدول العربية ومنظمة التعاون الإسلامي. يُعد الأردن دولة ذات سيادة ملكية دستورية، ومع ذلك فإن الملك يتمتع بسلطات تنفيذية وتشريعية واسعة.", "source_citation": "https://ar.wikipedia.org/?curid=1253 (Wikipedia, CC BY-SA, article id 1253)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1413-1-q1", "domain": "wiki", "language": "ar", "question": "ما هي الفترة التاريخية التي يعلق المجتمع الدولي بها الدعم العسكري للطالبان، وما كانت رد فعل باكستان عن هذا الدعم؟", "gold_answer": "الفترة هي من تأسيس طالبان حتى فترة وجودها في السلطة، واستمرت في التمرد. نفتت باكستان ذلك، وأصبحت ضدتهم بعد هجمات 11 سبتمبر.", "gold_passage_text": "يزعم المجتمع الدولي والحكومة الأفغانية على نطاق واسع أن المخابرات الباكستانية والقوات المسلحة الباكستانية قدمت الدعم لطالبان أثناء تأسيسها وفترة وجودها في السلطة، واستمرت في دعمهم أثناء التمرد. ونفت باكستان ذلك وصرحت بأنها أسقطت كل الدعم للجماعة بعد هجمات 11 سبتمبر. وفي سنة 2001 ورد أن 2500 عربي تحت قيادة زعيم القاعدة أسامة بن لادن قاتلوا مع طالبان.", "source_citation": "https://ar.wikipedia.org/?curid=1413 (Wikipedia, CC BY-SA, article id 1413)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1369-1-q1", "domain": "wiki", "language": "ar", "question": "في أي تصنيف دولي تُفرد اليمن في القائمة التي ذكرتها النص؟", "gold_answer": "تُعد اليمن دولة نامية، ومن بين أقل البلدان نمواً، حيث احتلت المرتبة الثامنة في قائمة الدول الأكثر هشاشة حول العالم لعام 2014.", "gold_passage_text": "يعتمد اقتصاد اليمن على موارد محدودة من النفط والغاز لم تستغل جيداً ولا يزال هذا القطاع رغم أنه يشكل النسبة الأكبر من الناتج المحلي الإجمالي غير مطور. تاريخياً، اليمن بلد زراعي، ولكنه يعتمد على مداخيل ممراته البحرية وموانئه.\nتمر البلاد بأوضاع سياسية واقتصادية صعبة نتيجة الفساد والصراعات المسلحة التي تعيق مسيرة التنمية. اليمن دولة نامية ومن بين البلدان الأقل نماءً حيث احتلت المرتبة الثامنة في قائمة الدول الأكثر هشاشة حول العالم لعام 2014.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1353-2-q0", "domain": "wiki", "language": "ar", "question": "ما هو أحد ألقاب أخرى تُعرف بمدينة الياسمين في القصة؟", "gold_answer": "تشترها اسمًا مثل الشام", "gold_passage_text": "تُعرف أيضًا بأسماء عديدة منها الشام و مدينة الياسمين؛ وقد احتلت مكانة إقليمية بارزة على صعيد الفنون، والآداب، والسياسة؛ وحظيت باهتمام الأدباء والشعراء والرحالة ونظم في وصفها العديد من النصوص الشعريّة والأدبيّة، نذكر منهم ياقوت الحموي الذي كتب:", "source_citation": "https://ar.wikipedia.org/?curid=1353 (Wikipedia, CC BY-SA, article id 1353)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:52-ar-q1", "domain": "quran", "language": "ar", "question": "When does the forgiveness happen?", "gold_answer": "من بعد ذلك", "gold_passage_text": "ثم عفونا عنكم من بعد ذلك لعلكم تشكرون", "source_citation": "Quran 2:52 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1333-0-q1", "domain": "wiki", "language": "ar", "question": "ما هو الموقع الجغرافي الذي يحيط بالبحر الأَبْيَضُ؟", "gold_answer": "يمتد البَحْر من الشمال إلى الأناضول وأوروبا، من الجنوب إلى شمال أفريقيا، ومن الشرق إلى بلاد الشام، ويتصل بالمحيط الأطلسي.", "gold_passage_text": "البَحْرُ الأَبْيَضُ المُتَوَسِّطُ أو البَحْرُ المُتَوَسِّطُ -سمَّاه العرب قديمًا بَحْرَ الرُّومِ أو البَحْرَ الشَّامِيَّ- هو بحر متصل بالمحيط الأطلسي وتحيط به منطقة البحر الأبيض المتوسط وهو شبه محاط تمامًا بالبر: من الشمال الأناضول وأوروبا ومن الجنوب شمال أفريقيا ومن الشرق بلاد الشام. يُعد البحر من الناحية الفنية جزءً من المحيط الأطلسي على الرغم من أنه يوصف عادة باعتباره كيانًا مستقلًا تمامًا.", "source_citation": "https://ar.wikipedia.org/?curid=1333 (Wikipedia, CC BY-SA, article id 1333)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1319-1-q1", "domain": "wiki", "language": "ar", "question": "أي ملاحظات جديدة دخلت على اللغات اللاتينية من ترجمة روبرت من تشستر؟", "gold_answer": "الجبر (Algebra) والصف (Zero).", "gold_passage_text": "تَرجمَ الكتابَ إلى اللاتينية العالمُ روبرت مِن تشستر نحو سنة 1145 م، دخلت على إثر ذلك كلمات جديدة، مثلُ: الجَبْر Algebra، والصِفر Zero إلى اللغات اللاتينية، وترجمه بعد ذلك بقليل جيراردو الكريموني الساكن في طليطلة، متبوعًا في ذلك بترجمة ثالثة للإيطالي غيوم دي لونا. استُعملت ترجمة روبرت مِن تشستر الكتاب الرئيسي في الرياضيات إلى حدود القرن السادس عشر في الجامعات الأوروبية.", "source_citation": "https://ar.wikipedia.org/?curid=1319 (Wikipedia, CC BY-SA, article id 1319)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:18-ar-q0", "domain": "quran", "language": "ar", "question": "من هو الشخص الذي يُشار إليه في النص؟", "gold_answer": "العمي فهم", "gold_passage_text": "صم بكم عمي فهم لا يرجعون", "source_citation": "Quran 2:18 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:30-ar-q1", "domain": "quran", "language": "ar", "question": "ما هي المخاوف التي عبّر عنها الملائكة بخصوص وضع خليفة في الأرض؟", "gold_answer": "قالوا أتجعل فيها من يفسد فيها ويسفك الدماء", "gold_passage_text": "وإذ قال ربك للملائكة إني جاعل في الأرض خليفة ۖ قالوا أتجعل فيها من يفسد فيها ويسفك الدماء ونحن نسبح بحمدك ونقدس لك ۖ قال إني أعلم ما لا تعلمون", "source_citation": "Quran 2:30 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:20-ar-q1", "domain": "quran", "language": "ar", "question": "كيف يُوصف الله في النص؟", "gold_answer": "أنه على كل شيء قدير", "gold_passage_text": "يكاد البرق يخطف أبصارهم ۖ كلما أضاء لهم مشوا فيه وإذا أظلم عليهم قاموا ۚ ولو شاء الله لذهب بسمعهم وأبصارهم ۚ إن الله على كل شيء قدير", "source_citation": "Quran 2:20 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1181-1-q1", "domain": "wiki", "language": "ar", "question": "ما هي المدينة التي كانت هاربًا إليها الأميرة من خيولها، وكيف تحول اسمها اللاتيني إلى قرطاج؟", "gold_answer": "كانت المدينة اسمها «قَرْت حَدَشْت» (المدينة الجديدة) وهي بلدة لبنانية، وأصبح الاسم قرطاجًا عند الترجمة إلى اللاتيني بسبب طريقة نطقه.", "gold_passage_text": "أسست الأميرة الفينيقية عليسة (أليسا أو أليسار) قرطاج عام 814 ق م.، حسب رواية المؤرخين القدماء. وجاءت الأميرة هاربة من أخيها مع أصحابها من مدينة صور بلبنان، وسموا المدينة 15px 15px 15px 15px 15px 15px 15px «قَرْت حَدَشْت» بمعنى «المدينة الجديدة» (من الفينيقية: قَرْت أي مدينة أو قرية، وحَدَشْت أي حديثة)، فأصبح الاسم «قرطاج» عن طريق النطق اللاتيني. وكانوا يعبدون خاصة «ملقرت»، واسمه يعني «ملك المدينة».\n [[ملف:Dido purchases Land for the Foundation of Carthage.jpg|تصغير|ديدون تؤسس قرطاج]]", "source_citation": "https://ar.wikipedia.org/?curid=1181 (Wikipedia, CC BY-SA, article id 1181)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:6-ar-q0", "domain": "quran", "language": "ar", "question": "من هم الذين لا يؤمنون؟", "gold_answer": "الذين كفروا", "gold_passage_text": "إن الذين كفروا سواء عليهم أأنذرتهم أم لم تنذرهم لا يؤمنون", "source_citation": "Quran 2:6 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:47-ar-q1", "domain": "quran", "language": "ar", "question": "ما هو الأمر الذي يُطلب من بني إسرائيل في هذا النص؟", "gold_answer": "اذكروا نعمتي التي أنعمت عليكم وأني فضلتكم على العالمين", "gold_passage_text": "يا بني إسرائيل اذكروا نعمتي التي أنعمت عليكم وأني فضلتكم على العالمين", "source_citation": "Quran 2:47 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:14-ar-q1", "domain": "quran", "language": "ar", "question": "متى يقولون أنهم مستهزئون؟", "gold_answer": "إذا خلوا إلى شياطينهم", "gold_passage_text": "وإذا لقوا الذين آمنوا قالوا آمنا وإذا خلوا إلى شياطينهم قالوا إنا معكم إنما نحن مستهزئون", "source_citation": "Quran 2:14 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-1:5-ar-q0", "domain": "quran", "language": "ar", "question": "ما هما الفعلان المذكوران في النص؟", "gold_answer": "نعبد ونستعين", "gold_passage_text": "إياك نعبد وإياك نستعين", "source_citation": "Quran 1:5 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:74-ar-q1", "domain": "quran", "language": "ar", "question": "ما الحكم الذي ورد في النص بخصوص الله وعما تعملون؟", "gold_answer": "ما الله بغافل عما تعملون", "gold_passage_text": "ثم قست قلوبكم من بعد ذلك فهي كالحجارة أو أشد قسوة ۚ وإن من الحجارة لما يتفجر منه الأنهار ۚ وإن منها لما يشقق فيخرج منه الماء ۚ وإن منها لما يهبط من خشية الله ۗ وما الله بغافل عما تعملون", "source_citation": "Quran 2:74 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1349-2-q0", "domain": "wiki", "language": "ar", "question": "من هو السلطان الحالي في عُمان وفقًا للنص؟", "gold_answer": "هيثم بن طارق آل سعيد", "gold_passage_text": "نظام الحكم في عُمان سلطاني وراثي والسلطان الحالي هو هيثم بن طارق آل سعيد الذي تولّى الحكم في 11 يناير 2020 عقب وفاة السلطان قابوس بن سعيد بن تيمور آل سعيد صاحب أطول فترة حكم في الشرق الأوسط حتى وفاته. لا يسمح الدستور العُماني بالأحزاب السياسية بينما يكفل حق الانتخاب لكل مواطن عُماني بلغ الواحدة والعشرين من عمره لاختيار أعضاء مجلس الشورى.", "source_citation": "https://ar.wikipedia.org/?curid=1349 (Wikipedia, CC BY-SA, article id 1349)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1364-0-q1", "domain": "wiki", "language": "ar", "question": "كيف يتم تسمية لينوس بينيديكت تورفالدس؟", "gold_answer": "هلسنكي.", "gold_passage_text": "لينوس بينيديكت تورفالدس (هلسنكي، 28 ديسمبر 1969) مهندس برمجيات فنلندي، اشتهر بأنه من وضع النواة المعروفة بـ لينُكس. سُمي على اسم الفيزيائي لينوس باولنغ الحائز على جائزة نوبل.", "source_citation": "https://ar.wikipedia.org/?curid=1364 (Wikipedia, CC BY-SA, article id 1364)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:14-ar-q0", "domain": "quran", "language": "ar", "question": "ماذا يقولون إذا لقوا الذين آمنوا؟", "gold_answer": "قالوا آمنا", "gold_passage_text": "وإذا لقوا الذين آمنوا قالوا آمنا وإذا خلوا إلى شياطينهم قالوا إنا معكم إنما نحن مستهزئون", "source_citation": "Quran 2:14 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:24-ar-q0", "domain": "quran", "language": "ar", "question": "ما هو وقود النار الذي ذُكر في النص؟", "gold_answer": "الناس والحجارة", "gold_passage_text": "فإن لم تفعلوا ولن تفعلوا فاتقوا النار التي وقودها الناس والحجارة ۖ أعدت للكافرين", "source_citation": "Quran 2:24 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1309-0-q0", "domain": "wiki", "language": "ar", "question": "أي دولة عربية تقع في وسط غرب القارة الآسيوية؟", "gold_answer": "دولتي لبنان", "gold_passage_text": "لُبنَان (رسميًّا: الجُمْهُورِيَّة اللبنانيَّة) هي دولة عربيّة واقِعَة في الشَرق الأوسط في غرب القارة الآسيويّة. تَحُدّها سوريا من الشمال والشرق، وفلسطين المحتلة (إسرائيل) من الجنوب، وتطل من جهة الغرب على البحر الأبيض المتوسط. هو بلد ديمقراطي جمهوري طوائفي. مُعظم سكانه من العرب المسلمين والمسيحيين. وبخلاف غالبيّة الدول العربيّة هناك وجود فعّال للمسيحيين في الحياة العامّة والسياسيّة. هاجر وانتشر أبناؤه حول العالم منذ أيام الفينيقيين، وحاليًّا فإن عدد اللبنانيين المهاجرين يُقدَّر بضعف عدد اللبنانيين المقيمين.", "source_citation": "https://ar.wikipedia.org/?curid=1309 (Wikipedia, CC BY-SA, article id 1309)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:65-ar-q0", "domain": "quran", "language": "ar", "question": "من هم الذين قيل لهم أن يكونوا قردة خاسئين؟", "gold_answer": "الذين اعتدوا منكم في السبت", "gold_passage_text": "ولقد علمتم الذين اعتدوا منكم في السبت فقلنا لهم كونوا قردة خاسئين", "source_citation": "Quran 2:65 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:2-ar-q1", "domain": "quran", "language": "ar", "question": "من المتصفون بهذا الكتاب كهدى؟", "gold_answer": "للمتقين", "gold_passage_text": "ذلك الكتاب لا ريب ۛ فيه ۛ هدى للمتقين", "source_citation": "Quran 2:2 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:31-ar-q0", "domain": "quran", "language": "ar", "question": "من هو الشخص الذي تعلم الأسماء كلها ثم عرضها على الملائكة؟", "gold_answer": "آدم", "gold_passage_text": "وعلم آدم الأسماء كلها ثم عرضهم على الملائكة فقال أنبئوني بأسماء هؤلاء إن كنتم صادقين", "source_citation": "Quran 2:31 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1432-1-q1", "domain": "wiki", "language": "ar", "question": "في أي ظروف تظهر آثار التوسع الأوعية الدموية في الرئتين للسيلدينافيل؟", "gold_answer": "عندما يكون هناك إثارة جنسية، لأن الدواء لا يزيدها ولا يثبطها بمفرده.", "gold_passage_text": "يعمل السيلدينافيل عن طريق تثبيط ()، وهو إنزيمٌ يُحفز تحلل حلقي الغوانوسين أحادي الفوسفات ()، الذي يُنظّم تدفق الدم في القضيب. ويتطلب الدواء وجود إثارةٍ جنسية ليُظهر مفعوله، إذ لا يُسبب الإثارة الجنسية أو يزيدها بمفرده. كما يؤدي إلى توسع الأوعية الدموية في الرئتين.", "source_citation": "https://ar.wikipedia.org/?curid=1432 (Wikipedia, CC BY-SA, article id 1432)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1372-0-q0", "domain": "wiki", "language": "ar", "question": "في أي بلد تقع مدينة سمرقند؟", "gold_answer": "تقع سمرقند في أوزبكستان.", "gold_passage_text": "سمرقند (بالأوزبكية: Samarqand؛ بالطاجيكية: Самарқанд؛ بالفارسية: سمرقند) هي مدينة تقع في جنوب شرق أوزبكستان، وهي من أقدم المدن المأهولة بالسكان في آسيا الوسطى، ويبلغ عدد سكانها 593,000 نسمة (2021)، وهي ثالث أكبر مدينة في أوزبكستان.", "source_citation": "https://ar.wikipedia.org/?curid=1372 (Wikipedia, CC BY-SA, article id 1372)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:58-ar-q1", "domain": "quran", "language": "ar", "question": "ما النتيجة التي وعد الله بها في هذا النص؟", "gold_answer": "نغفر لكم خطاياكم ۚ وسنزيد المحسنين", "gold_passage_text": "وإذ قلنا ادخلوا هذه القرية فكلوا منها حيث شئتم رغدا وادخلوا الباب سجدا وقولوا حطة نغفر لكم خطاياكم ۚ وسنزيد المحسنين", "source_citation": "Quran 2:58 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1415-1-q0", "domain": "wiki", "language": "ar", "question": "ما هي أهم النهرات التي تسريان عبر العراق وتعتبر بيئة خصبة لحضارات أولية؟", "gold_answer": "الدجلة والفرات", "gold_passage_text": "العراق بلد متنوع التضاريس؛ فمن الجبال والوديان والغابات في شمال العراق وبخاصة في إقليم كردستان، إلى التلال في سلسلة تلال حمرين، ومن السهل الرسوبي الخصب فيما بين نهري دجلة والفرات إلى الصحاري القاحلة كالصحراء العربية وبادية الشام، وكذلك يحتوي العراق على الهضبة الغربية الصحراوية في الغرب، وعلى نهرين مهمين هما دجلة والفرات واللذين على ضفافهما نشأت أولى الحضارات، وتوجد الأهوار الطبيعية في جنوب العراق والتي تعد البيئة الطبيعية لحيوانات لا توجد في أي مكان آخر من العالم، ومن أشهرها هور الحويزة وهور الحَمّار. وتوجد عدة بحيرات صناعية في العراق كبحيرة الثرثار والرزازة وغيرها، وفيهِ البحيرات الطبيعية كبحيرة ساوة في صحراء بادية السماوة في محافظة المثنى.", "source_citation": "https://ar.wikipedia.org/?curid=1415 (Wikipedia, CC BY-SA, article id 1415)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:40-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا يُطلب من المستمعين أن يذكرو؟", "gold_answer": "نعمتي التي أنعمت عليكم", "gold_passage_text": "يا بني إسرائيل اذكروا نعمتي التي أنعمت عليكم وأوفوا بعهدي أوف بعهدكم وإياي فارهبون", "source_citation": "Quran 2:40 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:5-ar-q0", "domain": "quran", "language": "ar", "question": "من هو الذي يُهمهم على هدى؟", "gold_answer": "ربهم", "gold_passage_text": "أولئك على هدى من ربهم ۖ وأولئك هم المفلحون", "source_citation": "Quran 2:5 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:15-ar-q0", "domain": "quran", "language": "ar", "question": "ما هي الأفعال التي يمارسها الله تجاههم في النص؟", "gold_answer": "يستهزئ بهم ويمدهم", "gold_passage_text": "الله يستهزئ بهم ويمدهم في طغيانهم يعمهون", "source_citation": "Quran 2:15 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:4-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا يؤمنون به؟", "gold_answer": "بما أنزل إليك وما أنزل من قبلك وبالآخرة", "gold_passage_text": "والذين يؤمنون بما أنزل إليك وما أنزل من قبلك وبالآخرة هم يوقنون", "source_citation": "Quran 2:4 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:73-ar-q0", "domain": "quran", "language": "ar", "question": "ماذا يفعل الله بالموتى؟", "gold_answer": "يحيي الله الموتى", "gold_passage_text": "فقلنا اضربوه ببعضها ۚ كذلك يحيي الله الموتى ويريكم آياته لعلكم تعقلون", "source_citation": "Quran 2:73 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:42-ar-q0", "domain": "quran", "language": "ar", "question": "ما هما الأمران المحرمان المذكوران في النص؟", "gold_answer": "تلبسوا الحق بالباطل وتكتموا الحق", "gold_passage_text": "ولا تلبسوا الحق بالباطل وتكتموا الحق وأنتم تعلمون", "source_citation": "Quran 2:42 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:80-ar-q0", "domain": "quran", "language": "ar", "question": "ماذا قالوا عن النار؟", "gold_answer": "لن تمسنا النار إلا أياما معدودة", "gold_passage_text": "وقالوا لن تمسنا النار إلا أياما معدودة ۚ قل أتخذتم عند الله عهدا فلن يخلف الله عهده ۖ أم تقولون على الله ما لا تعلمون", "source_citation": "Quran 2:80 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:59-ar-q1", "domain": "quran", "language": "ar", "question": "ما هو السبب الذي يُذكر في إنزال الرجز على الذين ظلموا؟", "gold_answer": "بما كانوا يفسقون", "gold_passage_text": "فبدل الذين ظلموا قولا غير الذي قيل لهم فأنزلنا على الذين ظلموا رجزا من السماء بما كانوا يفسقون", "source_citation": "Quran 2:59 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1361-2-q0", "domain": "wiki", "language": "ar", "question": "هل تعتبر المملكة هولندا عضوًا في الاتحاد الأوروبي؟", "gold_answer": "لا،根据
