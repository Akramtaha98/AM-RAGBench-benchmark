国家文本，她不是欧盟的成员。", "gold_passage_text": "| دولة عضو في الأمم المتحدة\n| لا\n|عضو في الاتحاد الأوروبي. The مملكة هولندا includes four areas with substantial autonomy:\n* \n* \n* \n*", "source_citation": "https://ar.wikipedia.org/?curid=1361 (Wikipedia, CC BY-SA, article id 1361)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:69-ar-q0", "domain": "quran", "language": "ar", "question": "ماذا طلب القوم من ربهم؟", "gold_answer": "ادع لنا ربك يبين لنا ما لونها", "gold_passage_text": "قالوا ادع لنا ربك يبين لنا ما لونها ۚ قال إنه يقول إنها بقرة صفراء فاقع لونها تسر الناظرين", "source_citation": "Quran 2:69 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1371-2-q0", "domain": "wiki", "language": "ar", "question": "كيف تم تسمية الموضع الذي يمتنع فيه الناس بعد ذلك على أنه 'جامع'؟", "gold_answer": "لأنها علامة الاجتماع", "gold_passage_text": "أصل كلمة مسجد في اللغة العربية\nالمسجد هو الموضع الذي يسجد فيه، وكل موضع يتعبد فيه فهو مسجد، حيث قال الله تعالى ،\nو، أما الجامع فهو نعت للمسجد، ونعت بذلك لأنه علامة الاجتماع، وفي الصدر الأول كانوا يقتصرون على كلمة مسجد، ثم صنفوا فقالوا المسجد الجامع، وآونة يضيفونها إلى الصفة فيقولون مسجد الجامع، ثم تجوز الناس واقتصروا على الصفة فقالوا للمسجد الكبير الذي تصلى فيه الجمعة وإن كان صغيراً الجامع؛ لأنه يجمع الناس لوقت معلوم.", "source_citation": "https://ar.wikipedia.org/?curid=1371 (Wikipedia, CC BY-SA, article id 1371)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:25-ar-q1", "domain": "quran", "language": "ar", "question": "ماذا قالوا كلما رزقوا منها من ثمرة رزقا؟", "gold_answer": "قالوا هذا الذي رزقنا من قبل", "gold_passage_text": "وبشر الذين آمنوا وعملوا الصالحات أن لهم جنات تجري من تحتها الأنهار ۖ كلما رزقوا منها من ثمرة رزقا ۙ قالوا هذا الذي رزقنا من قبل ۖ وأتوا به متشابها ۖ ولهم فيها أزواج مطهرة ۖ وهم فيها خالدون", "source_citation": "Quran 2:25 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1201-0-q0", "domain": "wiki", "language": "ar", "question": "ما هو اسم شخصية تُعرف في النص باسم 'أبو الطيب المتنبي'؟", "gold_answer": "هو أحمد شوقي", "gold_passage_text": "- أحمد شوقي.\n - أحمد شوقي.\n - أبو الطيب المتنبي.\n - أبو الطيب المتنبي.\n - أحمد شوقي.\n - أحمد شوقي.\n- أحمد شوقي.\n - حافظ إبراهيم.\n - الإمام الشافعي.\n - إيليا أبو ماضي.", "source_citation": "https://ar.wikipedia.org/?curid=1201 (Wikipedia, CC BY-SA, article id 1201)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:32-ar-q1", "domain": "quran", "language": "ar", "question": "كيف يصفون الله في هذا القول؟", "gold_answer": "العليم الحكيم", "gold_passage_text": "قالوا سبحانك لا علم لنا إلا ما علمتنا ۖ إنك أنت العليم الحكيم", "source_citation": "Quran 2:32 (Arabic, Tanzil.net Uthmani/Simple text, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ar-wiki-1415-0-q0", "domain": "wiki", "language": "ar", "question": "كيف يُعرف العراق رسمياً في النص؟", "gold_answer": "الجزء الشرعي يُعرف رسمياً بدولة عربية، جمهورية برلمانية، اتحادية وفقاً لدستور العراق.", "gold_passage_text": "ٱلْعِرَاقُ (رسميًّا: جُمْهُورِيَّةُ ٱلْعِرَاقِ) دولة عربية، جُمهورية، برلمانية، اتحادية على وَفْق دُستور العراق، وهو رسمياً تسعَ عشْرةَ محافظة، عاصمته بَغدادُ. وهو في غرب آسيا، وهو القسم الشَّمالي الشرقي من الوطن العربي، يُطل على الخليج العربي. عن جَنوبه: الكويت، والمملكة العربية السُّعودية، وعن شَماله: تركيَا، وعن غربه: سوريَة، والأردن، وعن شرقه: إيران، وهو عضوٌ مؤسس في: الأمم المتحدة وجامعة الدول العربية ومنظمة المؤتمر الإسلامي ومنظمة أوبك. له خامس أكبر احتياطي var STORAGE_KEY = 'amragbench_arabic_reannotation_v1';

function loadState() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { return JSON.parse(raw); } catch (e) { return {}; } }
  return {};
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
var state = loadState();

function getRec(id) {
  if (!state[id]) state[id] = { decision: '', corrected_question: '', corrected_answer: '', notes: '' };
  return state[id];
}

function updateStats() {
  var total = RECORDS.length;
  var done = 0;
  for (var i = 0; i < RECORDS.length; i++) {
    if (state[RECORDS[i].id] && state[RECORDS[i].id].decision) done++;
  }
  document.getElementById('statsLine').textContent = done + ' / ' + total + ' reviewed';
  var pct = total ? Math.round(100 * done / total) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function setDecision(id, decision) {
  var rec = getRec(id);
  rec.decision = decision;
  saveState(state);
  render();
}

function updateField(id, field, value) {
  var rec = getRec(id);
  rec[field] = value;
  saveState(state);
}

function cardHtml(r) {
  var rec = getRec(r.id);
  var isDone = !!rec.decision;
  var validClass = rec.decision === 'valid' ? ' active-valid' : '';
  var editClass = rec.decision === 'edit' ? ' active-edit' : '';
  var invalidClass = rec.decision === 'invalid' ? ' active-invalid' : '';
  var editShow = rec.decision === 'edit' ? ' show' : '';
  var notesShow = rec.decision ? ' show' : '';

  var html = '<div class="card' + (isDone ? ' done' : '') + '" data-id="' + r.id + '">';
  html += '<div class="meta">' + r.id + ' &middot; ' + r.domain + ' &middot; ' + r.language + '</div>';
  html += '<div class="field-label">Passage</div>';
  html += '<div class="field-value passage">' + r.gold_passage_text + '</div>';
  html += '<div class="field-label">Question</div>';
  html += '<div class="field-value">' + r.question + '</div>';
  html += '<div class="field-label">Answer</div>';
  html += '<div class="field-value">' + r.gold_answer + '</div>';
  html += '<div class="actions">';
  html += '<button class="decision' + validClass + '" onclick="setDecision(\'' + r.id + '\',\'valid\')">Valid as-is</button>';
  html += '<button class="decision' + editClass + '" onclick="setDecision(\'' + r.id + '\',\'edit\')">Needs edit</button>';
  html += '<button class="decision' + invalidClass + '" onclick="setDecision(\'' + r.id + '\',\'invalid\')">Invalid / reject</button>';
  html += '</div>';
  html += '<div class="edit-fields' + editShow + '">';
  html += '<div class="field-label">Corrected question (if needed)</div>';
  html += '<textarea rows="2" oninput="updateField(\'' + r.id + '\',\'corrected_question\',this.value)">' + (rec.corrected_question || '') + '</textarea>';
  html += '<div class="field-label">Corrected answer (if needed)</div>';
  html += '<textarea rows="2" oninput="updateField(\'' + r.id + '\',\'corrected_answer\',this.value)">' + (rec.corrected_answer || '') + '</textarea>';
  html += '</div>';
  html += '<div class="notes-field' + notesShow + '">';
  html += '<div class="field-label">Notes (optional)</div>';
  html += '<textarea rows="2" oninput="updateField(\'' + r.id + '\',\'notes\',this.value)">' + (rec.notes || '') + '</textarea>';
  html += '</div>';
  html += '</div>';
  return html;
}

function render() {
  var filter = document.getElementById('filterSelect').value;
  var container = document.getElementById('cardsContainer');
  var htmlParts = [];
  for (var i = 0; i < RECORDS.length; i++) {
    var r = RECORDS[i];
    var rec = getRec(r.id);
    if (filter === 'undone' && rec.decision) continue;
    if (filter === 'valid' && rec.decision !== 'valid') continue;
    if (filter === 'edit' && rec.decision !== 'edit') continue;
    if (filter === 'invalid' && rec.decision !== 'invalid') continue;
    htmlParts.push(cardHtml(r));
  }
  container.innerHTML = htmlParts.join('');
  updateStats();
}

function csvEscape(val) {
  val = (val === undefined || val === null) ? '' : String(val);
  if (val.indexOf(',') !== -1 || val.indexOf('"') !== -1 || val.indexOf('\n') !== -1) {
    val = '"' + val.replace(/"/g, '""') + '"';
  }
  return val;
}

function exportCsv() {
  var header = ['id','domain','language','question','gold_answer','gold_passage_text',
                 'new_annotator_decision','new_corrected_question','new_corrected_answer','new_annotator_notes'];
  var lines = [header.join(',')];
  for (var i = 0; i < RECORDS.length; i++) {
    var r = RECORDS[i];
    var rec = getRec(r.id);
    var row = [r.id, r.domain, r.language, r.question, r.gold_answer, r.gold_passage_text,
               rec.decision, rec.corrected_question, rec.corrected_answer, rec.notes];
    lines.push(row.map(csvEscape).join(','));
  }
  var csvContent = '﻿' + lines.join('\r\n');
  var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'amragbench_arabic_reannotation_v1_completed.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('exportBtn').addEventListener('click', exportCsv);
document.getElementById('filterSelect').addEventListener('change', render);
render();
</script>
