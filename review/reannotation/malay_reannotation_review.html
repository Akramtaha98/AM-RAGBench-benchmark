var RECORDS = [{"id": "quran-2:93-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimanakah sebab kegemaran menyembah patung anak lembu itu telah mesra di dalam hati mereka?", "gold_answer": "Dengan sebab kekufuran mereka.", "gold_passage_text": "Dan (ingatlah) ketika Kami mengikat perjanjian setia dengan kamu semasa Kami angkatkan bukit Tursina itu ke atas kamu (sambil kami berfirman): \"Ambilah (dan amalkanlah ajaran Kitab Taurat) yang Kami berikan kepada kamu itu dengan bersungguh-sungguh, dan dengarlah (apa yang diperintahkan kepada kamu dengan mematuhinya)\". Mereka menjawab: \"Kami dengar, dan kami menderhaka\". Sedang kegemaran menyembah (patung) anak lembu itu telah mesra dan sebati di dalam hati mereka, dengan sebab kekufuran mereka. Katakanlah (wahai Muhammad):\" Amatlah jahatnya apa yang disuruh oleh iman kamu itu kalaulah kamu orang-orang yang beriman\".", "source_citation": "Quran 2:93 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:84-ms-q1", "domain": "quran", "language": "ms", "question": "Siapa yang menjadi saksi bagi kebenaran perjanjian setia tersebut?", "gold_answer": "\"Kamu sendiri\"", "gold_passage_text": "Dan (ingatlah), ketika Kami mengikat perjanjian setia dengan kamu: \"(Bahawa) janganlah kamu menumpahkan darah (berbunuh-bunuhan) sesama sendiri, dan janganlah kamu usir-mengusir sesama sendiri dari kampung masing-masing\". Kemudian kamu telah berikrar mematuhi perjanjian setia itu, dan kamu sendiri pula menjadi saksi (yang mengakui kebenarannya).", "source_citation": "Quran 2:84 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:32-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimanakah keterangan yang diberikan mengenai pengetahuan?", "gold_answer": "Kami tidak mempunyai pengetahuan selain dari apa yang Engkau ajarkan kepada kami.", "gold_passage_text": "Malaikat itu menjawab: \"Maha suci Engkau (Ya Allah)! Kami tidak mempunyai pengetahuan selain dari apa yang Engkau ajarkan kepada kami; sesungguhnya Engkau jualah yang Maha Mengetahui, lagi Maha Bijaksana\".", "source_citation": "Quran 2:32 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:85-ms-q0", "domain": "quran", "language": "ms", "question": "Siapa yang disebut dalam teks ini sebagai golongan yang melakukan pembunuhan sesama sendiri?", "gold_answer": "Bani Israil.", "gold_passage_text": "Kemudian kamu ini (wahai Bani Israil), kamu berbunuh-bunuhan sesama sendiri dan kamu usir satu puak dari kaum kamu keluar dari kampungnya; kamu pula saling bantu-membantu (dengan orang lain) untuk menentang mereka dengan melakukan dosa dan penganiayaan; padahal kalau mereka datang kepada kamu sebagai orang tawanan, kamu tebus mereka; sedang perbuatan mengusir mereka diharamkan juga atas kamu. Sesudah itu maka patutkah kamu hanya percaya kepada sebahagian (dari isi) Kitab Taurat dan mengingkari akan sebahagian yang lain? Maka tiadalah balasan bagi orang yang berbuat demikian itu dari antara kamu, selain dari kehinaan ketika hidup di dunia, dan pada hari kiamat akan ditolak mereka ke dalam azab seksa yang amat berat. Dan (ingatlah), Allah tidak sekali-kali lalai akan apa yang kamu lakukan.", "source_citation": "Quran 2:85 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-44-0-q1", "domain": "wiki", "language": "ms", "question": "Bagaimanakah Hitler menyertai dalam perang, dan apa akibatnya bagi Perang Dunia Kedua?", "gold_answer": "Semasa perang, beliau terlibat secara langsung dalam operasi ketenteraan dan menjadi tokoh utama dalam peristiwa Holokus (pembunuhan beramai-ramai terhadap kira-kira enam juta orang Yahudi). Pencerobohan Poland oleh Hitler pada 1 September 1939 menandakan bermulanya Perang Dunia Kedua.", "gold_passage_text": "Adolf Hitler (20 April 1889 – 30 April 1945) ialah seorang ahli politik Jerman kelahiran Austria yang merupakan diktator Jerman Nazi dari tahun 1933 hingga kematiannya pada tahun 1945. Beliau naik ke tampuk kuasa sebagai pemimpin Parti Nazi, menjadi Canselor pada tahun 1933 dan kemudiannya mengambil gelaran pada tahun 1934. Pencerobohan Poland oleh Hitler pada 1&nbsp;September 1939 menandakan bermulanya Perang Dunia Kedua. Sepanjang perang, beliau terlibat secara langsung dalam operasi ketenteraan dan menjadi tokoh utama dalam peristiwa Holokus: iaitu pembunuhan beramai-ramai terhadap kira-kira enam juta orang Yahudi dan berjuta-juta mangsa yang lain.", "source_citation": "https://ms.wikipedia.org/?curid=44 (Wikipedia, CC BY-SA, article id 44)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-25-2-q1", "domain": "wiki", "language": "ms", "question": "Bagaimanakah beliau menerima pengangkatan ke majikan beliau ketika pemerintahan Marwan?", "gold_answer": "Sebagai penasihat kepada khalifah.", "gold_passage_text": "Ketika zaman pemerintahan Muawiyah, beliau telah dilantik menjadi pemimpin tentera dari Madinah bagi menyerang Byzantium. Ketika pemerintahan Marwan pula, beliau telah menjadi penasihat kepada khalifah dan dilantik sebagai gabenor Palestin. Beliau bersama adiknya, Abdul Aziz juga telah dilantik sebagai putera mahkota ketika pemerintahan ayahnya.", "source_citation": "https://ms.wikipedia.org/?curid=25 (Wikipedia, CC BY-SA, article id 25)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-1:3-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah dua sifat yang tertera dalam ayat tersebut?", "gold_answer": "Maha Pemurah dan Maha Mengasihani", "gold_passage_text": "Yang Maha Pemurah, lagi Maha Mengasihani.", "source_citation": "Quran 1:3 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-88-2-q0", "domain": "wiki", "language": "ms", "question": "Berapakah julat warna kepala Seladang jantan yang sangat tua?", "gold_answer": "Perang gelap sehingga hampir hitam.", "gold_passage_text": "Seladang jantan dewasa berwarna antara perang gelap sehingga hampir hitam bagi Seladang yang amat tua. Bagaimanapun, bahagian atas kepala dari atas mata sehingga tengkuk berwarna kelabu atau kekadangnya putih kotor. Muncung Seladang jantan berwarna pucat, dengan bahagian bawah kakinya berwarna putih tulen. Bulu jantan yang tua sangat nipis pada bahagian belakangnya. Sebaliknya, warna Seladang betina dan anak lebih pucat dan kekadang mempunyai warna kuning keperang-perangan sedikit yang paling ketara bagi Seladang yang hidup di daerah kering dan terbuka. Tanduk Seladang berwarna hijau pucat atau kuning hampir pada sepanjangnya tetapi hujung tanduk berwarna hitam.", "source_citation": "https://ms.wikipedia.org/?curid=88 (Wikipedia, CC BY-SA, article id 88)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:37-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah yang menerima taubat Nabi Adam?", "gold_answer": "Allah menerima taubatnya Nabi Adam.", "gold_passage_text": "Kemudian Nabi Adam menerima dari Tuhannya beberapa kalimah (kata-kata pengakuan taubat yang diamalkannya), lalu Allah menerima taubatnya; sesungguhnya Allah, Dia lah yang Maha Pengampun (Penerima taubat), lagi Maha Mengasihani.", "source_citation": "Quran 2:37 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:79-ms-q0", "domain": "quran", "language": "ms", "question": "Bagaimanakah akibat yang dialami oleh orang-orang yang menulis Kitab Taurat dengan tangan mereka?", "gold_answer": "Mereka mengalami kecelakaan besar disebabkan apa yang ditulis oleh tangan mereka, dan kecelakaan besar dari apa yang mereka usahakan itu.", "gold_passage_text": "Kecelakaan besar bagi orang-orang yang menulis Kitab Taurat dengan tangan mereka (lalu mengubah Kalam Allah dengan rekaan-rekaan mereka), kemudian mereka berkata: \"Ini ialah dari sisi Allah\", supaya mereka dengan perbuatan itu dapat membeli keuntungan dunia yang sedikit. Maka kecelakaan besar bagi mereka disebabkan apa yang ditulis oleh tangan mereka, dan kecelakaan besar bagi mereka dari apa yang mereka usahakan itu.", "source_citation": "Quran 2:79 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:17-ms-q0", "domain": "quran", "language": "ms", "question": "Apa perbandingan yang digunakan untuk menggambarkan golongan yang munafik dalam teks tersebut?", "gold_answer": "Seperti orang yang menyalakan api", "gold_passage_text": "Perbandingan hal mereka (golongan yang munafik itu) samalah seperti orang yang menyalakan api; apabila api itu menerangi sekelilingnya, (tiba-tiba) Allah hilangkan cahaya (yang menerangi) mereka, dan dibiarkannya mereka dalam gelap-gelita, tidak dapat melihat (sesuatu pun).", "source_citation": "Quran 2:17 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:21-ms-q0", "domain": "quran", "language": "ms", "question": "Ke atas siapa perintah beribadat tersebut ditujukan?", "gold_answer": "Tuhan kamu yang telah menciptakan kamu dan orang-orang yang terdahulu daripada kamu.", "gold_passage_text": "Wahai sekalian manusia! Beribadatlah kepada Tuhan kamu yang telah menciptakan kamu dan orang-orang yang terdahulu daripada kamu, supaya kamu (menjadi orang-orang yang) bertaqwa.", "source_citation": "Quran 2:21 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-97-1-q0", "domain": "wiki", "language": "ms", "question": "Kapan Bunga Mawar disebut sebagai bunga kebangsaan Persekutuan Tanah Melayu dan mengapa ia dikalahkan dari bunga-bunga lain oleh bunga raya pada tahun 1960?", "gold_answer": "Bunga Mawar dicadangkan sebagai bunga kebangsaan Persekutuan Tanah Melayu tidak lama selepas ia dimasyhurkan kemerdekaannya. Bunga raya, yang lebih kuat daripada Mawar, akhirnya mengalahkan Mawar dalam pengaduan tersebut.", "gold_passage_text": "Bunga mawar adalah salah satu jenis pokok bunga yang telah lama dikenali oleh masyarakat Melayu. Ia disebut dalam Hikayat Bayan Budiman yang ditulis sekitar 1370-an. Bunga mawar berbau harum, biasanya mawar kampung mempunyai bau yang paling kuat. Dalam kebudayaan-kebudayaan Barat dan Melayu, bunga mawar melambangkan cinta. Bunga ini pernah dicadangkan sebagai bunga kebangsaan Persekutuan Tanah Melayu tidak lama selepas ia dimasyhurkan kemerdekaannya sebelum dikalahkan dari bunga-bunga lain oleh bunga raya pada 1960.", "source_citation": "https://ms.wikipedia.org/?curid=97 (Wikipedia, CC BY-SA, article id 97)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:23-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah hamba yang disebutkan menerima apa yang diturunkan oleh Allah?", "gold_answer": "Muhammad.", "gold_passage_text": "Dan kalau kamu ada menaruh syak tentang apa yang Kami turunkan (Al-Quran) kepada hamba kami (Muhammad), maka cubalah buat dan datangkanlah satu surah yang sebanding dengan Al-Quran itu, dan panggilah orang-orang yang kamu percaya boleh menolong kamu selain dari Allah, jika betul kamu orang-orang yang benar.", "source_citation": "Quran 2:23 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:72-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah yang akan mengungkap apa yang kamu sembunyikan?", "gold_answer": "Allah", "gold_passage_text": "Dan (ingatlah), ketika kamu membunuh seorang manusia, kemudian kamu tuduh-menuduh sesama sendiri tentang pembunuhan itu, padahal Allah tetap melahirkan apa yang kamu sembunyikan.", "source_citation": "Quran 2:72 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-81-1-q0", "domain": "wiki", "language": "ms", "question": "Berapa banyak spesies mamalia yang dikira sebagai wujud dan diapakah mereka telah dibahagikan kepada order?", "gold_answer": "6,400 spesies dan mereka telah digambarkan serta dibahagikan kepada 29 order.", "gold_passage_text": "Kira-kira 6,400 spesies mamalia yang masih wujud telah digambarkan dan dibahagikan kepada 29 order. Order yang paling besar ialah rodensia, kelawar dan Eulipotyphla (landak susu, tikus mondok, tikus kesturi, dan lain-lain); tiga order besar yang seterusnya ialah Primat (termasuk manusia, mawas, monyet dan lain-lain), Artiodactyla (setasea dan lain-lain), dan Carnivora (kucing, anjing, anjing laut dan lain-lain).", "source_citation": "https://ms.wikipedia.org/?curid=81 (Wikipedia, CC BY-SA, article id 81)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:15-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimana kesesatan mereka dijelaskan dalam kurungan?", "gold_answer": "Melampaui batas itu", "gold_passage_text": "Allah (membalas) memperolok-olok, dan membiarkan mereka meraba-raba dalam kesesatan mereka (yang melampaui batas itu).", "source_citation": "Quran 2:15 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-81-1-q1", "domain": "wiki", "language": "ms", "question": "Apa yang merupakan tiga order mamalia terbesar yang diuraikan dalam teks?", "gold_answer": "Rodensia, Primat, dan Artiodactyla.", "gold_passage_text": "Kira-kira 6,400 spesies mamalia yang masih wujud telah digambarkan dan dibahagikan kepada 29 order. Order yang paling besar ialah rodensia, kelawar dan Eulipotyphla (landak susu, tikus mondok, tikus kesturi, dan lain-lain); tiga order besar yang seterusnya ialah Primat (termasuk manusia, mawas, monyet dan lain-lain), Artiodactyla (setasea dan lain-lain), dan Carnivora (kucing, anjing, anjing laut dan lain-lain).", "source_citation": "https://ms.wikipedia.org/?curid=81 (Wikipedia, CC BY-SA, article id 81)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-18-1-q0", "domain": "wiki", "language": "ms", "question": "Berapa bahagian permukaan Bumi yang dibaruki oleh Air?", "gold_answer": "71% daripada permukaan Bumi.", "gold_passage_text": "Air wujud dalam 3 bentuk iaitu pepejal, cecair, dan gas. Air dalam bentuk cecair adalah bentuk air yang paling utama ditemui di muka bumi ini. Air dalam bentuk gas adalah kukus atau wap air yang dihasilkan apabila air disejat atau dididihkan. Air dalam bentuk pepejal adalah ais yang dihasilkan apabila air dibekukan. Air meliputi 71% daripada permukaan Bumi, banyaknya di laut dan lautan (kira-kira 96.5%).", "source_citation": "https://ms.wikipedia.org/?curid=18 (Wikipedia, CC BY-SA, article id 18)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-87-2-q0", "domain": "wiki", "language": "ms", "question": "Mengapakah harimau dikenali sebagai salah satu spesies megafauna berkarisma di dunia?", "gold_answer": "Harimau dianggap sebagai salah satu spesies megafauna berkarisma di dunia.", "gold_passage_text": "Walau bagaimanapun, harimau tetap menjadi salah sejenis megafauna berkarisma yang paling terkenal di dunia. Harimau banyak memainkan peranan penting dalam mitos dan budaya rakyat, di samping masih mendapat tempat dalam bidang perfileman dan kesusasteraan moden. Lukisan harimau sering dijumpai pada bendera dan jata negara, sebagai maskot sukan, dan haiwan kebangsaan sebilangan negara Asia, termasuk Malaysia.", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-66-1-q0", "domain": "wiki", "language": "ms", "question": "Apa faktor risiko utama penyakit barah pangkal rahim menurut teks ini?", "gold_answer": "Kehadiran antibodi kepada human papillomavirus (HPV)", "gold_passage_text": "Salah satu faktor risiko penyakit barah pangkal rahim adalah kehadiran antibodi kepada human papillomavirus (kumpulan virus yang sama yang menyebabkan ketuat kelamin ( genital wart )). Walaupun tidak merbahaya, virus ini dipercayai menyebabkan perubahan kepada sel di pangkal rahim ( cervix ), menyebabkan perkembangan barah. Jenis strain HPV dikaitkan dengan barah pangkal rahim (strain 16, 18 dan 31), bukanlah jenis yang menyebabkan ketuat kelamin.", "source_citation": "https://ms.wikipedia.org/?curid=66 (Wikipedia, CC BY-SA, article id 66)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-1:4-ms-q1", "domain": "quran", "language": "ms", "question": "Siapakah yang menguasai pemerintahan pada hari tersebut?", "gold_answer": "Yang Menguasai pemerintahan.", "gold_passage_text": "Yang Menguasai pemerintahan hari Pembalasan (hari Akhirat).", "source_citation": "Quran 1:4 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-31-1-q1", "domain": "wiki", "language": "ms", "question": "Apa nama yang diberikan oleh pengikut teks untuk satuan tersebut?", "gold_answer": "mètre.", "gold_passage_text": "« Nous fixons l'unité de mesure à la dix-millionième partie du quart du méridien et nous la nommons mètre. »(\"Kami menetapkan satuan ukur panjang bersamaan satu persepuluh juta daripada satu perempat garis rembang, dan kami menamakannya mètre.\" )", "source_citation": "https://ms.wikipedia.org/?curid=31 (Wikipedia, CC BY-SA, article id 31)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:77-ms-q0", "domain": "quran", "language": "ms", "question": "Siapa yang mengetahui apa yang mereka rahsiakan dan apa yang mereka lahirkan?", "gold_answer": "Allah.", "gold_passage_text": "(Mereka berani berkata demikian) dan tidakkah mereka ketahui bahawasanya Allah mengetahui apa yang mereka rahsiakan dan apa yang mereka lahirkan?", "source_citation": "Quran 2:77 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:55-ms-q0", "domain": "quran", "language": "ms", "question": "Mengapa mereka disambar petir?", "gold_answer": "Kerana mereka berkata bahawa mereka tidak akan beriman kepadamu sehingga dapat melihat Allah dengan terang.", "gold_passage_text": "Dan (kenangkanlah) ketika kamu berkata: \"Wahai Musa! Kami tidak akan beriman kepadamu sehingga kami dapat melihat Allah dengan terang (dengan mata kepala kami)\". Maka kerana itu kamu disambar petir, sedang kamu semua melihatnya.", "source_citation": "Quran 2:55 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:15-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah yang memperolok-olok dan membiarkan mereka meraba-raba?", "gold_answer": "Allah", "gold_passage_text": "Allah (membalas) memperolok-olok, dan membiarkan mereka meraba-raba dalam kesesatan mereka (yang melampaui batas itu).", "source_citation": "Quran 2:15 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:23-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah tuntutan yang diminta kepada mereka yang menaruh syak?", "gold_answer": "Buat dan datangkanlah satu surah yang sebanding dengan Al-Quran itu, dan panggilah orang-orang yang kamu percaya boleh menolong kamu selain dari Allah.", "gold_passage_text": "Dan kalau kamu ada menaruh syak tentang apa yang Kami turunkan (Al-Quran) kepada hamba kami (Muhammad), maka cubalah buat dan datangkanlah satu surah yang sebanding dengan Al-Quran itu, dan panggilah orang-orang yang kamu percaya boleh menolong kamu selain dari Allah, jika betul kamu orang-orang yang benar.", "source_citation": "Quran 2:23 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:4-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimana keyakinan orang-orang yang beriman terhadap hari akhirat?", "gold_answer": "Mereka yakin akan (adanya) hari akhirat (dengan sepenuhnya).", "gold_passage_text": "Dan juga orang-orang yang beriman kepada Kitab \"Al-Quran\" yang diturunkan kepadamu (Wahai Muhammad), dan Kitab-kitab yang diturunkan dahulu daripadamu, serta mereka yakin akan (adanya) hari akhirat (dengan sepenuhnya).", "source_citation": "Quran 2:4 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:42-ms-q1", "domain": "quran", "language": "ms", "question": "Siapa yang mengetahui 'yang benar itu'?", "gold_answer": "Kamu semua.", "gold_passage_text": "Dan janganlah kamu campur adukkan yang benar itu dengan yang salah, dan kamu sembunyikan yang benar itu pula padahal kamu semua mengetahuinya.", "source_citation": "Quran 2:42 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:76-ms-q0", "domain": "quran", "language": "ms", "question": "Apa yang mereka kata apabila berjumpa dengan orang-orang yang beriman?", "gold_answer": "\"Kami telah beriman\"", "gold_passage_text": "Dan apabila mereka (orang-orang Yahudi pada zaman Rasulullah) bertemu dengan orang-orang yang beriman, mereka berkata: \"Kami telah beriman\"; dan apabila mereka berjumpa sesama sendiri, mereka berkata: \"Patutkah kamu ceritakan kepada mereka (orang-orang Islam) dengan apa yang telah diterangkan oleh Allah kepada kamu (di dalam Kitab Taurat mengenai kebenaran Nabi Muhammad) untuk menjadikannya hujah (bukti) yang dapat mengalahkah kamu di sisi Tuhan kamu? Tidakkah kamu berakal?\"", "source_citation": "Quran 2:76 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:37-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah sifat Allah yang disebut selepas Ia menerima taubat Nabi Adam?", "gold_answer": "Allah adalah yang Maha Pengampun dan Maha Mengasihani.", "gold_passage_text": "Kemudian Nabi Adam menerima dari Tuhannya beberapa kalimah (kata-kata pengakuan taubat yang diamalkannya), lalu Allah menerima taubatnya; sesungguhnya Allah, Dia lah yang Maha Pengampun (Penerima taubat), lagi Maha Mengasihani.", "source_citation": "Quran 2:37 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-102-1-q0", "domain": "wiki", "language": "ms", "question": "Bagimana asal-usul dan lokasi penyebaran tumbuhan ini?", "gold_answer": "Tumbuhan ini berasal dari Asia Tenggara dan menyebar luas mulai dari wilayah Tenasserim di Burma, Malaysia, Thailand, dan sebahagian kepulauan Indonesia, termasuk pulau-pulau Sumatera, Jawa, Borneo, Sulawesi, Maluku, hingga Australia.", "gold_passage_text": "Tanaman ini berasal dari Asia Tenggara di mana ia menyebar luas mulai dari wilayah Tenasserim di Burma, Malaysia, Thailand, dan sebahagian kepulauan Indonesia termasuk pulau-pulau Sumatera, Jawa (terutamanya di bahagian barat,) Borneo, Sulawesi, Maluku hingga sejauh Papua dan Queensland di Australia.", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-28-1-q0", "domain": "wiki", "language": "ms", "question": "Apa jenis organ yang dimiliki oleh ikan paus dewasa?", "gold_answer": "Hampir tiada organ penyusuan.", "gold_passage_text": "* bernafas melalui paru-paru melalui lubang hembus\n* mempunyai bulu (kurang berbanding haiwan darat, hampir tiada bagi paus dewasa)\n* berdarah panas\n* mempunyai organ penyusuan dan menyusukan anak.\n* mempunyai empat ruang jantung", "source_citation": "https://ms.wikipedia.org/?curid=28 (Wikipedia, CC BY-SA, article id 28)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-42-0-q2", "domain": "wiki", "language": "ms", "question": "Di mana terletak Laut Kaspia?", "gold_answer": "Pada kawasan antara Asia dan Eropah.", "gold_passage_text": "Laut Kaspia atau Laut Tabaristan merupakan sebuah jasad air pedalaman yang terletak di antara Asia dan Eropah. Ia tidak bersambung dengan mana-mana lautan, maka ia turut digelar sebagai tasik terbesar di dunia, namun ciri airnya yang masin menjadikannya mempunyai kedua-dua ciri laut dan tasik. Tahap kemasinannya ialah sekitar 1.2%, satu pertiga daripada kemasinan air laut biasa.", "source_citation": "https://ms.wikipedia.org/?curid=42 (Wikipedia, CC BY-SA, article id 42)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-107-2-q1", "domain": "wiki", "language": "ms", "question": "Mengapa petani-petani buah mangga hanya menerima harga yang rendah? Answer: Disebabkan buah mangga telah menjadi satu barang 'perdagangan saksama' di sebilangan negara.", "gold_answer": "Disebabkan buah mangga telah menjadi satu barang 'perdagangan saksama' di sebilangan negara.", "gold_passage_text": "Buah mangga dikatakan merupakan buah segar yang paling banyak dimakan di seluruh dunia. Walaupun demikian, petani-petani buah mangga hanya menerima harga yang rendah untuk hasil mereka. Disebabkan ini, buah mangga telah menjadi satu barang 'perdagangan saksama' di sebilangan negara.", "source_citation": "https://ms.wikipedia.org/?curid=107 (Wikipedia, CC BY-SA, article id 107)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-32-2-q0", "domain": "wiki", "language": "ms", "question": "Berapakah persentase kilauan Matahari semasa Bumi terbentuk, yang menyebabkan air tidak membeku dalam laut?", "gold_answer": "70% daripada nilai semasa.", "gold_passage_text": "Atmosfera dan lautan bumi terbentuk akibat aktiviti gunung berapi dan peluahgasan. Wap air daripada dua sumber ini terpeluwap ke dalam lautan, diimbuh dengan sumber air daripada asteroid, protoplanet dan komet. Air yang mencukupi untuk memenuhi lautan mungkin ada di Bumi sejak ia terbentuk. Dalam model ini, gas rumah hijau atmosfera menghalang lautan daripada membeku apabila Matahari yang baru terbentuk hanya mempunyai kekilauan 70% daripada nilai semasanya. Menjelang Ga, medan magnet Bumi telah terbentuk dan membantu menghalang atmosfera daripada ditanggalkan oleh angin suria.", "source_citation": "https://ms.wikipedia.org/?curid=32 (Wikipedia, CC BY-SA, article id 32)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:9-ms-q1", "domain": "quran", "language": "ms", "question": "Siapakah yang sebenarnya diperdayakan oleh mereka?", "gold_answer": "Dirinya sendiri.", "gold_passage_text": "Mereka hendak memperdayakan Allah dan orang-orang yang beriman, padahal mereka hanya memperdaya dirinya sendiri, sedang mereka tidak menyedarinya.", "source_citation": "Quran 2:9 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-83-0-q2", "domain": "wiki", "language": "ms", "question": "Mengapakah spesies gajah Asia dianggap terancam?", "gold_answer": "Karena jumlah populasi yang tersisa, antara 25.600 dan 32.750 ekor yang masih hidup liar.", "gold_passage_text": "Gajah Asia (Elephas maximus) merupakan salah satu daripada tiga spesies gajah yang masih tinggal. Spesies ini dianggap terancam, dengan antara 25,600 dan 32,750 ekor yang masih hidup liar .", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-40-0-q3", "domain": "wiki", "language": "ms", "question": "Bagaimana cahaya membantu untuk melihat?", "gold_answer": "Menantu manusia dan binatang", "gold_passage_text": "Cahaya (Jawi: ; pinjaman chāya), secara tepatnya dikenali sebagai cahaya tampak, merupakan tenaga berbentuk gelombang dan membantu manusia dan binatang melihat. Cahaya juga merupakan asas kepada ukuran meter yang mana 1 meter bersamaan dengan jarak dilalui cahaya melalui vakum pada 1/299,792,458 saat. Kelajuan cahaya ditakrifkan pada kelajuan 299,792,458 meter sesaat.", "source_citation": "https://ms.wikipedia.org/?curid=40 (Wikipedia, CC BY-SA, article id 40)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-30-2-q1", "domain": "wiki", "language": "ms", "question": "Berapa lama masa pendakian Gunung Tahan bagi mereka yang tidak sakit?", "gold_answer": "Selama sembilan hari di dalam hutan", "gold_passage_text": "Pendakian Gunung Tahan paling cepat adalah selama sembilan hari di dalam hutan bagi mereka yang sihat. Jika perjalanan dikira dari Kuala Lumpur, masa pendakian perlu ditambah lagi dua hari. Terpaksa merentas sungai dan runut yang sangat mencabar. Bagaimanapun, runut ini terbuka kepada orang ramai.", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:2-ms-q0", "domain": "quran", "language": "ms", "question": "Bagi golongan manakah Kitab Al-Quran menjadi petunjuk?", "gold_answer": "Orang-orang yang (hendak) bertaqwa.", "gold_passage_text": "Kitab Al-Quran ini, tidak ada sebarang syak padanya (tentang datangnya dari Allah dan tentang sempurnanya); ia pula menjadi petunjuk bagi orang-orang yang (hendak) bertaqwa;", "source_citation": "Quran 2:2 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-84-1-q1", "domain": "wiki", "language": "ms", "question": "Di mana biasanya gajah Malaysia boleh di dapati berdasarkan habitat yang mereka pilih?", "gold_answer": "Gajah Malaysia biasanya di dapati di hutan dara dan hutan sekunder.", "gold_passage_text": "Ciri-ciri\nGajah betina dan anaknya hidup dalam kumpulan kecil manakala gajah jantan lebih suka hidup bersendirian. Gajah biasanya berehat ketika cuaca panas. Setiap kumpulan mempunyai kawasan mereka tersendiri untuk mencari makanan. Mereka suka berenang dan mandi di sungai. Gajah Malaysia biasanya di dapati di hutan dara dan hutan sekunder.", "source_citation": "https://ms.wikipedia.org/?curid=84 (Wikipedia, CC BY-SA, article id 84)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-49-0-q2", "domain": "wiki", "language": "ms", "question": "Apakah isi kandungan teks yang berkaitan dengan definisi 'Mushaf' dan penerbitannya?", "gold_answer": "Isinya adalah definisi 'Mushaf' sebagai 'kulit' dan fakta bahawa ia diterbitkan oleh Uthman bin Afan.", "gold_passage_text": "Mushaf Uthman ialah versi al-Quran yang diterbitkan oleh Uthman bin Afan. \"Mushaf\" ialah perkataan bahasa Arab yang secara harfiah, bermaksud \"kulit\", iaitu kulit buku, tetapi digunakan dalam konteks ini untuk merujuk kepada senaskah kitab al-Quran.", "source_citation": "https://ms.wikipedia.org/?curid=49 (Wikipedia, CC BY-SA, article id 49)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-61-2-q1", "domain": "wiki", "language": "ms", "question": "Bagaimana asal etimologi nama 'Antraks' dan kegunaan penyakit tersebut bagi diagnosis?", "gold_answer": "Antraks bermaksud 'arang batu' dalam bahasa Yunani, dan nama tersebut digunakan kerana pesakit mempunyai lesi (lesion) kulit hitam.", "gold_passage_text": "Antraks merupakan penyakit menular teruk yang berpunca oleh bakteria Bacillus anthracis dan membawa maut dalam paling bentuk ganas. Antraks biasanya berlaku dikalangan haiwan maun liar dan peliharaan, tetapi boleh berlaku kepada manusia apabila mereka terdedah kepada haiwan yang berjangkit, tisu dari haiwan yang sakit, atau spora Antraks yang banyak. Bagaimanapun masih tidak terdapat kes manusia yang jatuh sakit melalui hubungan dengan pesakit Antraks.. Antraks bererti \"arang batu\" dalam bahasa Yunani, dan digunakan kerana pesakit mempunyai lesion kulit hitam.", "source_citation": "https://ms.wikipedia.org/?curid=61 (Wikipedia, CC BY-SA, article id 61)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-68-1-q0", "domain": "wiki", "language": "ms", "question": "Apakah kepekatan G6PD yang menyebabkan kekurangan ini?", "gold_answer": "G6PD adalah kepekatan hemoglobin yang tidak mencukupi atau rendah yang menyebabkan kekurangan (deficiency).", "gold_passage_text": "Kekurangan (deficiency) G6PD bukanlah satu kecacatan atau penyakit. Ia adalah satu fenomena keturunan yang melibatkan kedua-dua jantina, lelaki dan perempuan, tetapi lebih sering dialami oleh bayi lelaki. Ia secara am. Ditemui pada mereka yang mana ibu bapa mereka berasal dari daerah yang pernah sering mengalami Malaria seperti Asia Tenggara, Afrika dan juga Mediterranean.", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:62-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimanakah akibat bagi mereka yang beriman kepada Allah dan (beriman kepada) hari akhirat serta beramal soleh?", "gold_answer": "Pahala balasannya di sisi Tuhan mereka, tidak ada kebimbangan kepada mereka, dan mereka tidak akan berdukacita.", "gold_passage_text": "Sesungguhnya orang-orang yang beriman, dan orang-orang Yahudi dan orang-orang Nasora (Nasrani), dan orang-orang Saabien sesiapa di antara mereka itu beriman kepada Allah dan (beriman kepada) hari akhirat serta beramal soleh, maka bagi mereka pahala balasannya di sisi Tuhan mereka, dan tidak ada kebimbangan (dari berlakunya kejadian yang tidak baik) kepada mereka, dan mereka pula tidak akan berdukacita.", "source_citation": "Quran 2:62 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-50-0-q0", "domain": "wiki", "language": "ms", "question": "Bagi siapa nama lengkap Usman bin Affan dalam konteks ini?", "gold_answer": "Nama panjang beliau ialah Usman bin Affan Abi al-Ash bin Umaiyyah.", "gold_passage_text": "Usman yang menghiasi Aya Sophia di Istanbul.]]\nUsman bin Affan (Arab: عثمان بن عفان)atau nama panjang beliau adalah Usman bin Affan Abi al-Ash bin Umaiyyah merupakan salah seorang sahabat Nabi Muhammad SAW. Ketika beliau menjadi khalifah, berlaku pertelingkahan dalam kalangan umat Islam mengenai cara bacaan al-Quran. Disebabkan oleh itu Usman bin Affan telah meminjam suhuf, (kumpulan penulisan al-Quran daripada Hafsa. Selepas itu Usman bin Affan telah memerintahkan empat orang sahabat untuk menyalin semula al-Quran dalam bentuk yang sempurna yang dikenali sebagai Mushaf Usmani. Salinan Mushaf tersebut dihantar ke seluruh pusat jajahan bagi menggantikan salinan-salinan yang lain.", "source_citation": "https://ms.wikipedia.org/?curid=50 (Wikipedia, CC BY-SA, article id 50)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:27-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah orang-orang yang merombak perjanjian Allah?", "gold_answer": "Mereka yang memutuskan perkara yang disuruh Allah supaya diperhubungkan dan membuat kerosakan serta bencana di muka bumi.", "gold_passage_text": "(Iaitu) orang-orang yang merombak (mencabuli) perjanjian Allah sesudah diperteguhkannya, dan memutuskan perkara yang disuruh Allah supaya diperhubungkan, dan mereka pula membuat kerosakan dan bencana di muka bumi. Mereka itu ialah orang-orang yang rugi.", "source_citation": "Quran 2:27 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-76-0-q0", "domain": "wiki", "language": "ms", "question": "Apa nama planet kedua terdekat kepada Matahari di dalam passage tersebut?", "gold_answer": "Planet tersebut merupakan Venus (atau Zuhrah).", "gold_passage_text": "Zuhrah ( atau ) atau Kejora (Jawi: ; Inggeris: Venus) merupakan planet kedua terdekat kepada Matahari di mana edaran lengkapnya mengambil masa 224.7 hari bumi.", "source_citation": "https://ms.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:5-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah yang merupakan orang-orang yang berjaya dalam ayat ini?", "gold_answer": "Mereka itulah.", "gold_passage_text": "Mereka itulah yang tetap mendapat petunjuk dari Tuhan mereka, dan merekalah orang-orang yang berjaya.", "source_citation": "Quran 2:5 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-83-2-q0", "domain": "wiki", "language": "ms", "question": "Berdasarkan isi bacaan, gajah mana yang lebih suka hidup bersendirian?", "gold_answer": "Gajah jantan.", "gold_passage_text": "Gajah betina dan anaknya hidup dalam kumpulan kecil manakala gajah jantan lebih suka hidup bersendirian. Gajah biasanya berehat ketika cuaca panas. Setiap kumpulan mempunyai kawasan mereka tersendiri untuk mencari makanan. Mereka suka berenang dan mandi di sungai.", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:88-ms-q1", "domain": "quran", "language": "ms", "question": "Mengapa Allah telah melaknatkan mereka?", "gold_answer": "Disebabkan kekufuran mereka.", "gold_passage_text": "Dan mereka (kaum Yahudi) berkata pula: \"Hati kami tertutup (tidak dapat menerima Islam)\". (Sebenarnya hati mereka tidak tertutup) bahkan Allah telah melaknatkan mereka disebabkan kekufuran mereka, oleh itu maka sedikit benar mereka yang beriman.", "source_citation": "Quran 2:88 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:14-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah yang mereka katakan apabila mereka bertemu dengan orang-orang yang beriman?", "gold_answer": "\"Kami telah beriman\"", "gold_passage_text": "Dan apabila mereka bertemu dengan orang-orang yang beriman, mereka berkata: \" Kami telah beriman \", dan manakala mereka kembali kepada syaitan-syaitan mereka, mereka berkata pula:\" Sesungguhnya kami tetap bersama kamu, sebenarnya kami hanya memperolok-olok (akan orang-orang yang beriman)\".", "source_citation": "Quran 2:14 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:50-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah tindakan yang diambil terhadap kamu dalam peristiwa belah laut ini?", "gold_answer": "Kami selamatkan kamu", "gold_passage_text": "Dan (kenangkanlah) ketika kami belahkan laut (Merah) untuk kamu lalui (kerana melarikan diri dari angkara Firaun), maka Kami selamatkan kamu dan Kami tenggelamkan Firaun bersama-sama tenteranya, sedang kamu semua menyaksikannya.", "source_citation": "Quran 2:50 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-40-1-q0", "domain": "wiki", "language": "ms", "question": "Who are the two types of animals that eat only plants, and how are they named in the passage?", "gold_answer": "Haiwan maun and haiwan maun", "gold_passage_text": "Cahaya diperlukan dalam kehidupan seharian. Matahari ialah sumber cahaya yang utama. Tumbuhan hijau memerlukan cahaya untuk membuat makanan. Tumbuhan hijau ini akan menjadi makanan kepada haiwan lain yang akan menjadi makanan kepada haiwan lain pula. Interaksi ini membentuk rantaian makanan. Haiwan yang makan tumbuhan sahaja dikenali sebagai haiwan maun. Haiwan yang makan daging sahaja dikenali sebagai haiwan maging. Haiwan yang makan tumbuhan dan daging dikenali sebagai haiwan maserba.", "source_citation": "https://ms.wikipedia.org/?curid=40 (Wikipedia, CC BY-SA, article id 40)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:59-ms-q0", "domain": "quran", "language": "ms", "question": "Bagaimana orang-orang yang zalim itu bertindak terhadap perkataan yang dikatakan kepada mereka?", "gold_answer": "Mereka mengubah perkataan itu dengan melakukan sebaliknya.", "gold_passage_text": "Kemudian orang-orang yang zalim (penderhaka) itu mengubah perkataan (perintah kami) yang dikatakan kepada mereka dengan melakukan sebaliknya; maka Kami turunkan ke atas orang-orang yang zalim itu bala bencana dari langit, dengan sebab mereka sentiasa berlaku fasik (menderhaka).", "source_citation": "Quran 2:59 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:80-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah dua kemungkinan yang dikemukakan dalam arahan kepada Muhammad?", "gold_answer": "Adakah mereka sudah mendapat janji dari Allah supaya Allah tidak akan menyalahi janjiNya, atau hanya mereka mengatakan sesuatu yang tidak mereka ketahui.", "gold_passage_text": "Dan mereka berkata: \"Kami tidak sekali-kali akan disentuh oleh api neraka kecuali beberapa hari yang tertentu\". Katakanlah (wahai Muhammad): \"Adakah kamu sudah mendapat janji dari Allah supaya (dengan itu) Allah tidak akan menyalahi janjiNya, atau hanya kamu mengatakan atas nama Allah sesuatu yang tidak kamu mengetahuinya?\"", "source_citation": "Quran 2:80 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-97-0-q0", "domain": "wiki", "language": "ms", "question": "Apa spesies tumbuhan yang termasuk dalam mawar atau ros?", "gold_answer": "Sejenis tumbuhan berbunga dan saka.", "gold_passage_text": "Mawar () atau ros () merupakan sejenis tumbuhan berbunga dan saka digolong dalam genus Rosa keluarga Rosaceae; Tanaman ini berasal dari kawasan subtropika Hemisfera Utara; sebahagian kecil spesies dari Asia Selatan dan sebahagian spesies besar mawar dari tanah besar China dan sebahagian spesies lainnya dari benua Eropah. \nIa sering ditanam sebagai hiasan.", "source_citation": "https://ms.wikipedia.org/?curid=97 (Wikipedia, CC BY-SA, article id 97)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-61-0-q2", "domain": "wiki", "language": "ms", "question": "Apakah dua keadaan di mana Bakillus anthracis boleh dibiakkan?", "gold_answer": "Dengan oksigen (aerobik) atau tanpa oksigen (anearobik).", "gold_passage_text": "Antraks merupakan sebahagian dari keluarga basillus - bacterium yang mempunyai bentuk panjang. Nama saintifiknya adalah Bacillus anthracis. Bacillus anthracis mempunyai saiz yang agak besar (1-1.5um x 4-10um). Bacillus anthracis boleh dibiakkan dalam medium agar berkhasiat biasa secara aerobik (dengan oksigen) ataupun anearobik (tanpa oksigen).", "source_citation": "https://ms.wikipedia.org/?curid=61 (Wikipedia, CC BY-SA, article id 61)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-101-1-q1", "domain": "wiki", "language": "ms", "question": "Apakah beberapa hal yang biasa digunakan untuk menjadikan ulam dan dimakan dengan buah dan daun betik?", "gold_answer": "Pucuk, daun muda dan bunga.", "gold_passage_text": "Pokok betik menghasilkan buah yang boleh dimakan. Buah betik banyak dijual di pasar-pasar, termasuk pasar tani, dan pasar sayur. Pucuk, daun muda dan bunga betik sering dicelur untuk dijadikan ulam dan dimakan bersama sambal belacan. Pucuk muda betik berasa pahit, manakala buah muda betik jika dibuat halwa berasa masam-masam manis.", "source_citation": "https://ms.wikipedia.org/?curid=101 (Wikipedia, CC BY-SA, article id 101)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-99-0-q0", "domain": "wiki", "language": "ms", "question": "Apa nama botani untuk jenis tumbuhan yang dikenali sebagai 'belimbing besi'?", "gold_answer": "Averrhoa carambola", "gold_passage_text": "Belimbing besi (), belimbing manis atau belimbing segi (nama botani: Averrhoa carambola) merupakan tumbuhan daripada keluarga Oxalidaceae yang asli Asia Tenggara. Spesies ini menghasilkan buah bersegi atau bersanding-sanding yang boleh dimakan dan banyak terjual di pasar-pasar termasuk pasar tani dan pasar sayur.", "source_citation": "https://ms.wikipedia.org/?curid=99 (Wikipedia, CC BY-SA, article id 99)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-33-1-q0", "domain": "wiki", "language": "ms", "question": "Di mana tepat bersempadan Wilayah Luar Negeri Perancis Guiana Perancis dengan negara-negara lain?", "gold_answer": "Dengan Brazil, Suriname, Antillen Belanda, dan Saint-Martin.", "gold_passage_text": "Perancis Metropolitan, iaitu wilayah Perancis yang utama, bersempadan dengan Teluk Biscay dan Selat Inggeris, antara Belgium dan Sepanyol, tenggara United Kingdom; bersempadan dengan Laut Mediterranean, antara Itali dan Sepanyol. Wilayah ini juga mempunyai sempadan dengan negara Belgium, Jerman dan Luxembourg di sebelah timur laut; Switzerland di sebelah timur; Itali dan Monaco di sebelah tenggara; dan Andorra dan Sepanyol di sebelah barat daya. Selain itu, Wilayah Luar Negeri Perancis Guiana Perancis juga berkongsi sempadan darat dengan Brazil dan Suriname, dan Saint-Martin pula bersempadan dengan Antillen Belanda. Perancis dihubungkan dengan United Kingdom melalui Terowong Selat, yang berlalu di bawah Selat Inggeris. 18 kawasan utama Perancis (lima daripadanya terletak di luar negeri) menjangkau keluasan dan lebih 67 juta orang penduduk ().", "source_citation": "https://ms.wikipedia.org/?curid=33 (Wikipedia, CC BY-SA, article id 33)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-75-0-q0", "domain": "wiki", "language": "ms", "question": "Berdasarkan maklumat yang diberi, mana Planet yang pertama di dunia untuk ditemui melalui teleskop?", "gold_answer": "Uranus", "gold_passage_text": "Uranus () merupakan planet ketujuh daripada Matahari. Ia merupakan planet ketiga terbesar dari segi jejarinya dan planet keempat terbesar dari segi jisimnya di Sistem Suria. Nama Inggeris Uranus adalah bersempena nama dewa langit Yunani purba iaitu Ouranos (bahasa Yunani Kuno: Οὐρανός), bapa kepada Kronos (setaraf Saturnus) dan datuk Zeus (setaraf Jupiter). Walaupun ia boleh dilihat dengan mata kasar, planet ini tidak dikenal pasti oleh tamadun purba kerana kesuramannya dan putaran orbitnya yang perlahan. Sir William Herschel mengumumkan penemuannya pada 13 Mac 1781 dan ini menyebabkan garis sempadan yang diketahui dalam Sistem Suria buat pertama kalinya dalam sejarah moden dapat dikembangkan. Uranus juga planet pertama yang ditemui melalui teleskop.", "source_citation": "https://ms.wikipedia.org/?curid=75 (Wikipedia, CC BY-SA, article id 75)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-80-1-q0", "domain": "wiki", "language": "ms", "question": "Apa kadar suhu badan burung yang tetap seperti yang dinyatakan dalam teks?", "gold_answer": "40-44 °C.", "gold_passage_text": "Burung merupakan homoioterma, berdarah panas, dengan suhu tetap 40-44&nbsp;°C. Tulang burung adalah ringan dan berongga di kebanyakan tempat untuk mengurangkan ketumpatan dan beratnya. Semua burung mempunyai paruh, yang berbeza hanyalah bentuk dan saiz paruh mereka. Kebanyakan burung mempunyai bulu pelepah kecuali sedikit yang tidak mempunyai bulu pelepah. Burung jenis teropod dipercayai berevolusi daripada reptilia, seperti dinosaur, yang hidup kira-kira 180 juta tahun yang lampau. Burung berubah dan kehilangan gigi dan ciri reptilia yang lain, semasa mengalami proses evolusi yang mengambil masa berjuta-juta tahun. Pada masa yang sama, bulu pelepah tumbuh pada ekornya dan sayapnya.", "source_citation": "https://ms.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:11-ms-q0", "domain": "quran", "language": "ms", "question": "Apa nasihat yang diberikan kepada mereka?", "gold_answer": "\"Janganlah kamu membuat bencana dan kerosakan di muka bumi\"", "gold_passage_text": "Dan apabila dikatakan kepada mereka: \"Janganlah kamu membuat bencana dan kerosakan di muka bumi\", mereka menjawab: \" Sesungguhnya kami orang-orang yang hanya membuat kebaikan\".", "source_citation": "Quran 2:11 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-103-0-q1", "domain": "wiki", "language": "ms", "question": "Apakah genus dan keluarga sawo manila?", "gold_answer": "Nama botaninya ialah Manilkara zapota dan ia termasuk dalam genus Manilkara keluarga Sapotaceae.", "gold_passage_text": "Sawo manila, sauh menila, sawo atau ciku (nama botani: Manilkara zapota) merupakan spesies tumbuhan saka dalam genus Manilkara keluarga Sapotaceae. Ia tumbuh asal dari selatan Mexico, Amerika Tengah dan Caribbean; namun ia juga diperkenalkan di Asia Selatan dan Asia Tenggara di Filipina yang dijajah Empayar Sepanyol. Ia mudah beradaptasi kepada pelbagai jenis iklim tropika dan monsun yang ada di kawasan-kawasan ini. Tumbuhan ini menghasilkan buah manis yang boleh dimakan.", "source_citation": "https://ms.wikipedia.org/?curid=103 (Wikipedia, CC BY-SA, article id 103)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:75-ms-q0", "domain": "quran", "language": "ms", "question": "Bagaimakah tindakan yang diambil oleh puak tersebut setelah mereka memahami Kalam Allah?", "gold_answer": "Mereka mengubah dan memutarkan maksudnya.", "gold_passage_text": "(Sesudah kamu - wahai Muhammad dan pengikut-pengikutmu - mengetahui tentang kerasnya hati orang-orang Yahudi itu) maka bolehkah kamu menaruh harapan bahawa mereka akan beriman kepada seruan Islam yang kamu sampaikan itu, padahal sesungguhnya telah ada satu puak dari mereka yang mendengar Kalam Allah (Taurat), kemudian mereka mengubah dan memutarkan maksudnya sesudah mereka memahaminya, sedang mereka mengetahui (bahawa perbuatan itu salah)?", "source_citation": "Quran 2:75 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-104-1-q0", "domain": "wiki", "language": "ms", "question": "Adakah daun jenis pinat mempunyai 7 hingga 9 helai anak daun?", "gold_answer": "Ya, daun jenis pinat mempunyai 7 hingga 9 helai anak daun yang tersusun berselang-seli.", "gold_passage_text": "Daunnya jenis pinat dan mempunyai 7 - 9 helai anak daun yang tersusun berselang-seli dan berbentuk eliptik atau obovat, sementara anak daun dipangkal berbentuk ovat. Permukaan atas daun berwarna hijau tua, licin, bersinar, dan berombak sedikit. Ciri-ciri ini merupakan ciri dokong yang membezakan nya dari Lansium yang lain.", "source_citation": "https://ms.wikipedia.org/?curid=104 (Wikipedia, CC BY-SA, article id 104)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:86-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimana keadaan azab seksa mereka pada hari kiamat?", "gold_answer": "Azab seksa mereka tidak akan diringankan dan mereka tidak akan diberikan pertolongan.", "gold_passage_text": "Mereka itulah orang-orang yang membeli (mengutamakan) kehidupan dunia (dan kesenangannya) dengan (meninggalkan perintah-perintah Allah yang membawa kebahagiaan dalam kehidupan) akhirat; maka tidak akan diringankan azab seksa mereka (pada hari kiamat), dan mereka pula tidak akan diberikan pertolongan.", "source_citation": "Quran 2:86 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-71-2-q0", "domain": "wiki", "language": "ms", "question": "Bagaimana perbezaan komposisi planet Uranus dan planet lain di gergasi gas Musytari dan Zuhal?", "gold_answer": "Komposisi Uranus dan planet kedua-dua itu berbeza daripada gergasi-gerasi gas Musytari dan Zuhal.", "gold_passage_text": "Komposisi unsur planet ini mirip Uranus, dan komposisi kedua-dua planet berbeza daripada gergasi-gerasi gas Musytari dan Zuhal. Atmosfera planet mengandungi hidrogen, helium, hidrokarbon, kemungkinan nitrogen, dan kandungan \"ais\" yang besar seperti ais air, amonia, dan metana; metana di kawasan paling luar planet ini merupakan salah satu penyebab Neptun nampak kebiruan. Para ahli falak kadang-kadang mengkategorikan Uranus dan Neptunus sebagai \"gergasi ais\" untuk menekankan perbezaan ini. Bahagian dalam Neptun terdiri dari ais dan batu seperti Uranus.", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:28-ms-q1", "domain": "quran", "language": "ms", "question": "Mengapa 'kamu' akhirnya dikembalikan kepada Allah?", "gold_answer": "Untuk diberi balasan bagi segala yang kamu kerjakan.", "gold_passage_text": "Bagaimana kamu tergamak kufur (mengingkari) Allah padahal kamu dahulunya mati (belum lahir), kemudian Ia menghidupkan kamu; setelah itu Ia mematikan kamu, kemudian Ia menghidupkan kamu pula (pada hari akhirat); akhirnya kamu dikembalikan kepadaNya (untuk diberi balasan bagi segala yang kamu kerjakan).", "source_citation": "Quran 2:28 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-56-1-q1", "domain": "wiki", "language": "ms", "question": "Apakah bahan yang menyebabkan peningkatan tenaga pengikatan nuklear bagi helium-4 berbanding tiga unsur selepasnya?", "gold_answer": "Helium-4 mempunyai tenaga pengikatan nuklear yang sangat tinggi berbanding dengan tiga unsur selepasnya.", "gold_passage_text": "Helium adalah unsur kedua paling ringan dan kedua terbanyak di dalam alam semesta boleh cerap. Ia membentuk 24% daripada keseluruhan jisim unsur—12 kali ganda jisim kesemua unsur lain (kecuali hidrogen) digabungkan. Peratusan kelimpahan helium di alam semesta adalah sama dengan peratusannya di dalam Matahari dan planet Musytari. Ini disebabkan oleh tenaga pengikatan nuklear (setiap nukleon) helium-4 yang sangat tinggi berbanding dengan tenaga pengikatan nuklear bagi tiga unsur selepasnya. Tenaga pengikatan helium-4 ini juga menjelaskan kebiasaannya diperolehi daripada pelakuran nuklear dan pereputan radioaktif. Kebanyakan helium di alam semesta ialah helium-4, dan ia dipercayai telah dihasilkan sewaktu Letupan Besar. Kini, helium yang baharu dihasilkan oleh pelakuran hidrogen di dalam teras bintang-bintang.", "source_citation": "https://ms.wikipedia.org/?curid=56 (Wikipedia, CC BY-SA, article id 56)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-111-0-q0", "domain": "wiki", "language": "ms", "question": "Berdasarkan teks, nama botanik yang tepat untuk jenis terung tersebut adalah...", "gold_answer": "Solanum melongena", "gold_passage_text": "Terung () ialah tumbuhan yang tergolong dalam keluarga Solanaceae dan genus Solanum. Ia berasal dari India dan Sri Lanka, dan amat berkait dengan tomato dan ubi kentang. Terung biasanya digunakan sebagai sayur untuk masakan. Nama botaninya Solanum melongena.", "source_citation": "https://ms.wikipedia.org/?curid=111 (Wikipedia, CC BY-SA, article id 111)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-83-0-q0", "domain": "wiki", "language": "ms", "question": "Apakah spesies gajah yang menjadi perhatian dalam konteks ini?", "gold_answer": "Gajah Asia atau Elephas maximus.", "gold_passage_text": "Gajah Asia (Elephas maximus) merupakan salah satu daripada tiga spesies gajah yang masih tinggal. Spesies ini dianggap terancam, dengan antara 25,600 dan 32,750 ekor yang masih hidup liar .", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:10-ms-q0", "domain": "quran", "language": "ms", "question": "Di mana terdapat penyakit syak dan hasad dengki mengikut teks?", "gold_answer": "Dalam hati mereka (golongan yang munafik itu)", "gold_passage_text": "Dalam hati mereka (golongan yang munafik itu) terdapat penyakit (syak dan hasad dengki), maka Allah tambahkan lagi penyakit itu kepada mereka; dan mereka pula akan beroleh azab seksa yang tidak terperi sakitnya, dengan sebab mereka berdusta (dan mendustakan kebenaran).", "source_citation": "Quran 2:10 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-72-2-q1", "domain": "wiki", "language": "ms", "question": "Apakah nisbah atom hidrogen dan atom helium dalam komposisi utama Musytari?", "gold_answer": "Berdasarkan teks, atmosfera tinggi Musytari mempunyai 90% hidrogen dan 10% helium sebagai isi padu.", "gold_passage_text": "Komposisi Lapisan\nMusytari diklasifikasikan sebagai Gergasi Gas kerana kompisisinya teramsuk 76% hidrogen dan 4% helium tetapi sebab atom helium lebih jisim dari molekul hidrogen, atmosfera tinggi Musytari mempunyai 90% hidrogen dan 10% helium sebagai isi padu.", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-44-1-q0", "domain": "wiki", "language": "ms", "question": "Siapa yang mengkritik Hitler dan menyamakannya sebagai 'satu jelmaan syaitan politik moden'? Siapa pula pemimpin yang dikaitkan dengan ideologi yang membawa rejim Nazi?", "gold_answer": "Ahli sejarah dan biografi Ian Kershaw menyifatkan Hitler sebagai 'satu jelmaan syaitan politik moden'. Kepimpinan Hitler dan ideologi perkauman yang digunakan oleh beliau bertanggungjawab terhadap rejim Nazi.", "gold_passage_text": "Ahli sejarah dan biografi Ian Kershaw menyifatkan Hitler sebagai \"satu jelmaan syaitan politik moden\". Di bawah kepimpinan dan ideologi perkauman Hitler, rejim Nazi bertanggungjawab terhadap penghapusan bangsa kira-kira enam juta orang Yahudi dan berjuta-juta mangsa lain yang dianggap sebagai () atau golongan tidak dikehendaki. Hitler dan rejim Nazi juga bertanggungjawab atas pembunuhan lebih 19.3&nbsp;juta orang awam dan tawanan perang. Di samping itu, 28.7&nbsp;juta askar dan orang awam terbunuh akibat konflik ketenteraan di medan perang Eropah. Jumlah kematian orang awam semasa Perang Dunia II tidak pernah berlaku sebelum ini dalam sejarah peperangan dan menjadikannya konflik paling berdarah dalam sejarah manusia.", "source_citation": "https://ms.wikipedia.org/?curid=44 (Wikipedia, CC BY-SA, article id 44)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:21-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimanakah tujuan bagi mereka untuk beribadat?", "gold_answer": "Supaya kamu (menjadi orang-orang yang) bertaqwa.", "gold_passage_text": "Wahai sekalian manusia! Beribadatlah kepada Tuhan kamu yang telah menciptakan kamu dan orang-orang yang terdahulu daripada kamu, supaya kamu (menjadi orang-orang yang) bertaqwa.", "source_citation": "Quran 2:21 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-1:2-ms-q0", "domain": "quran", "language": "ms", "question": "Siapa yang menerima pujian dalam ayat tersebut?", "gold_answer": "Allah", "gold_passage_text": "Segala puji tertentu bagi Allah, Tuhan yang memelihara dan mentadbirkan sekalian alam.", "source_citation": "Quran 1:2 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-94-0-q0", "domain": "wiki", "language": "ms", "question": "Berapakah jumlah nama botani yang digunakan untuk bunga raya dalam teks tersebut?", "gold_answer": "Satu, yaitu Hibiscus rosa-sinensis.", "gold_passage_text": "Bunga raya (nama botani: Hibiscus rosa-sinensis)ialah spesies tumbuhan berbunga tropika genus Hibiscus dalam suku Hibisceae keluarga Malvaceae. Ia banyak ditanam sebagai tanaman hiasan di kawasan tropika dan subtropika, namun ia bertaburan asalnya di Vanuatu.", "source_citation": "https://ms.wikipedia.org/?curid=94 (Wikipedia, CC BY-SA, article id 94)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:58-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimana cara yang diminta untuk masuk ke bandar tersebut?", "gold_answer": "Melalui pintunya dengan tunduk (merendah diri)", "gold_passage_text": "Dan (kenangkanlah) ketika Kami berfirman: \"Masuklah kamu ke bandar ini, kemudian makanlah dari benda-benda yang ada di dalamnya dengan sepuas-puasnya, apa sahaja yang kamu sukai. Dan masuklah kamu melalui pintunya dengan tunduk (merendah diri); dan (mintalah ampun dengan) berkata: ' Ya Allah ampunilah dosa kami '; supaya kami ampunkan kesalahan-kesalahan kamu, dan Kami akan tambah pula pahala orang-orang yang berbuat baik\".", "source_citation": "Quran 2:58 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-43-1-q0", "domain": "wiki", "language": "ms", "question": "Mengapakah nama 'tití iaitu 'puma'' bagi sebuah tasik dikenali mengikut bahasa Aymara?", "gold_answer": "Nama itu dipercayai mengikut bahasa Aymara kerana 'puma' merujuk pada 'tití' atau 'tití iaitu 'puma''.", "gold_passage_text": "Asal usul nama tasik ini dipercayai mengikut bahasa Aymara iaitu titi iaitu \"puma\" dan q’aq’a atau qaqa \"kelabu\" kerana bentuk suatu lukisan batu di Isla del Sol yang diperhatikan masyarakat tempatan menyerupai seekor puma yang memburu kelinci.", "source_citation": "https://ms.wikipedia.org/?curid=43 (Wikipedia, CC BY-SA, article id 43)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-102-1-q1", "domain": "wiki", "language": "ms", "question": "Apa lokasi terjauh di mana tumbuhan ini telah mencapai penyebaran?", "gold_answer": "Pulau-pulau di Australia, khususnya Queensland.", "gold_passage_text": "Tanaman ini berasal dari Asia Tenggara di mana ia menyebar luas mulai dari wilayah Tenasserim di Burma, Malaysia, Thailand, dan sebahagian kepulauan Indonesia termasuk pulau-pulau Sumatera, Jawa (terutamanya di bahagian barat,) Borneo, Sulawesi, Maluku hingga sejauh Papua dan Queensland di Australia.", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-30-2-q0", "domain": "wiki", "language": "ms", "question": "Siapakah yang paling tidak disarankan untuk melakukan pendakian Gunung Tahan?", "gold_answer": "Orang yang sihat", "gold_passage_text": "Pendakian Gunung Tahan paling cepat adalah selama sembilan hari di dalam hutan bagi mereka yang sihat. Jika perjalanan dikira dari Kuala Lumpur, masa pendakian perlu ditambah lagi dua hari. Terpaksa merentas sungai dan runut yang sangat mencabar. Bagaimanapun, runut ini terbuka kepada orang ramai.", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:39-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimana keadaan mereka selepas mendustakan ayat-ayat keterangan kami?", "gold_answer": "Mereka kekal di dalamnya.", "gold_passage_text": "Dan orang-orang kafir yang mendustakan ayat-ayat keterangan kami, mereka itu ialah ahli neraka, mereka kekal di dalamnya.", "source_citation": "Quran 2:39 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:16-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah akibat yang dialami mereka?", "gold_answer": "Tiadah beruntung perniagaan mereka dan tidak pula mereka beroleh petunjuk hidayah.", "gold_passage_text": "Mereka itulah orang-orang yang membeli kesesatan dengan meninggalkan petunjuk; maka tiadalah beruntung perniagaan mereka dan tidak pula mereka beroleh petunjuk hidayah.", "source_citation": "Quran 2:16 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:84-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah kandungan perjanjian setia yang diterangkan dalam ayat tersebut?", "gold_answer": "\"(Bahawa) janganlah kamu menumpahkan darah (berbunuh-bunuhan) sesama sendiri, dan janganlah kamu usir-mengusir sesama sendiri dari kampung masing-masing\"", "gold_passage_text": "Dan (ingatlah), ketika Kami mengikat perjanjian setia dengan kamu: \"(Bahawa) janganlah kamu menumpahkan darah (berbunuh-bunuhan) sesama sendiri, dan janganlah kamu usir-mengusir sesama sendiri dari kampung masing-masing\". Kemudian kamu telah berikrar mematuhi perjanjian setia itu, dan kamu sendiri pula menjadi saksi (yang mengakui kebenarannya).", "source_citation": "Quran 2:84 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-85-1-q0", "domain": "wiki", "language": "ms", "question": "Berdasarkan teks, berapakah jumlah tempoh masa dahulu sejak orang utan Tapanuli berpisah daripada spesies Sumatera?", "gold_answer": "3.4 juta tahun dahulu.", "gold_passage_text": "Perbandingan gen menunjukkan bahawa orang utan Tapanuli terpisah daripada spesies Sumatera kira-kira 3.4 juta tahun dahulu. Orang utan Tapanuli berpisah dari orang utan Borneo jauh lebih lama, iaitu sekitar 670,000 tahun dahulu. Orang utan merupakan satu-satunya ahli yang masih wujud dalam subkeluarga Ponginae yang merangkumi spesies-spesies seperti tiga spesies pupus dalam genus Gigpantopithecus, termasuklah primat paling besar yang dikenali iaitu Gigantopithecus blacki. Leluhur sub.keluarga Ponginae berpisah dari salasilah mawas utama di Afrika pada 16 hingga 19 juta tahun dahulu lalu tersebar ke dalam Asia.", "source_citation": "https://ms.wikipedia.org/?curid=85 (Wikipedia, CC BY-SA, article id 85)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:50-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimanakah nasib Firaun dan tenteranya menurut perenggan tersebut?", "gold_answer": "Kami tenggelamkan Firaun bersama-sama tenteranya", "gold_passage_text": "Dan (kenangkanlah) ketika kami belahkan laut (Merah) untuk kamu lalui (kerana melarikan diri dari angkara Firaun), maka Kami selamatkan kamu dan Kami tenggelamkan Firaun bersama-sama tenteranya, sedang kamu semua menyaksikannya.", "source_citation": "Quran 2:50 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-102-2-q12", "domain": "wiki", "language": "ms", "question": "Apakah bentuk pangkal daun yang biasanya dipenuhi bulu-bulu halus?", "gold_answer": "Tirus hingga obtus", "gold_passage_text": "Batang dan dedaun\nPokok ini merupakan pokok saka yang boleh mencapai ketinggian sehingga 20 meter. Ia mempunyai daun ringkas yang kebanyakkannya berbentuk elliptik. Bahagian bawah urat daun (midrib) biasanya dipenuhi dengan bulu-bulu halus. Pangkal daun berbentuk tirus hingga obtus manakala hujung daun kebanyakkannya berbentuk kupsidat", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:19-ms-q1", "domain": "quran", "language": "ms", "question": "Siapa yang memiliki pengetahuan dan kekuasaan yang meliputi orang-orang yang kafir itu?", "gold_answer": "Allah.", "gold_passage_text": "Atau (bandingannya) seperti (orang-orang yang ditimpa) hujan lebat dari langit, bersama dengan gelap-gelita, dan guruh serta kilat; mereka menyumbat jarinya ke dalam telinga masing-masing dari mendengar suara petir, kerana mereka takut mati. (Masakan mereka boleh terlepas), sedang (pengetahuan dan kekuasaan) Allah meliputi orang-orang yang kafir itu.", "source_citation": "Quran 2:19 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-87-0-q0", "domain": "wiki", "language": "ms", "question": "Berapakah berat dan panjang terpanjang yang boleh dicapai oleh subspesies harimau yang lebih besar?", "gold_answer": "300 kilogram (660&nbsp;paun)", "gold_passage_text": "Harimau (nama saintifik: Panthera tigris) merupakan spesies binatang besar dengan badan yang menyerupai kucing, ia salah satu spesies dalam genus Panthera dan anggota keluarga Felidae. Harimau yang berasal dari Asia timur dan selatan ini ialah sejenis haiwan pemangsa dan maging. Subspesies harimau yang lebih besar boleh mencecah panjang dan berat 300 kilogram (660&nbsp;paun). Selain kebesaran dan kegagahannya, ciri-ciri terpenting yang dimiliki harimau ialah corak belang menegak berwarna hitam yang melapisi bulunya yang berwarna keputihan atau merah kejinggaan.", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-72-1-q0", "domain": "wiki", "language": "ms", "question": "Berapakah lama ia mengambil masa untuk membuat satu putaran lengkap mengelilingi Matahari?", "gold_answer": "11 hari.", "gold_passage_text": "Purata suhu di Musytari ialah sekitar 50°C. Musytari mengambil masa selama 11 hari untuk membuat satu putaran lengkap dan 11 tahun 9 bulan untuk membuat satu peredaran lengkap mengelilingi matahari. Garis pusat Musytari ialah 139,822 km.", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-73-1-q0", "domain": "wiki", "language": "ms", "question": "Di antara orbit planet Marikh dan Musytari, terdapat apa yang mengelilingi matahari?", "gold_answer": "Lingkaran asteroid yang kebanyakannya mengelilingi matahari.", "gold_passage_text": "Terdapat juga lingkaran asteroid yang kebanyakannya mengelilingi matahari di antara orbit planet Marikh dan Musytari. Disebabkan oleh putaran, garis pusat pada garis khatulistiwa adalah terpanjang bagi setiap planet dan bintang.", "source_citation": "https://ms.wikipedia.org/?curid=73 (Wikipedia, CC BY-SA, article id 73)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:3-ms-q0", "domain": "quran", "language": "ms", "question": "Apa yang mereka beriman kepada?", "gold_answer": "perkara-perkara yang ghaib", "gold_passage_text": "Iaitu orang-orang yang beriman kepada perkara-perkara yang ghaib, dan mendirikan (mengerjakan) sembahyang serta membelanjakan (mendermakan) sebahagian dari rezeki yang Kami berikan kepada mereka.", "source_citation": "Quran 2:3 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:61-ms-q0", "domain": "quran", "language": "ms", "question": "Apa yang diminta oleh orang ramai supaya dikeluarkan oleh Tuhan?", "gold_answer": "Sebahagian dari apa yang tumbuh di bumi, termasuk sayur-sayuran, mentimun, bawang putih, adas, dan bawang merah.", "gold_passage_text": "Dan (kenangkanlah) ketika kamu berkata: \"Wahai Musa, kami tidak sabar (sudah jemu) dengan makanan yang semacam sahaja; maka pohonkanlah kepada Tuhanmu untuk kami, supaya dikeluarkan bagi kami sebahagian dari apa yang tumbuh di bumi; dari sayur-sayurannya, dan mentimunnya, dan bawang putihnya, dan adas (kacang dalnya), serta bawang merahnya\". Nabi Musa menjawab: \"Adakah kamu mahu menukar sesuatu yang kurang baik dengan meninggalkan yang lebih baik? Turunlah kamu ke bandar kerana di sana kamu boleh dapati apa yang kamu minta itu\". Dan mereka ditimpakan dengan kehinaan dan kepapaan, dan sudah sepatutnya mereka mendapat kemurkaan dari Allah. Yang demikian itu ialah disebabkan mereka kufur (mengingkari) ayat-ayat Allah (perintah-perintah dan mukjizat-mukjizat yang membuktikan kebesaranNya); dan mereka pula membunuh Nabi-nabi dengan tidak ada alasan yang benar. Yang demikian itu ialah disebabkan mereka menderhaka dan mereka pula sentiasa menceroboh.", "source_citation": "Quran 2:61 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:1-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah nama-nama huruf yang disenaraikan dalam teks ini?", "gold_answer": "Alif, Laam, Miim.", "gold_passage_text": "Alif, Laam, Miim.", "source_citation": "Quran 2:1 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-18-1-q1", "domain": "wiki", "language": "ms", "question": "Apakah bentuk air yang paling utama ditemui di muka bumi ini?", "gold_answer": "Bentuk air yang paling utama ditemui di muka bumi ini adalah dalam bentuk cecair.", "gold_passage_text": "Air wujud dalam 3 bentuk iaitu pepejal, cecair, dan gas. Air dalam bentuk cecair adalah bentuk air yang paling utama ditemui di muka bumi ini. Air dalam bentuk gas adalah kukus atau wap air yang dihasilkan apabila air disejat atau dididihkan. Air dalam bentuk pepejal adalah ais yang dihasilkan apabila air dibekukan. Air meliputi 71% daripada permukaan Bumi, banyaknya di laut dan lautan (kira-kira 96.5%).", "source_citation": "https://ms.wikipedia.org/?curid=18 (Wikipedia, CC BY-SA, article id 18)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:36-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah yang menyebabkan mereka dikeluarkan dari nikmat syurga?", "gold_answer": "Syaitan.", "gold_passage_text": "Setelah itu
