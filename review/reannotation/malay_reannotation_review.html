maka Syaitan menggelincirkan mereka berdua dari syurga itu dan menyebabkan mereka dikeluarkan dari nikmat yang mereka telah berada di dalamnya dan Kami berfirman: \"Turunlah kamu! Sebahagian dari kamu menjadi musuh kepada sebahagian yang lain dan bagi kamu semua disediakan tempat kediaman di bumi, serta mendapat kesenangan hingga ke suatu masa (mati)\".", "source_citation": "Quran 2:36 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:22-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah yang menjadikan bumi ini untuk kamu sebagai hamparan?", "gold_answer": "Dia lah yang menjadikan bumi ini untuk kamu.", "gold_passage_text": "Dia lah yang menjadikan bumi ini untuk kamu sebagai hamparan, dan langit (serta segala isinya) sebagai bangunan (yang dibina dengan kukuhnya); dan diturunkanNya air hujan dari langit, lalu dikeluarkanNya dengan air itu berjenis-jenis buah-buahan yang menjadi rezeki bagi kamu; maka janganlah kamu mengadakan bagi Allah, sebarang sekutu, padahal kamu semua mengetahui (bahawa Allah ialah Tuhan Yang Maha Esa).", "source_citation": "Quran 2:22 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:79-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah tujuan mereka mengubah Kalam Allah dengan rekaan-rekaan mereka?", "gold_answer": "Supaya mereka dengan perbuatan itu dapat membeli keuntungan dunia yang sedikit.", "gold_passage_text": "Kecelakaan besar bagi orang-orang yang menulis Kitab Taurat dengan tangan mereka (lalu mengubah Kalam Allah dengan rekaan-rekaan mereka), kemudian mereka berkata: \"Ini ialah dari sisi Allah\", supaya mereka dengan perbuatan itu dapat membeli keuntungan dunia yang sedikit. Maka kecelakaan besar bagi mereka disebabkan apa yang ditulis oleh tangan mereka, dan kecelakaan besar bagi mereka dari apa yang mereka usahakan itu.", "source_citation": "Quran 2:79 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-28-0-q1", "domain": "wiki", "language": "ms", "question": "Adakah haiwan di dalam keluarga Balaenopteridae termasuk dalam nama-nama spesies yang disebutkan dalam passage?", "gold_answer": "Tidak, kerana paut () atau ikan paus () bukan nama spesies yang disebutkan dalam passage.", "gold_passage_text": "Paus () atau ikan paus () adalah sekelompok mamalia laut berplasenta akuatik penuh tergolong dalam ordo Setasea melalui lapan keluarga: Balaenopteridae, Balaenidae, Cetotheriidae, Eschrichtiidae, Monodontidae (termasuk beluga dan narwal, Physeteridae, Kogiidae dan Ziphiidae. Meskipun kesemua haiwan ini dinampakkan mempunyai ciri fizikal luar mirip ikan, masih ada ciri-ciri mamalia sepunya lain yang dimiliki:", "source_citation": "https://ms.wikipedia.org/?curid=28 (Wikipedia, CC BY-SA, article id 28)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-105-0-q0", "domain": "wiki", "language": "ms", "question": "Siapakah nama latin jambu batu?", "gold_answer": "Psidium guajava Linn", "gold_passage_text": "Jambu batu () atau jambu biji (Psidium guajava Linn) merupakan buah-buahan tropika. Nama saintifik jambu batu adalah dari cabang Myrtoideae keluarga \"Myrtaceae\". Jambu batu banyak terjual di pasar-pasar termasuk pasar tani, dan pasar sayur.", "source_citation": "https://ms.wikipedia.org/?curid=105 (Wikipedia, CC BY-SA, article id 105)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:6-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah yang berlaku kepada mereka sama ada engkau beri amaran atau tidak beri amaran?", "gold_answer": "Mereka tidak akan beriman", "gold_passage_text": "Sesungguhnya orang-orang kafir (yang tidak akan beriman), sama sahaja kepada mereka: sama ada engkau beri amaran kepadanya atau engkau tidak beri amaran, mereka tidak akan beriman.", "source_citation": "Quran 2:6 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-107-2-q0", "domain": "wiki", "language": "ms", "question": "Berdasarkan passage, apa yang dianggap sebagai satu buah mangga? Answer: Sebuah buah mangga dianggap merupakan buah segar yang paling banyak dimakan di seluruh dunia.", "gold_answer": "Buah mangga dikatakan merupakan buah segar yang paling banyak dimakan di seluruh dunia.", "gold_passage_text": "Buah mangga dikatakan merupakan buah segar yang paling banyak dimakan di seluruh dunia. Walaupun demikian, petani-petani buah mangga hanya menerima harga yang rendah untuk hasil mereka. Disebabkan ini, buah mangga telah menjadi satu barang 'perdagangan saksama' di sebilangan negara.", "source_citation": "https://ms.wikipedia.org/?curid=107 (Wikipedia, CC BY-SA, article id 107)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-102-2-q1", "domain": "wiki", "language": "ms", "question": "Bagaimana bentuk bahagian bawah urat daun (midrib) yang biasanya dipenuhi bulu?", "gold_answer": "Berbentuk bulu-bulu halus", "gold_passage_text": "Batang dan dedaun\nPokok ini merupakan pokok saka yang boleh mencapai ketinggian sehingga 20 meter. Ia mempunyai daun ringkas yang kebanyakkannya berbentuk elliptik. Bahagian bawah urat daun (midrib) biasanya dipenuhi dengan bulu-bulu halus. Pangkal daun berbentuk tirus hingga obtus manakala hujung daun kebanyakkannya berbentuk kupsidat", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-28-2-q1", "domain": "wiki", "language": "ms", "question": "Pada waktu seperti apa, paus purba berevolusi dan berapa tahun di masa lalu?", "gold_answer": "Pertengahan tempoh Eosen, kira-kira 50 juta tahun dahulu.", "gold_passage_text": "Paus purba berevolusi pada pertengahan tempoh Eosen, kira-kira 50 juta tahun dahulu. Salah satu paus terawal yang telah pupus adalah Basilosaurus yang mempunyai kepala kecil bermuncung menonjol dan bergigi. Basilosaurus sepanjang 25 meter panjang.", "source_citation": "https://ms.wikipedia.org/?curid=28 (Wikipedia, CC BY-SA, article id 28)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:60-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah arahan yang diberikan kepada Nabi Musa supaya ia mendapatkan air?", "gold_answer": "Pukulah batu itu dengan tongkatmu.", "gold_passage_text": "Dan (ingatlah) ketika Nabi Musa memohon supaya diberi air untuk kaumnya, maka Kami berfirman: \"Pukulah batu itu dengan tongkatmu\", (ia pun memukulnya), folalu terpancutlah dari batu itu dua belas mata air; sesungguhnya tiap-tiap satu puak (di antara mereka) telah mengetahui tempat minumnya masing-masing. (Dan Kami berfirman): \"Makanlah dan minumlah kamu dari rezeki Allah itu, dan janganlah kamu merebakkan bencana kerosakan di muka bumi\".", "source_citation": "Quran 2:60 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:89-ms-q0", "domain": "quran", "language": "ms", "question": "Apa yang dilakukan mereka setelah datang kepada mereka Nabi Muhammad dan Al Quran?", "gold_answer": "Mereka mengingkarinya.", "gold_passage_text": "Dan ketika datang kepada mereka sebuah Kitab dari Allah (Al Quran), yang mengesahkan apa yang ada pada mereka (Kitab Taurat), sedang mereka sebelum itu sentiasa memohon (kepada Allah) kemenangan atas kaum kafir musyrik (dengan kedatangan seorang Nabi pembawa Kitab itu). Setelah datang kepada mereka apa yang mereka sedia mengetahui kebenarannya (Nabi Muhammad dan Al Quran), mereka mengingkarinya; maka (dengan yang demikian), laknat Allah menimpa orang-orang yang kafir ingkar itu.", "source_citation": "Quran 2:89 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-76-1-q1", "domain": "wiki", "language": "ms", "question": "Manakah planet yang diwakili oleh objek semula jadi yang paling terang di waktu malam kecuali Bulan?", "gold_answer": "Zuhrah.", "gold_passage_text": "Ia merupakan objek semula jadi yang paling terang di waktu malam, kecuali Bulan, mencapai magnitud kecerahan −4.6; kecerahan maksimum dicapai planet ini sebelum matahari naik atau pun terbenam sehingga kadangkalanya boleh dilihat di siang hari lalu diberi nama Bintang Pagi ataupun Bintang Petang. Oleh kerana Zuhrah merupakan planet inferior dari Bumi, ia tidak pernah muncul jauh daripada Matahari: Kelonjongannya mencapai maksimum sebanyak 47.8°.", "source_citation": "https://ms.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-39-1-q0", "domain": "wiki", "language": "ms", "question": "Mengapa garis pusat pada garis khatulistiwa terpanjang bagi setiap planet dan bintang?", "gold_answer": "Sebab putaran tersebut menyebabkan lingkaran asteroid yang kebanyakannya mengelilingi matahari di antara orbit planet ini dan Musytari.", "gold_passage_text": "Terdapat juga lingkaran asteroid yang kebanyakannya mengelilingi matahari di antara orbit planet ini dan Musytari. Putaran tersebut menyebabkan garis pusat pada garis khatulistiwa terpanjang bagi setiap planet dan bintang.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-26-1-q1", "domain": "wiki", "language": "ms", "question": "Apakah sebutan untuk dua spesies penyu yang dinyatakan dalam teks?", "gold_answer": "Penyu Archelon dan penyu Cimochelys.", "gold_passage_text": "Mengikut kajian yang telah dijalankan, penyu didapati telah wujud semenjak akhir zaman Jura (145-208 juta tahun) ketika dinosaur masih ada. Penyu Archelon yang bersaiz 6 meter (20 kaki) panjang ataupun penyu Cimochelys, berenang di laut silam seperti penyu masa kini.", "source_citation": "https://ms.wikipedia.org/?curid=26 (Wikipedia, CC BY-SA, article id 26)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-68-2-q1", "domain": "wiki", "language": "ms", "question": "Seorang penderita kekurangan G6PD boleh mengalami manifestasi klinikal seperti apa pada keadaan tertentu?", "gold_answer": "Ia termasuk demam kuning baru lahir, sakit perut, sakit belakang, pening, sakit kepala, dispnea (pernafasan tidak teratur), dan palpitasi.", "gold_passage_text": "Para ibu bapa tidak perlu risau jika anak mereka mengalami kekurangan G6PD ini kerana pada dasarnya ia tidak berbahaya. Komplikasi hanya akan terjadi jika mereka terdedah kepada ubat-ubatan yang boleh menghasilkan proses homolisis di dalam darah. Dari segi yang lain, G6PD boleh menjadikan penghidap, lebih kuat melawan penyakit Malaria. oksijen dengan berkesan ke seluruh tubuh, keadaan sebagai anemia hemolytik muncul. Tambahan kepada anemia hemolytik, seseorang yang kekurangan G6PD boleh menjangka beberapa manifastasi klinikal pada keadaan mereka. Ini termasuk demam kuning baru lahir, sakit perut dan/atau sakit belakang, pening, sakit kepala, dispnea (pernafasan tidak teratur), dan palpitasi (Cecil, 1992).", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:63-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah peristiwa yang berlaku semasa perjanjian setia diambil?", "gold_answer": "Kami angkatkan Gunung Tursina di atas kamu.", "gold_passage_text": "Dan (ingatlah), ketika Kami mengambil perjanjian setia kamu semasa Kami angkatkan Gunung Tursina di atas kamu (sambil Kami berfirman): \"Terimalah Taurat yang telah Kami berikan kepada kamu (serta amalkanlah) dengan bersungguh-sungguh, dan ingatlah (jangan lupakan) apa yang tersebut di dalamnya, supaya kamu bertaqwa.", "source_citation": "Quran 2:63 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:13-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah yang dinyatakan sebagai orang-orang yang bodoh dalam teks ini?", "gold_answer": "Merekalah orang-orang yang bodoh.", "gold_passage_text": "Dan apabila dikatakan kepada mereka: \"Berimanlah kamu sebagaimana orang-orang itu telah beriman\". Mereka menjawab: \"Patutkah kami ini beriman sebagaimana berimannya orang-orang bodoh itu?\" Ketahuilah! Sesungguhnya merekalah orang-orang yang bodoh, tetapi mereka tidak mengetahui (hakikat yang sebenarnya).", "source_citation": "Quran 2:13 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:46-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah dua perkara yang dipercayai akan berlaku?", "gold_answer": "Bahawa mereka akan menemui Tuhan mereka, dan bahawa mereka akan kembali kepadaNya.", "gold_passage_text": "(Iaitu) mereka yang percaya dengan yakin bahawa mereka akan menemui Tuhan mereka, dan bahawa mereka akan kembali kepadaNya.", "source_citation": "Quran 2:46 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:62-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah kumpulan yang disebutkan dalam ayat tersebut?", "gold_answer": "Orang-orang yang beriman, orang-orang Yahudi, orang-orang Nasora (Nasrani), dan orang-orang Saabien.", "gold_passage_text": "Sesungguhnya orang-orang yang beriman, dan orang-orang Yahudi dan orang-orang Nasora (Nasrani), dan orang-orang Saabien sesiapa di antara mereka itu beriman kepada Allah dan (beriman kepada) hari akhirat serta beramal soleh, maka bagi mereka pahala balasannya di sisi Tuhan mereka, dan tidak ada kebimbangan (dari berlakunya kejadian yang tidak baik) kepada mereka, dan mereka pula tidak akan berdukacita.", "source_citation": "Quran 2:62 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-56-2-q1", "domain": "wiki", "language": "ms", "question": "Di mana bahan yang diuraikan untuk menghasilkan helium ini berasal dari?", "gold_answer": "Sebuah unsur radioaktif yang berat.", "gold_passage_text": "Di Bumi, gas ini agak jarang, dengan kelimpahan dalam atmosfera bumi hanya sebanyak 0.00052% mengikut isipadu. Kebanyakan helium dari Bumi yang wujud pada hari ini dihasilkan melalui pereputan radioaktif unsur-unsur radioaktif yang berat (torium dan uranium). Zarah-zarah alfa yang dipancarkan dalam pereputan ini terdiri daripada nukelus-nukleus helium-4. Helium radiogenik ini terperangkap dengan gas asli, dengan kepekatan sehingga 7% mengikut isipadu. Dari situ, ia diekstrak secara komersial melalui proses pemisahan bersuhu rendah yang dinamakan penyulingan berperingkat.", "source_citation": "https://ms.wikipedia.org/?curid=56 (Wikipedia, CC BY-SA, article id 56)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:18-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah keadaan yang dialami oleh mereka dalam pasusan tersebut?", "gold_answer": "Pekak, bisu dan buta.", "gold_passage_text": "Mereka (seolah-olah orang yang) pekak, bisu dan buta; dengan keadaan itu mereka tidak dapat kembali (kepada kebenaran).", "source_citation": "Quran 2:18 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:25-ms-q0", "domain": "quran", "language": "ms", "question": "Apakah perkataan yang diucapkan oleh mereka apabila diberikan satu pemberian dari buah-buahan syurga itu?", "gold_answer": "\"Inilah yang telah diberikan kepada kami dahulu\"", "gold_passage_text": "Dan berilah khabar gembira kepada orang-orang yang beriman dan beramal soleh, sesungguhnya mereka beroleh syurga yang mengalir di bawahnya beberapa sungai; tiap-tiap kali mereka diberikan satu pemberian dari sejenis buah-buahan syurga itu, mereka berkata: \"Inilah yang telah diberikan kepada kami dahulu\"; dan mereka diberikan rezeki itu yang sama rupanya (tetapi berlainan hakikatnya), dan disediakan untuk mereka dalam syurga itu pasangan-pasangan, isteri-isteri yang sentiasa bersih suci, sedang mereka pula kekal di dalamnya selama-lamanya.", "source_citation": "Quran 2:25 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-102-0-q0", "domain": "wiki", "language": "ms", "question": "Apa nama saintifik untuk tumbuhan cempedak yang disebutkan dalam teks?", "gold_answer": "Artocarpus integer", "gold_passage_text": "Cempedak ( [cĕm.pĕ.dak]), campedak (dua-dua dalam ), tibadak (Jawi: , ) atau baroh (Jawi: , ) merupakan sejenis tumbuhan yang menghasilkan buah yang boleh dimakan, nama saintifiknya ialah Artocarpus integer. Buah cempedak banyak dijual di pasar-pasar termasuk pasar tani, dan pasar sayur. sinonim Artocarpus champeden (Thunb.) Merr., Artocarpus polyphema Pers.). Pokok cempedak turut diperkenalkan ke Queensland. Pokok cempedak cepat tumbuh, dan pokok bersaiz serdahana mampu menghasilkan buah yang banyak.", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:52-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah tujuan bagi 'kami' untuk maafkan kesalahan kamu?", "gold_answer": "Supaya kamu bersyukur.", "gold_passage_text": "Kemudian sesudah itu kami maafkan kesalahan kamu, supaya kamu bersyukur.", "source_citation": "Quran 2:52 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:71-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimanakah keadaan mereka ketika mereka menyembelih lembu yang tersebut?", "gold_answer": "Hampir-hampir mereka tidak dapat menunaikan (perintah Allah) itu.", "gold_passage_text": "Nabi Musa menjawab: \"Bahawasanya Allah berfirman: Sebenarnya (lembu yang dikehendaki itu) ialah lembu betina yang tidak pernah digunakan untuk membajak tanah (sawah bendang), dan tidak pula (digunakan mengangkut air) untuk menyiram tanaman; ia juga tidak cacat dan tidak ada belang pada warnanya\". Mereka berkata: \"Sekarang baharulah engkau dapat menerangkan sifat-sifatnya yang sebenar\". Maka mereka pun menyembelih lembu yang tersebut, dan hampir-hampir mereka tidak dapat menunaikan (perintah Allah) itu.", "source_citation": "Quran 2:71 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:70-ms-q1", "domain": "quran", "language": "ms", "question": "Untuk apa mereka akan mendapat petunjuk?", "gold_answer": "Untuk mencari dan menyembelih lembu itu", "gold_passage_text": "Mereka berkata lagi: \"Pohonkanlah kepada Tuhanmu untuk kami, supaya diterangkanNya kepada kami lembu betina yang mana satu? Kerana sesungguhnya lembu yang dikehendaki itu kesamaran kepada kami (susah kami memilihnya), dan kami insya Allah akan mendapat petunjuk (untuk mencari dan menyembelih lembu itu)\".", "source_citation": "Quran 2:70 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-45-1-q4", "domain": "wiki", "language": "ms", "question": "Apa kata yang digunakan untuk merujuk pada 'salji' dalam konteks Himalaya?", "gold_answer": "Kata 'salji'.", "gold_passage_text": "Perkataan Himalaya adalah berasal dari Sanskrit dan membawa erti \"tempat kediaman salji\" (Sanskrit him \"salji\", dan aalaya \"rumah, tempat kediaman\"). Dalam sebutan Hindi/Sanskrit, Himalaya disebut dengan a pertama panjang dan a akhir pendek, i.e. as /himaal-ya/.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-77-0-q1", "domain": "wiki", "language": "ms", "question": "Sebutkan semua komponen yang termasuk dalam gas-gas yang membentuk udara mengikut penaziran dalam passage ini.", "gold_answer": "Nitrogen, Oksigen, Karbon dioksida, gas nadir, wap air, habuk, dan mikroorganisma.", "gold_passage_text": "Di antara gas-gas yang membentuk udara adalah seperti berikut:\n* Nitrogen\n* Oksigen\n* Karbon dioksida\n* gas nadir\n* wap air\n* habuk\n* mikroorganisma", "source_citation": "https://ms.wikipedia.org/?curid=77 (Wikipedia, CC BY-SA, article id 77)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-72-0-q1", "domain": "wiki", "language": "ms", "question": "Apakah nisbah jisim Musytari terhadap gabungan jisim semua planet lain dalam Sistem Suria?", "gold_answer": "Lebih daripada dua setengah kali ganda", "gold_passage_text": "Musytari () ialah planet kelima dari Matahari. Planet ini mempunyai jarak purata kira-kira 778.3 juta kilometer dari Matahari dan ia adalah planet yang terbesar dalam Sistem Suria, mempunyai jisim sekadar 1.8986\\times10^{27}kg . Ini bermaksud bahawa jisim Musytari adalah lebih daripada dua setengah kali ganda daripada semua planet lain dalam Sistem Suria digabungkan. Jisim ini juga dikenali sebagai Jisim Jovian.", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-79-1-q0", "domain": "wiki", "language": "ms", "question": "Kadangan muncul dalam rekod fosil sebagai spesies marin sekitar berapa juta tahun yang lalu?", "gold_answer": "542 juta tahun yang lalu.", "gold_passage_text": "Sebahagian besar filum haiwan yang diketahui, seperti kordata, arthropod, dan moluska, muncul dalam rekod fosil sebagai spesies marin semasa ledakan Cambrian sekitar 542 juta tahun yang lalu.", "source_citation": "https://ms.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:41-ms-q0", "domain": "quran", "language": "ms", "question": "Kepada siapa hendaklah kamu bertaqwa?", "gold_answer": "Kepada Akulah sahaja.", "gold_passage_text": "Dan berimanlah kamu dengan apa yang Aku turunkan (Al-Quran) yang mengesahkan benarnya Kitab yang ada pada kamu, dan janganlah kamu menjadi orang-orang yang mula-mula kafir (ingkar) akan dia; dan janganlah pula kamu menjadikan ayat-ayatKu (sebagai harga untuk) membeli kelebihan-kelebihan yang sedikit faedahnya; dan kepada Akulah sahaja hendaklah kamu bertaqwa.", "source_citation": "Quran 2:41 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-1:2-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah fungsi Tuhan yang diterangkan dalam ayat tersebut?", "gold_answer": "Memelihara dan mentadbirkan sekalian alam", "gold_passage_text": "Segala puji tertentu bagi Allah, Tuhan yang memelihara dan mentadbirkan sekalian alam.", "source_citation": "Quran 1:2 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:55-ms-q1", "domain": "quran", "language": "ms", "question": "Siapa yang melihat petir tersebut?", "gold_answer": "Kamu semua.", "gold_passage_text": "Dan (kenangkanlah) ketika kamu berkata: \"Wahai Musa! Kami tidak akan beriman kepadamu sehingga kami dapat melihat Allah dengan terang (dengan mata kepala kami)\". Maka kerana itu kamu disambar petir, sedang kamu semua melihatnya.", "source_citation": "Quran 2:55 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-90-2-q0", "domain": "wiki", "language": "ms", "question": "Apa definisi yang diletakkan terhadap tumbuhan secara luas berdasarkan maklumat ini?", "gold_answer": "Semua autotrof (autotroph), iaitu yang menghasilkan makanannya sendiri daripada bahan mentah bukan organik dan cahaya matahari.", "gold_passage_text": "Istilah tumbuhan yang lebih luas adalah semua autotrof (autotroph) — iaitu, yang menghasilkan makanannya sendiri daripada bahan mentah bukan organik dan cahaya matahari. Ini adalah istilah yang manusahabah, dan yang menumpukan kepada peranan biasa tumbuhan dalam sistem ekologi. Bagaimanapun terdapat fotoautotrof (photoautotrophs) dalam Prokaryote, khususnya bakteria photoautotrophik dan cyanobacteria. Tumbuhan memerlukan pelbagai nutrien penting yang disesuaikan dengan fasa pertumbuhan tumbuhan, seperti vitamin, mineral, hormon, dan lain-lain. Dalam pertanian komersil keperluan pemakanan tumbuhan dibekalkan oleh manusia melalui kejuruteraan bioteknologi, termasuk penggunaan baja.", "source_citation": "https://ms.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:43-ms-q1", "domain": "quran", "language": "ms", "question": "Dengan siapa semua orang melakukan rukuk?", "gold_answer": "Bersama-sama orang-orang yang rukuk.", "gold_passage_text": "Dan dirikanlah kamu akan sembahyang dan keluarkanlah zakat, dan rukuklah kamu semua (berjemaah) bersama-sama orang-orang yang rukuk.", "source_citation": "Quran 2:43 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-92-1-q1", "domain": "wiki", "language": "ms", "question": "Bagaimana iklim di Tanah Tinggi Cameron mempengaruhi penanaman bunga teluki?", "gold_answer": "Iklimnya menyerupai iklim hawa sederhana dengan suhu maksimum sekitar 21°C, sehingga pokok bunga teluki boleh ditanam sepanjang tahun.", "gold_passage_text": "Penanaman bunga teluki di Malaysia adalah tertumpu di kawasan dataran tinggi seperti di Tanah Tinggi Cameron. Di Tanah Tinggi Cameron iklimnya menyerupai iklim hawa sederhana (suhu maksimum sekitar 21&nbsp;°C) dan pokok bunga teluki boleh ditanam sepanjang tahun.", "source_citation": "https://ms.wikipedia.org/?curid=92 (Wikipedia, CC BY-SA, article id 92)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-85-2-q0", "domain": "wiki", "language": "ms", "question": "Siapa yang dimulakan kajian lapangan terhadap orang utan?", "gold_answer": "Ahli primatologi Birutė Galdikas.", "gold_passage_text": "Orang utan antara primat yang paling cerdas, dengan menggunakan pelbagai alat-alat canggih serta membina sarang tidur yang teliti daripada dahan ranting dan daun setiap malam. Orang utan banyak dikaji untuk kemampuan belajar, malah mungkin dapat membentuk budaya tersendiri dalam populasi. Kajian lapangan terhadap orang utan dimulakan oleh ahli primatologi Birutė Galdikas. Ketiga-tiga spesies orang utan dikira terancam genting. Antara ancaman terhadap populasi orang utan liar termasuk pemburuan haram, kemusnahan habitat dan perdagangan haiwan peliharaan haram. Terdapat beberapa pertubuhan pemuliharaan dan rehabilitasi yang berdedikasi terhadap kemandirian orang utan liar.", "source_citation": "https://ms.wikipedia.org/?curid=85 (Wikipedia, CC BY-SA, article id 85)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-30-1-q1", "domain": "wiki", "language": "ms", "question": "Adakah gunung ini dipercayai mempunyai dua pendaki mawas?", "gold_answer": "Ya, ia dipercayai mempunyai dua ekor mawas gergasi.", "gold_passage_text": "Penamaan\nGunung ini dinamakan sebagai Tahan kerana pernah dianggap sebagai tempat larangan; gunung ini diceritakan mempunyai dua perigi \"ibu emas\" dan \"ibu perak\" yang boleh memberikan kuasa menukarkan apa-apa objek yang disentuh menjadi perak dan emas, tetapi ia ditunggu dua ekor mawas gergasi. Selain itu, gunung ini juga dipercayai dinamakan sedemikian kerana pendakian ke puncak gunung memerlukan ketahanan yang kuat bagi sesiapa yang ingin menawan Gunung Tahan.", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:73-ms-q0", "domain": "quran", "language": "ms", "question": "Siapa yang berfirman bahawa mereka perlu memukul si mati dengan sebahagian anggota lembu?", "gold_answer": "Kami (Allah)", "gold_passage_text": "Maka Kami (Allah) berfirman: \"Pukulah si mati dengan sebahagian anggota lembu yang kamu sembelih itu\" (Mereka pun memukulnya dan ia kembali hidup). Demikianlah Allah menghidupkan orang-orang yang telah mati, dan memperlihatkan kepada kamu tanda-tanda kekuasaanNya, supaya kamu memahaminya.", "source_citation": "Quran 2:73 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:8-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah keadaan sebenar mereka yang berkata tersebut?", "gold_answer": "Mereka sebenarnya tidak beriman.", "gold_passage_text": "Dan di antara manusia ada yang berkata: \"Kami telah beriman kepada Allah dan kepada hari akhirat\"; padahal mereka sebenarnya tidak beriman.", "source_citation": "Quran 2:8 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:25-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimana ciri-ciri pasangan-pasangan yang disediakan untuk mereka dalam syurga?", "gold_answer": "isteri-isteri yang sentiasa bersih suci", "gold_passage_text": "Dan berilah khabar gembira kepada orang-orang yang beriman dan beramal soleh, sesungguhnya mereka beroleh syurga yang mengalir di bawahnya beberapa sungai; tiap-tiap kali mereka diberikan satu pemberian dari sejenis buah-buahan syurga itu, mereka berkata: \"Inilah yang telah diberikan kepada kami dahulu\"; dan mereka diberikan rezeki itu yang sama rupanya (tetapi berlainan hakikatnya), dan disediakan untuk mereka dalam syurga itu pasangan-pasangan, isteri-isteri yang sentiasa bersih suci, sedang mereka pula kekal di dalamnya selama-lamanya.", "source_citation": "Quran 2:25 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-73-2-q0", "domain": "wiki", "language": "ms", "question": "Apa sistem utama Zuhal mempunyai dan apa bahagian terbesar dalam sistem tersebut?", "gold_answer": "Zuhal mempunyai satu sistem gelang atau cecincin yang utama yang terdiri kebanyakannya dari air batu dengan sejumlah kecil serpihan batuan dan debu. Bulan-bulan dalam sistem itu ialah Titan, Ganymede, dan Utarid.", "gold_passage_text": "Zuhal mempunyai satu sistem gelang atau cecincin yang utama terdiri kebanyakannya dari air batu dengan sejumlah kecil serpihan batuan dan debu. Sebanyak enam puluh bulan-bulan mengorbit planet berkenaan. Salah satu bulan ini, Titan merupakan bulan Zuhal yang terbesar (selepas Ganymede) yang diukur lebih besar dari planet Utarid serta merupakan satu-satunya bulan dalam Sistem Suria yang mempunyai atmosfera sendiri.", "source_citation": "https://ms.wikipedia.org/?curid=73 (Wikipedia, CC BY-SA, article id 73)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-89-1-q1", "domain": "wiki", "language": "ms", "question": "Apa yang melambangkan agama Islam, atau agama bagi Persekutuan, di dalam kanton tersebut?", "gold_answer": "Anak bulan yang melambangkan agama Islam, kerana ia telah tertakluk di dalam Perlembagaan Persekutuan Malaysia.", "gold_passage_text": "Bahagian segi empat (atau kanton) yang berwarna biru tua di atas sebelah kiri menegak dari atas hingga ke bawah jalur merah yang kelima itu melambangkan perpaduan rakyat Malaysia; kanton tersebut mengandungi anak bulan yang melambangkan agama Islam sebagai agama bagi Persekutuan (seperti yang telah tertakluk di dalam Perlembagaan Persekutuan Malaysia). Bintang pecah 14 itu melambangkan perpaduan 13 buah negeri dan Kerajaan Persekutuan. Warna kuning pada anak bulan dan bintang melambangkan warna diraja bagi Duli-duli Yang Maha Mulia Baginda Raja-raja Melayu.", "source_citation": "https://ms.wikipedia.org/?curid=89 (Wikipedia, CC BY-SA, article id 89)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-105-1-q2", "domain": "wiki", "language": "ms", "question": "Di Malaysia, di mana tahun mula untuk penanaman Jambu batu secara komersial?", "gold_answer": "Di Malaysia kawasan penanaman Jambu batu secara komersial bermula pada pertengahan tahun 1980.", "gold_passage_text": "Jambu batu dipercayai berasal dari kawasan antara Peru dan Mexico iaitu di kawasan tropika Amerika. Jambu batu tersebar ke merata kawasan tropika dan sub tropika. Di Malaysia kawasan penanaman secara komersil bermula pada pertengahan tahun 1980.", "source_citation": "https://ms.wikipedia.org/?curid=105 (Wikipedia, CC BY-SA, article id 105)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-87-2-q1", "domain": "wiki", "language": "ms", "question": "Diantara sektor mana harimau masih memegang tempat yang mencabar dalam budaya dan kemasyarakatan?", "gold_answer": "Harimau mendapat tempat penting dalam bidang perfileman dan kesusasteraan moden, serta terus menjadi simbol nasional di Asia termasuk Malaysia.", "gold_passage_text": "Walau bagaimanapun, harimau tetap menjadi salah sejenis megafauna berkarisma yang paling terkenal di dunia. Harimau banyak memainkan peranan penting dalam mitos dan budaya rakyat, di samping masih mendapat tempat dalam bidang perfileman dan kesusasteraan moden. Lukisan harimau sering dijumpai pada bendera dan jata negara, sebagai maskot sukan, dan haiwan kebangsaan sebilangan negara Asia, termasuk Malaysia.", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:34-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah sebab Iblis tidak tunduk memberi hormat?", "gold_answer": "Ia enggan dan takbur.", "gold_passage_text": "Dan (ingatlah) ketika kami berfirman kepada malaikat: \"Tunduklah (beri hormat) kepada Nabi Adam\". Lalu mereka sekaliannya tunduk memberi hormat melainkan Iblis; ia enggan dan takbur, dan menjadilah ia dari golongan yang kafir.", "source_citation": "Quran 2:34 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:85-ms-q1", "domain": "quran", "language": "ms", "question": "Bagaimana balasan yang diberikan kepada orang yang percaya hanya kepada sebahagian Kitab Taurat dan mengingkari sebahagian yang lain?", "gold_answer": "Tiadalah balasan bagi orang yang berbuat demikian itu, melainkan kehinaan ketika hidup di dunia, dan pada hari kiamat akan ditolak mereka ke dalam azab seksa yang amat berat.", "gold_passage_text": "Kemudian kamu ini (wahai Bani Israil), kamu berbunuh-bunuhan sesama sendiri dan kamu usir satu puak dari kaum kamu keluar dari kampungnya; kamu pula saling bantu-membantu (dengan orang lain) untuk menentang mereka dengan melakukan dosa dan penganiayaan; padahal kalau mereka datang kepada kamu sebagai orang tawanan, kamu tebus mereka; sedang perbuatan mengusir mereka diharamkan juga atas kamu. Sesudah itu maka patutkah kamu hanya percaya kepada sebahagian (dari isi) Kitab Taurat dan mengingkari akan sebahagian yang lain? Maka tiadalah balasan bagi orang yang berbuat demikian itu dari antara kamu, selain dari kehinaan ketika hidup di dunia, dan pada hari kiamat akan ditolak mereka ke dalam azab seksa yang amat berat. Dan (ingatlah), Allah tidak sekali-kali lalai akan apa yang kamu lakukan.", "source_citation": "Quran 2:85 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:9-ms-q0", "domain": "quran", "language": "ms", "question": "Siapa yang hendak diperdayakan oleh mereka?", "gold_answer": "Allah dan orang-orang yang beriman.", "gold_passage_text": "Mereka hendak memperdayakan Allah dan orang-orang yang beriman, padahal mereka hanya memperdaya dirinya sendiri, sedang mereka tidak menyedarinya.", "source_citation": "Quran 2:9 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-45-1-q1", "domain": "wiki", "language": "ms", "question": "Apa arti kata 'Himalaya' dalam bahasa Hindi atau Sanskrit?", "gold_answer": "Arti 'Himalaya' adalah 'tempat kediaman salji'.", "gold_passage_text": "Perkataan Himalaya adalah berasal dari Sanskrit dan membawa erti \"tempat kediaman salji\" (Sanskrit him \"salji\", dan aalaya \"rumah, tempat kediaman\"). Dalam sebutan Hindi/Sanskrit, Himalaya disebut dengan a pertama panjang dan a akhir pendek, i.e. as /himaal-ya/.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "ms-wiki-26-2-q0", "domain": "wiki", "language": "ms", "question": "Apakah fungsi kaki pendayung yang terletak di hadapan penyu dalam konteks gerakan mereka?", "gold_answer": "Fungsi kaki pendayung itu ialah untuk menggerakkan penyu ke darat.", "gold_passage_text": "Penyu mempunyai cangkerang keras di bahagian belakang dengan kaki pendayung di hadapan. Ciri-ciri ini menjadikan penyu tangkas berenang di dalam air tetapi kekok bergerak di daratan, perkara ini berbeza dengan kura-kura yang mempunyai kaki yang serupa bagi keempat-empat kakinya.", "source_citation": "https://ms.wikipedia.org/?curid=26 (Wikipedia, CC BY-SA, article id 26)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:20-ms-q1", "domain": "quran", "language": "ms", "question": "Apakah yang akan dihilangkan oleh Allah sekiranya Dia menghendaki?", "gold_answer": "Pendengaran dan penglihatan mereka.", "gold_passage_text": "Kilat itu pula hampir-hampir menyambar (menghilangkan) penglihatan mereka; tiap-tiap kali kilat itu menerangi mereka (dengan pancarannya), mereka berjalan dalam cahayanya. Dan apabila gelap menyelubungi mereka, berhentilah mereka (menunggu dengan bingungnya). Dan sekiranya Allah menghendaki, nescaya dihilangkanNya pendengaran dan penglihatan mereka; sesungguhnya Allah Maha Kuasa atas tiap-tiap sesuatu.", "source_citation": "Quran 2:20 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}, {"id": "quran-2:8-ms-q0", "domain": "quran", "language": "ms", "question": "Siapakah yang berkata \"Kami telah beriman kepada Allah dan kepada hari akhirat\"?", "gold_answer": "Ada di antara manusia.", "gold_passage_text": "Dan di antara manusia ada yang berkata: \"Kami telah beriman kepada Allah dan kepada hari akhirat\"; padahal mereka sebenarnya tidak beriman.", "source_citation": "Quran 2:8 (Malay, Abdullah Muhammad Basmeih translation via Tanzil.net, CC BY 3.0)", "new_annotator_decision": "", "new_corrected_question": "", "new_corrected_answer": "", "new_annotator_notes": ""}];
var STORAGE_KEY = 'amragbench_malay_reannotation_v1';

function loadState() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { return JSON.parse(raw); } catch (e) { return {}; } }
  return {};
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
var state = loadState();

function getRec(id) {
  if (!state[id]) state[id] = { decision: '', corrected_question: '', corrected_answer: '', notes: '' };
  return state[id];
}

function updateStats() {
  var total = RECORDS.length;
  var done = 0;
  for (var i = 0; i < RECORDS.length; i++) {
    if (state[RECORDS[i].id] && state[RECORDS[i].id].decision) done++;
  }
  document.getElementById('statsLine').textContent = done + ' / ' + total + ' reviewed';
  var pct = total ? Math.round(100 * done / total) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function setDecision(id, decision) {
  var rec = getRec(id);
  rec.decision = decision;
  saveState(state);
  render();
}

function updateField(id, field, value) {
  var rec = getRec(id);
  rec[field] = value;
  saveState(state);
}

function cardHtml(r) {
  var rec = getRec(r.id);
  var isDone = !!rec.decision;
  var validClass = rec.decision === 'valid' ? ' active-valid' : '';
  var editClass = rec.decision === 'edit' ? ' active-edit' : '';
  var invalidClass = rec.decision === 'invalid' ? ' active-invalid' : '';
  var editShow = rec.decision === 'edit' ? ' show' : '';
  var notesShow = rec.decision ? ' show' : '';

  var html = '<div class="card' + (isDone ? ' done' : '') + '" data-id="' + r.id + '">';
  html += '<div class="meta">' + r.id + ' &middot; ' + r.domain + ' &middot; ' + r.language + '</div>';
  html += '<div class="field-label">Passage</div>';
  html += '<div class="field-value passage">' + r.gold_passage_text + '</div>';
  html += '<div class="field-label">Question</div>';
  html += '<div class="field-value">' + r.question + '</div>';
  html += '<div class="field-label">Answer</div>';
  html += '<div class="field-value">' + r.gold_answer + '</div>';
  html += '<div class="actions">';
  html += '<button class="decision' + validClass + '" onclick="setDecision(\'' + r.id + '\',\'valid\')">Valid as-is</button>';
  html += '<button class="decision' + editClass + '" onclick="setDecision(\'' + r.id + '\',\'edit\')">Needs edit</button>';
  html += '<button class="decision' + invalidClass + '" onclick="setDecision(\'' + r.id + '\',\'invalid\')">Invalid / reject</button>';
  html += '</div>';
  html += '<div class="edit-fields' + editShow + '">';
  html += '<div class="field-label">Corrected question (if needed)</div>';
  html += '<textarea rows="2" oninput="updateField(\'' + r.id + '\',\'corrected_question\',this.value)">' + (rec.corrected_question || '') + '</textarea>';
  html += '<div class="field-label">Corrected answer (if needed)</div>';
  html += '<textarea rows="2" oninput="updateField(\'' + r.id + '\',\'corrected_answer\',this.value)">' + (rec.corrected_answer || '') + '</textarea>';
  html += '</div>';
  html += '<div class="notes-field' + notesShow + '">';
  html += '<div class="field-label">Notes (optional)</div>';
  html += '<textarea rows="2" oninput="updateField(\'' + r.id + '\',\'notes\',this.value)">' + (rec.notes || '') + '</textarea>';
  html += '</div>';
  html += '</div>';
  return html;
}

function render() {
  var filter = document.getElementById('filterSelect').value;
  var container = document.getElementById('cardsContainer');
  var htmlParts = [];
  for (var i = 0; i < RECORDS.length; i++) {
    var r = RECORDS[i];
    var rec = getRec(r.id);
    if (filter === 'undone' && rec.decision) continue;
    if (filter === 'valid' && rec.decision !== 'valid') continue;
    if (filter === 'edit' && rec.decision !== 'edit') continue;
    if (filter === 'invalid' && rec.decision !== 'invalid') continue;
    htmlParts.push(cardHtml(r));
  }
  container.innerHTML = htmlParts.join('');
  updateStats();
}

function csvEscape(val) {
  val = (val === undefined || val === null) ? '' : String(val);
  if (val.indexOf(',') !== -1 || val.indexOf('"') !== -1 || val.indexOf('\n') !== -1) {
    val = '"' + val.replace(/"/g, '""') + '"';
  }
  return val;
}

function exportCsv() {
  var header = ['id','domain','language','question','gold_answer','gold_passage_text',
                 'new_annotator_decision','new_corrected_question','new_corrected_answer','new_annotator_notes'];
  var lines = [header.join(',')];
  for (var i = 0; i < RECORDS.length; i++) {
    var r = RECORDS[i];
    var rec = getRec(r.id);
    var row = [r.id, r.domain, r.language, r.question, r.gold_answer, r.gold_passage_text,
               rec.decision, rec.corrected_question, rec.corrected_answer, rec.notes];
    lines.push(row.map(csvEscape).join(','));
  }
  var csvContent = '﻿' + lines.join('\r\n');
  var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'amragbench_malay_reannotation_v1_completed.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('exportBtn').addEventListener('click', exportCsv);
document.getElementById('filterSelect').addEventListener('change', render);
render();
</script>
</body>
</html>
