u-bulu halus. Pangkal daun berbentuk tirus hingga obtus manakala hujung daun kebanyakkannya berbentuk kupsidat", "gold_answer": "Batang dan dedaun", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-104-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan teks tersebut, anak daun dipangkal berbentuk?", "gold_passage_id": "ms-wiki-104-1", "gold_passage_text": "Daunnya jenis pinat dan mempunyai 7 - 9 helai anak daun yang tersusun berselang-seli dan berbentuk eliptik atau obovat, sementara anak daun dipangkal berbentuk ovat. Permukaan atas daun berwarna hijau tua, licin, bersinar, dan berombak sedikit. Ciri-ciri ini merupakan ciri dokong yang membezakan nya dari Lansium yang lain.", "gold_answer": "Bentuk ovat.", "source_citation": "https://ms.wikipedia.org/?curid=104 (Wikipedia, CC BY-SA, article id 104)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-105-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapakah nama latin jambu batu?", "gold_passage_id": "ms-wiki-105-0", "gold_passage_text": "Jambu batu () atau jambu biji (Psidium guajava Linn) merupakan buah-buahan tropika. Nama saintifik jambu batu adalah dari cabang Myrtoideae keluarga \"Myrtaceae\". Jambu batu banyak terjual di pasar-pasar termasuk pasar tani, dan pasar sayur.", "gold_answer": "Psidium guajava Linn", "source_citation": "https://ms.wikipedia.org/?curid=105 (Wikipedia, CC BY-SA, article id 105)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-105-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana asal-usul Jambu batu?", "gold_passage_id": "ms-wiki-105-1", "gold_passage_text": "Jambu batu dipercayai berasal dari kawasan antara Peru dan Mexico iaitu di kawasan tropika Amerika. Jambu batu tersebar ke merata kawasan tropika dan sub tropika. Di Malaysia kawasan penanaman secara komersil bermula pada pertengahan tahun 1980.", "gold_answer": "Jambu batu dipercayai berasal dari kawasan antara Peru dan Mexico iaitu di kawasan tropika Amerika.", "source_citation": "https://ms.wikipedia.org/?curid=105 (Wikipedia, CC BY-SA, article id 105)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-107-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan passage, apa yang dianggap sebagai satu buah mangga? Answer: Sebuah buah mangga dianggap merupakan buah segar yang paling banyak dimakan di seluruh dunia.", "gold_passage_id": "ms-wiki-107-2", "gold_passage_text": "Buah mangga dikatakan merupakan buah segar yang paling banyak dimakan di seluruh dunia. Walaupun demikian, petani-petani buah mangga hanya menerima harga yang rendah untuk hasil mereka. Disebabkan ini, buah mangga telah menjadi satu barang 'perdagangan saksama' di sebilangan negara.", "gold_answer": "Buah mangga dikatakan merupakan buah segar yang paling banyak dimakan di seluruh dunia.", "source_citation": "https://ms.wikipedia.org/?curid=107 (Wikipedia, CC BY-SA, article id 107)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-108-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Dewasaannya di mana tumbuhan ini berasal?", "gold_passage_id": "ms-wiki-108-0", "gold_passage_text": "Manggis (), sementah (), manggista, mesetor, mesetar atau mesta (nama botani: Garcinia mangostana) ialah tumbuhan malar hijau dalam genus Garcinia yang bertaburan asal di kawasan tropika sekeliling Lautan Hindi. Pokok-pokoknya ditanam sejak zaman prasejarah lagi.", "gold_answer": "Di kawasan tropika sekeliling Lautan Hindi.", "source_citation": "https://ms.wikipedia.org/?curid=108 (Wikipedia, CC BY-SA, article id 108)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-18-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama bahan kimia yang mempunyai formula H2O dan wujud dalam bentuk cecair pada tekanan biasa?", "gold_passage_id": "ms-wiki-18-0", "gold_passage_text": "Air (, formula kimia: H2O) merupakan bahan kimia yang berada dalam bentuk cecair pada tekanan biasa dan pada suhu bilik. Air yang tulen tiada rasa, warna atau bau. Formula kimianya menunjukkan satu molekul air terbina daripada dua atom hidrogen dan satu atom oksigen. Setiap kehidupan di bumi ini memerlukan air untuk terus hidup.", "gold_answer": "Air", "source_citation": "https://ms.wikipedia.org/?curid=18 (Wikipedia, CC BY-SA, article id 18)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-18-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa formula kimia bagi air berdasarkan bahagian teks?", "gold_passage_id": "ms-wiki-18-2", "gold_passage_text": "Ciri-ciri\nFormula kimia bagi air adalah H2O, yang membawa maksud setiap molekul air mengandungi dua atom hidrogen dan satu atom oksigen. Hubungan terjadi antara elektron-elektron yang membentuk bahagian luar atom dan merupakan mata rantai kuat yang dinamakan ikatan kovalen.", "gold_answer": "H2O", "source_citation": "https://ms.wikipedia.org/?curid=18 (Wikipedia, CC BY-SA, article id 18)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-18-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa maknanya dari simbol 'H2O' dalam konteks molekul air?", "gold_passage_id": "ms-wiki-18-2", "gold_passage_text": "Ciri-ciri\nFormula kimia bagi air adalah H2O, yang membawa maksud setiap molekul air mengandungi dua atom hidrogen dan satu atom oksigen. Hubungan terjadi antara elektron-elektron yang membentuk bahagian luar atom dan merupakan mata rantai kuat yang dinamakan ikatan kovalen.", "gold_answer": "Setiap molekul air mengandungi dua atom hidrogen dan satu atom oksigen.", "source_citation": "https://ms.wikipedia.org/?curid=18 (Wikipedia, CC BY-SA, article id 18)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-26-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah sebutan rasmi bagi kumpulan organisma yang termasuk dalam penyu?", "gold_passage_id": "ms-wiki-26-0", "gold_passage_text": "Penyu () adalah sejenis reptilia lautan daripada superkeluarga Chelonioidea dari order Testudines. Terdapat tujuh spesies penyu: penyu hijau, penyu tempayan, penyu karah, penyu pipih, penyu belimbing, penyu lipas Pasifik dan penyu lipas Atlantik.", "gold_answer": "Sejenis reptilia lautan daripada superkeluarga Chelonioidea dari order Testudines.", "source_citation": "https://ms.wikipedia.org/?curid=26 (Wikipedia, CC BY-SA, article id 26)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-26-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah zaman paling awal yang didapati penyu telah wujud berdasarkan kajian di dalam teks?", "gold_passage_id": "ms-wiki-26-1", "gold_passage_text": "Mengikut kajian yang telah dijalankan, penyu didapati telah wujud semenjak akhir zaman Jura (145-208 juta tahun) ketika dinosaur masih ada. Penyu Archelon yang bersaiz 6 meter (20 kaki) panjang ataupun penyu Cimochelys, berenang di laut silam seperti penyu masa kini.", "gold_answer": "Akhir zaman Jura (145-208 juta tahun) ketika dinosaur masih ada.", "source_citation": "https://ms.wikipedia.org/?curid=26 (Wikipedia, CC BY-SA, article id 26)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-28-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Kira panjang asal basilosaurus yang merupakan salah satu paus terawal yang telah pupus.", "gold_passage_id": "ms-wiki-28-2", "gold_passage_text": "Paus purba berevolusi pada pertengahan tempoh Eosen, kira-kira 50 juta tahun dahulu. Salah satu paus terawal yang telah pupus adalah Basilosaurus yang mempunyai kepala kecil bermuncung menonjol dan bergigi. Basilosaurus sepanjang 25 meter panjang.", "gold_answer": "25 meter panjang.", "source_citation": "https://ms.wikipedia.org/?curid=28 (Wikipedia, CC BY-SA, article id 28)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-28-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Pada waktu seperti apa, paus purba berevolusi dan berapa tahun di masa lalu?", "gold_passage_id": "ms-wiki-28-2", "gold_passage_text": "Paus purba berevolusi pada pertengahan tempoh Eosen, kira-kira 50 juta tahun dahulu. Salah satu paus terawal yang telah pupus adalah Basilosaurus yang mempunyai kepala kecil bermuncung menonjol dan bergigi. Basilosaurus sepanjang 25 meter panjang.", "gold_answer": "Pertengahan tempoh Eosen, kira-kira 50 juta tahun dahulu.", "source_citation": "https://ms.wikipedia.org/?curid=28 (Wikipedia, CC BY-SA, article id 28)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-30-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa lama masa pendakian Gunung Tahan bagi mereka yang tidak sakit?", "gold_passage_id": "ms-wiki-30-2", "gold_passage_text": "Pendakian Gunung Tahan paling cepat adalah selama sembilan hari di dalam hutan bagi mereka yang sihat. Jika perjalanan dikira dari Kuala Lumpur, masa pendakian perlu ditambah lagi dua hari. Terpaksa merentas sungai dan runut yang sangat mencabar. Bagaimanapun, runut ini terbuka kepada orang ramai.", "gold_answer": "Selama sembilan hari di dalam hutan", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-31-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama yang diberikan oleh pengikut teks untuk satuan tersebut?", "gold_passage_id": "ms-wiki-31-1", "gold_passage_text": "« Nous fixons l'unité de mesure à la dix-millionième partie du quart du méridien et nous la nommons mètre. »(\"Kami menetapkan satuan ukur panjang bersamaan satu persepuluh juta daripada satu perempat garis rembang, dan kami menamakannya mètre.\" )", "gold_answer": "mètre.", "source_citation": "https://ms.wikipedia.org/?curid=31 (Wikipedia, CC BY-SA, article id 31)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-33-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama lain atau nama resmi dari negara Perancis yang diuraikan dalam teks tersebut?", "gold_passage_id": "ms-wiki-33-0", "gold_passage_text": "Perancis atau nama rasminya Republik Perancis ( ) ialah sebuah negara rentas benua menjangkau wilayah metropolitannya (dipanggil Perancis Metropolitan) terletak di Eropah Barat dan juga pulau-pulau dan wilayah seberang laut yang terletak di benua Amerika dan lautan-lautan Atlantik, Pasifik dan Hindi.", "gold_answer": "Republik Perancis", "source_citation": "https://ms.wikipedia.org/?curid=33 (Wikipedia, CC BY-SA, article id 33)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-34-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Ditemui mana spesies Pakma, padma, patma, atau kerubut?", "gold_passage_id": "ms-wiki-34-0", "gold_passage_text": "Pakma, padma, patma atau kerubut ialah sejenis tumbuhan berbunga dalam genus parasit Rafflesia keluarga Rafflesiaceae. Spesies-spesiesnya berbunga besar daripada kudup yang muncul terus dari tanah atau berpangkal pada pokok perumah; salah satu spesies genus ini mempunyai bunga yang terbesar di dunia. Genus ini memuatkan kira-kira 28 spesies (termasuk empat spesies yang belum selesai dicirikan sesuai yang dikenal pada 1997 oleh Willem Meijer dalam monograf terbaru genus itu), semua spesies dalam genus ini ditemui di Asia Tenggara.", "gold_answer": "Di Asia Tenggara.", "source_citation": "https://ms.wikipedia.org/?curid=34 (Wikipedia, CC BY-SA, article id 34)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-34-1-q2", "language": "ms", "domain": "wikipedia_general", "question": "Biarai karya Deschamps dipublikasikan kepada ahli sains Barat sampai tahun mana?", "gold_passage_id": "ms-wiki-34-1", "gold_passage_text": "Ia julung kali diberi perhatian oleh orang Barat melalui penemuan oleh pakar bedah dan alamiah Perancis, Louis Auguste Deschamps di Jawa antara 1791 dan 1794; namun, catatan dan gambarannya dirampas oleh tentera laut British pada 1803 dan tidak diterbitkan kepada ahli-ahli sains Barat sampai tahun 1861.", "gold_answer": "Sampai tahun 1861.", "source_citation": "https://ms.wikipedia.org/?curid=34 (Wikipedia, CC BY-SA, article id 34)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-39-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah dua satelit yang terdapat pada planet Marikh?", "gold_passage_id": "ms-wiki-39-0", "gold_passage_text": "Marikh (lambang: ♂, daripada bahasa Arab atau Parsi: مريخ) merupakan planet yang keempat letaknya dari Matahari dalam Sistem Suria. Marikh terkenal dengan warna permukaannya yang merah apabila dilihat dari langit, terutamanya pada waktu malam. Ia mempunyai 2 satelit iaitu Phobos dan Deimos. Kedua-dua satelit tersebut menyerupai asteroid.", "gold_answer": "Phobos dan Deimos.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-39-0-q3", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah satelit Phobos dan Deimos menyerupai asteroid?", "gold_passage_id": "ms-wiki-39-0", "gold_passage_text": "Marikh (lambang: ♂, daripada bahasa Arab atau Parsi: مريخ) merupakan planet yang keempat letaknya dari Matahari dalam Sistem Suria. Marikh terkenal dengan warna permukaannya yang merah apabila dilihat dari langit, terutamanya pada waktu malam. Ia mempunyai 2 satelit iaitu Phobos dan Deimos. Kedua-dua satelit tersebut menyerupai asteroid.", "gold_answer": "Kedua-dua satelit tersebut menyerupai asteroid.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-40-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa sebutan tepat bagi 'cahaya' dalam teks ini?", "gold_passage_id": "ms-wiki-40-0", "gold_passage_text": "Cahaya (Jawi: ; pinjaman chāya), secara tepatnya dikenali sebagai cahaya tampak, merupakan tenaga berbentuk gelombang dan membantu manusia dan binatang melihat. Cahaya juga merupakan asas kepada ukuran meter yang mana 1 meter bersamaan dengan jarak dilalui cahaya melalui vakum pada 1/299,792,458 saat. Kelajuan cahaya ditakrifkan pada kelajuan 299,792,458 meter sesaat.", "gold_answer": "Cahaya tampak", "source_citation": "https://ms.wikipedia.org/?curid=40 (Wikipedia, CC BY-SA, article id 40)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-40-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah definisi yang diberikan kepada 'kelajuan cahaya' dalam teks ini?", "gold_passage_id": "ms-wiki-40-0", "gold_passage_text": "Cahaya (Jawi: ; pinjaman chāya), secara tepatnya dikenali sebagai cahaya tampak, merupakan tenaga berbentuk gelombang dan membantu manusia dan binatang melihat. Cahaya juga merupakan asas kepada ukuran meter yang mana 1 meter bersamaan dengan jarak dilalui cahaya melalui vakum pada 1/299,792,458 saat. Kelajuan cahaya ditakrifkan pada kelajuan 299,792,458 meter sesaat.", "gold_answer": "299,792,458 meter sesaat", "source_citation": "https://ms.wikipedia.org/?curid=40 (Wikipedia, CC BY-SA, article id 40)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-40-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Berapa jarak yang ditempuh oleh cahaya dalam satu meter bagi pengukuran meter?", "gold_passage_id": "ms-wiki-40-0", "gold_passage_text": "Cahaya (Jawi: ; pinjaman chāya), secara tepatnya dikenali sebagai cahaya tampak, merupakan tenaga berbentuk gelombang dan membantu manusia dan binatang melihat. Cahaya juga merupakan asas kepada ukuran meter yang mana 1 meter bersamaan dengan jarak dilalui cahaya melalui vakum pada 1/299,792,458 saat. Kelajuan cahaya ditakrifkan pada kelajuan 299,792,458 meter sesaat.", "gold_answer": "1/299,792,458 saat", "source_citation": "https://ms.wikipedia.org/?curid=40 (Wikipedia, CC BY-SA, article id 40)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-40-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Which animals eat both plants and meat, and what is the name given to them?", "gold_passage_id": "ms-wiki-40-1", "gold_passage_text": "Cahaya diperlukan dalam kehidupan seharian. Matahari ialah sumber cahaya yang utama. Tumbuhan hijau memerlukan cahaya untuk membuat makanan. Tumbuhan hijau ini akan menjadi makanan kepada haiwan lain yang akan menjadi makanan kepada haiwan lain pula. Interaksi ini membentuk rantaian makanan. Haiwan yang makan tumbuhan sahaja dikenali sebagai haiwan maun. Haiwan yang makan daging sahaja dikenali sebagai haiwan maging. Haiwan yang makan tumbuhan dan daging dikenali sebagai haiwan maserba.", "gold_answer": "Haiwan maserba", "source_citation": "https://ms.wikipedia.org/?curid=40 (Wikipedia, CC BY-SA, article id 40)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-45-1-q2", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana penyebutan 'Himalaya' dalam sebutan Hindi atau Sanskrit?", "gold_passage_id": "ms-wiki-45-1", "gold_passage_text": "Perkataan Himalaya adalah berasal dari Sanskrit dan membawa erti \"tempat kediaman salji\" (Sanskrit him \"salji\", dan aalaya \"rumah, tempat kediaman\"). Dalam sebutan Hindi/Sanskrit, Himalaya disebut dengan a pertama panjang dan a akhir pendek, i.e. as /himaal-ya/.", "gold_answer": "Disebut dengan a pertama panjang dan a akhir pendek, i.e. as /himaal-ya/.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-45-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah lebar banjaran Himalaya?", "gold_passage_id": "ms-wiki-45-2", "gold_passage_text": "Geografi\nBanjaran Himalaya adalah sepanjang 2400 km, dari Nanga Parbat di barat hinggalah ke Namche Barwa di timur. Kelebaran banjaran pula adalah di antara 250-300 km.", "gold_answer": "Di antara 250-300 km.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-46-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang menubuhkan atau mengutak-atik Parti ini?", "gold_passage_id": "ms-wiki-46-1", "gold_passage_text": "Parti ini diketuai oleh Adolf Hitler dan merupakan parti kerajaan utama sewaktu beliau memerintah negara Jerman. Lambang rasmi Parti Nazi ini adalah Swastika yang berlatarbelakangkan warna merah.", "gold_answer": "Adolf Hitler", "source_citation": "https://ms.wikipedia.org/?curid=46 (Wikipedia, CC BY-SA, article id 46)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-49-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang menghantar perutusan kepada Hafsa?", "gold_passage_id": "ms-wiki-49-2", "gold_passage_text": "Oleh itu, Uthman menghantar satu perutusan kepada Hafsa yang mengatakan: \"Kirimkanlah suhuf kepada kami supaya kami dapat menyusun bahan-bahan al-Quran dalam salinan-salinan yang sempurna dan memulangkan manuskrip-manuskrip kepada kamu.\"", "gold_answer": "Uthman", "source_citation": "https://ms.wikipedia.org/?curid=49 (Wikipedia, CC BY-SA, article id 49)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-55-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Di mana hidrogen wujud secara bebas dan sebagai sebahagian daripada bahan-bahan tertentu?", "gold_passage_id": "ms-wiki-55-1", "gold_passage_text": "Hidrogen wujud secara bebas, dan juga sebagai sebahagian daripada air, bahan galian, dan bahan organik. Hidrogen dibebaskan semula melalui elektrolisis air dan melalui pemprosesan petroleum. Hidrogen tidak terbakar, tetapi meletup apabila bercampur dengan oksigen dan didedahkan kepada api.", "gold_answer": "Hidrogen wujud secara bebas, dan juga sebagai sebahagian daripada air, bahan galian, dan bahan organik.", "source_citation": "https://ms.wikipedia.org/?curid=55 (Wikipedia, CC BY-SA, article id 55)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-55-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana hidrogen boleh dibebaskan semula?", "gold_passage_id": "ms-wiki-55-1", "gold_passage_text": "Hidrogen wujud secara bebas, dan juga sebagai sebahagian daripada air, bahan galian, dan bahan organik. Hidrogen dibebaskan semula melalui elektrolisis air dan melalui pemprosesan petroleum. Hidrogen tidak terbakar, tetapi meletup apabila bercampur dengan oksigen dan didedahkan kepada api.", "gold_answer": "Hidrogen dibebaskan semula melalui elektrolisis air dan melalui pemprosesan petroleum.", "source_citation": "https://ms.wikipedia.org/?curid=55 (Wikipedia, CC BY-SA, article id 55)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-60-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah sebutan untuk embolisme yang disebabkan oleh embolus dari trombus?", "gold_passage_id": "ms-wiki-60-1", "gold_passage_text": "Embolisme boleh menyebabkan penyumbatan aliran darah secara sebahagian atau keseluruhan dalam saluran yang terjejas. Penyumbatan sedemikian (oklusi vaskular) boleh menjejaskan bahagian badan yang jauh dari asal embolus. Embolisme yang berlaku oleh sebab embolus dari trombus dipanggil tromboembolisme.", "gold_answer": "Tromboembolisme.", "source_citation": "https://ms.wikipedia.org/?curid=60 (Wikipedia, CC BY-SA, article id 60)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-60-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa istilah yang diberikan untuk terapi yang melibatkan emboli?", "gold_passage_id": "ms-wiki-60-2", "gold_passage_text": "Embolisme biasanya merupakan kejadian patologi disebabkan oleh penyakit atau kecederaan. Kadangkala ia dicipta dengan sengaja untuk tujuan terapeutik, seperti untuk menghentikan pendarahan atau membunuh tumor kanser dengan menghentikan bekalan darahnya. Terapi sedemikian dipanggil embolisasi.", "gold_answer": "Terapi sedemikian dipanggil embolisasi.", "source_citation": "https://ms.wikipedia.org/?curid=60 (Wikipedia, CC BY-SA, article id 60)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-66-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang boleh membawa virus Human Papilloma (HPV) selain daripada wanita?", "gold_passage_id": "ms-wiki-66-2", "gold_passage_text": "Jangkitan virus Human Papilloma (HPV) yang tersebar melalui hubungan seks memberi risiko yang tinggi pada wanita yang sering bertukar pasangan hubungan seks ataupun wanita yang mempunyai seorang sahaja pasangan hubungan seks akan tetapi pasangannya itu banyak bertukar pasangan berhubungan seks. Lelaki adalah juga pembawa virus Human Papilloma (HPV).", "gold_answer": "Lelaki adalah juga pembawa virus Human Papilloma (HPV).", "source_citation": "https://ms.wikipedia.org/?curid=66 (Wikipedia, CC BY-SA, article id 66)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-71-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah nama lain yang digunakan oleh Neptun di antara orang Barat?", "gold_passage_id": "ms-wiki-71-0", "gold_passage_text": "Neptun ( [nép.tun], ; juga Neptunus ) atau nama lama ia Waruna () merupakan planet kelapan dan planet paling jauh jika diukur dari Matahari dalam Sistem Suria. Ia merupakan planet keempat terbesar berdasarkan diameter (49,530&nbsp;km) dan planet ketiga terbesar berdasarkan jisim, yakni 17 kali lebih besar daripada Bumi, dan sedikit lebih besar daripada Uranus. Planet ini mengorbit Matahari pada jarak 30.1 unit astronomi (UA) atau sekitar 4,450 juta kilometer. Tempoh putaran planet ini adalah 16.1 jam sedangkan tempoh orbit ialah 164.8 tahun. Planet ini dinamakan sempena Neptunus, dewa lautan masyarakat Romawi, malah simbol astronominya adalah ♆, yakni trisula yang disenjatakan dewa ini.", "gold_answer": "Neptunus", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-71-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah tempoh waktu bagi putaran planet Neptun?", "gold_passage_id": "ms-wiki-71-0", "gold_passage_text": "Neptun ( [nép.tun], ; juga Neptunus ) atau nama lama ia Waruna () merupakan planet kelapan dan planet paling jauh jika diukur dari Matahari dalam Sistem Suria. Ia merupakan planet keempat terbesar berdasarkan diameter (49,530&nbsp;km) dan planet ketiga terbesar berdasarkan jisim, yakni 17 kali lebih besar daripada Bumi, dan sedikit lebih besar daripada Uranus. Planet ini mengorbit Matahari pada jarak 30.1 unit astronomi (UA) atau sekitar 4,450 juta kilometer. Tempoh putaran planet ini adalah 16.1 jam sedangkan tempoh orbit ialah 164.8 tahun. Planet ini dinamakan sempena Neptunus, dewa lautan masyarakat Romawi, malah simbol astronominya adalah ♆, yakni trisula yang disenjatakan dewa ini.", "gold_answer": "16.1 jam", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-71-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Apakah planet ketiga terbesar berdasarkan jisim di Sistem Suria?", "gold_passage_id": "ms-wiki-71-0", "gold_passage_text": "Neptun ( [nép.tun], ; juga Neptunus ) atau nama lama ia Waruna () merupakan planet kelapan dan planet paling jauh jika diukur dari Matahari dalam Sistem Suria. Ia merupakan planet keempat terbesar berdasarkan diameter (49,530&nbsp;km) dan planet ketiga terbesar berdasarkan jisim, yakni 17 kali lebih besar daripada Bumi, dan sedikit lebih besar daripada Uranus. Planet ini mengorbit Matahari pada jarak 30.1 unit astronomi (UA) atau sekitar 4,450 juta kilometer. Tempoh putaran planet ini adalah 16.1 jam sedangkan tempoh orbit ialah 164.8 tahun. Planet ini dinamakan sempena Neptunus, dewa lautan masyarakat Romawi, malah simbol astronominya adalah ♆, yakni trisula yang disenjatakan dewa ini.", "gold_answer": "Bumi", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-71-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa metana di kawasan paling luar planet ini dianggap sebagai salah satu penyebab Neptun nampak kebiruan?", "gold_passage_id": "ms-wiki-71-2", "gold_passage_text": "Komposisi unsur planet ini mirip Uranus, dan komposisi kedua-dua planet berbeza daripada gergasi-gerasi gas Musytari dan Zuhal. Atmosfera planet mengandungi hidrogen, helium, hidrokarbon, kemungkinan nitrogen, dan kandungan \"ais\" yang besar seperti ais air, amonia, dan metana; metana di kawasan paling luar planet ini merupakan salah satu penyebab Neptun nampak kebiruan. Para ahli falak kadang-kadang mengkategorikan Uranus dan Neptunus sebagai \"gergasi ais\" untuk menekankan perbezaan ini. Bahagian dalam Neptun terdiri dari ais dan batu seperti Uranus.", "gold_answer": "Metana di kawasan paling luar planet ini merupakan salah satu penyebab Neptun nampak kebiruan.", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-72-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah julat jarak purata Musytari dari Matahari?", "gold_passage_id": "ms-wiki-72-0", "gold_passage_text": "Musytari () ialah planet kelima dari Matahari. Planet ini mempunyai jarak purata kira-kira 778.3 juta kilometer dari Matahari dan ia adalah planet yang terbesar dalam Sistem Suria, mempunyai jisim sekadar 1.8986\\times10^{27}kg . Ini bermaksud bahawa jisim Musytari adalah lebih daripada dua setengah kali ganda daripada semua planet lain dalam Sistem Suria digabungkan. Jisim ini juga dikenali sebagai Jisim Jovian.", "gold_answer": "778.3 juta kilometer", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-72-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah nisbah jisim Musytari terhadap gabungan jisim semua planet lain dalam Sistem Suria?", "gold_passage_id": "ms-wiki-72-0", "gold_passage_text": "Musytari () ialah planet kelima dari Matahari. Planet ini mempunyai jarak purata kira-kira 778.3 juta kilometer dari Matahari dan ia adalah planet yang terbesar dalam Sistem Suria, mempunyai jisim sekadar 1.8986\\times10^{27}kg . Ini bermaksud bahawa jisim Musytari adalah lebih daripada dua setengah kali ganda daripada semua planet lain dalam Sistem Suria digabungkan. Jisim ini juga dikenali sebagai Jisim Jovian.", "gold_answer": "Lebih daripada dua setengah kali ganda", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-72-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Apakah nama lain bagi jisim Musytari?", "gold_passage_id": "ms-wiki-72-0", "gold_passage_text": "Musytari () ialah planet kelima dari Matahari. Planet ini mempunyai jarak purata kira-kira 778.3 juta kilometer dari Matahari dan ia adalah planet yang terbesar dalam Sistem Suria, mempunyai jisim sekadar 1.8986\\times10^{27}kg . Ini bermaksud bahawa jisim Musytari adalah lebih daripada dua setengah kali ganda daripada semua planet lain dalam Sistem Suria digabungkan. Jisim ini juga dikenali sebagai Jisim Jovian.", "gold_answer": "Jisim Jovian", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-72-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah panjang garis pusat Musytari?", "gold_passage_id": "ms-wiki-72-1", "gold_passage_text": "Purata suhu di Musytari ialah sekitar 50°C. Musytari mengambil masa selama 11 hari untuk membuat satu putaran lengkap dan 11 tahun 9 bulan untuk membuat satu peredaran lengkap mengelilingi matahari. Garis pusat Musytari ialah 139,822 km.", "gold_answer": "139,822 km.", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-73-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana kedudukan garis pusat pada garis khatulistiwa planet dan bintangnya?", "gold_passage_id": "ms-wiki-73-1", "gold_passage_text": "Terdapat juga lingkaran asteroid yang kebanyakannya mengelilingi matahari di antara orbit planet Marikh dan Musytari. Disebabkan oleh putaran, garis pusat pada garis khatulistiwa adalah terpanjang bagi setiap planet dan bintang.", "gold_answer": "Terpanjang bagi setiap planet dan bintang.", "source_citation": "https://ms.wikipedia.org/?curid=73 (Wikipedia, CC BY-SA, article id 73)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-75-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan maklumat yang diberi, mana Planet yang pertama di dunia untuk ditemui melalui teleskop?", "gold_passage_id": "ms-wiki-75-0", "gold_passage_text": "Uranus () merupakan planet ketujuh daripada Matahari. Ia merupakan planet ketiga terbesar dari segi jejarinya dan planet keempat terbesar dari segi jisimnya di Sistem Suria. Nama Inggeris Uranus adalah bersempena nama dewa langit Yunani purba iaitu Ouranos (bahasa Yunani Kuno: Οὐρανός), bapa kepada Kronos (setaraf Saturnus) dan datuk Zeus (setaraf Jupiter). Walaupun ia boleh dilihat dengan mata kasar, planet ini tidak dikenal pasti oleh tamadun purba kerana kesuramannya dan putaran orbitnya yang perlahan. Sir William Herschel mengumumkan penemuannya pada 13 Mac 1781 dan ini menyebabkan garis sempadan yang diketahui dalam Sistem Suria buat pertama kalinya dalam sejarah moden dapat dikembangkan. Uranus juga planet pertama yang ditemui melalui teleskop.", "gold_answer": "Uranus", "source_citation": "https://ms.wikipedia.org/?curid=75 (Wikipedia, CC BY-SA, article id 75)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-76-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang diberi nama Bintang Pagi atau Bintang Petang ketika cerminan planet ini terlihat di siang hari?", "gold_passage_id": "ms-wiki-76-1", "gold_passage_text": "Ia merupakan objek semula jadi yang paling terang di waktu malam, kecuali Bulan, mencapai magnitud kecerahan −4.6; kecerahan maksimum dicapai planet ini sebelum matahari naik atau pun terbenam sehingga kadangkalanya boleh dilihat di siang hari lalu diberi nama Bintang Pagi ataupun Bintang Petang. Oleh kerana Zuhrah merupakan planet inferior dari Bumi, ia tidak pernah muncul jauh daripada Matahari: Kelonjongannya mencapai maksimum sebanyak 47.8°.", "gold_answer": "Bintang Pagi ataupun Bintang Petang.", "source_citation": "https://ms.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-79-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang merujuk pada definisi 'haiwan' dalam perkataan ini?", "gold_passage_id": "ms-wiki-79-0", "gold_passage_text": "Haiwan () atau binatang () ialah sekelompok besar organisma eukariot multisel yang tergolong dalam alam Animalia atau Metazoa. Hampir semuanya dengan seberapa pengecualian, memakan bahan organik, menghirup oksigen, mempunyai myosit dan mampu bergerak, dapat membiak secara seksual, dan tumbuh dari sfera kosong sel, blastula, semasa perkembangan embrio. Haiwan disusun lanjut dalam klad yakni senenek moyang yang sama.", "gold_answer": "Sekelompok besar organisma eukariot multisel yang tergolong dalam alam Animalia atau Metazoa.", "source_citation": "https://ms.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-79-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Kadangan muncul dalam rekod fosil sebagai spesies marin sekitar berapa juta tahun yang lalu?", "gold_passage_id": "ms-wiki-79-1", "gold_passage_text": "Sebahagian besar filum haiwan yang diketahui, seperti kordata, arthropod, dan moluska, muncul dalam rekod fosil sebagai spesies marin semasa ledakan Cambrian sekitar 542 juta tahun yang lalu.", "gold_answer": "542 juta tahun yang lalu.", "source_citation": "https://ms.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-82-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa Gajah Afrika dikelompokkan oleh IUCN sebagai spesies yang terjejas manakala Gajah Asia diklasifikasikan sebagai spesies terancam?", "gold_passage_id": "ms-wiki-82-0", "gold_passage_text": "Gajah Afrika digolongkan sebagai spesies yang terjejas oleh IUCN, sementara Gajah Asia diklasifikasikan sebagai spesies terancam. Salah satu ancaman utama bagi gajah adalah perdagangan gading yang mendorong kegiatan pemburuan haram. Ancaman lain adalah kemusnahan habitat dan konflik dengan penduduk tempatan. Gajah digunakan sebagai haiwan pekerja di Asia. Dahulu gajah pernah digunakan untuk perang; kini, gajah seringkali dipertontonkan di zoo dan sarkas. Gajah mudah dikenali rupa bentuknya dan telah digambarkan dalam seni, cerita rakyat, agama, sastera, dan budaya popular.", "gold_answer": "Gajah Afrika digolongkan sebagai spesies yang terjejas oleh IUCN, sementara Gajah Asia diklasifikasikan sebagai spesies terancam.", "source_citation": "https://ms.wikipedia.org/?curid=82 (Wikipedia, CC BY-SA, article id 82)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-82-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa satu daripada dua ancaman utama yang mempengaruhi Gajah Asia selain perdagangan gading dan kemusnahan habitat?", "gold_passage_id": "ms-wiki-82-0", "gold_passage_text": "Gajah Afrika digolongkan sebagai spesies yang terjejas oleh IUCN, sementara Gajah Asia diklasifikasikan sebagai spesies terancam. Salah satu ancaman utama bagi gajah adalah perdagangan gading yang mendorong kegiatan pemburuan haram. Ancaman lain adalah kemusnahan habitat dan konflik dengan penduduk tempatan. Gajah digunakan sebagai haiwan pekerja di Asia. Dahulu gajah pernah digunakan untuk perang; kini, gajah seringkali dipertontonkan di zoo dan sarkas. Gajah mudah dikenali rupa bentuknya dan telah digambarkan dalam seni, cerita rakyat, agama, sastera, dan budaya popular.", "gold_answer": "Konflik dengan penduduk tempatan.", "source_citation": "https://ms.wikipedia.org/?curid=82 (Wikipedia, CC BY-SA, article id 82)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-82-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah istilah yang sebenarnya digunakan pada zaman sebelum gajah pinjaman Sanskrit di Indonesia?", "gold_passage_id": "ms-wiki-82-2", "gold_passage_text": "Terdapat juga istilah biram () dan leman (; daripada ) yang digunakan dalam penulisan hikayat-hikayat Melayu. Istilah leman kata yang asli sebelum terganti dengan gajah pinjaman Sanskrit.", "gold_answer": "leman kata yang asli", "source_citation": "https://ms.wikipedia.org/?curid=82 (Wikipedia, CC BY-SA, article id 82)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-84-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimanakah perilaku gajah betina berbanding dengan gajah jantan dalam memilih lokasi aktiviti sosial?", "gold_passage_id": "ms-wiki-84-1", "gold_passage_text": "Ciri-ciri\nGajah betina dan anaknya hidup dalam kumpulan kecil manakala gajah jantan lebih suka hidup bersendirian. Gajah biasanya berehat ketika cuaca panas. Setiap kumpulan mempunyai kawasan mereka tersendiri untuk mencari makanan. Mereka suka berenang dan mandi di sungai. Gajah Malaysia biasanya di dapati di hutan dara dan hutan sekunder.", "gold_answer": "Gajah betina dan anaknya hidup dalam kumpulan kecil manakala gajah jantan lebih suka hidup bersendirian.", "source_citation": "https://ms.wikipedia.org/?curid=84 (Wikipedia, CC BY-SA, article id 84)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-84-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana biasanya gajah Malaysia boleh di dapati berdasarkan habitat yang mereka pilih?", "gold_passage_id": "ms-wiki-84-1", "gold_passage_text": "Ciri-ciri\nGajah betina dan anaknya hidup dalam kumpulan kecil manakala gajah jantan lebih suka hidup bersendirian. Gajah biasanya berehat ketika cuaca panas. Setiap kumpulan mempunyai kawasan mereka tersendiri untuk mencari makanan. Mereka suka berenang dan mandi di sungai. Gajah Malaysia biasanya di dapati di hutan dara dan hutan sekunder.", "gold_answer": "Gajah Malaysia biasanya di dapati di hutan dara dan hutan sekunder.", "source_citation": "https://ms.wikipedia.org/?curid=84 (Wikipedia, CC BY-SA, article id 84)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-85-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang dimulakan kajian lapangan terhadap orang utan?", "gold_passage_id": "ms-wiki-85-2", "gold_passage_text": "Orang utan antara primat yang paling cerdas, dengan menggunakan pelbagai alat-alat canggih serta membina sarang tidur yang teliti daripada dahan ranting dan daun setiap malam. Orang utan banyak dikaji untuk kemampuan belajar, malah mungkin dapat membentuk budaya tersendiri dalam populasi. Kajian lapangan terhadap orang utan dimulakan oleh ahli primatologi Birutė Galdikas. Ketiga-tiga spesies orang utan dikira terancam genting. Antara ancaman terhadap populasi orang utan liar termasuk pemburuan haram, kemusnahan habitat dan perdagangan haiwan peliharaan haram. Terdapat beberapa pertubuhan pemuliharaan dan rehabilitasi yang berdedikasi terhadap kemandirian orang utan liar.", "gold_answer": "Ahli primatologi Birutė Galdikas.", "source_citation": "https://ms.wikipedia.org/?curid=85 (Wikipedia, CC BY-SA, article id 85)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-87-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah berat dan panjang terpanjang yang boleh dicapai oleh subspesies harimau yang lebih besar?", "gold_passage_id": "ms-wiki-87-0", "gold_passage_text": "Harimau (nama saintifik: Panthera tigris) merupakan spesies binatang besar dengan badan yang menyerupai kucing, ia salah satu spesies dalam genus Panthera dan anggota keluarga Felidae. Harimau yang berasal dari Asia timur dan selatan ini ialah sejenis haiwan pemangsa dan maging. Subspesies harimau yang lebih besar boleh mencecah panjang dan berat 300 kilogram (660&nbsp;paun). Selain kebesaran dan kegagahannya, ciri-ciri terpenting yang dimiliki harimau ialah corak belang menegak berwarna hitam yang melapisi bulunya yang berwarna keputihan atau merah kejinggaan.", "gold_answer": "300 kilogram (660&nbsp;paun)", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-87-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah ciri-ciri terpenting yang dimiliki harimau selain dari kebesaran dan kegagahannya?", "gold_passage_id": "ms-wiki-87-0", "gold_passage_text": "Harimau (nama saintifik: Panthera tigris) merupakan spesies binatang besar dengan badan yang menyerupai kucing, ia salah satu spesies dalam genus Panthera dan anggota keluarga Felidae. Harimau yang berasal dari Asia timur dan selatan ini ialah sejenis haiwan pemangsa dan maging. Subspesies harimau yang lebih besar boleh mencecah panjang dan berat 300 kilogram (660&nbsp;paun). Selain kebesaran dan kegagahannya, ciri-ciri terpenting yang dimiliki harimau ialah corak belang menegak berwarna hitam yang melapisi bulunya yang berwarna keputihan atau merah kejinggaan.", "gold_answer": "Corak belang menegak berwarna hitam yang melapisi bulunya yang berwarna keputihan atau merah kejinggaan.", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-88-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah nama lama bagi spesies Seladang sebelum tahun 1900?", "gold_passage_id": "ms-wiki-88-0", "gold_passage_text": "Seladang (Bos gaurus, dahulu Bibos gauris) ialah sejenis haiwan bovin yang besar dan berbulu warna gelap di Asia Selatan dan Asia Tenggara. Bilangannya yang terbesar pada hari ini adalah di India. Seladang ialah spesies lembu liar yang terbesar dan adalah lebih besar daripada Kerbau Tanjung, Kerbau Air Liar Asia, dan bison. Dalam konteks pelancongan safari, ia dikenali sebagai bison India, akan tetapi istilah ini tidak tepat daripada segi teknikal. Bentuk bela jinak Seladang dikenali sebagai gayal atau mithun.", "gold_answer": "Bibos gauris", "source_citation": "https://ms.wikipedia.org/?curid=88 (Wikipedia, CC BY-SA, article id 88)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-88-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Seorang pengunjung di Asia Tenggara boleh mengenal pasti Seladang sebagai bison India.", "gold_passage_id": "ms-wiki-88-0", "gold_passage_text": "Seladang (Bos gaurus, dahulu Bibos gauris) ialah sejenis haiwan bovin yang besar dan berbulu warna gelap di Asia Selatan dan Asia Tenggara. Bilangannya yang terbesar pada hari ini adalah di India. Seladang ialah spesies lembu liar yang terbesar dan adalah lebih besar daripada Kerbau Tanjung, Kerbau Air Liar Asia, dan bison. Dalam konteks pelancongan safari, ia dikenali sebagai bison India, akan tetapi istilah ini tidak tepat daripada segi teknikal. Bentuk bela jinak Seladang dikenali sebagai gayal atau mithun.", "gold_answer": "Ya", "source_citation": "https://ms.wikipedia.org/?curid=88 (Wikipedia, CC BY-SA, article id 88)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-88-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Apakah spesies besar dan berbulu warna gelap di Asia Selatan dan Asia Tenggara?", "gold_passage_id": "ms-wiki-88-0", "gold_passage_text": "Seladang (Bos gaurus, dahulu Bibos gauris) ialah sejenis haiwan bovin yang besar dan berbulu warna gelap di Asia Selatan dan Asia Tenggara. Bilangannya yang terbesar pada hari ini adalah di India. Seladang ialah spesies lembu liar yang terbesar dan adalah lebih besar daripada Kerbau Tanjung, Kerbau Air Liar Asia, dan bison. Dalam konteks pelancongan safari, ia dikenali sebagai bison India, akan tetapi istilah ini tidak tepat daripada segi teknikal. Bentuk bela jinak Seladang dikenali sebagai gayal atau mithun.", "gold_answer": "Seladang", "source_citation": "https://ms.wikipedia.org/?curid=88 (Wikipedia, CC BY-SA, article id 88)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-88-0-q3", "language": "ms", "domain": "wikipedia_general", "question": "Adakah Seladang lebih besar daripada Kerbau Tanjung?", "gold_passage_id": "ms-wiki-88-0", "gold_passage_text": "Seladang (Bos gaurus, dahulu Bibos gauris) ialah sejenis haiwan bovin yang besar dan berbulu warna gelap di Asia Selatan dan Asia Tenggara. Bilangannya yang terbesar pada hari ini adalah di India. Seladang ialah spesies lembu liar yang terbesar dan adalah lebih besar daripada Kerbau Tanjung, Kerbau Air Liar Asia, dan bison. Dalam konteks pelancongan safari, ia dikenali sebagai bison India, akan tetapi istilah ini tidak tepat daripada segi teknikal. Bentuk bela jinak Seladang dik dia.org/?curid=89 (Wikipedia, CC BY-SA, article id 89)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-90-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah sumber tenaga yang digunakan tumbuhan untuk menjalankan proses fotosintesis?", "gold_passage_id": "ms-wiki-90-0", "gold_passage_text": "Tumbuh-tumbuhan mendapatkan tenaganya dari cahaya matahari dengan menjalankan proses fotosintesis melalui kloroplas lalu menghasilkan kanji. Udara, air, dan juga nutrien merupakan keperluan asas bagi setiap tumbuhan. Hidupan ini merangkumi semua benda hidup yang mampu menghasilkan makanan sendiri dengan menggunakan klorofil (zat hijau) untuk menjalankan proses fotosintesis. Sel tumbuhan berbeza dengan sel haiwan dalam beberapa segi termasuk sel tumbuhan mempunyai dinding sel.", "gold_answer": "Cahaya matahari", "source_citation": "https://ms.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-90-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang dibebaskan tumbuhan melalui proses fotosintesis?", "gold_passage_id": "ms-wiki-90-0", "gold_passage_text": "Tumbuh-tumbuhan mendapatkan tenaganya dari cahaya matahari dengan menjalankan proses fotosintesis melalui kloroplas lalu menghasilkan kanji. Udara, air, dan juga nutrien merupakan keperluan asas bagi setiap tumbuhan. Hidupan ini merangkumi semua benda hidup yang mampu menghasilkan makanan sendiri dengan menggunakan klorofil (zat hijau) untuk menjalankan proses fotosintesis. Sel tumbuhan berbeza dengan sel haiwan dalam beberapa segi termasuk sel tumbuhan mempunyai dinding sel.", "gold_answer": "Kanji", "source_citation": "https://ms.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-92-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Di mana penanaman bunga teluki di Malaysia tertumpu?", "gold_passage_id": "ms-wiki-92-1", "gold_passage_text": "Penanaman bunga teluki di Malaysia adalah tertumpu di kawasan dataran tinggi seperti di Tanah Tinggi Cameron. Di Tanah Tinggi Cameron iklimnya menyerupai iklim hawa sederhana (suhu maksimum sekitar 21&nbsp;°C) dan pokok bunga teluki boleh ditanam sepanjang tahun.", "gold_answer": "Di kawasan dataran tinggi seperti di Tanah Tinggi Cameron.", "source_citation": "https://ms.wikipedia.org/?curid=92 (Wikipedia, CC BY-SA, article id 92)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-94-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana asal bunga raya berasal?", "gold_passage_id": "ms-wiki-94-0", "gold_passage_text": "Bunga raya (nama botani: Hibiscus rosa-sinensis)ialah spesies tumbuhan berbunga tropika genus Hibiscus dalam suku Hibisceae keluarga Malvaceae. Ia banyak ditanam sebagai tanaman hiasan di kawasan tropika dan subtropika, namun ia bertaburan asalnya di Vanuatu.", "gold_answer": "Vanuatu.", "source_citation": "https://ms.wikipedia.org/?curid=94 (Wikipedia, CC BY-SA, article id 94)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-94-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapakah yang pertama kali menggambarkan genus Hibiscus pada tahun 1753?", "gold_passage_id": "ms-wiki-94-1", "gold_passage_text": "Taksonomi\nHibiscus rosa-sinensis julung kali digambarkan pada 1753 oleh Carl Linnaeus dalam Species Plantarum. Julukan spesifiknya rosa-sinensis secara terus bermaksud \"mawar China\", sungguhpun tumbuhan ini tidak berkait dengan mawar betul mahupun datang dari China. Genus Hibiscus ada dalam suku Hibisceae dan subkeluarga Malvoideae keluarga Malvaceae.", "gold_answer": "Carl Linnaeus", "source_citation": "https://ms.wikipedia.org/?curid=94 (Wikipedia, CC BY-SA, article id 94)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-98-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah yang dimaksud dengan pokok berbunga pertama berdasarkan pengandaian dalam teks?", "gold_passage_id": "ms-wiki-98-0", "gold_passage_text": "Pokok bunga Anthurium merupakan sejenis tumbuhan berbunga yang sering ditanam sebagai pokok hiasan. Tumbuhan berbunga seperti ini mula muncul pada zaman Cretaceous. Pokok berbunga pertama adalah angiosperm. Nama botaninya Anthurium andraeanum.", "gold_answer": "Angiosperm", "source_citation": "https://ms.wikipedia.org/?curid=98 (Wikipedia, CC BY-SA, article id 98)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-98-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama ilmiah pokok bunga Anthurium?", "gold_passage_id": "ms-wiki-98-0", "gold_passage_text": "Pokok bunga Anthurium merupakan sejenis tumbuhan berbunga yang sering ditanam sebagai pokok hiasan. Tumbuhan berbunga seperti ini mula muncul pada zaman Cretaceous. Pokok berbunga pertama adalah angiosperm. Nama botaninya Anthurium andraeanum.", "gold_answer": "Anthurium andraeanum", "source_citation": "https://ms.wikipedia.org/?curid=98 (Wikipedia, CC BY-SA, article id 98)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-99-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama botani untuk jenis tumbuhan yang dikenali sebagai 'belimbing besi'?", "gold_passage_id": "ms-wiki-99-0", "gold_passage_text": "Belimbing besi (), belimbing manis atau belimbing segi (nama botani: Averrhoa carambola) merupakan tumbuhan daripada keluarga Oxalidaceae yang asli Asia Tenggara. Spesies ini menghasilkan buah bersegi atau bersanding-sanding yang boleh dimakan dan banyak terjual di pasar-pasar termasuk pasar tani dan pasar sayur.", "gold_answer": "Averrhoa carambola", "source_citation": "https://ms.wikipedia.org/?curid=99 (Wikipedia, CC BY-SA, article id 99)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}]</script>
<script>
const RECORDS = JSON.parse(document.getElementById('record-data').textContent);
const STORAGE_KEY = 'amragbench_wiki_review_state_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
let state = loadState();

function getRec(id) {
  return state[id] || { decision: '', corrected_question: '', corrected_answer: '', annotator_notes: '' };
}
function setRec(id, patch) {
  state[id] = Object.assign(getRec(id), patch);
  saveState(state);
  updateStats();
}

let currentFilter = 'all';
let searchTerm = '';

function matchesFilter(r) {
  const st = getRec(r.id);
  if (currentFilter === 'ar' && r.language !== 'ar') return false;
  if (currentFilter === 'ms' && r.language !== 'ms') return false;
  if (currentFilter === 'flagged' && !r.lint_flags) return false;
  if (currentFilter === 'unreviewed' && st.decision) return false;
  if (searchTerm) {
    const hay = (r.question + ' ' + r.gold_answer + ' ' + r.gold_passage_text).toLowerCase();
    if (!hay.includes(searchTerm)) return false;
  }
  return true;
}

function sortedRecords() {
  return RECORDS.filter(matchesFilter);
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderCard(r) {
  const st = getRec(r.id);
  const isRtl = r.language === 'ar';
  const rtlClass = isRtl ? 'rtl' : '';
  const doneClass = st.decision === 'approve' ? 'done-approve' : st.decision === 'edit' ? 'done-edit' : st.decision === 'reject' ? 'done-reject' : '';
  const flagsHtml = r.lint_flags ? '<div class="flags">' + escapeHtml(r.lint_flags) + '</div>' : '';
  const langBadge = isRtl ? '<span class="badge badge-ar">ARABIC</span>' : '<span class="badge badge-ms">MALAY</span>';
  const flagBadge = r.lint_flags ? '<span class="badge badge-flag">FLAGGED</span>' : '';
  const citationExtra = r.draft_model ? ' &middot; drafted by ' + escapeHtml(r.draft_model) : '';

  return '' +
  '<div class="card ' + doneClass + '" data-id="' + escapeHtml(r.id) + '" tabindex="0">' +
    '<div class="card-top">' +
      '<div class="badges">' + langBadge + flagBadge + '<span class="id-text">' + escapeHtml(r.id) + '</span></div>' +
    '</div>' +
    '<div class="passage ' + rtlClass + '">' + escapeHtml(r.gold_passage_text) + '</div>' +
    '<div class="qa ' + rtlClass + '">' +
      '<div class="label">Question</div>' +
      '<div class="val">' + escapeHtml(r.question) + '</div>' +
    '</div>' +
    '<div class="qa ' + rtlClass + '">' +
      '<div class="label">Answer</div>' +
      '<div class="val">' + escapeHtml(r.gold_answer) + '</div>' +
    '</div>' +
    '<div class="citation">' + escapeHtml(r.source_citation) + citationExtra + '</div>' +
    flagsHtml +
    '<div class="actions">' +
      '<button class="btn-approve ' + (st.decision==='approve'?'sel':'') + '" data-action="approve">Approve</button>' +
      '<button class="btn-edit ' + (st.decision==='edit'?'sel':'') + '" data-action="edit">Edit</button>' +
      '<button class="btn-reject ' + (st.decision==='reject'?'sel':'') + '" data-action="reject">Reject</button>' +
    '</div>' +
    '<div class="edit-fields ' + (st.decision==='edit'?'show':'') + '">' +
      '<label>Corrected question</label>' +
      '<textarea class="' + rtlClass + '" data-field="corrected_question" placeholder="' + escapeHtml(r.question) + '" rows="2">' + escapeHtml(st.corrected_question) + '</textarea>' +
      '<label>Corrected answer</label>' +
      '<textarea class="' + rtlClass + '" data-field="corrected_answer" placeholder="' + escapeHtml(r.gold_answer) + '" rows="2">' + escapeHtml(st.corrected_answer) + '</textarea>' +
      '<label>Notes (optional, any decision)</label>' +
      '<textarea data-field="annotator_notes" rows="1">' + escapeHtml(st.annotator_notes) + '</textarea>' +
    '</div>' +
  '</div>';
}

function renderAll() {
  const list = sortedRecords();
  const container = document.getElementById('cardContainer');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty-state">No records match this filter.</div>';
  } else {
    container.innerHTML = list.map(renderCard).join('');
  }
  updateStats();
}

function updateStats() {
  const total = RECORDS.length;
  let nApprove=0, nEdit=0, nReject=0;
  RECORDS.forEach(r => {
    const d = getRec(r.id).decision;
    if (d === 'approve') nApprove++;
    else if (d === 'edit') nEdit++;
    else if (d === 'reject') nReject++;
  });
  const done = nApprove + nEdit + nReject;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statApprove').textContent = nApprove;
  document.getElementById('statEdit').textContent = nEdit;
  document.getElementById('statReject').textContent = nReject;
  const bar = document.getElementById('progressBar');
  const pct = x => total ? (x/total*100) : 0;
  bar.innerHTML = '<div class="pb-approve" style="width:' + pct(nApprove) + '%"></div><div class="pb-edit" style="width:' + pct(nEdit) + '%"></div><div class="pb-reject" style="width:' + pct(nReject) + '%"></div>';

  const nAr = RECORDS.filter(r => r.language === 'ar').length;
  const nMs = RECORDS.filter(r => r.language === 'ms').length;
  const banner = document.getElementById('warnBanner');
  if (nMs === 0 || nAr === 0) {
    banner.textContent = 'Note: ' + nAr + ' Arabic records and ' + nMs + ' Malay records loaded.';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

document.getElementById('cardContainer').addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  const action = e.target.dataset.action;
  if (action) {
    const current = getRec(id).decision;
    const next = current === action ? '' : action;
    setRec(id, { decision: next });
    card.className = 'card ' + (next === 'approve' ? 'done-approve' : next === 'edit' ? 'done-edit' : next === 'reject' ? 'done-reject' : '');
    card.querySelectorAll('.actions button').forEach(b => b.classList.remove('sel'));
    if (next) card.querySelector('[data-action="' + next + '"]').classList.add('sel');
    const ef = card.querySelector('.edit-fields');
    ef.classList.toggle('show', next === 'edit');
  }
});

document.getElementById('cardContainer').addEventListener('input', (e) => {
  const field = e.target.dataset.field;
  if (!field) return;
  const card = e.target.closest('.card');
  const id = card.dataset.id;
  setRec(id, { [field]: e.target.value });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

document.getElementById('searchBox').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase();
  renderAll();
});

document.addEventListener('keydown', (e) => {
  const active = document.activeElement;
  if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) return;
  const focused = document.activeElement.closest ? document.activeElement.closest('.card') : null;
  const cards = Array.from(document.querySelectorAll('.card'));
  if (cards.length === 0) return;
  let idx = focused ? cards.indexOf(focused) : -1;

  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx+1, cards.length-1); cards[idx].focus(); cards[idx].scrollIntoView({block:'center', behavior:'smooth'}); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx-1, 0); cards[idx].focus(); cards[idx].scrollIntoView({block:'center', behavior:'smooth'}); }
  else if (['a','A','e','E','r','R'].includes(e.key) && focused) {
    const map = {a:'approve', e:'edit', r:'reject'};
    const btn = focused.querySelector('[data-action="' + map[e.key.toLowerCase()] + '"]');
    if (btn) btn.click();
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const cols = ['id','language','domain','question','gold_answer','gold_passage_text','source_citation','draft_model','lint_flags','decision','corrected_question','corrected_answer','annotator_notes'];
  const csvEscape = (v) => {
    v = (v === undefined || v === null) ? '' : String(v);
    if (/[",\n]/.test(v)) v = '"' + v.replace(/"/g, '""') + '"';
    return v;
  };
  const lines = [cols.join(',')];
  RECORDS.forEach(r => {
    const st = getRec(r.id);
    const row = cols.map(c => {
      if (c === 'decision') return st.decision || '';
      if (c === 'corrected_question') return st.corrected_question || '';
      if (c === 'corrected_answer') return st.corrected_answer || '';
      if (c === 'annotator_notes') return st.annotator_notes || '';
      return r[c] !== undefined ? r[c] : '';
    });
    lines.push(row.map(csvEscape).join(','));
  });
  const csvContent = '﻿' + lines.join('\r\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wiki_review_completed.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

renderAll();
</script>
</body>
</html>
