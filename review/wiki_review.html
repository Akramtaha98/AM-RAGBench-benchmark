flags": ""}, {"id": "ar-wiki-1203-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو الشخص المسؤول عن إعداد جداول التصنيف في نظام مكتبة الكونغرس؟", "gold_passage_id": "ar-wiki-1203-2", "gold_passage_text": "ساهم عدد كبير من المتخصصين في العلوم المختلفة بإعداد جداول التصنيف كل واحد في مجال تخصصه وقد أخذ بعين الاعتبار حجم المكتبة والتوسع في المستقبل ويمكن وصف نظام مكتبة الكونغرس بأنه عدة تصانيف متخصصة يعالج كل قسم موضوع رئيسي.", "gold_answer": "عدد كبير من المتخصصين في العلوم المختلفة", "source_citation": "https://ar.wikipedia.org/?curid=1203 (Wikipedia, CC BY-SA, article id 1203)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1203-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو التعريف لنظام مكتبة الكونغرس كما ورد في النص؟", "gold_passage_id": "ar-wiki-1203-2", "gold_passage_text": "ساهم عدد كبير من المتخصصين في العلوم المختلفة بإعداد جداول التصنيف كل واحد في مجال تخصصه وقد أخذ بعين الاعتبار حجم المكتبة والتوسع في المستقبل ويمكن وصف نظام مكتبة الكونغرس بأنه عدة تصانيف متخصصة يعالج كل قسم موضوع رئيسي.", "gold_answer": "عدة تصانيف متخصصة يعالج كل قسم موضوع رئيسي", "source_citation": "https://ar.wikipedia.org/?curid=1203 (Wikipedia, CC BY-SA, article id 1203)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1250-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الجهة التي اعتمد ابن خلدون على أساتزها لإكمال تعليمه؟", "gold_passage_id": "ar-wiki-1250-2", "gold_passage_text": "نشأ ابن خلدون على تراث أسرته عريقة العلم؛ فدأب على الدراسة في حِجر أبيه الذي كان معلمه الأول، فقرأ القرآن وحفظه ودرس القراءت السبع والحديث والتفسير والفقه إضافةً للنحو واللّغة مستثمراً أساتذة تونس التي كانت من أبرز مراكز العلوم والآداب في بلاد المغرب. ذكر ابن خلدون أسماء شيوخه في كلِّ علمٍ واهتم بترجمة أعمالهم وتحدث عن بعض الكُتب التي درسها، ويبدو ممّا درسه أنّه تخصص بالفقه المالكي وعلم اللّغة والشعر قبل أن يدخل في الفلسفة والمنطق حتّى بلوغه. وبعدها انتشر الفناء الكبير أو الطاعون الجارف كما يسميه ابن خلدون، وعمّ الوباء ديار الإسلام من سمرقند حتّى المغرب الأقصى، كما انتشر في إيطاليا والبلاد الأوروبية الأُخرى، وقد كابد ابن خلدون الحُزنَ بسبب الوباء إذ فقد معظم معلميه وشيوخه إضافةً لوالديه.", "gold_answer": "تونس", "source_citation": "https://ar.wikipedia.org/?curid=1250 (Wikipedia, CC BY-SA, article id 1250)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1253-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الدولة التي كانت خاضعة لحكمها في منطقة فلسطين الانتدابية في عام 1921؟", "gold_passage_id": "ar-wiki-1253-2", "gold_passage_text": "أسّس الأمير عبد الله بن الحسين عام 1921، إمارة شرق الأردن بمساعدة المملكة المتحدة وكانت خاضعة آنذاك لحكم المملكة المتحدة في منطقة فلسطين الانتدابية، استقلت عام 1946 ونودي بالأمير عبد الله ملكًا عليها، فعُرفت منذ ذلك الحين باسم المملكة الأردنية الهاشمية. النظام في المملكة الأردنية الهاشمية هو نظام ملكي دستوري مع حكومة تمثيلية. الملك يمارس سلطته التنفيذية من خلال رئيس الوزراء ومجلس الوزراء، الذي في الوقت نفسه، هو مسؤول أمام مجلس النواب (المنتخب) ومجلس الأعيان (المُعَّين من قبل الملك) الذين يشكلان السلطة التشريعية للدولة. هناك أيضًا السلطة القضائية المستقلة. الأردن عضو مؤسس في جامعة الدول العربية ومنظمة التعاون الإسلامي. يُعد الأردن دولة ذات سيادة ملكية دستورية، ومع ذلك فإن الملك يتمتع بسلطات تنفيذية وتشريعية واسعة.", "gold_answer": "المملكة المتحدة", "source_citation": "https://ar.wikipedia.org/?curid=1253 (Wikipedia, CC BY-SA, article id 1253)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1253-2-q2", "language": "ar", "domain": "wikipedia_general", "question": "في أي عام استقلت الأردن من الاستعمار؟", "gold_passage_id": "ar-wiki-1253-2", "gold_passage_text": "أسّس الأمير عبد الله بن الحسين عام 1921، إمارة شرق الأردن بمساعدة المملكة المتحدة وكانت خاضعة آنذاك لحكم المملكة المتحدة في منطقة فلسطين الانتدابية، استقلت عام 1946 ونودي بالأمير عبد الله ملكًا عليها، فعُرفت منذ ذلك الحين باسم المملكة الأردنية الهاشمية. النظام في المملكة الأردنية الهاشمية هو نظام ملكي دستوري مع حكومة تمثيلية. الملك يمارس سلطته التنفيذية من خلال رئيس الوزراء ومجلس الوزراء، الذي في الوقت نفسه، هو مسؤول أمام مجلس النواب (المنتخب) ومجلس الأعيان (المُعَّين من قبل الملك) الذين يشكلان السلطة التشريعية للدولة. هناك أيضًا السلطة القضائية المستقلة. الأردن عضو مؤسس في جامعة الدول العربية ومنظمة التعاون الإسلامي. يُعد الأردن دولة ذات سيادة ملكية دستورية، ومع ذلك فإن الملك يتمتع بسلطات تنفيذية وتشريعية واسعة.", "gold_answer": "عام 1946", "source_citation": "https://ar.wikipedia.org/?curid=1253 (Wikipedia, CC BY-SA, article id 1253)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1256-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "من هو العالم الذي شارك في كتابة نظام التشغيل يونكس الذي انتشر في وقت تقريبي مع ظهور لغة C في هذه المعامل؟", "gold_passage_id": "ar-wiki-1256-1", "gold_passage_text": "نشوء الفكرة\nبدأت الفكرة بشكل غير مباشر في أوائل السبعينيات من (معامل بيل) في شركة (إيه تي أند تي) إذ ابتكر الباحثين ريتشي وكيرنان (لغة السي C). وفي ذات الوقت تقريباً، اُبتكر نظام التشغيل يونكس الذي خرج من تلك المعامل وقد اشترك في كتابته العالم ريتشي.", "gold_answer": "ريتشي.", "source_citation": "https://ar.wikipedia.org/?curid=1256 (Wikipedia, CC BY-SA, article id 1256)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1296-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هي الحكومة المذكورة في بداية النص؟", "gold_passage_id": "ar-wiki-1296-0", "gold_passage_text": "الأردن\n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n* \n*", "gold_answer": "الأردن", "source_citation": "https://ar.wikipedia.org/?curid=1296 (Wikipedia, CC BY-SA, article id 1296)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1298-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي أبرز السمات التي تصف مدينة هلسنكي؟", "gold_passage_id": "ar-wiki-1298-2", "gold_passage_text": "و هلسنكي هي أكبر مركز سياسي وتعليمي ومالي وثقافي وبحثي في فنلندا. كما أنها مدينة إقليمية هامة في بحر البلطيق وشمال أوروبا. وقد استقرت حوالي 70٪ من الشركات الأجنبية العاملة في فنلندا بمنطقة هلسنكي.", "gold_answer": "هي أكبر مركز سياسي وتعليمي ومالي وثقافي وبحثي في فنلندا.", "source_citation": "https://ar.wikipedia.org/?curid=1298 (Wikipedia, CC BY-SA, article id 1298)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1299-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "كيف يتم تعريف البرمجيات الحرة بر اساس النص؟", "gold_passage_id": "ar-wiki-1299-0", "gold_passage_text": "[[ملف:Free Software Concept Map Final2.png|300بك|تصغير|يسار|خارطة تصورية للبرامج الحرة]]\nالبرمجيات الحرة هي برمجيات حاسوبية يمكن استخدامها ودراستها وتعديلها لأي غرض دون قيود، وكذلك نسخها وتداولها مُعدّلة أو غير كذلك، بقيود أو دون قيود. أو تضمن أن متلقيها ستكون لهم الحقوق ذاتها. البرمجياتُ الحرةُ عموما مجانية، إلا أن بعضها قد يكون بمقابل. الطريق المعتاد لتوزيع البرمجيات كبرمجيات حرة هو ترخيصها للمتلقي تحت رخصة حرّة، أو بوضعها في الملك العام، ونشر الشفرة المصدرية لها.", "gold_answer": "البرمجيات الحرة هي برمجيات حاسوبية يمكن استخدامها ودراستها وتعديلها لأي غرض دون قيود، وكذلك نسخها وتداولها مُعدّلة أو غير كذلك، بقيود أو دون قيود. أو تضمن أن متلقيها ستكون لهم الحقوق ذاتها.", "source_citation": "https://ar.wikipedia.org/?curid=1299 (Wikipedia, CC BY-SA, article id 1299)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1309-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "أي من الدول التالية لا تزال في طور الاستيطان حسب النص؟", "gold_passage_id": "ar-wiki-1309-0", "gold_passage_text": "لُبنَان (رسميًّا: الجُمْهُورِيَّة اللبنانيَّة) هي دولة عربيّة واقِعَة في الشَرق الأوسط في غرب القارة الآسيويّة. تَحُدّها سوريا من الشمال والشرق، وفلسطين المحتلة (إسرائيل) من الجنوب، وتطل من جهة الغرب على البحر الأبيض المتوسط. هو بلد ديمقراطي جمهوري طوائفي. مُعظم سكانه من العرب المسلمين والمسيحيين. وبخلاف غالبيّة الدول العربيّة هناك وجود فعّال للمسيحيين في الحياة العامّة والسياسيّة. هاجر وانتشر أبناؤه حول العالم منذ أيام الفينيقيين، وحاليًّا فإن عدد اللبنانيين المهاجرين يُقدَّر بضعف عدد اللبنانيين المقيمين.", "gold_answer": "إسرائيل", "source_citation": "https://ar.wikipedia.org/?curid=1309 (Wikipedia, CC BY-SA, article id 1309)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1313-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "أي من المنظمات التالية تم تشكيلها ضمن الجامعة العربية لتنمية مصالح العالم العربي؟", "gold_passage_id": "ar-wiki-1313-1", "gold_passage_text": "تسهل الجامعة العربية إجراء برامج سياسية واقتصادية وثقافية وعلمية واجتماعية لتنمية مصالح العالم العربي من خلال مؤسساتٍ مثل المنظمة العربية للتربية والثقافة والعلوم (أليسكو) ومجلس الوحدة الاقتصادية العربية. وقد كانت الجامعة العربية بمثابة منتدىً لتنسيق المواقف السياسية للدول الأعضاء، وللتداول ومناقشة المسائل التي تثير الهام المشترك، ولتسوية بعض المنازعات العربية والحد من صراعاتها، كصراع أزمة لبنان عام 1958. كما مثلت الجامعة منصةً لصياغة وإبرام العديد من الوثائق التاريخية لتعزيز التكامل الاقتصادي بين بلدان الجامعة. أحد أمثلة هذه الوثائق المهمة وثيقة العمل الاقتصادي العربي المشترك، والتي تحدد مبادئ الأنشطة الاقتصادية في المنطقة.", "gold_answer": "المنظمة العربية للتربية والثقافة والعلوم (أليسكو) ومجلس الوحدة الاقتصادية العربية.", "source_citation": "https://ar.wikipedia.org/?curid=1313 (Wikipedia, CC BY-SA, article id 1313)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1318-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الاسم الحقيقي واللقب للعالم الذي قدم العمليات الجبرية؟", "gold_passage_id": "ar-wiki-1318-0", "gold_passage_text": "الجَبْر هو فرع من علم الرياضيات وجاء اسم الجبر من كتاب عالم الرياضيات والفلكي والرحالة محمد بن موسى الخوارزمي (الكتاب المختصر في حساب الجبر والمقابلة) الذي قدم العمليات الجبرية التي تنظم إيجاد حلول للمعادلات الخطية والتربيعية. والكلمة (الجبر) مأخوذة من اللغة العربية، ومعنى علم الجبر في قاموس المعاني: (فَرْعٌ مِنَ الرِّيَاضِيَّاتِ يَقُومُ عَلَى إِحْلاَلِ الرُّمُوزِ مَحَلَّ الأَعْدَادِ المجْهُولَةِ أَوِ الْمَعْلُومَةِ).ويشكل علم الجبر أحد الفروع الثلاثة الأساسية في [[رياضيات|الرياضيات] إضافة إلى الهندسة الرياضية والتحليل الرياضي ونظرية الأعداد والتباديل والتوافيق. ويهتم هذا العلم بدراسة البنى الجبرية والتماثلات بينها، والعلاقات والكميات.", "gold_answer": "محمد بن موسى الخوارزمي", "source_citation": "https://ar.wikipedia.org/?curid=1318 (Wikipedia, CC BY-SA, article id 1318)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1319-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي أعمال علمية كتب الخوارزمي كتاب الجمع والتفريق في الحساب الهندي؟", "gold_passage_id": "ar-wiki-1319-2", "gold_passage_text": "ضمت مؤلفات الخوارزمي كتاب الجمع والتفريق في الحساب الهندي، وكتاب رسم الربع المعمور، وكتاب تقويم البلدان، وكتاب العمل بالأسطرلاب، وكتاب «صورة الأرض» الذي اعتمد فيه على كتاب المجسطي لبطليموس مع إضافات وشروح وتعليقات، وأعاد كتابة كتاب الفلك الهندي المعروف باسم «السند هند الكبير» الذي ترجم إلى اللغة العربية زمن الخليفة المنصور فأعاد الخوارزمي كتابته وأضاف إليه وسمي كتابه «السند هند الصغير».", "gold_answer": "كتاب الجمع والتفريق في الحساب الهندي", "source_citation": "https://ar.wikipedia.org/?curid=1319 (Wikipedia, CC BY-SA, article id 1319)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1341-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي جزء من العالم يقع ألمانيا؟", "gold_passage_id": "ar-wiki-1341-1", "gold_passage_text": "تقع ألمانيا في وسط أوروبا يحدها من الشمال بحر الشمال والدنمارك وبحر البلطيق، ومن الجنوب النمسا وسويسرا، ومن الشرق بولندا والتشيك ومن الغرب فرنسا ولوكسمبورغ وبلجيكا وهولندا.", "gold_answer": "وسط أوروبا", "source_citation": "https://ar.wikipedia.org/?curid=1341 (Wikipedia, CC BY-SA, article id 1341)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1346-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو السمات الرئيسية للغة التي يركز عليها النص؟", "gold_passage_id": "ar-wiki-1346-2", "gold_passage_text": "من أبرز سمات اللغة نظام الاشتقاق الواسع فيها، حيث يمكن الجمع بحرية بين الجذور اللغوية واللواحق أو السوابق لتكوين كلمات جديدة، مما يجعل من الممكن التعبير بفعالية باستخدام عدد محدود من المفردات.", "gold_answer": "نظام الاشتقاق الواسع", "source_citation": "https://ar.wikipedia.org/?curid=1346 (Wikipedia, CC BY-SA, article id 1346)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1348-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي سنة خدم الشخص المذكور كأمينا عاماً للجامعة العربية؟", "gold_passage_id": "ar-wiki-1348-1", "gold_passage_text": "عمل مديرا لإدارة الهيئات الدولية بوزارة الخارجية المصرية عام 1977 ومندوبا دائما لمصر لدى الأمم المتحدة عام 1990 ووزيراً للخارجية عام 1991 وأميناً عاماً للجامعة العربية عام 2001.", "gold_answer": "عام 2001.", "source_citation": "https://ar.wikipedia.org/?curid=1348 (Wikipedia, CC BY-SA, article id 1348)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1349-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي منطقة جغرافية تقع عمان رسمياً؟", "gold_passage_id": "ar-wiki-1349-0", "gold_passage_text": "عُمان (رسمياً: سَلْطَنَةُ عُمَان)، هي دولة خليجية تقع في غرب آسيا في الربع الجنوبي الشرقي من شبه الجزيرة العربية. تقع بين خطي عرض 16° 40' و 20' 26° شمالاً وبين خطي طول 50' 51°و 40' °59 شرقا. يحدها من الشمال الخليج العربي ومضيق هرمز ومن الشمال الغربي الإمارات ومن الغرب السعودية ومن الجنوب اليمن ومن الجنوب الشرقي بحر العرب. تغطي مساحة إجمالية تبلغ 309.500 كم² وهي بذلك تحتل المرتبة الثالثة من حيث المساحة في شبه الجزيرة العربية.", "gold_answer": "تقع في غرب آسيا في الربع الجنوبي الشرقي من شبه الجزيرة العربية.", "source_citation": "https://ar.wikipedia.org/?curid=1349 (Wikipedia, CC BY-SA, article id 1349)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1349-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو السلطان الحالي في عُمان وفقًا للنص؟", "gold_passage_id": "ar-wiki-1349-2", "gold_passage_text": "نظام الحكم في عُمان سلطاني وراثي والسلطان الحالي هو هيثم بن طارق آل سعيد الذي تولّى الحكم في 11 يناير 2020 عقب وفاة السلطان قابوس بن سعيد بن تيمور آل سعيد صاحب أطول فترة حكم في الشرق الأوسط حتى وفاته. لا يسمح الدستور العُماني بالأحزاب السياسية بينما يكفل حق الانتخاب لكل مواطن عُماني بلغ الواحدة والعشرين من عمره لاختيار أعضاء مجلس الشورى.", "gold_answer": "هيثم بن طارق آل سعيد", "source_citation": "https://ar.wikipedia.org/?curid=1349 (Wikipedia, CC BY-SA, article id 1349)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1351-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في تاريخ 29 أغسطس من كل عام، من هو الشخص الذي يُعتبر مغنى بوب أمريكي؟", "gold_passage_id": "ar-wiki-1351-2", "gold_passage_text": "أغسطس\n* 2 أغسطس - شو هايامي، مؤدي أصوات ياباني.\n* 29 أغسطس - مايكل جاكسون، مغني بوب أمريكي.\n* 31 أغسطس - إريك زمور، كاتب سياسي وصحفي فرنسي.", "gold_answer": "مايكل جاكسون، مغني بوب أمريكي.", "source_citation": "https://ar.wikipedia.org/?curid=1351 (Wikipedia, CC BY-SA, article id 1351)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1351-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو جنسيته وأعماله التي تتمثل فيها في 31 أغسطس؟", "gold_passage_id": "ar-wiki-1351-2", "gold_passage_text": "أغسطس\n* 2 أغسطس - شو هايامي، مؤدي أصوات ياباني.\n* 29 أغسطس - مايكل جاكسون، مغني بوب أمريكي.\n* 31 أغسطس - إريك زمور، كاتب سياسي وصحفي فرنسي.", "gold_answer": "إريك زمور، كاتب سياسي وصحفي فرنسي.", "source_citation": "https://ar.wikipedia.org/?curid=1351 (Wikipedia, CC BY-SA, article id 1351)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1357-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما معنى التسمية في اللغة العربية وفقاً للنص المذكور?", "gold_passage_id": "ar-wiki-1357-1", "gold_passage_text": "التسمية\nالفرات في اللغة العربية تعني كل ماء عذب، ويقال ماء فرت، ومياه فرات،\nوالتسمية وردت في القرآن الكريم:\n* سورة الفرقان [الآية:53].\n* سورة فاطر [الآية:12].\n* سورة المرسلات [الآية:27].", "gold_answer": "كل ماء عذب", "source_citation": "https://ar.wikipedia.org/?curid=1357 (Wikipedia, CC BY-SA, article id 1357)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1358-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "بما هي عاصمة اقتصادية للولايات المتحدة الأمريكية وأهم مركز تجاري في العالم؟", "gold_passage_id": "ar-wiki-1358-1", "gold_passage_text": "وتعتبر مدينة نيويورك أحد أهم مراكز التجارة والمال في العالم، فهي عاصمة اقتصادية للولايات المتحدة لكثرة الشركات والبنوك العالمية فيها، ويوجد بها مقر الأمم المتحدة وسوق الأوراق المالية ومؤشر الداو جونز الصناعي. توصف مدينة نيويورك بأنها العاصمة الثقافية والإقتصادية للعالم.", "gold_answer": "مدينة نيويورك", "source_citation": "https://ar.wikipedia.org/?curid=1358 (Wikipedia, CC BY-SA, article id 1358)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1360-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من الذي نفذ سياسة التحديث ونهى العزلة الدولية لعمان؟", "gold_passage_id": "ar-wiki-1360-2", "gold_passage_text": "نفذ قابوس سياسة التحديث وأنهى العزلة الدولية لعمان، شهد عهده ارتفاعًا في مستويات المعيشة والتنمية في البلاد، ألغى العبودية، وأنهى تمرد ظفار، وأصدر دستور عمان.", "gold_answer": "قابوس", "source_citation": "https://ar.wikipedia.org/?curid=1360 (Wikipedia, CC BY-SA, article id 1360)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1361-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الاسم الكامل للحكم في الهند المذكور في النص؟", "gold_passage_id": "ar-wiki-1361-1", "gold_passage_text": "|-\n||' – جمهورية الهند\n| دولة عضو في الأمم المتحدة\n| لا\n|الهند هي دولة اتحادية مكونة من ولايات الهند ومناطقها.\n|-\n||' – جمهورية هندوراس\n| دولة عضو في الأمم المتحدة\n| لا", "gold_answer": "جمهورية الهند", "source_citation": "https://ar.wikipedia.org/?curid=1361 (Wikipedia, CC BY-SA, article id 1361)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1363-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ماذا يُعرَف بالصلاة في الإسلام؟", "gold_passage_id": "ar-wiki-1363-0", "gold_passage_text": "[[ملف:Evening prayer at Islamic Center of Central Missouri.jpg|تصغير|250بك|صلاة العشاء في المركز الإسلامي في وسط ولاية ميسوري]]\nالصَّلَاةُ فِي الإِسْلَام هي الركن الثاني من أركان الإسلام، ففي الحديث: . وقوله أيضاً: ، وهي الفرع الأول من فروع الدين عند الشيعة والصلاة واجبة على كل مسلم، بالغ، عاقل، ذكر كان أو أنثى، وقد فرضت الصلاة في مكة قبل هجرة النبي محمد إلى المدينة المنورة في السنة الثانية قبل الهجرة، وذلك أثناء الإسراء والمعراج.", "gold_answer": "هي الركن الثاني من أركان الإسلام", "source_citation": "https://ar.wikipedia.org/?curid=1363 (Wikipedia, CC BY-SA, article id 1363)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1363-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "متى فرضت الصلاة في مكة؟", "gold_passage_id": "ar-wiki-1363-0", "gold_passage_text": "[[ملف:Evening prayer at Islamic Center of Central Missouri.jpg|تصغير|250بك|صلاة العشاء في المركز الإسلامي في وسط ولاية ميسوري]]\nالصَّلَاةُ فِي الإِسْلَام هي الركن الثاني من أركان الإسلام، ففي الحديث: . وقوله أيضاً: ، وهي الفرع الأول من فروع الدين عند الشيعة والصلاة واجبة على كل مسلم، بالغ، عاقل، ذكر كان أو أنثى، وقد فرضت الصلاة في مكة قبل هجرة النبي محمد إلى المدينة المنورة في السنة الثانية قبل الهجرة، وذلك أثناء الإسراء والمعراج.", "gold_answer": "في السنة الثانية قبل الهجرة، وذلك أثناء الإسراء والمعراج", "source_citation": "https://ar.wikipedia.org/?curid=1363 (Wikipedia, CC BY-SA, article id 1363)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1364-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو اللقب الذي يمنح الفيزيائي لينوس باولنغ الذي أثار ذكرى لينوس بينيديكت تورفالدس؟", "gold_passage_id": "ar-wiki-1364-0", "gold_passage_text": "لينوس بينيديكت تورفالدس (هلسنكي، 28 ديسمبر 1969) مهندس برمجيات فنلندي، اشتهر بأنه من وضع النواة المعروفة بـ لينُكس. سُمي على اسم الفيزيائي لينوس باولنغ الحائز على جائزة نوبل.", "gold_answer": "جائزة نوبل.", "source_citation": "https://ar.wikipedia.org/?curid=1364 (Wikipedia, CC BY-SA, article id 1364)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1378-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي سنة أُبعد ابن لادن من الخرطوم؟", "gold_passage_id": "ar-wiki-1378-1", "gold_passage_text": "وتحت ضغوط دولية أُبعد ابن لادن من الخرطوم في سنة 1996، في طائرة عسكرية متوجهة إلى أفغانستان. بعد أن كوَّن علاقة جيدة مع حركة طالبان، التي كانت تسيطر على أفغانستان في تلك الأثناء. وبعد انتقاله إلى أفغانستان تولَّى تسيير تنظيم القاعدة الذي أسسه مع عبد الله عزام سنة 1987، الذي أعلن من خلاله الحرب على الولايات المتحدة الأمريكية. وفي سنة 1998، تلاقت أفكار وأهداف أسامة بن لادن مع نظيره أيمن الظواهري، الذي كان يشغل حينها منصب الأمين العام في جماعة الجهاد الإسلامي المصرية المحظورة. وأطلق الاثنان بياناً يدعُوانِ فيهِ إلى قتل الأمريكيين وحلفائهم أينما كانوا، وإلى إخراجهم من المسجد الأقصى والمسجد الحرام. فبدأ التنظيم باستهداف المقرات الأمريكية في العالم، والتي كان أوّلها تفجير السفارتين الأمريكيتين، في كينيا وتنزانيا، عام 1998.", "gold_answer": "في سنة 1996", "source_citation": "https://ar.wikipedia.org/?curid=1378 (Wikipedia, CC BY-SA, article id 1378)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1378-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "من الذي أسس تنظيم القاعدة؟", "gold_passage_id": "ar-wiki-1378-1", "gold_passage_text": "وتحت ضغوط دولية أُبعد ابن لادن من الخرطوم في سنة 1996، في طائرة عسكرية متوجهة إلى أفغانستان. بعد أن كوَّن علاقة جيدة مع حركة طالبان، التي كانت تسيطر على أفغانستان في تلك الأثناء. وبعد انتقاله إلى أفغانستان تولَّى تسيير تنظيم القاعدة الذي أسسه مع عبد الله عزام سنة 1987، الذي أعلن من خلاله الحرب على الولايات المتحدة الأمريكية. وفي سنة 1998، تلاقت أفكار وأهداف أسامة بن لادن مع نظيره أيمن الظواهري، الذي كان يشغل حينها منصب الأمين العام في جماعة الجهاد الإسلامي المصرية المحظورة. وأطلق الاثنان بياناً يدعُوانِ فيهِ إلى قتل الأمريكيين وحلفائهم أينما كانوا، وإلى إخراجهم من المسجد الأقصى والمسجد الحرام. فبدأ التنظيم باستهداف المقرات الأمريكية في العالم، والتي كان أوّلها تفجير السفارتين الأمريكيتين، في كينيا وتنزانيا، عام 1998.", "gold_answer": "مع عبد الله عزام", "source_citation": "https://ar.wikipedia.org/?curid=1378 (Wikipedia, CC BY-SA, article id 1378)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1382-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الاسم الذي تُلقب به أفغانستان بسبب تاريخها الطويل في مقاومة الغزاة والإمبراطوريات؟", "gold_passage_id": "ar-wiki-1382-1", "gold_passage_text": "ومعنى كلمة أفغانستان هي أرض الأفغان، وتعتبر إحدى نقاط الاتصال القديمة لطريق الحرير والهجرات البشرية السابقة. وتلك الدولة ذات الموقع جيوإستراتيجي تربط شرق وغرب وجنوب ووسط آسيا، وهي موطن لكثير من الأمم القديمة والحديثة خلال العصور المتتالية. وكانت المنطقة هدفًا لكثير من الشعوب الغازية والفاتحين منذ القدم، منذ عهد الإغريق تحت حكم الإسكندر الأكبر، ومروراً بالفتوحات الإسلامية وحكم المغول وغيرهم. أفغانستان تُلقب بـ \"مقبرة الإمبراطوريات\" بسبب تاريخها الطويل في مقاومة الغزاة والإمبراطوريات الكبرى التي حاولت السيطرة عليها. وقد كانت أفغانستان منبع للعديد من الممالك، مثل مملكة باكتريا الإغريقية والكوشانيين والهياطلة والصفاريين والسامانيين والغزنويين التيموريين، وممالك أخرى ظهرت في أفغانستان فشكّلت دولًا عظمى هيمنت على جيرانها من الممالك الأخرى.", "gold_answer": "مقبرة الإمبراطوريات", "source_citation": "https://ar.wikipedia.org/?curid=1382 (Wikipedia, CC BY-SA, article id 1382)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1413-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "أي حدث ساهم في إعادة طالبان السيطرة الفعالة على حكم أفغانستان؟", "gold_passage_id": "ar-wiki-1413-2", "gold_passage_text": "بعد سقوط كابل في 15 أغسطس 2021 بعد هجوم طالبان على الحكومة الأفغانية، استعادت طالبان السيطرة الفعالة على حكم أفغانستان، وقد أعلن قلب الدين حكمتيار زعيم «الحزب الإسلامي الأفغاني» أحد فصائل الإخوان المسلمون في أفغانستان دعمه لحكومة طالبان المرتقبة دون شروط مسبقة وقال «نحن أشقاء مع طالبان ويوجد بيننا توافق في الآراء».", "gold_answer": "سقوط كابل في 15 أغسطس 2021 بعد هجوم طالبان على الحكومة الأفغانية", "source_citation": "https://ar.wikipedia.org/?curid=1413 (Wikipedia, CC BY-SA, article id 1413)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1413-2-q2", "language": "ar", "domain": "wikipedia_general", "question": "ما هي شروط أو التزامات الحكومة الأفغانية التي لم تطلبها قبيل تأكيد دعم قلب الدين حكمتيار؟", "gold_passage_id": "ar-wiki-1413-2", "gold_passage_text": "بعد سقوط كابل في 15 أغسطس 2021 بعد هجوم طالبان على الحكومة الأفغانية، استعادت طالبان السيطرة الفعالة على حكم أفغانستان، وقد أعلن قلب الدين حكمتيار زعيم «الحزب الإسلامي الأفغاني» أحد فصائل الإخوان المسلمون في أفغانستان دعمه لحكومة طالبان المرتقبة دون شروط مسبقة وقال «نحن أشقاء مع طالبان ويوجد بيننا توافق في الآراء».", "gold_answer": "دون شروط مسبقة", "source_citation": "https://ar.wikipedia.org/?curid=1413 (Wikipedia, CC BY-SA, article id 1413)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1415-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي منطقة من العراق توجد الأهوار الطبيعية التي تعتبر بيئة طبيعية مميزة؟", "gold_passage_id": "ar-wiki-1415-1", "gold_passage_text": "العراق بلد متنوع التضاريس؛ فمن الجبال والوديان والغابات في شمال العراق وبخاصة في إقليم كردستان، إلى التلال في سلسلة تلال حمرين، ومن السهل الرسوبي الخصب فيما بين نهري دجلة والفرات إلى الصحاري القاحلة كالصحراء العربية وبادية الشام، وكذلك يحتوي العراق على الهضبة الغربية الصحراوية في الغرب، وعلى نهرين مهمين هما دجلة والفرات واللذين على ضفافهما نشأت أولى الحضارات، وتوجد الأهوار الطبيعية في جنوب العراق والتي تعد البيئة الطبيعية لحيوانات لا توجد في أي مكان آخر من العالم، ومن أشهرها هور الحويزة وهور الحَمّار. وتوجد عدة بحيرات صناعية في العراق كبحيرة الثرثار والرزازة وغيرها، وفيهِ البحيرات الطبيعية كبحيرة ساوة في صحراء بادية السماوة في محافظة المثنى.", "gold_answer": "في جنوب العراق", "source_citation": "https://ar.wikipedia.org/?curid=1415 (Wikipedia, CC BY-SA, article id 1415)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1415-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي مكان ولد النبي إبراهيم كما ورد في النص?", "gold_passage_id": "ar-wiki-1415-2", "gold_passage_text": "ولد في العراق النبي إبراهيم، وهو أرض الكثير من الأنبياء، ولكثير من أئمة المسلمين سنة وشيعة كالإمام علي، والإمام الحسين، وأخيه العباس، والإمامين الكاظمين، والإمامين العسكريين، والإمام المهدي، والإمام عبد القادر الجيلاني، والإمام الأعظم أبو حنيفة النعمان، وكثير من مراقد ومقامات أولاد الأئمة عند الشيعة والصحابة مثل سلمان الفارسي، والتابعين.", "gold_answer": "في العراق", "source_citation": "https://ar.wikipedia.org/?curid=1415 (Wikipedia, CC BY-SA, article id 1415)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1416-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي بعض الأهداف المذكورة للقاعدة؟", "gold_passage_id": "ar-wiki-1416-1", "gold_passage_text": "تشمل أهداف القاعدة إنهاء النفوذ الأجنبي في البلدان الإسلامية، وإعادة الخلافة الإسلامية، وتطبيق الشريعة الإسلامية. وتعتقد القاعدة أن هناك تحالفًا مسيحيًا - يهوديًا يتآمر لتدمير الإسلام.", "gold_answer": "إنهاء النفوذ الأجنبي في البلدان الإسلامية، وإعادة الخلافة الإسلامية، وتطبيق الشريعة الإسلامية.", "source_citation": "https://ar.wikipedia.org/?curid=1416 (Wikipedia, CC BY-SA, article id 1416)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1420-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو الزائد بن سلطان الذي يُذكر في النص؟", "gold_passage_id": "ar-wiki-1420-0", "gold_passage_text": "زايد بن سلطان بن زايد بن خليفة بن شخبوط بن ذياب بن عيسى بن نهيان آل نهيان (6 مايو 1918 – 2 نوفمبر 2004) هو أول رئيسٍ لدولة الإمارات العربية المتحدة، وأحد أبرز القادة العرب في القرن العشرين. كان له دورٌ كبيرٌ في توحيد الدولة مع الشيخ راشد بن سعيد آل مكتوم وتحقق لهم ذلك في 2 ديسمبر 1971 بتأسيس أول فدراليّةٍ عربيّةٍ حديثةٍ.", "gold_answer": "زايد بن سلطان بن زايد بن خليفة بن شخبوط بن ذياب بن عيسى بن نهيان آل نهيان (6 مايو 1918 – 2 نوفمبر 2004)", "source_citation": "https://ar.wikipedia.org/?curid=1420 (Wikipedia, CC BY-SA, article id 1420)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1420-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي عام تولى شخصية النص حكم منطقة العين؟", "gold_passage_id": "ar-wiki-1420-1", "gold_passage_text": "وُلد في مدينة العين ونشأ في بيئة صحراوية بسيطة أكسبته صفات الصبر والاعتماد على النفس، تلقى تعليمه الأولي في الكتاتيب حيث تعلم القراءة والكتابة وحفظ القرآن الكريم. تولى حكم منطقة العين عام 1946، وعمل على تطويرها بإنشاء المدارس وحفر الأفلاج وتوفير الخدمات الأساسية، مما عزز مكانته كقائد محلي بارز.", "gold_answer": "عام 1946", "source_citation": "https://ar.wikipedia.org/?curid=1420 (Wikipedia, CC BY-SA, article id 1420)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1427-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو شخصية الكتابة التي يروي عنها في هذه القطعة النصية؟", "gold_passage_id": "ar-wiki-1427-0", "gold_passage_text": "رشاد خليفة (19 نوفمبر 1935 - 31 يناير 1990) هو مصري هاجر إلى الولايات المتحدة للدراسة في 1959 وتخصّص في مجال الكيمياء الحيوية وأصبح مواطناً أمريكياً بعد حصوله الجنسية الأمريكية. اشتهر بإدعائه الرسالة وبحثه في الإعجاز العددي في القرآن.", "gold_answer": "رشاد خليفة", "source_citation": "https://ar.wikipedia.org/?curid=1427 (Wikipedia, CC BY-SA, article id 1427)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1427-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "أي من الفروع علمية يدرسها رشارد خليفة حسب وصف النص؟", "gold_passage_id": "ar-wiki-1427-0", "gold_passage_text": "رشاد خليفة (19 نوفمبر 1935 - 31 يناير 1990) هو مصري هاجر إلى الولايات المتحدة للدراسة في 1959 وتخصّص في مجال الكيمياء الحيوية وأصبح مواطناً أمريكياً بعد حصوله الجنسية الأمريكية. اشتهر بإدعائه الرسالة وبحثه في الإعجاز العددي في القرآن.", "gold_answer": "الكيمياء الحيوية", "source_citation": "https://ar.wikipedia.org/?curid=1427 (Wikipedia, CC BY-SA, article id 1427)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1438-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "توفي بغداد كمعظم عاصمة للعالم بعد عام 1258?", "gold_passage_id": "ar-wiki-1438-2", "gold_passage_text": "كانت بغداد أكبر مدينة في العالم لمُعظم فَترة حُكْم بَنو العَباس خلال العصر الذهبي الإسلامي، بِحَيث بلغَ عَدد سُكانها أكثر من مِليون نَسمة. وصلت مدينة بغداد لذروتها في عصر الخليفة العباسي الخامس هارون الرشيد وارتبطت باسمه في روايات ألف ليلة وليلة ذات الشهرة العالمية، حيث باتت عاصمة العالم القديم. وقد فقدت هذه المكانة منذ عام 1258 عندما غزاها المغول والتتار. مع حلول بدايات القرن السادس عشر، تبادل الصفويون والعثمانيون السيطرة على المدينة، حتى انتزعها العثمانيون أخيراً في عام 1535، فظلت تحت حكمهم قرابة 4 قرون. وفي عام 1917، سيطر الإنجليز على المدينة، وقد خضعت كمعظم مناطق العراق الأخرى تحت الانتداب البريطاني، ثم أصبحت عاصمة للمملكة العراقية عام 1921، والجمهورية العراقية عام 1958.", "gold_answer": "فقدت هذه المكانة منذ عام 1258 عندما غزاها المغول والتتار.", "source_citation": "https://ar.wikipedia.org/?curid=1438 (Wikipedia, CC BY-SA, article id 1438)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1442-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو التلقين الذي تُمثله المعالقات في الشعر العربي قبل المجيء بالإسلام؟", "gold_passage_id": "ar-wiki-1442-0", "gold_passage_text": "المُعَلَّقاتُ وتُعرف أيضًا بـ المُذَهَّبات والسُّمُوط والجاهِلِيَّات والسَّبْع أو العشر الطِّوال، هي من أَشْهَرِ ما كتَب العَرَبُ في الشِّعرِ وسُمِّيَتْ مُعَلَّقَاتٍ. وقد قيل لها مُعَلَّقَاتٌ لأنها مثلُ العقود النفيسة تَعْلَقُ بالأذهان. ويقال إن هذه القصائد كانت تكتب بماء الذهب وتعلق على أستار الكَعْبَةِ قبل مجيء الإِسْلَامِ، وتعدّ هذه القصائدُ أروعَ ما قيل في الشِّعْرِ العربيِّ الْقَدِيمِ وأنفسَه؛ لِذلكَ اهْتَمَّ الناس قديمًا بها ودَوّنوها وكتبوا شُروحًا لها، وهي عادةً ما تبدأُ بذِكْرِ الْأَطْلَالِ وتَذْكُرُ ديارَ محبوبةِ الشاعرِ وكانتْ سَهْلةَ الحِفْظِ وتكون هذه المعلقات من محبته له شعاره الخاص.", "gold_answer": "قيل لها مُعَلَّقَاتٌ لأنها مثلُ العقود النفيسة تَعْلَقُ بالأذهان.", "source_citation": "https://ar.wikipedia.org/?curid=1442 (Wikipedia, CC BY-SA, article id 1442)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1442-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "كيف كانت تُسمي المعلقات قبل أن يجمع حَمَّاد الرّوايها؟", "gold_passage_id": "ar-wiki-1442-1", "gold_passage_text": "وقيل إن حَمَّادًا الرَّاويةَ هو أولُ مَن جمع القصائدَ السَّبْعَ الطِّوَالَ وسماها بالمعلقاتِ (السموط). وكان يقولُ إنها مِن أعذبِ ما قال العربُ وإنَّ العربَ كانوا يسمونها بالسُّموطِ (الْمُعَلَّقَاتِ). وقد ذهب الأُدباءُ والكُتَّابُ من بعدِه لدِراسَتِها. مثلُ ابنِ الكَلْبِيِّ. وابْنِ عَبْدِ رَبِّهِ صاحبِ العقد الفريد وأضاف بكِتَابِهَ أَمْرَ تَعْلِيقِهَا عَلَى الْكَعْبَةِ. قَدْ تَجِدُهُنَّ سَبْعَ قَصَائدَ في كلِّ كتابٍ قديمٍ لكِنَّ منهمْ مَن أضاف قصيدةً لشاعِرٍ وأهمل قصيدةً لِشاعرٍ آخَرَ. فاحتاروا مَن السبعةُ، فجعلوها عشرًا.", "gold_answer": "السموط", "source_citation": "https://ar.wikipedia.org/?curid=1442 (Wikipedia, CC BY-SA, article id 1442)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-1443-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي سياق أدبي نشأت المسيرة الأدبية نجيب محفوظ من خلال الترجمة؟", "gold_passage_id": "ar-wiki-1443-0", "gold_passage_text": "تتشابك مسيرة نجيب محفوظ الأدبية مع تاريخ الرواية الحديثة في مصر والعالم العربي. في مطلع القرن العشرين، خطت الرواية العربية خطواتها الأولى في مجتمع وثقافة اكتشفت هذا النوع الأدبي من خلال ترجمة الروايات الأوروبية من القرن التاسع عشر. ومع ذلك، بالنسبة لنجيب محفوظ، فإن مجتمعًا قويًا وقديمًا مثل المجتمع المصري، بعد أن حافظ على التقاليد القديمة أثناء التحديث، يمكنه أن يستوعب ويدمج، دون خوف، بعض جوانب الثقافة الغربية. لأن هذا الكاتب استمع قبل كل شيء، في عمله، إلى هذا الشعب المصري، وإلى مغامراته الحميمة وتاريخه.", "gold_answer": "من خلال ترجمة الروايات الأوروبية من القرن التاسع عشر.", "source_citation": "https://ar.wikipedia.org/?curid=1443 (Wikipedia, CC BY-SA, article id 1443)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-38-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو الشخص الذي ساهم بشكل كبير في العمل الرائد في الرياضيات البديهية خلال أواخر القرن التاسع عشر؟", "gold_passage_id": "ar-wiki-38-2", "gold_passage_text": "ظهرت الحجج الصارمة أولًا في الرياضيات اليونانية، وعلى الأخص في أصول إقليدس. منذ العمل الرائد لجوزيبه بيانو (1858-1932)، وديفيد هيلبرت (1862-1943)، وغيرهم في النظم البديهية في أواخر القرن التاسع عشر، أصبح من المعتاد النظر إلى الأبحاث الرياضية كإثبات للحقيقة عن طريق الاستنتاج الدقيق للبديهيات والتعاريف المختارة بشكل مناسب. وتطورت الرياضيات بوتيرة بطيئة نسبيًا حتى عصر النهضة، عندما أدت الابتكارات الرياضية التي تتفاعل مع الاكتشافات العلمية الجديدة إلى زيادة سريعة في معدل الاكتشافات الرياضية التي استمرت حتى يومنا هذا.", "gold_answer": "غيرهم", "source_citation": "https://ar.wikipedia.org/?curid=38 (Wikipedia, CC BY-SA, article id 38)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-62-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي اللغة التي تشير فيها الملاحم القديمة إلى اسم بلدها قبل التسمية الحالية؟", "gold_passage_id": "ar-wiki-62-0", "gold_passage_text": "التأثيل\nتسمى رسمياً جمهورية إستونيا (بالإستونية: Eesti Vabariik - إيسْتي ڤابارِيك) وترجع تسميتها بهذا الاسم إلى الكاتب الروماني تاسيتس حيث وصف في كتابه جيرمانيا جماعة من الناس يسمون آيستي. الملاحم الإسكندنافية القديمة تشير إلى بلد اسمها إستلَند (Estland) وهو اسم إستونيا في اللغات الجرمانية الحديثة.", "gold_answer": "اللغات الجرمانية الحديثة.", "source_citation": "https://ar.wikipedia.org/?curid=62 (Wikipedia, CC BY-SA, article id 62)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-7-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الحالة التي يتكون فيها الماء عند نقطة التجمّد؟", "gold_passage_id": "ar-wiki-7-0", "gold_passage_text": "[[ملف:2006-02-13 Drop-impact.jpg|يسار|تصغير|250x250بك|الماء هو المركب الكيميائي الأكثر وفرةً في الأرض.]]\n[[ملف:Iceberg_with_hole_near_Sandersons_Hope_2007-07-28_2.jpg|يسار|تصغير|250x250بك|الماء في حالاته الثلاث: السائلة والصلبة (جليد) والغازية (بخار ماء/سحاب).]]\nالماء مادةٌ شفافةٌ عديمة اللون والرائحة، وهو المكوّن الأساسي للجداول والبحيرات والبحار والمحيطات وكذلك للسوائل في جميع الكائنات الحيّة، وهو أكثر المركّبات الكيميائيّة انتشاراً على سطح الأرض. يتألّف جزيء الماء من ذرّة أكسجين مركزية ترتبط بها ذرّتا هيدروجين على طرفيها برابطة تساهميّة بحيث تكون صيغته الكيميائية H2O. عند الظروف القياسية من الضغط ودرجة الحرارة يكون الماء سائلاً؛ أمّا الحالة الصلبة فتتشكّل عند نقطة التجمّد، وتدعى بالجليد؛ أمّا الحالة الغازية فتتشكّل عند نقطة الغليان، وتسمّى بخار الماء.", "gold_answer": "الجليد", "source_citation": "https://ar.wikipedia.org/?curid=7 (Wikipedia, CC BY-SA, article id 7)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-76-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "تغيرت الأجهزة الحديثة فيما يتعلق بـ: (أ) طريقة استخدام الناس للتلفاز في منازلهم، (ب) عدد أجهزة التلفاز المتاحة، أو (ج) نوع أجهزة التلفاز المستخدمة.", "gold_passage_id": "ar-wiki-76-2", "gold_passage_text": "وقد غيرت الأجهزة الحديثة كمسجلات الفيديو كاسيت، ومشغلات أقراص الفيديو، والحاسوب الشخصي منذ أواخر السبعينيات طريقة استخدام الناس للتلفاز في منازلهم. فمثلاً، أصبحت أجهزة التلفاز تستعمل في ممارسة الألعاب الإلكترونية، واستقبال خدمات المعلومات التلفازية.", "gold_answer": "طريقة استخدام الناس للتلفاز في منازلهم.", "source_citation": "https://ar.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-77-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هم أول من أدخل الحرف (الفلامك) إلى لغتهم؟", "gold_passage_id": "ar-wiki-77-1", "gold_passage_text": "كان الساميون الذين عاشوا 1500 ق.م. قد ادخلوا هذا الحرف إلى لغتهم من الكتابة الهيرغليفية لغة المصريين القدماء. بعدها أدخله الإغريق إلى لغتهم وأسموه ألفا، وآخرهم الرومان اللذين عدلوا على شكل الحرف سنة 114 ميلادي ليصبح شكله ما نعرفه اليوم.", "gold_answer": "كان الساميون الذين عاشوا 1500 ق.م.", "source_citation": "https://ar.wikipedia.org/?curid=77 (Wikipedia, CC BY-SA, article id 77)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ar-wiki-79-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي اللغة تم حساب معدل تكرار الحرف F المذكور في النص؟", "gold_passage_id": "ar-wiki-79-2", "gold_passage_text": "في الألمانية\nإف [ɛf] يحتوي الحرف F على معدل تكرار بلغ 1.66٪ في النصوص باللغة الألمانية. وهو بذلك الحرف الثامن عشر الأكثر شيوعًا في النصوص الألمانية.ملف:De-F.ogg", "gold_answer": "اللغة الألمانية.", "source_citation": "https://ar.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-100-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana air daun yang ditumbuk boleh digunakan untuk merawat demam?", "gold_passage_id": "ms-wiki-100-0", "gold_passage_text": "Biji-biji jenis petola ini boleh diambil sebagai julap. Daun yang ditumbuk lumat boleh dilumur pada kawasan panas untuk merawat demam, malah air daunnya juga diminum oleh ibu yang bersalin.", "gold_answer": "Pada kawasan panas.", "source_citation": "https://ms.wikipedia.org/?curid=100 (Wikipedia, CC BY-SA, article id 100)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-101-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah beberapa hal yang biasa digunakan untuk menjadikan ulam dan dimakan dengan buah dan daun betik?", "gold_passage_id": "ms-wiki-101-1", "gold_passage_text": "Pokok betik menghasilkan buah yang boleh dimakan. Buah betik banyak dijual di pasar-pasar, termasuk pasar tani, dan pasar sayur. Pucuk, daun muda dan bunga betik sering dicelur untuk dijadikan ulam dan dimakan bersama sambal belacan. Pucuk muda betik berasa pahit, manakala buah muda betik jika dibuat halwa berasa masam-masam manis.", "gold_answer": "Pucuk, daun muda dan bunga.", "source_citation": "https://ms.wikipedia.org/?curid=101 (Wikipedia, CC BY-SA, article id 101)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-101-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa asal kata asal bagi perkataan 'betik' yang digunakan oleh orang Portugis?", "gold_passage_id": "ms-wiki-101-2", "gold_passage_text": "Peristilahan\nPerkataan betik () dijejak kepada kata bahasa Portugis pateca. Perkataan itu diberikan orang Portugis barangkali selepas mendengarkan perkataan biṭṭīkh yang asalnya bermaksud \"tembikai\" daripada pedagang-pedagang Arab di Malabar, India.", "gold_answer": "Kata-bahasa Arab 'tembikai' yang bermaksud 'tembikai'.", "source_citation": "https://ms.wikipedia.org/?curid=101 (Wikipedia, CC BY-SA, article id 101)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-101-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Dari mana orang Arab membawa perkataan 'betik' kepada orang Portugis?", "gold_passage_id": "ms-wiki-101-2", "gold_passage_text": "Peristilahan\nPerkataan betik () dijejak kepada kata bahasa Portugis pateca. Perkataan itu diberikan orang Portugis barangkali selepas mendengarkan perkataan biṭṭīkh yang asalnya bermaksud \"tembikai\" daripada pedagang-pedagang Arab di Malabar, India.", "gold_answer": "Dari pedagang-pedagang Arab di Malabar, India.", "source_citation": "https://ms.wikipedia.org/?curid=101 (Wikipedia, CC BY-SA, article id 101)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-102-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana buah cempedak banyak dijual, seperti pasar tani dan pasar sayur?", "gold_passage_id": "ms-wiki-102-0", "gold_passage_text": "Cempedak ( [cĕm.pĕ.dak]), campedak (dua-dua dalam ), tibadak (Jawi: , ) atau baroh (Jawi: , ) merupakan sejenis tumbuhan yang menghasilkan buah yang boleh dimakan, nama saintifiknya ialah Artocarpus integer. Buah cempedak banyak dijual di pasar-pasar termasuk pasar tani, dan pasar sayur. sinonim Artocarpus champeden (Thunb.) Merr., Artocarpus polyphema Pers.). Pokok cempedak turut diperkenalkan ke Queensland. Pokok cempedak cepat tumbuh, dan pokok bersaiz serdahana mampu menghasilkan buah yang banyak.", "gold_answer": "Di pasar-pasar termasuk pasar tani, pasar sayur, dan pasar Queensland.", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-102-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bagimana asal-usul dan lokasi penyebaran tumbuhan ini?", "gold_passage_id": "ms-wiki-102-1", "gold_passage_text": "Tanaman ini berasal dari Asia Tenggara di mana ia menyebar luas mulai dari wilayah Tenasserim di Burma, Malaysia, Thailand, dan sebahagian kepulauan Indonesia termasuk pulau-pulau Sumatera, Jawa (terutamanya di bahagian barat,) Borneo, Sulawesi, Maluku hingga sejauh Papua dan Queensland di Australia.", "gold_answer": "Tumbuhan ini berasal dari Asia Tenggara dan menyebar luas mulai dari wilayah Tenasserim di Burma, Malaysia, Thailand, dan sebahagian kepulauan Indonesia, termasuk pulau-pulau Sumatera, Jawa, Borneo, Sulawesi, Maluku, hingga Australia.", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-102-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa lokasi terjauh di mana tumbuhan ini telah mencapai penyebaran?", "gold_passage_id": "ms-wiki-102-1", "gold_passage_text": "Tanaman ini berasal dari Asia Tenggara di mana ia menyebar luas mulai dari wilayah Tenasserim di Burma, Malaysia, Thailand, dan sebahagian kepulauan Indonesia termasuk pulau-pulau Sumatera, Jawa (terutamanya di bahagian barat,) Borneo, Sulawesi, Maluku hingga sejauh Papua dan Queensland di Australia.", "gold_answer": "Pulau-pulau di Australia, khususnya Queensland.", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-102-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah ketinggian maksimum yang boleh dicapai oleh pokok saka tersebut?", "gold_passage_id": "ms-wiki-102-2", "gold_passage_text": "Batang dan dedaun\nPokok ini merupakan pokok saka yang boleh mencapai ketinggian sehingga 20 meter. Ia mempunyai daun ringkas yang kebanyakkannya berbentuk elliptik. Bahagian bawah urat daun (midrib) biasanya dipenuhi dengan bulu-bulu halus. Pangkal daun berbentuk tirus hingga obtus manakala hujung daun kebanyakkannya berbentuk kupsidat", "gold_answer": "Sekitar 20 meter", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-102-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana bentuk bahagian bawah urat daun (midrib) yang biasanya dipenuhi bulu?", "gold_passage_id": "ms-wiki-102-2", "gold_passage_text": "Batang dan dedaun\nPokok ini merupakan pokok saka yang boleh mencapai keting ld_passage_text": "Sawo manila, sauh menila, sawo atau ciku (nama botani: Manilkara zapota) merupakan spesies tumbuhan saka dalam genus Manilkara keluarga Sapotaceae. Ia tumbuh asal dari selatan Mexico, Amerika Tengah dan Caribbean; namun ia juga diperkenalkan di Asia Selatan dan Asia Tenggara di Filipina yang dijajah Empayar Sepanyol. Ia mudah beradaptasi kepada pelbagai jenis iklim tropika dan monsun yang ada di kawasan-kawasan ini. Tumbuhan ini menghasilkan buah manis yang boleh dimakan.", "gold_answer": "Ia tumbuh asal dari selatan Mexico, Amerika Tengah, dan Caribbean.", "source_citation": "https://ms.wikipedia.org/?curid=103 (Wikipedia, CC BY-SA, article id 103)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-103-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah genus dan keluarga sawo manila?", "gold_passage_id": "ms-wiki-103-0", "gold_passage_text": "Sawo manila, sauh menila, sawo atau ciku (nama botani: Manilkara zapota) merupakan spesies tumbuhan saka dalam genus Manilkara keluarga Sapotaceae. Ia tumbuh asal dari selatan Mexico, Amerika Tengah dan Caribbean; namun ia juga diperkenalkan di Asia Selatan dan Asia Tenggara di Filipina yang dijajah Empayar Sepanyol. Ia mudah beradaptasi kepada pelbagai jenis iklim tropika dan monsun yang ada di kawasan-kawasan ini. Tumbuhan ini menghasilkan buah manis yang boleh dimakan.", "gold_answer": "Nama botaninya ialah Manilkara zapota dan ia termasuk dalam genus Manilkara keluarga Sapotaceae.", "source_citation": "https://ms.wikipedia.org/?curid=103 (Wikipedia, CC BY-SA, article id 103)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-103-1-q0", "language": "ms", "domain"
