 "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-58-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa peratus jisim Matahari mewakili dari jisim keseluruhan Sistem Suria?", "gold_passage_id": "ms-wiki-58-1", "gold_passage_text": "Komponen prinsipal dari Sistem Suria ialah Matahari, sebuah bintang utama urutan G2 yang mengandungi 99.86 peratus dari jisim sistem yang diketahui dan menguasainya secara graviti. Empat badan pengorbit Matahari yang terbesar, gergasi gas, menghitungkan untuk 99 peratus dari jisim yang tertinggal, dengan Musytari dan Zuhal bersama mengandungi lebih dari 90 peratus.", "gold_answer": "99.86 peratus.", "source_citation": "https://ms.wikipedia.org/?curid=58 (Wikipedia, CC BY-SA, article id 58)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-58-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa objek besar di Bumi seperti Planet tidak pernah berada berhampiran dengan komet atau lingkaran Kuiper?", "gold_passage_id": "ms-wiki-58-2", "gold_passage_text": "Kebanyakan objek besar mengorbit mengelilingi Matahari yang berada berhampiran satah orbit Bumi, dikenali sebagai ekliptik. Planet tersebut amat rapat kepada ekliptik manakala komet dan lingkaran Kuiper kerapkali pada pentingnya sudut lebihan kepadanya. Kesemua planet dan kebanyakan objek lain mengorbit Matahari pada arah yang sama bhaawa Matahari berputar (arah lawan jam, seperti yang dilihat dari atas kutub utara Matahari). Terdapat pengecualian, seperti Komet Halley.", "gold_answer": "Sebab kerana kebanyakan objek besar mengorbit mengelilingi Matahari, di mana komet dan lingkaran Kuiper kerapkali pada sudut lebihan kepada ekliptik.", "source_citation": "https://ms.wikipedia.org/?curid=58 (Wikipedia, CC BY-SA, article id 58)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-58-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana Matahari berada sahaja dalam kaitannya dengan satah orbit Bumi?", "gold_passage_id": "ms-wiki-58-2", "gold_passage_text": "Kebanyakan objek besar mengorbit mengelilingi Matahari yang berada berhampiran satah orbit Bumi, dikenali sebagai ekliptik. Planet tersebut amat rapat kepada ekliptik manakala komet dan lingkaran Kuiper kerapkali pada pentingnya sudut lebihan kepadanya. Kesemua planet dan kebanyakan objek lain mengorbit Matahari pada arah yang sama bhaawa Matahari berputar (arah lawan jam, seperti yang dilihat dari atas kutub utara Matahari). Terdapat pengecualian, seperti Komet Halley.", "gold_answer": "Berkiri berhampiran satah orbit Bumi, dikenali sebagai ekliptik.", "source_citation": "https://ms.wikipedia.org/?curid=58 (Wikipedia, CC BY-SA, article id 58)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-59-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa punca utama yang menyebabkan arteri tersumbat berdasarkan passage ini?", "gold_passage_id": "ms-wiki-59-0", "gold_passage_text": "Trombotik adalah salah satu punca Infrak yang menyebabkan Angin Ahmar, selain Embolik. Trombotik disebabkan oleh pembekuan darah dalam salah satu saluran darah. Darah beku ini mengakibatkan aliran darah tersumbat, tetapi tidak pecah. Pembekuan darah ini berlaku akibat pengumpulan kolagen dan kolesterol di dinding saluran darah.", "gold_answer": "Pembekuan darah yang disebabkan oleh pengumpulan kolagen dan kolesterol di dinding saluran darah.", "source_citation": "https://ms.wikipedia.org/?curid=59 (Wikipedia, CC BY-SA, article id 59)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-59-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana keadaan aliran darah apabila berlaku trombosis?", "gold_passage_id": "ms-wiki-59-0", "gold_passage_text": "Trombotik adalah salah satu punca Infrak yang menyebabkan Angin Ahmar, selain Embolik. Trombotik disebabkan oleh pembekuan darah dalam salah satu saluran darah. Darah beku ini mengakibatkan aliran darah tersumbat, tetapi tidak pecah. Pembekuan darah ini berlaku akibat pengumpulan kolagen dan kolesterol di dinding saluran darah.", "gold_answer": "Aliran darah tersumbat tetapi tidak pecah.", "source_citation": "https://ms.wikipedia.org/?curid=59 (Wikipedia, CC BY-SA, article id 59)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-60-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah embolisme ialah penyumbatan?", "gold_passage_id": "ms-wiki-60-0", "gold_passage_text": "Embolisme ialah penyumbatan yang disebabkan oleh embolus, iaitu bahan yang menyebabkan penyumbatan, di dalam saluran darah. Embolus tersebut mungkin berupa darah beku (trombus), globul lemak (embolisme lemak), gelembung udara atau gas lain (embolisme udara), bendalir amnion (embolisme bendalir amnion), atau bendasing.", "gold_answer": "Ia disebabkan oleh embolus, iaitu bahan yang menyebabkan penyumbatan.", "source_citation": "https://ms.wikipedia.org/?curid=60 (Wikipedia, CC BY-SA, article id 60)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-60-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah contoh contoh bahan embolus menurut maklumat dalam teks ini?", "gold_passage_id": "ms-wiki-60-0", "gold_passage_text": "Embolisme ialah penyumbatan yang disebabkan oleh embolus, iaitu bahan yang menyebabkan penyumbatan, di dalam saluran darah. Embolus tersebut mungkin berupa darah beku (trombus), globul lemak (embolisme lemak), gelembung udara atau gas lain (embolisme udara), bendalir amnion (embolisme bendalir amnion), atau bendasing.", "gold_answer": "Bahan embolus termasuk darah beku (trombus), globul lemak (embolisme lemak), gelembung udara atau gas lain (embolisme udara), bendalir amnion (embolisme bendalir amnion), atau bendasing.", "source_citation": "https://ms.wikipedia.org/?curid=60 (Wikipedia, CC BY-SA, article id 60)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-60-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang boleh menyebabkan penyumbatan aliran darah dalam saluran yang terjejas?", "gold_passage_id": "ms-wiki-60-1", "gold_passage_text": "Embolisme boleh menyebabkan penyumbatan aliran darah secara sebahagian atau keseluruhan dalam saluran yang terjejas. Penyumbatan sedemikian (oklusi vaskular) boleh menjejaskan bahagian badan yang jauh dari asal embolus. Embolisme yang berlaku oleh sebab embolus dari trombus dipanggil tromboembolisme.", "gold_answer": "Embolisme, seperti penyumbatan oleh embolus dari trombus.", "source_citation": "https://ms.wikipedia.org/?curid=60 (Wikipedia, CC BY-SA, article id 60)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-60-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah emboli boleh dicipta dengan sengaja?", "gold_passage_id": "ms-wiki-60-2", "gold_passage_text": "Embolisme biasanya merupakan kejadian patologi disebabkan oleh penyakit atau kecederaan. Kadangkala ia dicipta dengan sengaja untuk tujuan terapeutik, seperti untuk menghentikan pendarahan atau membunuh tumor kanser dengan menghentikan bekalan darahnya. Terapi sedemikian dipanggil embolisasi.", "gold_answer": "Bagaimanapun, emboli kadang-kadang dicipta dengan sengaja untuk tujuan terapeutik, seperti untuk menghentikan pendarahan atau membunuh tumor kanser dengan menghentikan bekalan darahnya.", "source_citation": "https://ms.wikipedia.org/?curid=60 (Wikipedia, CC BY-SA, article id 60)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-61-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama keluarga bacterium yang termasuk Antraks?", "gold_passage_id": "ms-wiki-61-0", "gold_passage_text": "Antraks merupakan sebahagian dari keluarga basillus - bacterium yang mempunyai bentuk panjang. Nama saintifiknya adalah Bacillus anthracis. Bacillus anthracis mempunyai saiz yang agak besar (1-1.5um x 4-10um). Bacillus anthracis boleh dibiakkan dalam medium agar berkhasiat biasa secara aerobik (dengan oksigen) ataupun anearobik (tanpa oksigen).", "gold_answer": "Sebahagian dari keluarga basillus.", "source_citation": "https://ms.wikipedia.org/?curid=61 (Wikipedia, CC BY-SA, article id 61)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-61-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan saiz yang diberi, apakah dimensi utama Bakillus anthracis?", "gold_passage_id": "ms-wiki-61-0", "gold_passage_text": "Antraks merupakan sebahagian dari keluarga basillus - bacterium yang mempunyai bentuk panjang. Nama saintifiknya adalah Bacillus anthracis. Bacillus anthracis mempunyai saiz yang agak besar (1-1.5um x 4-10um). Bacillus anthracis boleh dibiakkan dalam medium agar berkhasiat biasa secara aerobik (dengan oksigen) ataupun anearobik (tanpa oksigen).", "gold_answer": "Saiznya berkisar antara 1-1.5 mikron (panjang) dan 4-10 mikron (lebar).", "source_citation": "https://ms.wikipedia.org/?curid=61 (Wikipedia, CC BY-SA, article id 61)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-61-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Apakah dua keadaan di mana Bakillus anthracis boleh dibiakkan?", "gold_passage_id": "ms-wiki-61-0", "gold_passage_text": "Antraks merupakan sebahagian dari keluarga basillus - bacterium yang mempunyai bentuk panjang. Nama saintifiknya adalah Bacillus anthracis. Bacillus anthracis mempunyai saiz yang agak besar (1-1.5um x 4-10um). Bacillus anthracis boleh dibiakkan dalam medium agar berkhasiat biasa secara aerobik (dengan oksigen) ataupun anearobik (tanpa oksigen).", "gold_answer": "Dengan oksigen (aerobik) atau tanpa oksigen (anearobik).", "source_citation": "https://ms.wikipedia.org/?curid=61 (Wikipedia, CC BY-SA, article id 61)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-61-0-q3", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana jenis kelamin Bakillus anthracis dikira dalam bahagian ini?", "gold_passage_id": "ms-wiki-61-0", "gold_passage_text": "Antraks merupakan sebahagian dari keluarga basillus - bacterium yang mempunyai bentuk panjang. Nama saintifiknya adalah Bacillus anthracis. Bacillus anthracis mempunyai saiz yang agak besar (1-1.5um x 4-10um). Bacillus anthracis boleh dibiakkan dalam medium agar berkhasiat biasa secara aerobik (dengan oksigen) ataupun anearobik (tanpa oksigen).", "gold_answer": "Dipastikan tidak dapat dikira, kerana teks hanya memberikan ukuran saiz dalam mikron tanpa menyebut maklumat kelakuan atau jenis kelamin.", "source_citation": "https://ms.wikipedia.org/?curid=61 (Wikipedia, CC BY-SA, article id 61)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-61-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan teks, apa yang dimaksudkan dengan penyakit menular 'Antraks', dan berapa banyak kes kesakitan manusia yang pernah dilaporkan?", "gold_passage_id": "ms-wiki-61-2", "gold_passage_text": "Antraks merupakan penyakit menular teruk yang berpunca oleh bakteria Bacillus anthracis dan membawa maut dalam paling bentuk ganas. Antraks biasanya berlaku dikalangan haiwan maun liar dan peliharaan, tetapi boleh berlaku kepada manusia apabila mereka terdedah kepada haiwan yang berjangkit, tisu dari haiwan yang sakit, atau spora Antraks yang banyak. Bagaimanapun masih tidak terdapat kes manusia yang jatuh sakit melalui hubungan dengan pesakit Antraks.. Antraks bererti \"arang batu\" dalam bahasa Yunani, dan digunakan kerana pesakit mempunyai lesion kulit hitam.", "gold_answer": "Antraks merupakan penyakit menular yang berpunca oleh bakteria Bacillus anthracis; dalam teks ini, tidak terdapat kes manusia yang jatuh sakit melalui hubungan dengan pesakit Antraks.", "source_citation": "https://ms.wikipedia.org/?curid=61 (Wikipedia, CC BY-SA, article id 61)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-61-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana asal etimologi nama 'Antraks' dan kegunaan penyakit tersebut bagi diagnosis?", "gold_passage_id": "ms-wiki-61-2", "gold_passage_text": "Antraks merupakan penyakit menular teruk yang berpunca oleh bakteria Bacillus anthracis dan membawa maut dalam paling bentuk ganas. Antraks biasanya berlaku dikalangan haiwan maun liar dan peliharaan, tetapi boleh berlaku kepada manusia apabila mereka terdedah kepada haiwan yang berjangkit, tisu dari haiwan yang sakit, atau spora Antraks yang banyak. Bagaimanapun masih tidak terdapat kes manusia yang jatuh sakit melalui hubungan dengan pesakit Antraks.. Antraks bererti \"arang batu\" dalam bahasa Yunani, dan digunakan kerana pesakit mempunyai lesion kulit hitam.", "gold_answer": "Antraks bermaksud 'arang batu' dalam bahasa Yunani, dan nama tersebut digunakan kerana pesakit mempunyai lesi (lesion) kulit hitam.", "source_citation": "https://ms.wikipedia.org/?curid=61 (Wikipedia, CC BY-SA, article id 61)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-65-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah afasia adalah penyakit yang disebabkan oleh apa?", "gold_passage_id": "ms-wiki-65-0", "gold_passage_text": "Afasia merupakan sejenis penyakit yang disebabkan oleh kerosakan saraf otak, dengan itu akan melumpuhkan kebolehan seseorang untuk berkomunikasi. Masalah afasia adalah berbeza dengan disleksia. Tanda penting pengidap afasia adalah kesukaran berkomunikasi secara pertuturan, kesukaran memahami percakapan orang lain, dan kesukaran untuk membaca dan menulis.", "gold_answer": "Kerosakan saraf otak.", "source_citation": "https://ms.wikipedia.org/?curid=65 (Wikipedia, CC BY-SA, article id 65)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-65-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang dimaksud dengan afasia berbeza dengan disleksia?", "gold_passage_id": "ms-wiki-65-0", "gold_passage_text": "Afasia merupakan sejenis penyakit yang disebabkan oleh kerosakan saraf otak, dengan itu akan melumpuhkan kebolehan seseorang untuk berkomunikasi. Masalah afasia adalah berbeza dengan disleksia. Tanda penting pengidap afasia adalah kesukaran berkomunikasi secara pertuturan, kesukaran memahami percakapan orang lain, dan kesukaran untuk membaca dan menulis.", "gold_answer": "Tidak ada, tetapi masalah afasia berbeza dengan disleksia.", "source_citation": "https://ms.wikipedia.org/?curid=65 (Wikipedia, CC BY-SA, article id 65)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-65-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang termasuk dalam definisi afasia menurut teks?", "gold_passage_id": "ms-wiki-65-2", "gold_passage_text": "Sebarang daripada yang berikut boleh dianggap afasia:\n* ketidakupayaan untuk memahami pertuturan\n* ketidakupayaan untuk membaca (aleksia)\n* ketidakupayaan untuk menulis (agraphia)\n* ketidakupayaan untuk bertutur, tanpa lumpuh otot\n* ketidakupayaan untuk membentuk ayat\n* ketidakupayaan untuk menamakan objek (anomia)\n* lemah sebutan\n* pertuturan tidak bersesuaian, penggunaan jargon atau perkataan yang salah\n* ketidakupayaan untuk mengulang ayat\n* pengulangan ayat yang tegar\n* sebarang kecacatan penggunaan bahasa yang lain", "gold_answer": "Sebarang daripada ketidakupayaan untuk memahami pertuturan, membaca, menulis, bertutur tanpa lumpuh otot, membentuk ayat, menamakan objek, lemah sebutan, pertuturan tidak bersesuaian, penggunaan jargon atau perkataan yang salah, ketidakupayaan untuk mengulang ayat, pengulangan ayat yang tegar, atau kecacatan penggunaan bahasa lain.", "source_citation": "https://ms.wikipedia.org/?curid=65 (Wikipedia, CC BY-SA, article id 65)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-66-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama alternatif bagi barah pangkal rahim yang juga dikenali sebagai kanser serviks?", "gold_passage_id": "ms-wiki-66-0", "gold_passage_text": "Barah pangkal rahim atau juga dikenali sebagai kanser serviks merupakan barah yang kedua paling tinggi kejadiannya di kalangan wanita di Malaysia. Barah pangkal rahim juga merupakan barah paling biasa dikalangan wanita usia biak ( reproductive age ).", "gold_answer": "Barah pangkal rahim juga dikenali sebagai kanser serviks.", "source_citation": "https://ms.wikipedia.org/?curid=66 (Wikipedia, CC BY-SA, article id 66)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-66-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di kalangan wanita apa di Malaysia, barah pangkal rahim merupakan barah dengan kejadiannya yang paling tinggi?", "gold_passage_id": "ms-wiki-66-0", "gold_passage_text": "Barah pangkal rahim atau juga dikenali sebagai kanser serviks merupakan barah yang kedua paling tinggi kejadiannya di kalangan wanita di Malaysia. Barah pangkal rahim juga merupakan barah paling biasa dikalangan wanita usia biak ( reproductive age ).", "gold_answer": "Barah pangkal rahim merupakan barah yang kedua paling tinggi kejadiannya di kalangan wanita di Malaysia.", "source_citation": "https://ms.wikipedia.org/?curid=66 (Wikipedia, CC BY-SA, article id 66)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-66-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa faktor risiko utama penyakit barah pangkal rahim menurut teks ini?", "gold_passage_id": "ms-wiki-66-1", "gold_passage_text": "Salah satu faktor risiko penyakit barah pangkal rahim adalah kehadiran antibodi kepada human papillomavirus (kumpulan virus yang sama yang menyebabkan ketuat kelamin ( genital wart )). Walaupun tidak merbahaya, virus ini dipercayai menyebabkan perubahan kepada sel di pangkal rahim ( cervix ), menyebabkan perkembangan barah. Jenis strain HPV dikaitkan dengan barah pangkal rahim (strain 16, 18 dan 31), bukanlah jenis yang menyebabkan ketuat kelamin.", "gold_answer": "Kehadiran antibodi kepada human papillomavirus (HPV)", "source_citation": "https://ms.wikipedia.org/?curid=66 (Wikipedia, CC BY-SA, article id 66)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-66-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah hubungan antara jenis strain HPV dan ketuat kelamin yang menyebabkan?", "gold_passage_id": "ms-wiki-66-1", "gold_passage_text": "Salah satu faktor risiko penyakit barah pangkal rahim adalah kehadiran antibodi kepada human papillomavirus (kumpulan virus yang sama yang menyebabkan ketuat kelamin ( genital wart )). Walaupun tidak merbahaya, virus ini dipercayai menyebabkan perubahan kepada sel di pangkal rahim ( cervix ), menyebabkan perkembangan barah. Jenis strain HPV dikaitkan dengan barah pangkal rahim (strain 16, 18 dan 31), bukanlah jenis yang menyebabkan ketuat kelamin.", "gold_answer": "Strain HPV yang dikaitkan dengan barah pangkal rahim, seperti 16, 18, dan 31, bukanlah jenis yang menyebabkan ketuat kelamin.", "source_citation": "https://ms.wikipedia.org/?curid=66 (Wikipedia, CC BY-SA, article id 66)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-66-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah risiko yang tinggi yang dikaitkan dengan virus Human Papilloma (HPV)?", "gold_passage_id": "ms-wiki-66-2", "gold_passage_text": "Jangkitan virus Human Papilloma (HPV) yang tersebar melalui hubungan seks memberi risiko yang tinggi pada wanita yang sering bertukar pasangan hubungan seks ataupun wanita yang mempunyai seorang sahaja pasangan hubungan seks akan tetapi pasangannya itu banyak bertukar pasangan berhubungan seks. Lelaki adalah juga pembawa virus Human Papilloma (HPV).", "gold_answer": "Risiko yang tinggi ini berlaku pada wanita yang sering bertukar pasangan hubungan seks atau pada wanita yang mempunyai seorang sahaja pasangan hubungan seks tetapi pasangannya itu banyak bertukar pasangan berhubungan seks.", "source_citation": "https://ms.wikipedia.org/?curid=66 (Wikipedia, CC BY-SA, article id 66)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-68-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa itu Glukosa-6-Fosfat dehidrogenase (G6PD)?", "gold_passage_id": "ms-wiki-68-0", "gold_passage_text": "Glukosa-6-Fosfat dehidrogenase (G6PD) merupakan sejenis enzim keturunan yang terdapat di dalam sel darah merah manusia. Kekurangan enzim ini boleh memusnahkan sel darah merah apabila terdedah kepada jangkitan, ubatan tertentu ataupun makanan. Apabila sel darah merah tidak lagi mampu mengangkut oksigen dengan berkesan ke seluruh tubuh, keadaan dikenali sebagai anemia hemolytik muncul. Tambahan kepada anemia hemolytik, seseorang yang kekurangan G6PD boleh menjangka beberapa manifastasi klinikal pada keadaan mereka. Ini termasuk demam kuning baru lahir, sakit perut dan/atau sakit belakang, pening, sakit kepala, dispnea (pernafasan tidak teratur), dan palpitasi (Cecil, 1992).", "gold_answer": "Glukosa-6-Fosfat dehidrogenase (G6PD) ialah sejenis enzim keturunan yang terdapat di dalam sel darah merah manusia.", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-68-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Adakah kekurangan enzim G6PD boleh menyebabkan anemia?", "gold_passage_id": "ms-wiki-68-0", "gold_passage_text": "Glukosa-6-Fosfat dehidrogenase (G6PD) merupakan sejenis enzim keturunan yang terdapat di dalam sel darah merah manusia. Kekurangan enzim ini boleh memusnahkan sel darah merah apabila terdedah kepada jangkitan, ubatan tertentu ataupun makanan. Apabila sel darah merah tidak lagi mampu mengangkut oksigen dengan berkesan ke seluruh tubuh, keadaan dikenali sebagai anemia hemolytik muncul. Tambahan kepada anemia hemolytik, seseorang yang kekurangan G6PD boleh menjangka beberapa manifastasi klinikal pada keadaan mereka. Ini termasuk demam kuning baru lahir, sakit perut dan/atau sakit belakang, pening, sakit kepala, dispnea (pernafasan tidak teratur), dan palpitasi (Cecil, 1992).", "gold_answer": "Ya, kekurangan enzim G6PD boleh memusnahkan sel darah merah apabila terdedah kepada jangkitan, ubatan tertentu ataupun makanan, yang menyebabkan keadaan dikenali sebagai anemia hemolytik.", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-68-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah kepekatan G6PD yang menyebabkan kekurangan ini?", "gold_passage_id": "ms-wiki-68-1", "gold_passage_text": "Kekurangan (deficiency) G6PD bukanlah satu kecacatan atau penyakit. Ia adalah satu fenomena keturunan yang melibatkan kedua-dua jantina, lelaki dan perempuan, tetapi lebih sering dialami oleh bayi lelaki. Ia secara am. Ditemui pada mereka yang mana ibu bapa mereka berasal dari daerah yang pernah sering mengalami Malaria seperti Asia Tenggara, Afrika dan juga Mediterranean.", "gold_answer": "G6PD adalah kepekatan hemoglobin yang tidak mencukupi atau rendah yang menyebabkan kekurangan (deficiency).", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-68-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Kapan kekurangan G6PD biasanya muncul dalam hidup?", "gold_passage_id": "ms-wiki-68-1", "gold_passage_text": "Kekurangan (deficiency) G6PD bukanlah satu kecacatan atau penyakit. Ia adalah satu fenomena keturunan yang melibatkan kedua-dua jantina, lelaki dan perempuan, tetapi lebih sering dialami oleh bayi lelaki. Ia secara am. Ditemui pada mereka yang mana ibu bapa mereka berasal dari daerah yang pernah sering mengalami Malaria seperti Asia Tenggara, Afrika dan juga Mediterranean.", "gold_answer": "Kekurangan G6PD biasanya muncul pada bayi yang baru lahir, tetapi ia lebih sering dialami oleh bayi lelaki.", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-68-1-q2", "language": "ms", "domain": "wikipedia_general", "question": "Apakah jenis penyakit atau kecacatan kekurangan G6PD?", "gold_passage_id": "ms-wiki-68-1", "gold_passage_text": "Kekurangan (deficiency) G6PD bukanlah satu kecacatan atau penyakit. Ia adalah satu fenomena keturunan yang melibatkan kedua-dua jantina, lelaki dan perempuan, tetapi lebih sering dialami oleh bayi lelaki. Ia secara am. Ditemui pada mereka yang mana ibu bapa mereka berasal dari daerah yang pernah sering mengalami Malaria seperti Asia Tenggara, Afrika dan juga Mediterranean.", "gold_answer": "Kekurangan G6PD bukanlah satu kecacatan atau penyakit, tetapi merupakan satu fenomena keturunan.", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-68-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah ibu bapa tidak perlu risau jika anak mereka mengalami kekurangan G6PD?", "gold_passage_id": "ms-wiki-68-2", "gold_passage_text": "Para ibu bapa tidak perlu risau jika anak mereka mengalami kekurangan G6PD ini kerana pada dasarnya ia tidak berbahaya. Komplikasi hanya akan terjadi jika mereka terdedah kepada ubat-ubatan yang boleh menghasilkan proses homolisis di dalam darah. Dari segi yang lain, G6PD boleh menjadikan penghidap, lebih kuat melawan penyakit Malaria. oksijen dengan berkesan ke seluruh tubuh, keadaan sebagai anemia hemolytik muncul. Tambahan kepada anemia hemolytik, seseorang yang kekurangan G6PD boleh menjangka beberapa manifastasi klinikal pada keadaan mereka. Ini termasuk demam kuning baru lahir, sakit perut dan/atau sakit belakang, pening, sakit kepala, dispnea (pernafasan tidak teratur), dan palpitasi (Cecil, 1992).", "gold_answer": "Kerana G6PD tidak berbahaya pada dasarnya; ia hanya menjadi berbahaya jika terdedah kepada ubat-ubatan yang boleh menyebabkan proses homolisis.", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-68-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Seorang penderita kekurangan G6PD boleh mengalami manifestasi klinikal seperti apa pada keadaan tertentu?", "gold_passage_id": "ms-wiki-68-2", "gold_passage_text": "Para ibu bapa tidak perlu risau jika anak mereka mengalami kekurangan G6PD ini kerana pada dasarnya ia tidak berbahaya. Komplikasi hanya akan terjadi jika mereka terdedah kepada ubat-ubatan yang boleh menghasilkan proses homolisis di dalam darah. Dari segi yang lain, G6PD boleh menjadikan penghidap, lebih kuat melawan penyakit Malaria. oksijen dengan berkesan ke seluruh tubuh, keadaan sebagai anemia hemolytik muncul. Tambahan kepada anemia hemolytik, seseorang yang kekurangan G6PD boleh menjangka beberapa manifastasi klinikal pada keadaan mereka. Ini termasuk demam kuning baru lahir, sakit perut dan/atau sakit belakang, pening, sakit kepala, dispnea (pernafasan tidak teratur), dan palpitasi (Cecil, 1992).", "gold_answer": "Ia termasuk demam kuning baru lahir, sakit perut, sakit belakang, pening, sakit kepala, dispnea (pernafasan tidak teratur), dan palpitasi.", "source_citation": "https://ms.wikipedia.org/?curid=68 (Wikipedia, CC BY-SA, article id 68)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-70-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah planet terkecil di Sistem Suria di mana Utarid berada berdasarkan jejari khatulistiwanya?", "gold_passage_id": "ms-wiki-70-1", "gold_passage_text": "Ciri fizikal\nUtarid ialah salah satu daripada planet-planet terestial Sistem Suria dan merupakan planet terkecil di Sistem Suria dengan jejari khatulisitwa sebanyak 2,439.7 km. Utarid dipenuhi oleh kira-kira 70% bahan logam dan selebihnya bahan silikat. Ketumpatan Utarid ialah 5.427 g/cm3, kedua tertinggi di Sistem Suria selepas Bumi (5.515 g/cm3). Sekiranya kemampatan graviti diabaikan, kemampatan Utarid ialah 5.3 g/cm3, melebihi ketumpatan Bumi, 4.4 g/cm3.", "gold_answer": "Utarid adalah salah satu daripada planet-planet terestrial Sistem Suria dengan jejari khatulistiwa sebanyak 2,439.7 km.", "source_citation": "https://ms.wikipedia.org/?curid=70 (Wikipedia, CC BY-SA, article id 70)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-70-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa ketumpatan planet terkecil di Sistem Suria? Dan ketumpatan Bumi?", "gold_passage_id": "ms-wiki-70-1", "gold_passage_text": "Ciri fizikal\nUtarid ialah salah satu daripada planet-planet terestial Sistem Suria dan merupakan planet terkecil di Sistem Suria dengan jejari khatulisitwa sebanyak 2,439.7 km. Utarid dipenuhi oleh kira-kira 70% bahan logam dan selebihnya bahan silikat. Ketumpatan Utarid ialah 5.427 g/cm3, kedua tertinggi di Sistem Suria selepas Bumi (5.515 g/cm3). Sekiranya kemampatan graviti diabaikan, kemampatan Utarid ialah 5.3 g/cm3, melebihi ketumpatan Bumi, 4.4 g/cm3.", "gold_answer": "Ketumpatan planet terkecil di Sistem Suria ialah ketumpatan Utarid (5.427 g/cm3), manakala ketumpatan Bumi ialah 4.4 g/cm3.", "source_citation": "https://ms.wikipedia.org/?curid=70 (Wikipedia, CC BY-SA, article id 70)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-71-0-q3", "language": "ms", "domain": "wikipedia_general", "question": "Jarak orbit Neptun dari Matahari dalam unit astronomi adalah", "gold_passage_id": "ms-wiki-71-0", "gold_passage_text": "Neptun ( [nép.tun], ; juga Neptunus ) atau nama lama ia Waruna () merupakan planet kelapan dan planet paling jauh jika diukur dari Matahari dalam Sistem Suria. Ia merupakan planet keempat terbesar berdasarkan diameter (49,530&nbsp;km) dan planet ketiga terbesar berdasarkan jisim, yakni 17 kali lebih besar daripada Bumi, dan sedikit lebih besar daripada Uranus. Planet ini mengorbit Matahari pada jarak 30.1 unit astronomi (UA) atau sekitar 4,450 juta kilometer. Tempoh putaran planet ini adalah 16.1 jam sedangkan tempoh orbit ialah 164.8 tahun. Planet ini dinamakan sempena Neptunus, dewa lautan masyarakat Romawi, malah simbol astronominya adalah ♆, yakni trisula yang disenjatakan dewa ini.", "gold_answer": "30.1 UA", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-71-0-q4", "language": "ms", "domain": "wikipedia_general", "question": "Apa simbol astronomi yang digunakan untuk planet Neptun?", "gold_passage_id": "ms-wiki-71-0", "gold_passage_text": "Neptun ( [nép.tun], ; juga Neptunus ) atau nama lama ia Waruna () merupakan planet kelapan dan planet paling jauh jika diukur dari Matahari dalam Sistem Suria. Ia merupakan planet keempat terbesar berdasarkan diameter (49,530&nbsp;km) dan planet ketiga terbesar berdasarkan jisim, yakni 17 kali lebih besar daripada Bumi, dan sedikit lebih besar daripada Uranus. Planet ini mengorbit Matahari pada jarak 30.1 unit astronomi (UA) atau sekitar 4,450 juta kilometer. Tempoh putaran planet ini adalah 16.1 jam sedangkan tempoh orbit ialah 164.8 tahun. Planet ini dinamakan sempena Neptunus, dewa lautan masyarakat Romawi, malah simbol astronominya adalah ♆, yakni trisula yang disenjatakan dewa ini.", "gold_answer": "♆", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "VERY_SHORT_ANSWER"}, {"id": "ms-wiki-71-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Pada berapa bulan 1846, Neptun telah ditemukan?", "gold_passage_id": "ms-wiki-71-1", "gold_passage_text": "Neptun ditemukan pada 23 September 1846. Planet ini merupakan planet pertama yang ditemukan melalui ramalan dan pengiraan matematik. Perubahan yang tak terduga di orbit Uranus membuat Alexis Bouvard menyimpulkan bahawa hal tersebut berlaku akibat gangguan graviti daripada planet yang belum dikenal pasti. Jasad ini selanjutnya ditemui oleh Johann Galle di kedudukan yang diramalkan oleh Urbain Le Verrier. Satelit alam terbesarnya, Triton, ditemukan segera sesudahnya, sementara 12 satelit alam lainnya baru ditemukan oleh teleskop pada abad ke-20. Neptun telah dikunjungi oleh satu prob angkasa iaitu Voyager 2 yang terbang melewati planet tersebut pada 25 Ogos 1989.", "gold_answer": "23 bulan.", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-71-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa Alexis Bouvard menyimpulkan bahawa terdapat gangguan graviti kepada planet yang belum dikenal pasti?", "gold_passage_id": "ms-wiki-71-1", "gold_passage_text": "Neptun ditemukan pada 23 September 1846. Planet ini merupakan planet pertama yang ditemukan melalui ramalan dan pengiraan matematik. Perubahan yang tak terduga di orbit Uranus membuat Alexis Bouvard menyimpulkan bahawa hal tersebut berlaku akibat gangguan graviti daripada planet yang belum dikenal pasti. Jasad ini selanjutnya ditemui oleh Johann Galle di kedudukan yang diramalkan oleh Urbain Le Verrier. Satelit alam terbesarnya, Triton, ditemukan segera sesudahnya, sementara 12 satelit alam lainnya baru ditemukan oleh teleskop pada abad ke-20. Neptun telah dikunjungi oleh satu prob angkasa iaitu Voyager 2 yang terbang melewati planet tersebut pada 25 Ogos 1989.", "gold_answer": "Perubahan yang tak terduga di orbit Uranus.", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-71-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana perbezaan komposisi planet Uranus dan planet lain di gergasi gas Musytari dan Zuhal?", "gold_passage_id": "ms-wiki-71-2", "gold_passage_text": "Komposisi unsur planet ini mirip Uranus, dan komposisi kedua-dua planet berbeza daripada gergasi-gerasi gas Musytari dan Zuhal. Atmosfera planet mengandungi hidrogen, helium, hidrokarbon, kemungkinan nitrogen, dan kandungan \"ais\" yang besar seperti ais air, amonia, dan metana; metana di kawasan paling luar planet ini merupakan salah satu penyebab Neptun nampak kebiruan. Para ahli falak kadang-kadang mengkategorikan Uranus dan Neptunus sebagai \"gergasi ais\" untuk menekankan perbezaan ini. Bahagian dalam Neptun terdiri dari ais dan batu seperti Uranus.", "gold_answer": "Komposisi Uranus dan planet kedua-dua itu berbeza daripada gergasi-gerasi gas Musytari dan Zuhal.", "source_citation": "https://ms.wikipedia.org/?curid=71 (Wikipedia, CC BY-SA, article id 71)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-72-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah lama ia mengambil masa untuk membuat satu putaran lengkap mengelilingi Matahari?", "gold_passage_id": "ms-wiki-72-1", "gold_passage_text": "Purata suhu di Musytari ialah sekitar 50°C. Musytari mengambil masa selama 11 hari untuk membuat satu putaran lengkap dan 11 tahun 9 bulan untuk membuat satu peredaran lengkap mengelilingi matahari. Garis pusat Musytari ialah 139,822 km.", "gold_answer": "11 hari.", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-72-1-q2", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah Purata suhu di Musytari ialah sekitar 50°C?", "gold_passage_id": "ms-wiki-72-1", "gold_passage_text": "Purata suhu di Musytari ialah sekitar 50°C. Musytari mengambil masa selama 11 hari untuk membuat satu putaran lengkap dan 11 tahun 9 bulan untuk membuat satu peredaran lengkap mengelilingi matahari. Garis pusat Musytari ialah 139,822 km.", "gold_answer": "Tidak dinyatakan dalam passage.", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-72-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa atmosfera tinggi Musytari diklasifikasikan sebagai Gergasi Gas?", "gold_passage_id": "ms-wiki-72-2", "gold_passage_text": "Komposisi Lapisan\nMusytari diklasifikasikan sebagai Gergasi Gas kerana kompisisinya teramsuk 76% hidrogen dan 4% helium tetapi sebab atom helium lebih jisim dari molekul hidrogen, atmosfera tinggi Musytari mempunyai 90% hidrogen dan 10% helium sebagai isi padu.", "gold_answer": "Sebab atom helium lebih jisim dari molekul hidrogen, yang menyebabkan komposisi teramuhnya terdapat lebih kurang 90% hidrogen dan 10% helium sebagai isi padu, bertentangan dengan kelas utamanya.", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-72-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah nisbah atom hidrogen dan atom helium dalam komposisi utama Musytari?", "gold_passage_id": "ms-wiki-72-2", "gold_passage_text": "Komposisi Lapisan\nMusytari diklasifikasikan sebagai Gergasi Gas kerana kompisisinya teramsuk 76% hidrogen dan 4% helium tetapi sebab atom helium lebih jisim dari molekul hidrogen, atmosfera tinggi Musytari mempunyai 90% hidrogen dan 10% helium sebagai isi padu.", "gold_answer": "Berdasarkan teks, atmosfera tinggi Musytari mempunyai 90% hidrogen dan 10% helium sebagai isi padu.", "source_citation": "https://ms.wikipedia.org/?curid=72 (Wikipedia, CC BY-SA, article id 72)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-73-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Di antara orbit planet Marikh dan Musytari, terdapat apa yang mengelilingi matahari?", "gold_passage_id": "ms-wiki-73-1", "gold_passage_text": "Terdapat juga lingkaran asteroid yang kebanyakannya mengelilingi matahari di antara orbit planet Marikh dan Musytari. Disebabkan oleh putaran, garis pusat pada garis khatulistiwa adalah terpanjang bagi setiap planet dan bintang.", "gold_answer": "Lingkaran asteroid yang kebanyakannya mengelilingi matahari.", "source_citation": "https://ms.wikipedia.org/?curid=73 (Wikipedia, CC BY-SA, article id 73)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-73-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa sistem utama Zuhal mempunyai dan apa bahagian terbesar dalam sistem tersebut?", "gold_passage_id": "ms-wiki-73-2", "gold_passage_text": "Zuhal mempunyai satu sistem gelang atau cecincin yang utama terdiri kebanyakannya dari air batu dengan sejumlah kecil serpihan batuan dan debu. Sebanyak enam puluh bulan-bulan mengorbit planet berkenaan. Salah satu bulan ini, Titan merupakan bulan Zuhal yang terbesar (selepas Ganymede) yang diukur lebih besar dari planet Utarid serta merupakan satu-satunya bulan dalam Sistem Suria yang mempunyai atmosfera sendiri.", "gold_answer": "Zuhal mempunyai satu sistem gelang atau cecincin yang utama yang terdiri kebanyakannya dari air batu dengan sejumlah kecil serpihan batuan dan debu. Bulan-bulan dalam sistem itu ialah Titan, Ganymede, dan Utarid.", "source_citation": "https://ms.wikipedia.org/?curid=73 (Wikipedia, CC BY-SA, article id 73)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-73-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mana-belah bulan Zuhal yang terbesar, dan adakah ia mempunyai atmosfera sendiri?", "gold_passage_id": "ms-wiki-73-2", "gold_passage_text": "Zuhal mempunyai satu sistem gelang atau cecincin yang utama terdiri kebanyakannya dari air batu dengan sejumlah kecil serpihan batuan dan debu. Sebanyak enam puluh bulan-bulan mengorbit planet berkenaan. Salah satu bulan ini, Titan merupakan bulan Zuhal yang terbesar (selepas Ganymede) yang diukur lebih besar dari planet Utarid serta merupakan satu-satunya bulan dalam Sistem Suria yang mempunyai atmosfera sendiri.", "gold_answer": "Bulan Zuhal yang terbesar ialah Titan. Ia diukur lebih besar daripada planet Utarid dan merupakan satu-satunya bulan dalam Sistem Suria yang mempunyai atmosfera sendiri.", "source_citation": "https://ms.wikipedia.org/?curid=73 (Wikipedia, CC BY-SA, article id 73)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-74-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Adakah Pluto dianggap sebagai planet terbesar? Apa kepingan paling besar yang dilihat dengan mata kasar mengelilingi matahari?", "gold_passage_id": "ms-wiki-74-0", "gold_passage_text": "Pluto, digelar secara rasmi 134340 Pluto (lambang: atau ), merupakan planet kerdil kedua terbesar yang diketahui dalam Sistem Suria (selepas planet kerdil Eris) dan badan kesepuluh terbesar yang dilihat dengan mata kasar mengelilingi matahari. Ia dinamakan sempena Plūtō atau Plouton, dewa neraka kepercayaan tamadun Rom purba. Pada asalnya Pluto dikelaskan sebagai sebuah planet. Kini, ia dianggap ahli terbesar bagi populasi berlainan yang dikenali sebagai gelung Kuiper.", "gold_answer": "Pluto adalah planet kerdil terbesar kedua di Sistem Suria, dan ia merupakan badan kesepuluh terbesar yang dilihat dengan mata kasar mengelilingi matahari.", "source_citation": "https://ms.wikipedia.org/?curid=74 (Wikipedia, CC BY-SA, article id 74)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_ zons ketika terbang mengelilingi Pluto dan mengabili gambar?", "gold_passage_id": "ms-wiki-74-2", "gold_passage_text": "Pada 14 Julai 2015, sistem Pluto akan dilawati buat kali pertama. Prob New Horizons akan terbang mengelilingi untuk mendapatkan ukuran yang tepat dan mengabil gambar Pluto dan satelit-satelitnya.", "gold_answer": "Untuk mendapatkan ukuran yang tepat dan mengabili gambar Pluto dan satelit-satelitnya.", "source_citation": "https://ms.wikipedia.org/?curid=74 (Wikipedia, CC BY-SA, article id 74)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-75-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Sejarah moden bagi sistem matahari dikembangkan untuk pertama kalinya sebagai akibat apa?", "gold_passage_id": "ms-wiki-75-0", "gold_passage_text": "Uranus () merupakan planet ketujuh daripada Matahari. Ia merupakan planet ketiga terbesar dari segi jejarinya dan planet keempat terbesar dari segi jisimnya di Sistem Suria. Nama Inggeris Uranus adalah bersempena nama dewa langit Yunani purba iaitu Ouranos (bahasa Yunani Kuno: Οὐρανός), bapa kepada Kronos (setaraf Saturnus) dan datuk Zeus (setaraf Jupiter). Walaupun ia boleh dilihat dengan mata kasar, planet ini tidak dikenal pasti oleh tamadun purba kerana kesuramannya dan putaran orbitnya yang perlahan. Sir William Herschel mengumumkan penemuannya pada 13 Mac 1781 dan ini menyebabkan garis sempadan yang diketahui dalam Sistem Suria buat pertama kalinya dalam sejarah moden dapat dikembangkan. Uranus juga planet pertama yang ditemui melalui teleskop.", "gold_answer": "Penemuan Uranus oleh Sir William Herschel pada 13 Mac 1781.", "source_citation": "https://ms.wikipedia.org/?curid=75 (Wikipedia, CC BY-SA, article id 75)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-76-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama planet kedua terdekat kepada Matahari di dalam passage tersebut?", "gold_passage_id": "ms-wiki-76-0", "gold_passage_text": "Zuhrah ( atau ) atau Kejora (Jawi: ; Inggeris: Venus) merupakan planet kedua terdekat kepada Matahari di mana edaran lengkapnya mengambil masa 224.7 hari bumi.", "gold_answer": "Planet tersebut merupakan Venus (atau Zuhrah).", "source_citation": "https://ms.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-76-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah masa edaran lengkap bagi planet Venus di dunia ini?", "gold_passage_id": "ms-wiki-76-0", "gold_passage_text": "Zuhrah ( atau ) atau Kejora (Jawi: ; Inggeris: Venus) merupakan planet kedua terdekat kepada Matahari di mana edaran lengkapnya mengambil masa 224.7 hari bumi.", "gold_answer": "Masa edaran lengkap adalah 224.7 hari.", "source_citation": "https://ms.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-76-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Manakah planet yang diwakili oleh objek semula jadi yang paling terang di waktu malam kecuali Bulan?", "gold_passage_id": "ms-wiki-76-1", "gold_passage_text": "Ia merupakan objek semula jadi yang paling terang di waktu malam, kecuali Bulan, mencapai magnitud kecerahan −4.6; kecerahan maksimum dicapai planet ini sebelum matahari naik atau pun terbenam sehingga kadangkalanya boleh dilihat di siang hari lalu diberi nama Bintang Pagi ataupun Bintang Petang. Oleh kerana Zuhrah merupakan planet inferior dari Bumi, ia tidak pernah muncul jauh daripada Matahari: Kelonjongannya mencapai maksimum sebanyak 47.8°.", "gold_answer": "Zuhrah.", "source_citation": "https://ms.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-76-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berguna apa Planet Zuhrah?", "gold_passage_id": "ms-wiki-76-2", "gold_passage_text": "Sifat fizikal\nZuhrah dianggap sebagai planet kembar Bumi kerana saiz, jisim, isipadu dan ketumpatannya yang hampir sama dengan bumi. Malahan, planet Bumi dan Zuhrah terbentuk daripada awan nebula yang sama. Walau bagaimanapun, kedua dua planet ini mempunyai sifat yang berbeza. Zuhrah tidak mempunyai lautan, dan diselubungi dengan atmosfera yang mengandungi karbon dioksida pada peratusan yang tinggi. Atmosfera Zuhrah juga tidak mempunyai wap air dan awan awan di Zuhrah terdiri daripada titisan titisan asid sulfurik. Di permukaan Zuhrah, tekanan atmosferanya 92 kali ganda lebih tinggi daripada tekanan udara Bumi pada permukaan laut.", "gold_answer": "Planet Zuhrah tidak mempunyai lautan dan diselubungi dengan atmosfera yang mengandungi karbon dioksida pada peratusan yang tinggi, serta memiliki awan awan yang terdiri daripada titisan titisan asid sulfurik. Di permukaannya, tekanan atmosferanya 92 kali ganda lebih tinggi daripada tekanan udara Bumi pada permukaan laut.", "source_citation": "https://ms.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-76-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berpaut bagaimana Planet Bumi dan Planet Zuhrah?", "gold_passage_id": "ms-wiki-76-2", "gold_passage_text": "Sifat fizikal\nZuhrah dianggap sebagai planet kembar Bumi kerana saiz, jisim, isipadu dan ketumpatannya yang hampir sama dengan bumi. Malahan, planet Bumi dan Zuhrah terbentuk daripada awan nebula yang sama. Walau bagaimanapun, kedua dua planet ini mempunyai sifat yang berbeza. Zuhrah tidak mempunyai lautan, dan diselubungi dengan atmosfera yang mengandungi karbon dioksida pada peratusan yang tinggi. Atmosfera Zuhrah juga tidak mempunyai wap air dan awan awan di Zuhrah terdiri daripada titisan titisan asid sulfurik. Di permukaan Zuhrah, tekanan atmosferanya 92 kali ganda lebih tinggi daripada tekanan udara Bumi pada permukaan laut.", "gold_answer": "Planet Bumi dan Planet Zuhrah terbentuk daripada awan nebula yang sama, tetapi sifat fizikal mereka berbeza, di mana Zuhrah tidak mempunyai lautan dan mempunyai atmosfera yang mengandungi karbon dioksida pada peratusan yang tinggi.", "source_citation": "https://ms.wikipedia.org/?curid=76 (Wikipedia, CC BY-SA, article id 76)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-77-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Adakah gas nadir dan wap air termasuk dalam gas-gas yang membentuk udara seperti yang dinyatakan dalam passage ini?", "gold_passage_id": "ms-wiki-77-0", "gold_passage_text": "Di antara gas-gas yang membentuk udara adalah seperti berikut:\n* Nitrogen\n* Oksigen\n* Karbon dioksida\n* gas nadir\n* wap air\n* habuk\n* mikroorganisma", "gold_answer": "Ya, kedua-dua gas tersebut dinyatakan dalam senarai gas-gas yang membentuk udara.", "source_citation": "https://ms.wikipedia.org/?curid=77 (Wikipedia, CC BY-SA, article id 77)", "annotator_id"
