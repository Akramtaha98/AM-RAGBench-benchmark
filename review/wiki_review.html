ge_id": "ms-wiki-43-2", "gold_passage_text": "Geografi\nTasik ini terletak di hujung utara cekungan Altiplano endorheic tinggi di Andes antara sempadan Peru dan Bolivia; bahagian barat tasik terletak dalam Daerah Puno Peru manakala bahagian timur terletak di Jabatan La Paz Bolivia.", "gold_answer": "Di hujung utara cekungan Altiplano endorheic tinggi di Andes, antara sempadan Peru dan Bolivia.", "source_citation": "https://ms.wikipedia.org/?curid=43 (Wikipedia, CC BY-SA, article id 43)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-43-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana hubungan geografis antara Tasik ini dan Negara Peru?", "gold_passage_id": "ms-wiki-43-2", "gold_passage_text": "Geografi\nTasik ini terletak di hujung utara cekungan Altiplano endorheic tinggi di Andes antara sempadan Peru dan Bolivia; bahagian barat tasik terletak dalam Daerah Puno Peru manakala bahagian timur terletak di Jabatan La Paz Bolivia.", "gold_answer": "Bahagian barat tasik terletak dalam Daerah Puno Peru.", "source_citation": "https://ms.wikipedia.org/?curid=43 (Wikipedia, CC BY-SA, article id 43)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-43-2-q2", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana hubungan geografis antara Tasik ini dan Negara Bolivia?", "gold_passage_id": "ms-wiki-43-2", "gold_passage_text": "Geografi\nTasik ini terletak di hujung utara cekungan Altiplano endorheic tinggi di Andes antara sempadan Peru dan Bolivia; bahagian barat tasik terletak dalam Daerah Puno Peru manakala bahagian timur terletak di Jabatan La Paz Bolivia.", "gold_answer": "Bahagian timur tasik terletak di Jabatan La Paz Bolivia.", "source_citation": "https://ms.wikipedia.org/?curid=43 (Wikipedia, CC BY-SA, article id 43)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-44-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Adolf Hitler ialah mana? Berikan jawapan berdasarkan passage.", "gold_passage_id": "ms-wiki-44-0", "gold_passage_text": "Adolf Hitler (20 April 1889 – 30 April 1945) ialah seorang ahli politik Jerman kelahiran Austria yang merupakan diktator Jerman Nazi dari tahun 1933 hingga kematiannya pada tahun 1945. Beliau naik ke tampuk kuasa sebagai pemimpin Parti Nazi, menjadi Canselor pada tahun 1933 dan kemudiannya mengambil gelaran pada tahun 1934. Pencerobohan Poland oleh Hitler pada 1&nbsp;September 1939 menandakan bermulanya Perang Dunia Kedua. Sepanjang perang, beliau terlibat secara langsung dalam operasi ketenteraan dan menjadi tokoh utama dalam peristiwa Holokus: iaitu pembunuhan beramai-ramai terhadap kira-kira enam juta orang Yahudi dan berjuta-juta mangsa yang lain.", "gold_answer": "Ialah seorang ahli politik Jerman kelahiran Austria, seorang diktator Jerman Nazi, yang merupakan pemimpin Parti Nazi, Canselor, dan mengambil gelaran pada tahun 1934.", "source_citation": "https://ms.wikipedia.org/?curid=44 (Wikipedia, CC BY-SA, article id 44)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-44-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimanakah Hitler menyertai dalam perang, dan apa akibatnya bagi Perang Dunia Kedua?", "gold_passage_id": "ms-wiki-44-0", "gold_passage_text": "Adolf Hitler (20 April 1889 – 30 April 1945) ialah seorang ahli politik Jerman kelahiran Austria yang merupakan diktator Jerman Nazi dari tahun 1933 hingga kematiannya pada tahun 1945. Beliau naik ke tampuk kuasa sebagai pemimpin Parti Nazi, menjadi Canselor pada tahun 1933 dan kemudiannya mengambil gelaran pada tahun 1934. Pencerobohan Poland oleh Hitler pada 1&nbsp;September 1939 menandakan bermulanya Perang Dunia Kedua. Sepanjang perang, beliau terlibat secara langsung dalam operasi ketenteraan dan menjadi tokoh utama dalam peristiwa Holokus: iaitu pembunuhan beramai-ramai terhadap kira-kira enam juta orang Yahudi dan berjuta-juta mangsa yang lain.", "gold_answer": "Semasa perang, beliau terlibat secara langsung dalam operasi ketenteraan dan menjadi tokoh utama dalam peristiwa Holokus (pembunuhan beramai-ramai terhadap kira-kira enam juta orang Yahudi). Pencerobohan Poland oleh Hitler pada 1 September 1939 menandakan bermulanya Perang Dunia Kedua.", "source_citation": "https://ms.wikipedia.org/?curid=44 (Wikipedia, CC BY-SA, article id 44)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-44-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang mengkritik Hitler dan menyamakannya sebagai 'satu jelmaan syaitan politik moden'? Siapa pula pemimpin yang dikaitkan dengan ideologi yang membawa rejim Nazi?", "gold_passage_id": "ms-wiki-44-1", "gold_passage_text": "Ahli sejarah dan biografi Ian Kershaw menyifatkan Hitler sebagai \"satu jelmaan syaitan politik moden\". Di bawah kepimpinan dan ideologi perkauman Hitler, rejim Nazi bertanggungjawab terhadap penghapusan bangsa kira-kira enam juta orang Yahudi dan berjuta-juta mangsa lain yang dianggap sebagai () atau golongan tidak dikehendaki. Hitler dan rejim Nazi juga bertanggungjawab atas pembunuhan lebih 19.3&nbsp;juta orang awam dan tawanan perang. Di samping itu, 28.7&nbsp;juta askar dan orang awam terbunuh akibat konflik ketenteraan di medan perang Eropah. Jumlah kematian orang awam semasa Perang Dunia II tidak pernah berlaku sebelum ini dalam sejarah peperangan dan menjadikannya konflik paling berdarah dalam sejarah manusia.", "gold_answer": "Ahli sejarah dan biografi Ian Kershaw menyifatkan Hitler sebagai 'satu jelmaan syaitan politik moden'. Kepimpinan Hitler dan ideologi perkauman yang digunakan oleh beliau bertanggungjawab terhadap rejim Nazi.", "source_citation": "https://ms.wikipedia.org/?curid=44 (Wikipedia, CC BY-SA, article id 44)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-44-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa ramai yang dihukum mati secara rasmi dalam rejim Nazi berdasarkan data dalam teks ini? Selain itu, berapa ramai tawanan perang yang terbunuh?", "gold_passage_id": "ms-wiki-44-1", "gold_passage_text": "Ahli sejarah dan biografi Ian Kershaw menyifatkan Hitler sebagai \"satu jelmaan syaitan politik moden\". Di bawah kepimpinan dan ideologi perkauman Hitler, rejim Nazi bertanggungjawab terhadap penghapusan bangsa kira-kira enam juta orang Yahudi dan berjuta-juta mangsa lain yang dianggap sebagai () atau golongan tidak dikehendaki. Hitler dan rejim Nazi juga bertanggungjawab atas pembunuhan lebih 19.3&nbsp;juta orang awam dan tawanan perang. Di samping itu, 28.7&nbsp;juta askar dan orang awam terbunuh akibat konflik ketenteraan di medan perang Eropah. Jumlah kematian orang awam semasa Perang Dunia II tidak pernah berlaku sebelum ini dalam sejarah peperangan dan menjadikannya konflik paling berdarah dalam sejarah manusia.", "gold_answer": "Hitler dan rejim Nazi bertanggungjawab atas pembunuhan lebih 19.3 juta orang awam, manakala 28.7 juta askar dan orang awam turut terbunuh akibat konflik ketenteraan di medan perang Eropah.", "source_citation": "https://ms.wikipedia.org/?curid=44 (Wikipedia, CC BY-SA, article id 44)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-44-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Kapan dan di mana seorang tokoh yang disebut dalam perkampungan kecil Braunau Am Inn telah dilahirkan?", "gold_passage_id": "ms-wiki-44-2", "gold_passage_text": "Sejarah awal\nPada 6:30 petang 20 April, 1889, beliau telah dilahirkan di sebuah perkampungan kecil Braunau Am Inn, Austria berhampiran dengan sempadan Jerman di Bavaria.", "gold_answer": "Pada 6:30 petang 20 April 1889 di sebuah perkampungan kecil Braunau Am Inn, berhampiran dengan sempadan Jerman di Bavaria.", "source_citation": "https://ms.wikipedia.org/?curid=44 (Wikipedia, CC BY-SA, article id 44)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-44-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana terletak wilayah Braunau Am Inn berbanding dengan sempadan Jerman di Bavaria?", "gold_passage_id": "ms-wiki-44-2", "gold_passage_text": "Sejarah awal\nPada 6:30 petang 20 April, 1889, beliau telah dilahirkan di sebuah perkampungan kecil Braunau Am Inn, Austria berhampiran dengan sempadan Jerman di Bavaria.", "gold_answer": "Perkampungan kecil Braunau Am Inn terletak berhampiran dengan sempadan Jerman di Bavaria.", "source_citation": "https://ms.wikipedia.org/?curid=44 (Wikipedia, CC BY-SA, article id 44)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-45-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa lokasi utama yang memisahkan subbenua India dan dataran Tibet di banjaran Himalaya?", "gold_passage_id": "ms-wiki-45-0", "gold_passage_text": "Banjaran Himalaya ialah banjaran gunung yang memisahkan subbenua India dari kawasan utara Pakistan dan dataran Tibet yang luas (sekarang sebahagian dari China) di utara. Ia merupakan sumber kepada sungai-sungai Indus, Gangga dan Brahmaputra. Gunung tertinggi di dunia, termasuk Gunung Everest (8844.43&nbsp;m or 29,017 kaki), K2 (8611&nbsp;m atau 28,251 kaki), Kangchengjunga (8586&nbsp;m atau 28,169 kaki),Lhotse(8500m atau 27888 kaki), dan Makalu I(8475m atau 27805 kaki) terletak di banjaran ini.", "gold_answer": "Kawasan utara Pakistan dan dataran Tibet yang luas (sekarang sebahagian dari China) di utara.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text"}, {"id": "ms-wiki-45-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mata atur gunung tertinggi di dunia yang terletak di banjaran Himalaya ini?", "gold_passage_id": "ms-wiki-45-0", "gold_passage_text": "Banjaran Himalaya ialah banjaran gunung yang memisahkan subbenua India dari kawasan utara Pakistan dan dataran Tibet yang luas (sekarang sebahagian dari China) di utara. Ia merupakan sumber kepada sungai-sungai Indus, Gangga dan Brahmaputra. Gunung tertinggi di dunia, termasuk Gunung Everest (8844.43&nbsp;m or 29,017 kaki), K2 (8611&nbsp;m atau 28,251 kaki), Kangchengjunga (8586&nbsp;m atau 28,169 kaki),Lhotse(8500m atau 27888 kaki), dan Makalu I(8475m atau 27805 kaki) terletak di banjaran ini.", "gold_answer": "Gunung Everest (8844.43 m atau 29,017 kaki), K2 (8611 m), Kangchengjunga (8586 m), Lhotse (8500 m), dan Makalu I (8475 m).", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "annotator_id": "ollama_draft", "draft_model": "qw : "ms-wiki-45-1", "gold_passage_text": "Perkataan Himalaya adalah berasal dari Sanskrit dan membawa erti \"tempat kediaman salji\" (Sanskrit him \"salji\", dan aalaya \"rumah, tempat kediaman\"). Dalam sebutan Hindi/Sanskrit, Himalaya disebut dengan a pertama panjang dan a akhir pendek, i.e. as /himaal-ya/.", "gold_answer": "Karena kata 'salji' dalam bahasa Sanskrit berarti 'salji', dan kata 'aalaya' berarti 'rumah atau tempat kediaman'.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-45-1-q4", "language": "ms", "domain": "wikipedia_general", "question": "Apa kata yang digunakan untuk merujuk pada 'salji' dalam konteks Himalaya?", "gold_passage_id": "ms-wiki-45-1", "gold_passage_text": "Perkataan Himalaya adalah berasal dari Sanskrit dan membawa erti \"tempat kediaman salji\" (Sanskrit him \"salji\", dan aalaya \"rumah, tempat kediaman\"). Dalam sebutan Hindi/Sanskrit, Himalaya disebut dengan a pertama panjang dan a akhir pendek, i.e. as /himaal-ya/.", "gold_answer": "Kata 'salji'.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-45-1-q5", "language": "ms", "domain": "wikipedia_general", "question": "Apa kata yang digunakan untuk merujuk pada 'tempat kediaman' dalam konteks Himalaya?", "gold_passage_id": "ms-wiki-45-1", "gold_passage_text": "Perkataan Himalaya adalah berasal dari Sanskrit dan membawa erti \"tempat kediaman salji\" (Sanskrit him \"salji\", dan aalaya \"rumah, tempat kediaman\"). Dalam sebutan Hindi/Sanskrit, Himalaya disebut dengan a pertama panjang dan a akhir pendek, i.e. as /himaal-ya/.", "gold_answer": "Kata 'aalaya'.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-45-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah jarak dari Nanga Parbat di barat ke Namche Barwa di timur?", "gold_passage_id": "ms-wiki-45-2", "gold_passage_text": "Geografi\nBanjaran Himalaya adalah sepanjang 2400 km, dari Nanga Parbat di barat hinggalah ke Namche Barwa di timur. Kelebaran banjaran pula adalah di antara 250-300 km.", "gold_answer": "2400 km.", "source_citation": "https://ms.wikipedia.org/?curid=45 (Wikipedia, CC BY-SA, article id 45)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-46-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama perubahan yang diberikan kepada parti politik di Jerman apabila Hitler menyedari desakan tersebut?", "gold_passage_id": "ms-wiki-46-0", "gold_passage_text": "Parti Buruh Jerman Sosialis Nasional () atau Parti Nazi merupakan sebuah parti politik di Jerman antara tahun 1920 hingga 1945. Sebelum itu parti ini dikenali sebagai Parti Pekerja Jerman atau \"Deutsche Arbeiterpartei\" (DAP), yang wujud dari tahun 1919 hingga 1920. Istilah Nazi ialah bahasa Jerman, singkatan dari perkataan Nationalsozialist. Namun atas desakan Hitler untuk memasukkan unsur sosialisme nasional nama parti itu ditukar kepada \"Parti Buruh Jerman Sosialis Nasional\" (dalam bahasa Jerman \"Nationalsozialistische Deutsche Arbeiterpartei\" atau NSDAP) atau nama popularnya Nazi.", "gold_answer": "Nama parti itu ditukar kepada Parti Buruh Jerman Sosialis Nasional (NSDAP) atau nama popularnya Nazi.", "source_citation": "https://ms.wikipedia.org/?curid=46 (Wikipedia, CC BY-SA, article id 46)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-46-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Sebelum parti Nazi, parti ini dikenali dengan nama mana dan berapa lama ia wujud sebelum nama itu berubah?", "gold_passage_id": "ms-wiki-46-0", "gold_passage_text": "Parti Buruh Jerman Sosialis Nasional () atau Parti Nazi merupakan sebuah parti politik di Jerman antara tahun 1920 hingga 1945. Sebelum itu parti ini dikenali sebagai Parti Pekerja Jerman atau \"Deutsche Arbeiterpartei\" (DAP), yang wujud dari tahun 1919 hingga 1920. Istilah Nazi ialah bahasa Jerman, singkatan dari perkataan Nationalsozialist. Namun atas desakan Hitler untuk memasukkan unsur sosialisme nasional nama parti itu ditukar kepada \"Parti Buruh Jerman Sosialis Nasional\" (dalam bahasa Jerman \"Nationalsozialistische Deutsche Arbeiterpartei\" atau NSDAP) atau nama popularnya Nazi.", "gold_answer": "Sebelum nama Nazi, parti dikenali sebagai Parti Pekerja Jerman atau Deutsche Arbeiterpartei (DAP), yang wujud antara tahun 1919 hingga 1920.", "source_citation": "https://ms.wikipedia.org/?curid=46 (Wikipedia, CC BY-SA, article id 46)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-46-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana bentuk dan warna lambang rasmi Parti Nazi ini?", "gold_passage_id": "ms-wiki-46-1", "gold_passage_text": "Parti ini diketuai oleh Adolf Hitler dan merupakan parti kerajaan utama sewaktu beliau memerintah negara Jerman. Lambang rasmi Parti Nazi ini adalah Swastika yang berlatarbelakangkan warna merah.", "gold_answer": "Warna merah dengan gambar Swastika", "source_citation": "https://ms.wikipedia.org/?curid=46 (Wikipedia, CC BY-SA, article id 46)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-46-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Pada tahun 1921, Adolf Hitler membentuk pasukan pertahanan peribadi dan mengubah parti Nazi menjadi organisasi yang lebih radikal melalui apa nama pasukan tersebut?", "gold_passage_id": "ms-wiki-46-2", "gold_passage_text": "Sejarah\nAdolf Hitler telah menjadi Pengerusi Parti Nazi pada 29 Julai 1921 dan terus memulakan program untuk menjadikan parti ini sebagai sebuah organisasi pemberontak yang radikal. Pada tahun yang sama, beliau telah menubuhkan \"Pasukan Gempur\" (atau dalam Jerman Sturmabteilung). Pasukan ini pada mulanya merupakan pasukan penjaga peribadi bagi Hitler, tetapi kemudiannya diperalatkan untuk mengembangkan pengaruh parti Nazi melalui intimidasi, ketakutan dan serangan ganas terhadap parti politik yang lain.", "gold_answer": "Pasukan Gempur (atau dalam Jerman Sturmabteilung)", "source_citation": "https://ms.wikipedia.org/?curid=46 (Wikipedia, CC BY-SA, article id 46)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-46-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa pasukan 'Pasukan Gempur' diperalatkan bagi mengembangkan pengaruh Nazi melalui cara-cara yang lebih agresif?", "gold_passage_id": "ms-wiki-46-2", "gold_passage_text": "Sejarah\nAdolf Hitler telah menjadi Pengerusi Parti Nazi pada 29 Julai 1921 dan terus memulakan program untuk menjadikan parti ini sebagai sebuah organisasi pemberontak yang radikal. Pada tahun yang sama, beliau telah menubuhkan \"Pasukan Gempur\" (atau dalam Jerman Sturmabteilung). Pasukan ini pada mulanya merupakan pasukan penjaga peribadi bagi Hitler, tetapi kemudiannya diperalatkan untuk mengembangkan pengaruh parti Nazi melalui intimidasi, ketakutan dan serangan ganas terhadap parti politik yang lain.", "gold_answer": "Mengikut teks, pasukan ini digunakan untuk mengembangkan pengaruh parti Nazi melalui intimidasi, ketakutan dan serangan ganas terhadap parti politik yang lain.", "source_citation": "https://ms.wikipedia.org/?curid=46 (Wikipedia, CC BY-SA, article id 46)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-47-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang merupakan isteri kepada Khalifah keempat Marwan bin al-Hakam?", "gold_passage_id": "ms-wiki-47-0", "gold_passage_text": "Ummu Abdul Malik Aisyah binti Muawiyah bin al-Mughirah bin Abi al-'As bin Umaiyyah () merupakan isteri kepada Khalifah keempat Marwan bin al-Hakam dan ibu kepada Khalifah kelima Abdul Malik bin Marwan.", "gold_answer": "Ummu Abdul Malik Aisyah binti Muawiyah bin al-Mughirah bin Abi al-'As bin Umaiyyah.", "source_citation": "https://ms.wikipedia.org/?curid=47 (Wikipedia, CC BY-SA, article id 47)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-47-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bapa siapa dari Ummu Abdul Malik Aisyah?", "gold_passage_id": "ms-wiki-47-0", "gold_passage_text": "Ummu Abdul Malik Aisyah binti Muawiyah bin al-Mughirah bin Abi al-'As bin Umaiyyah () merupakan isteri kepada Khalifah keempat Marwan bin al-Hakam dan ibu kepada Khalifah kelima Abdul Mali language": "ms", "domain": "wikipedia_general", "question": "Siapa yang menerbitkan versi al-Quran yang dikenali sebagai Mushaf?", "gold_passage_id": "ms-wiki-49-0", "gold_passage_text": "Mushaf Uthman ialah versi al-Quran yang diterbitkan oleh Uthman bin Afan. \"Mushaf\" ialah perkataan bahasa Arab yang secara harfiah, bermaksud \"kulit\", iaitu kulit buku, tetapi digunakan dalam konteks ini untuk merujuk kepada senaskah kitab al-Quran.", "gold_answer": "Perubahan tersebut diterbitkan oleh Uthman bin Afan.", "source_citation": "https://ms.wikipedia.org/?curid=49 (Wikipedia, CC BY-SA, article id 49)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-49-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Apakah isi kandungan teks yang berkaitan dengan definisi 'Mushaf' dan penerbitannya?", "gold_passage_id": "ms-wiki-49-0", "gold_passage_text": "Mushaf Uthman ialah versi al-Quran yang diterbitkan oleh Uthman bin Afan. \"Mushaf\" ialah perkataan bahasa Arab yang secara harfiah, bermaksud \"kulit\", iaitu kulit buku, tetapi digunakan dalam konteks ini untuk merujuk kepada senaskah kitab al-Quran.", "gold_answer": "Isinya adalah definisi 'Mushaf' sebagai 'kulit' dan fakta bahawa ia diterbitkan oleh Uthman bin Afan.", "source_citation": "https://ms.wikipedia.org/?curid=49 (Wikipedia, CC BY-SA, article id 49)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-49-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa Hudhaifa bin Al-Yaman bertemu dengan Uthman?", "gold_passage_id": "ms-wiki-49-1", "gold_passage_text": "Ketika orang-orang Sham dan Iraq bersatu dalam sebuah peperangan untuk menaklukkan Arminya dan Adharbijan, Hudhaifa bin Al-Yaman bertemu dengan Uthman kerana beliau takut tentang perbezaan cara pembacaan al-Quran antara orang-orang Sham dengan orang-orang Iraq. Hudhaifa berkata kepada Uthman: \"O ketua Penganut-penganut Islam! Selamatkanlah negara ini sebelum mereka berbeza terhadap Kitab (al-Quran), sebagaimana dengan pengalaman orang Yahudi dan orang Kristian dahulu.\"", "gold_answer": "Hudhaifa bertemu dengan Uthman kerana Uthman takut mengenai perbezaan cara pembacaan Al-Quran antara orang-orang Sham dengan orang-orang Iraq.", "source_citation": "https://ms.wikipedia.org/?curid=49 (Wikipedia, CC BY-SA, article id 49)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-49-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa tindakan yang diminta oleh Hudhaifa kepada Uthman?", "gold_passage_id": "ms-wiki-49-1", "gold_passage_text": "Ketika orang-orang Sham dan Iraq bersatu dalam sebuah peperangan untuk menaklukkan Arminya dan Adharbijan, Hudhaifa bin Al-Yaman bertemu dengan Uthman kerana beliau takut tentang perbezaan cara pembacaan al-Quran antara orang-orang Sham dengan orang-orang Iraq. Hudhaifa berkata kepada Uthman: \"O ketua Penganut-penganut Islam! Selamatkanlah negara ini sebelum mereka berbeza terhadap Kitab (al-Quran), sebagaimana dengan pengalaman orang Yahudi dan orang Kristian dahulu.\"", "gold_answer": "Hudhaifa meminta kepada Uthman untuk membebaskan negara ini sebelum mereka (Sham dan Iraq) berbeza terhadap Kitab (Al-Quran).", "source_citation": "https://ms.wikipedia.org/?curid=49 (Wikipedia, CC BY-SA, article id 49)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-49-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa tujuan utama perutusan yang dihantar kepada Hafsa?", "gold_passage_id": "ms-wiki-49-2", "gold_passage_text": "Oleh itu, Uthman menghantar satu perutusan kepada Hafsa yang mengatakan: \"Kirimkanlah suhuf kepada kami supaya kami dapat menyusun bahan-bahan al-Quran dalam salinan-salinan yang sempurna dan memulangkan manuskrip-manuskrip kepada kamu.\"", "gold_answer": "Mengesurani bahan-bahan al-Quran dalam salinan-salinan yang sempurna dan memulangkan manuskrip-manuskrip kepada Hafsa.", "source_citation": "https://ms.wikipedia.org/?curid=49 (Wikipedia, CC BY-SA, article id 49)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-50-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bagi siapa nama lengkap Usman bin Affan dalam konteks ini?", "gold_passage_id": "ms-wiki-50-0", "gold_passage_text": "Usman yang menghiasi Aya Sophia di Istanbul.]]\nUsman bin Affan (Arab: عثمان بن عفان)atau nama panjang beliau adalah Usman bin Affan Abi al-Ash bin Umaiyyah merupakan salah seorang sahabat Nabi Muhammad SAW. Ketika beliau menjadi khalifah, berlaku pertelingkahan dalam kalangan umat Islam mengenai cara bacaan al-Quran. Disebabkan oleh itu Usman bin Affan telah meminjam suhuf, (kumpulan penulisan al-Quran daripada Hafsa. Selepas itu Usman bin Affan telah memerintahkan empat orang sahabat untuk menyalin semula al-Quran dalam bentuk yang sempurna yang dikenali sebagai Mushaf Usmani. Salinan Mushaf tersebut dihantar ke seluruh pusat jajahan bagi menggantikan salinan-salinan yang lain.", "gold_answer": "Nama panjang beliau ialah Usman bin Affan Abi al-Ash bin Umaiyyah.", "source_citation": "https://ms.wikipedia.org/?curid=50 (Wikipedia, CC BY-SA, article id 50)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-50-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa Usman bin Affan memerintahkan empat sahabat untuk menyalin al-Quran?", "gold_passage_id": "ms-wiki-50-0", "gold_passage_text": "Usman yang menghiasi Aya Sophia di Istanbul.]]\nUsman bin Affan (Arab: عثمان بن عفان)atau nama panjang beliau adalah Usman bin Affan Abi al-Ash bin Umaiyyah merupakan salah seorang sahabat Nabi Muhammad SAW. Ketika beliau menjadi khalifah, berlaku pertelingkahan dalam kalangan umat Islam mengenai cara bacaan al-Quran. Disebabkan oleh itu Usman bin Affan telah meminjam suhuf, (kumpulan penulisan al-Quran daripada Hafsa. Selepas itu Usman bin Affan telah memerintahkan empat orang sahabat untuk menyalin semula al-Quran dalam bentuk yang sempurna yang dikenali sebagai Mushaf Usmani. Salinan Mushaf tersebut dihantar ke seluruh pusat jajahan bagi menggantikan salinan-salinan yang lain.", "gold_answer": "Karena berlaku pertelingkahan mengenai cara bacaan al-Quran dalam kalangan umat Islam.", "source_citation": "https://ms.wikipedia.org/?curid=50 (Wikipedia, CC BY-SA, article id 50)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-50-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa Usman ra. melarang pembunuhan kaum munafik setelah para sahabat mencadangkan tindakan tersebut?", "gold_passage_id": "ms-wiki-50-2", "gold_passage_text": "Saidina Usman dibunuh oleh oleh golongan Khawarij dan pengikut Abdullah bin Saba’. ‎Para sahabat pernah mencadangkan agar kaum munafik ini di bunuh, akan tetapi Usman ‎ra. melarang kerana mengikuti langkah Nabi yang melarang membunuh kaum munafik ‎kerana di khuatiri musuh Islam akan menuduh orang Islam membunuh rakan mereka ‎sendiri.‎", "gold_answer": "Menggunakan langkah Nabi yang melarang membunuh kaum munafik kerana di khuatiri musuh Islam akan menuduh orang Islam membunuh rakan mereka sendiri.", "source_citation": "https://ms.wikipedia.org/?curid=50 (Wikipedia, CC BY-SA, article id 50)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-50-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa Saidina Usman dibunuh oleh golongan Khawarij dan pengikut Abdullah bin Saba'?", "gold_passage_id": "ms-wiki-50-2", "gold_passage_text": "Saidina Usman dibunuh oleh oleh golongan Khawarij dan pengikut Abdullah bin Saba’. ‎Para sahabat pernah mencadangkan agar kaum munafik ini di bunuh, akan tetapi Usman ‎ra. melarang kerana mengikuti langkah Nabi yang melarang membunuh kaum munafik ‎kerana di khuatiri musuh Islam akan menuduh orang Islam membunuh rakan mereka ‎sendiri.‎", "gold_answer": "Berdasarkan teks, Saidina Usman dibunuh oleh golongan Khawarij dan pengikut Abdullah bin Saba'.", "source_citation": "https://ms.wikipedia.org/?curid=50 (Wikipedia, CC BY-SA, article id 50)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-52-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa definisi penyakit seperti ڤڽاكيت mengikut teks tersebut?", "gold_passage_id": "ms-wiki-52-0", "gold_passage_text": "Penyakit (Tulisan Jawi: ڤڽاكيت) adalah keadaan tidak normal pada badan atau minda yang menyebabkan ketidakselesaan, disfungsi, atau tekanan/stres kepada orang yang terbabit atau berhubung rapat dengannya. Kadang kala istilah ini digunakan secara umum untuk menerangkan kecederaan, kecacatan, sindrom, simptom, keserongan tingkah laku, dan variasi biasa sesuatu struktur atau fungsi, sementara dalam konteks lain boleh dianggap sebagai kategori yang boleh dibezakan.", "gold_answer": "Penyakit adalah keadaan tidak normal pada badan atau minda yang menyebabkan ketidakselesaan, disfungsi, atau tekanan/stres kepada orang yang terbabit atau berhubung rapat dengannya.", "source_citation": "https://ms.wikipedia.org/?curid=52 (Wikipedia, CC BY-SA, article id 52)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-52-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bentuk lain dari istilah 'penyakit' (dalam konteks tertentu) dapat dikategorikan seperti apa?", "gold_passage_id": "ms-wiki-52-0", "gold_passage_text": "Penyakit (Tulisan Jawi: ڤڽاكيت) adalah keadaan tidak normal pada badan atau minda yang menyebabkan ketidakselesaan, disfungsi, atau tekanan/stres kepada orang yang terbabit atau berhubung rapat dengannya. Kadang kala istilah ini digunakan secara umum untuk menerangkan kecederaan, kecacatan, sindrom, simptom, keserongan tingkah laku, dan variasi biasa sesuatu struktur atau fungsi, sementara dalam konteks lain boleh dianggap sebagai kategori yang boleh dibezakan.", "gold_answer": "Dalam konteks lain, istilah tersebut boleh dianggap sebagai kategori yang boleh dibezakan.", "source_citation": "https://ms.wikipedia.org/?curid=52 (Wikipedia, CC BY-SA, article id 52)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-52-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang dianggap sebagai gejala yang dianggap sebagai penyakit dalam masyarakat Amerika Utara kini tetapi tidak pernah dianggap sedemikian dalam kebudayaan Amerika abad lalu?", "gold_passage_id": "ms-wiki-52-1", "gold_passage_text": "Sesuatu gejala dianggap sebagai penyakit oleh sesuatu kebudayaan atau dalam satu julat masa, tetapi bukan dalam semua kebudayaan atau era. Masalah kecenderungan menentang, masalah sukar menumpukan perhatian, dan masalah personaliti merupakan antara contoh gejala yang dianggap sebagai penyakit dalam masyarakat Amerika Utara kini tetapi tidak pernah dianggap sedemikian dalam kebudayaan Amerika abad lalu atau bagi masyarakat lain pada masa kini.", "gold_answer": "Masalah kecenderungan menentang, masalah sukar menumpukan perhatian, dan masalah personaliti.", "source_citation": "https://ms.wikipedia.org/?curid=52 (Wikipedia, CC BY-SA, article id 52)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-52-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah kriteria yang menentukan apabila sesuatu gejala dianggap sebagai penyakit oleh satu kebudayaan?", "gold_passage_id": "ms-wiki-52-1", "gold_passage_text": "Sesuatu gejala dianggap sebagai penyakit oleh sesuatu kebudayaan atau dalam satu julat masa, tetapi bukan dalam semua kebudayaan atau era. Masalah kecenderungan menentang, masalah sukar menumpukan perhatian, dan masalah personaliti merupakan antara contoh gejala yang dianggap sebagai penyakit dalam masyarakat Amerika Utara kini tetapi tidak pernah dianggap sedemikian dalam kebudayaan Amerika abad lalu atau bagi masyarakat lain pada masa kini.", "gold_answer": "Sesuatu gejala dianggap sebagai penyakit oleh satu kebudayaan atau dalam satu julat masa jika ia dianggap sebagai gejala, tetapi bukan dalam semua kebudayaan atau era.", "source_citation": "https://ms.wikipedia.org/?curid=52 (Wikipedia, CC BY-SA, article id 52)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-52-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah topik yang menjadi politik hangat dalam masyarakat kerana perasaannya terhadap ekonomi dan masyarakat?", "gold_passage_id": "ms-wiki-52-2", "gold_passage_text": "Kadang kala, sama ada sesuatu gejala dikira sebagai penyakit atau sindrom dan variasinya telah menjadi topik politik yang hangat lantaran kesannya kepada ekonomi dan masyarakat. Sebagai contoh, kejutan letupan (shell shock) dan masalah tekanan pascatrauma (post-traumatic stress disorder) merupakan telah dipolitikkan di Amerika Syarikat; demikian juga kecederaan pergerakan berulang (repetitive motion injury) di Australia.", "gold_answer": "Gejala yang dikira sebagai penyakit atau sindrom dan variasinya.", "source_citation": "https://ms.wikipedia.org/?curid=52 (Wikipedia, CC BY-SA, article id 52)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-52-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mana-mana gejala berikut telah dipolitikkan di Amerika Syarikat:", "gold_passage_id": "ms-wiki-52-2", "gold_passage_text": "Kadang kala, sama ada sesuatu gejala dikira sebagai penyakit atau sindrom dan variasinya telah menjadi topik politik yang hangat lantaran kesannya kepada ekonomi dan masyarakat. Sebagai contoh, kejutan letupan (shell shock) dan masalah tekanan pascatrauma (post-traumatic stress disorder) merupakan telah dipolitikkan di Amerika Syarikat; demikian juga kecederaan pergerakan berulang (repetitive motion injury) di Australia.", "gold_answer": "Kejutan letupan (shell shock) dan masalah tekanan pascatrauma (post-traumatic stress disorder).", "source_citation": "https://ms.wikipedia.org/?curid=52 (Wikipedia, CC BY-SA, article id 52)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-55-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama simbol kimia bagi unsur Hidrogen?", "gold_passage_id": "ms-wiki-55-0", "gold_passage_text": "Hidrogen () ialah unsur yang mempunyai nombor atom 1 dengan simbol kimia, H. Hidrogen ialah unsur pertama dan unsur yang paling ringan dalam jadual berkala. Hidrogen berada dalam kumpulan 1 dan kala 1.", "gold_answer": "H", "source_citation": "https://ms.wikipedia.org/?curid=55 (Wikipedia, CC BY-SA, article id 55)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "VERY_SHORT_ANSWER"}, {"id": "ms-wiki-56-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama unsur kimia dan simbolnya yang disebut Helium di dalam teks ini?", "gold_passage_id": "ms-wiki-56-0", "gold_passage_text": "Helium () adalah sejenis unsur kimia dengan simbol He dan nombor atom 2. Ia merupakan gas monoatom tidak berwarna, tidak berbau, tidak berasa, tidak beracun dan lengai yang terletak di tempat teratas dalam kumpulan gas adi (kumpulan 18) dalam jadual berkala. Helium mempunyai takat didih dan lebur yang terendah berbanding semua unsur lain serta wujud dalam bentuk gas kecuali dalam keadaan-keadaan ekstrem.", "gold_answer": "Helium memiliki simbol He dan merupakan unsur kimia dengan nombor atom 2.", "source_citation": "https://ms.wikipedia.org/?curid=56 (Wikipedia, CC BY-SA, article id 56)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-56-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana Helium diletakkan dalam jadual berkala, dan apa sifat fizikal utama yang menjadikan ia unik?", "gold_passage_id": "ms-wiki-56-0", "gold_passage_text": "Helium () adalah sejenis unsur kimia dengan simbol He dan nombor atom 2. Ia merupakan gas monoatom tidak berwarna, tidak berbau, tidak berasa, tidak beracun dan lengai yang terletak di tempat teratas dalam kumpulan gas adi (kumpulan 18) dalam jadual berkala. Helium mempunyai takat didih dan lebur yang terendah berbanding semua unsur lain serta wujud dalam bentuk gas kecuali dalam keadaan-keadaan ekstrem.", "gold_answer": "Helium terletak di tempat teratas dalam kumpulan gas adi (kumpulan 18) dalam jadual berkala; ia mempunyai takat didih dan lebur yang terendah berbanding semua unsur lain.", "source_citation": "https://ms.wikipedia.org/?curid=56 (Wikipedia, CC BY-SA, article id 56)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-56-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa peratusan jisim keseluruhan alam semesta yang dibina oleh helium?", "gold_passage_id": "ms-wiki-56-1", "gold_passage_text": "Helium adalah unsur kedua paling ringan dan kedua terbanyak di dalam alam semesta boleh cerap. Ia membentuk 24% daripada keseluruhan jisim unsur—12 kali ganda jisim kesemua unsur lain (kecuali hidrogen) digabungkan. Peratusan kelimpahan helium di alam semesta adalah sama dengan peratusannya di dalam Matahari dan planet Musytari. Ini disebabkan oleh tenaga pengikatan nuklear (setiap nukleon) helium-4 yang sangat tinggi berbanding dengan tenaga pengikatan nuklear bagi tiga unsur selepasnya. Tenaga pengikatan helium-4 ini juga menjelaskan kebiasaannya diperolehi daripada pelakuran nuklear dan pereputan radioaktif. Kebanyakan helium di alam semesta ialah helium-4, dan ia dipercayai telah dihasilkan sewaktu Letupan Besar. Kini, helium yang baharu dihasilkan oleh pelakuran hidrogen di dalam teras bintang-bintang.", "gold_answer": "Helium membentuk 24% daripada keseluruhan jisim unsur.", "source_citation": "https://ms.wikipedia.org/?curid=56 (Wikipedia, CC BY-SA, article id 56)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-56-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah bahan yang menyebabkan peningkatan tenaga pengikatan nuklear bagi helium-4 berbanding tiga unsur selepasnya?", "gold_passage_id": "ms-wiki-56-1", "gold_passage_text": "Helium adalah unsur kedua paling ringan dan kedua terbanyak di dalam alam semesta boleh cerap. Ia membentuk 24% daripada keseluruhan jisim unsur—12 kali ganda jisim kesemua unsur lain (kecuali hidrogen) digabungkan. Peratusan kelimpahan helium di alam semesta adalah sama dengan peratusannya di dalam Matahari dan planet Musytari. Ini disebabkan oleh tenaga pengikatan nuklear (setiap nukleon) helium-4 yang sangat tinggi berbanding dengan tenaga pengikatan nuklear bagi tiga unsur selepasnya. Tenaga pengikatan helium-4 ini juga menjelaskan kebiasaannya diperolehi daripada pelakuran nuklear dan pereputan radioaktif. Kebanyakan helium di alam semesta ialah helium-4, dan ia dipercayai telah dihasilkan sewaktu Letupan Besar. Kini, helium yang baharu dihasilkan oleh pelakuran hidrogen di dalam teras bintang-bintang.", "gold_answer": "Helium-4 mempunyai tenaga pengikatan nuklear yang sangat tinggi berbanding dengan tiga unsur selepasnya.", "source_citation": "https://ms.wikipedia.org/?curid=56 (Wikipedia, CC BY-SA, article id 56)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-56-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa kadar isipadu gas ini di Bumi?", "gold_passage_id": "ms-wiki-56-2", "gold_passage_text": "Di Bumi, gas ini agak jarang, dengan kelimpahan dalam atmosfera bumi hanya sebanyak 0.00052% mengikut isipadu. Kebanyakan helium dari Bumi yang wujud pada hari ini dihasilkan melalui pereputan radioaktif unsur-unsur radioaktif yang berat (torium dan uranium). Zarah-zarah alfa yang dipancarkan dalam pereputan ini terdiri daripada nukelus-nukleus helium-4. Helium radiogenik ini terperangkap dengan gas asli, dengan kepekatan sehingga 7% mengikut isipadu. Dari situ, ia diekstrak secara komersial melalui proses pemisahan bersuhu rendah yang dinamakan penyulingan berperingkat.", "gold_answer": "Kadar isipadamnya adalah 0.00052%.", "source_citation": "https://ms.wikipedia.org/?curid=56 (Wikipedia, CC BY-SA, article id 56)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_answer; REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-56-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana bahan yang diuraikan untuk menghasilkan helium ini berasal dari?", "gold_passage_id": "ms-wiki-56-2", "gold_passage_text": "Di Bumi, gas ini agak jarang, dengan kelimpahan dalam atmosfera bumi hanya sebanyak 0.00052% mengikut isipadu. Kebanyakan helium dari Bumi yang wujud pada hari ini dihasilkan melalui pereputan radioaktif unsur-unsur radioaktif yang berat (torium dan uranium). Zarah-zarah alfa yang dipancarkan dalam pereputan ini terdiri daripada nukelus-nukleus helium-4. Helium radiogenik ini terperangkap dengan gas asli, dengan kepekatan sehingga 7% mengikut isipadu. Dari situ, ia diekstrak secara komersial melalui proses pemisahan bersuhu rendah yang dinamakan penyulingan berperingkat.", "gold_answer": "Sebuah unsur radioaktif yang berat.", "source_citation": "https://ms.wikipedia.org/?curid=56 (Wikipedia, CC BY-SA, article id 56)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-57-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa jarak purata antara Bumi dengan Matahari?", "gold_passage_id": "ms-wiki-57-0", "gold_passage_text": "Matahari, mentari () atau suria merupakan bintang terdekat dengan Bumi dengan jarak purata sebanyak 149,680,000 kilometer (93,026,724 batu). Matahari dan lapan buah planet membentuk Sistem Suria. Matahari mempunyai garis pusatnya berukuran 1,391,980 kilometer atau 109 kali ganda Bumi dengan suhu permukaan 5,500&nbsp;°C dan suhu teras 15 juta °C. Matahari dikelaskan sebagai bintang kerdil jenis G. Cahaya dari matahari memakan masa 8 minit dan 20 saat untuk sampai ke Bumi dan cahaya yang terang ini boleh mengakibatkan sesiapa yang memandang terus kepada matahari menjadi buta.", "gold_answer": "149,680,000 kilometer", "source_citation": "https://ms.wikipedia.org/?curid=57 (Wikipedia, CC BY-SA, article id 57)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_answer; REPEATED_CHAR in gold_passage_text"}, {"id": "ms-wiki-57-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Adakah cahaya dari Matahari boleh menyebabkan buta jika seseorang memandang terus kepadanya?", "gold_passage_id": "ms-wiki-57-0", "gold_passage_text": "Matahari, mentari () atau suria merupakan bintang terdekat dengan Bumi dengan jarak purata sebanyak 149,680,000 kilometer (93,026,724 batu). Matahari dan lapan buah planet membentuk Sistem Suria. Matahari mempunyai garis pusatnya berukuran 1,391,980 kilometer atau 109 kali ganda Bumi dengan suhu permukaan 5,500&nbsp;°C dan suhu teras 15 juta °C. Matahari dikelaskan sebagai bintang kerdil jenis G. Cahaya dari matahari memakan masa 8 minit dan 20 saat untuk sampai ke Bumi dan cahaya yang terang ini boleh mengakibatkan sesiapa yang memandang terus kepada matahari menjadi buta.", "gold_answer": "Ya, cahaya yang terang ini boleh mengakibatkan sesiapa yang memandang terus kepada matahari menjadi buta.", "source_citation": "https://ms.wikipedia.org/?curid=57 (Wikipedia, CC BY-SA, article id 57)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-57-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah lama waktu yang diperlukan untuk satu putaran putaran bumi oleh matahari?", "gold_passage_id": "ms-wiki-57-2", "gold_passage_text": "Matahari berputar selama 25.04 hari bumi setiap putaran dan mempunyai graviti 27.9 kali lebih kuat daripada graviti bumi. Terdapat julangan gas teramat panas yang boleh menjangkau sehingga sejauh 100,000 kilometer ke angkasa. Marakan matahari ini boleh mengganggu gelombang komunikasi seperti radio, televisyen dan radar di bumi dan mampu merosakkan satelit atau stesen angkasa yang tidak dilindungi. Matahari juga menghasilkan gelombang-gelombang radio, ultraungu, sinar inframerah, sinar-X, dan angin suria yang merebak ke seluruh Sistem Suria.", "gold_answer": "25.04 hari.", "source_citation": "https://ms.wikipedia.org/?curid=57 (Wikipedia, CC BY-SA, article id 57)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-57-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berap kali lebih kuat graviti matahari berbanding graviti bumi?", "gold_passage_id": "ms-wiki-57-2", "gold_passage_text": "Matahari berputar selama 25.04 hari bumi setiap putaran dan mempunyai graviti 27.9 kali lebih kuat daripada graviti bumi. Terdapat julangan gas teramat panas yang boleh menjangkau sehingga sejauh 100,000 kilometer ke angkasa. Marakan matahari ini boleh mengganggu gelombang komunikasi seperti radio, televisyen dan radar di bumi dan mampu merosakkan satelit atau stesen angkasa yang tidak dilindungi. Matahari juga menghasilkan gelombang-gelombang radio, ultraungu, sinar inframerah, sinar-X, dan angin suria yang merebak ke seluruh Sistem Suria.", "gold_answer": "27.9 kali.", "source_citation": "https://ms.wikipedia.org/?curid=57 (Wikipedia, CC BY-SA, article id 57)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-58-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang menyebabkan heliosfera terbentuk dan terletak di mana?", "gold_passage_id": "ms-wiki-58-0", "gold_passage_text": "Angin suria, iaitu aliran plasma dari Matahari, menciptakan gelembung pada medium interstelar yang dikenali sebagai heliosfera, iaitu melangkau diluar kepada tepian cakera terserak. Awan Oort, yang dipercayai menjadi sumber untuk komet jangka-panjang, mungkin juga wujud pada jarak secara kasarnya beribu kali lebih jauh dari heliosfera. Heliopaus merupakan poin iaitu tekanan dari angin suria disamakan kepada tekanan bertentangan dari angin interstelar. Sistem Suria terletak didalam satu dari tangan luar galaksi Bima Sakti, iaitu mengandungi sekitar 200 bilion bintang.", "gold_answer": "Heliosfera terbentuk akibat aliran plasma angin suria dan melangkau diluar kepada tepian cakera terserak.", "source_citation": "https://ms.wikipedia.org/?curid=58 (Wikipedia, CC BY-SA, article id 58)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-
