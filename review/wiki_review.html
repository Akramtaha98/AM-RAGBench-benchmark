: "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-78-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa komet mengambil masa beribu-ribu tahun untuk menyelesaikan satu kali orbit mengelilingi Matahari?", "gold_passage_id": "ms-wiki-78-1", "gold_passage_text": "Komet memiliki orbit atau lintasan yang berbentuk membujur, lebih lonjong dan panjang daripada orbit planet lalu menempuh jarak lebih jauh di luar angkasa daripada planet; bahkan ada daripada jasad-jasad ini mengambil masa beribu-ribu tahun untuk menyelesaikan satu kali orbit mengelilingi Matahari. Sesetengah akan terlalu hampir dengan matahari lalu terbakar musnah, manakala yang lain terkeluar dari sistem suria buat selama-lamanya. Kadang-kala, komet ini ditarik oleh graviti dan jatuh ke Bumi, Bulan, atau planet-planet yang lain.", "gold_answer": "Bagi komet, kuantiti masa yang diperlukan untuk menyelesaikan satu kali orbit mengelilingi Matahari berbeza-beda bergantung kepada jaraknya terhadap matahari; beberapa komet mengambil masa beribu-ribu tahun.", "source_citation": "https://ms.wikipedia.org/?curid=78 (Wikipedia, CC BY-SA, article id 78)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-78-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana hubungan antara lintasan komet yang membujur dengan orbit planet?", "gold_passage_id": "ms-wiki-78-1", "gold_passage_text": "Komet memiliki orbit atau lintasan yang berbentuk membujur, lebih lonjong dan panjang daripada orbit planet lalu menempuh jarak lebih jauh di luar angkasa daripada planet; bahkan ada daripada jasad-jasad ini mengambil masa beribu-ribu tahun untuk menyelesaikan satu kali orbit mengelilingi Matahari. Sesetengah akan terlalu hampir dengan matahari lalu terbakar musnah, manakala yang lain terkeluar dari sistem suria buat selama-lamanya. Kadang-kala, komet ini ditarik oleh graviti dan jatuh ke Bumi, Bulan, atau planet-planet yang lain.", "gold_answer": "Orbit komet berbentuk membujur, lebih lonjong dan panjang, berbeza dengan orbit planet.", "source_citation": "https://ms.wikipedia.org/?curid=78 (Wikipedia, CC BY-SA, article id 78)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-78-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapa banyak komet telah dikenalpasti?", "gold_passage_id": "ms-wiki-78-2", "gold_passage_text": "Sebanyak lebih 4595 buah komet dapat dikenalpasti , namun ia hanya sebilangan kecil yang dapat perhatikan dari kira-kira satu trilion unit yang dikirakan boleh wujud menjangkaui luar Sistem Suria terutamanya di awan Oort.", "gold_answer": "Lebih daripada 4595 buah.", "source_citation": "https://ms.wikipedia.org/?curid=78 (Wikipedia, CC BY-SA, article id 78)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-78-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah jumlah komet yang kira-kira boleh wujud menjangkaui luar Sistem Suria?", "gold_passage_id": "ms-wiki-78-2", "gold_passage_text": "Sebanyak lebih 4595 buah komet dapat dikenalpasti , namun ia hanya sebilangan kecil yang dapat perhatikan dari kira-kira satu trilion unit yang dikirakan boleh wujud menjangkaui luar Sistem Suria terutamanya di awan Oort.", "gold_answer": "Kira-kira satu trilion unit.", "source_citation": "https://ms.wikipedia.org/?curid=78 (Wikipedia, CC BY-SA, article id 78)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-79-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa ciri-ciri utama yang disebutkan dalam teks untuk menghafal sesuatu yang dikategorikan sebagai haiwan?", "gold_passage_id": "ms-wiki-79-0", "gold_passage_text": "Haiwan () atau binatang () ialah sekelompok besar organisma eukariot multisel yang tergolong dalam alam Animalia atau Metazoa. Hampir semuanya dengan seberapa pengecualian, memakan bahan organik, menghirup oksigen, mempunyai myosit dan mampu bergerak, dapat membiak secara seksual, dan tumbuh dari sfera kosong sel, blastula, semasa perkembangan embrio. Haiwan disusun lanjut dalam klad yakni senenek moyang yang sama.", "gold_answer": "Memakan bahan organik, menghirup oksigen, mempunyai myosit, mampu bergerak, dapat membiak secara seksual, dan tumbuh dari sfera kosong sel, blastula, semasa perkembangan embrio.", "source_citation": "https://ms.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-79-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Sebahagian besar filum haiwan yang diketahui termasuk kordata, arthropod, dan moluska apa?", "gold_passage_id": "ms-wiki-79-1", "gold_passage_text": "Sebahagian besar filum haiwan yang diketahui, seperti kordata, arthropod, dan moluska, muncul dalam rekod fosil sebagai spesies marin semasa ledakan Cambrian sekitar 542 juta tahun yang lalu.", "gold_answer": "Kordata, arthropod, dan moluska.", "source_citation": "https://ms.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-79-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa manusia memanfaatkan banyak spesies hewan lain selain makanan dan bahan?", "gold_passage_id": "ms-wiki-79-2", "gold_passage_text": "Manusia memanfaatkan banyak spesies haiwan lain, seperti makanan (termasuk daging, susu, dan telur), untuk bahan (seperti kulit dan bulu), sebagai haiwan peliharaan, dan sebagai haiwan yang berfungsi termasuk untuk pengangkutan.", "gold_answer": "Sebagian dari spesies hewan yang dimanfaatkan oleh manusia berfungsi sebagai pengangkutan.", "source_citation": "https://ms.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-79-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Contoh hewan apa saja yang dimanfaatkan manusia untuk bahan dan sebagai hewan peliharaan?", "gold_passage_id": "ms-wiki-79-2", "gold_passage_text": "Manusia memanfaatkan banyak spesies haiwan lain, seperti makanan (termasuk daging, susu, dan telur), untuk bahan (seperti kulit dan bulu), sebagai haiwan peliharaan, dan sebagai haiwan yang berfungsi termasuk untuk pengangkutan.", "gold_answer": "Manusia memanipulasikan hewan seperti hewan peliharaan dan hewan yang berfungsi termasuk untuk pengangkutan, serta hewan yang digunakan sebagai bahan (seperti kulit dan bulu) dan hewan yang dijadikan makanan (termasuk daging, susu, dan telur).", "source_citation": "https://ms.wikipedia.org/?curid=79 (Wikipedia, CC BY-SA, article id 79)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-80-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan maklumat dalam teks, burung mana yang diklasifikasikan dalam kelas Aves?", "gold_passage_id": "ms-wiki-80-0", "gold_passage_text": "Burung () merupakan haiwan vertebrata bersayap, berkaki dua, berdarah panas dan bertelur; pelbagai spesiesnya dalam kelas Aves yang besar dan terdapat di serata dunia dari kawasan gurun sehinggalah di Kutub Utara, juga di kawasan hutan hujan Amazon, dan Greenland. Terdapat lebih daripada 11,000 spesies burung yang dikenal pasti dan dibahagikan kepada 44 order. Selain itu, terdapat banyak subspesies yang jika dikira berserta dengan spesies yang diketahui mengandungi lebih 3,200 jenis.", "gold_answer": "Pelbagai spesies burung dalam kelas Aves.", "source_citation": "https://ms.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-80-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana burung dapat ditemui di seluruh dunia mengikut teks?", "gold_passage_id": "ms-wiki-80-0", "gold_passage_text": "Burung () merupakan haiwan vertebrata bersayap, berkaki dua, berdarah panas dan bertelur; pelbagai spesiesnya dalam kelas Aves yang besar dan terdapat di serata dunia dari kawasan gurun sehinggalah di Kutub Utara, juga di kawasan hutan hujan Amazon, dan Greenland. Terdapat lebih daripada 11,000 spesies burung yang dikenal pasti dan dibahagikan kepada 44 order. Selain itu, terdapat banyak subspesies yang jika dikira berserta dengan spesies yang diketahui mengandungi lebih 3,200 jenis.", "gold_answer": "Di serata dunia dari kawasan gurun sehinggalah di Kutub Utara, juga di kawasan hutan hujan Amazon, dan Greenland.", "source_citation": "https://ms.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text"}, {"id": "ms-wiki-80-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa kadar suhu badan burung yang tetap seperti yang dinyatakan dalam teks?", "gold_passage_id": "ms-wiki-80-1", "gold_passage_text": "Burung merupakan homoioterma, berdarah panas, dengan suhu tetap 40-44&nbsp;°C. Tulang burung adalah ringan dan berongga di kebanyakan tempat untuk mengurangkan ketumpatan dan beratnya. Semua burung mempunyai paruh, yang berbeza hanyalah bentuk dan saiz paruh mereka. Kebanyakan burung mempunyai bulu pelepah kecuali sedikit yang tidak mempunyai bulu pelepah. Burung jenis teropod dipercayai berevolusi daripada reptilia, seperti dinosaur, yang hidup kira-kira 180 juta tahun yang lampau. Burung berubah dan kehilangan gigi dan ciri reptilia yang lain, semasa mengalami proses evolusi yang mengambil masa berjuta-juta tahun. Pada masa yang sama, bulu pelepah tumbuh pada ekornya dan sayapnya.", "gold_answer": "40-44 °C.", "source_citation": "https://ms.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-80-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengana burung teropod dipercayai berasal daripada kelompok vertebrata yang mana?", "gold_passage_id": "ms-wiki-80-1", "gold_passage_text": "Burung merupakan homoioterma, berdarah panas, dengan suhu tetap 40-44&nbsp;°C. Tulang burung adalah ringan dan berongga di kebanyakan tempat untuk mengurangkan ketumpatan dan beratnya. Semua burung mempunyai paruh, yang berbeza hanyalah bentuk dan saiz paruh mereka. Kebanyakan burung mempunyai bulu pelepah kecuali sedikit yang tidak mempunyai bulu pelepah. Burung jenis teropod dipercayai berevolusi daripada reptilia, seperti dinosaur, yang hidup kira-kira 180 juta tahun yang lampau. Burung berubah dan kehilangan gigi dan ciri reptilia yang lain, semasa mengalami proses evolusi yang mengambil masa berjuta-juta tahun. Pada masa yang sama, bulu pelepah tumbuh pada ekornya dan sayapnya.", "gold_answer": "Dari reptilia, seperti dinosaur.", "source_citation": "https://ms.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-80-1-q2", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana ciri cipta bulu pada burung berubah semasa melalui proses evolusi?", "gold_passage_id": "ms-wiki-80-1", "gold_passage_text": "Burung merupakan homoioterma, berdarah panas, dengan suhu tetap 40-44&nbsp;°C. Tulang burung adalah ringan dan berongga di kebanyakan tempat untuk mengurangkan ketumpatan dan beratnya. Semua burung mempunyai paruh, yang berbeza hanyalah bentuk dan saiz paruh mereka. Kebanyakan burung mempunyai bulu pelepah kecuali sedikit yang tidak mempunyai bulu pelepah. Burung jenis teropod dipercayai berevolusi daripada reptilia, seperti dinosaur, yang hidup kira-kira 180 juta tahun yang lampau. Burung berubah dan kehilangan gigi dan ciri reptilia yang lain, semasa mengalami proses evolusi yang mengambil masa berjuta-juta tahun. Pada masa yang sama, bulu pelepah tumbuh pada ekornya dan sayapnya.", "gold_answer": "Burung kehilangan gigi dan ciri reptilia lain, sambil tumbuh bulu pada ekornya dan sayapnya.", "source_citation": "https://ms.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-80-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah spesies burung yang dibolehkan untuk terbang?", "gold_passage_id": "ms-wiki-80-2", "gold_passage_text": "Banyak burung mampu terbang kecuali beberapa spesies seperti burung unta, emu, kiwi dan penguin. Kesemua burung mempunyai sayap walaupun pada burung yang tidak dapat terbang, sungguhpun ia mungkin kecil dan tidak berguna. Burung boleh mengeluarkan telur. Pada kebiasaannya burung betina akan mengeram telur, kadangkala kedua-dua pasangan akan bergilir, dan dalam sesetengah spesies burung hanya burung jantan yang akan mengeramkan telur tersebut. Terdapat juga spesies burung yang bertelur dalam sarang burung lain untuk dieramkan oleh keluarga burung angkat.", "gold_answer": "Sebilangan spesies burung lain selain burung unta, emu, kiwi dan penguin.", "source_citation": "https://ms.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-80-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana sikap burung betina dalam menggendal telur?", "gold_passage_id": "ms-wiki-80-2", "gold_passage_text": "Banyak burung mampu terbang kecuali beberapa spesies seperti burung unta, emu, kiwi dan penguin. Kesemua burung mempunyai sayap walaupun pada burung yang tidak dapat terbang, sungguhpun ia mungkin kecil dan tidak berguna. Burung boleh mengeluarkan telur. Pada kebiasaannya burung betina akan mengeram telur, kadangkala kedua-dua pasangan akan bergilir, dan dalam sesetengah spesies burung hanya burung jantan yang akan mengeramkan telur tersebut. Terdapat juga spesies burung yang bertelur dalam sarang burung lain untuk dieramkan oleh keluarga burung angkat.", "gold_answer": "Secara kebiasaannya burung betina akan mengeram telur, dengan ketiadaan burung jantan hanya jika dalam sesetengah spesies.", "source_citation": "https://ms.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-81-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapa banyak spesies mamalia yang dikira sebagai wujud dan diapakah mereka telah dibahagikan kepada order?", "gold_passage_id": "ms-wiki-81-1", "gold_passage_text": "Kira-kira 6,400 spesies mamalia yang masih wujud telah digambarkan dan dibahagikan kepada 29 order. Order yang paling besar ialah rodensia, kelawar dan Eulipotyphla (landak susu, tikus mondok, tikus kesturi, dan lain-lain); tiga order besar yang seterusnya ialah Primat (termasuk manusia, mawas, monyet dan lain-lain), Artiodactyla (setasea dan lain-lain), dan Carnivora (kucing, anjing, anjing laut dan lain-lain).", "gold_answer": "6,400 spesies dan mereka telah digambarkan serta dibahagikan kepada 29 order.", "source_citation": "https://ms.wikipedia.org/?curid=81 (Wikipedia, CC BY-SA, article id 81)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-81-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang merupakan tiga order mamalia terbesar yang diuraikan dalam teks?", "gold_passage_id": "ms-wiki-81-1", "gold_passage_text": "Kira-kira 6,400 spesies mamalia yang masih wujud telah digambarkan dan dibahagikan kepada 29 order. Order yang paling besar ialah rodensia, kelawar dan Eulipotyphla (landak susu, tikus mondok, tikus kesturi, dan lain-lain); tiga order besar yang seterusnya ialah Primat (termasuk manusia, mawas, monyet dan lain-lain), Artiodactyla (setasea dan lain-lain), dan Carnivora (kucing, anjing, anjing laut dan lain-lain).", "gold_answer": "Rodensia, Primat, dan Artiodactyla.", "source_citation": "https://ms.wikipedia.org/?curid=81 (Wikipedia, CC BY-SA, article id 81)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-81-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa mamalia betina melahirkan dan menyusukan anak kecuali mamalia yang sangat primitif seperti platipus dan sesetengah tenggiling?", "gold_passage_id": "ms-wiki-81-2", "gold_passage_text": "* Mempunyai saraf tunjang.\n* Bertulang belakang.\n* Mempunyai jantung dengan 4 ruang.\n* Badan dilitupi oleh bulu. \n* Mempunyai cuping telinga. \n* Mempunyai kelenjar peluh.\n* Mamalia betina melahirkan dan menyusukan anak, kecuali mamalia yang sangat primitif seperti platipus dan sesetengah tenggiling.\n* Bernafas melalui peparu. \n* Berdarah panas (suhu badan tetap).", "gold_answer": "Mengikut teks, mamalia yang melahirkan dan menyusukan anak adalah jenis mamalia kecuali yang sangat primitif seperti platipus dan sesetengah tenggiling.", "source_citation": "https://ms.wikipedia.org/?curid=81 (Wikipedia, CC BY-SA, article id 81)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-81-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Adakah mamalia yang disebutkan mempunyai kelenjar peluh?", "gold_passage_id": "ms-wiki-81-2", "gold_passage_text": "* Mempunyai saraf tunjang.\n* Bertulang belakang.\n* Mempunyai jantung dengan 4 ruang.\n* Badan dilitupi oleh bulu. \n* Mempunyai cuping telinga. \n* Mempunyai kelenjar peluh.\n* Mamalia betina melahirkan dan menyusukan anak, kecuali mamalia yang sangat primitif seperti platipus dan sesetengah tenggiling.\n* Bernafas melalui peparu. \n* Berdarah panas (suhu badan tetap).", "gold_answer": "Ya, mamalia yang disebutkan mempunyai kelenjar peluh, dengan catatan yang sama berlaku untuk mamalia yang sangat primitif seperti platipus dan sesetengah tenggiling.", "source_citation": "https://ms.wikipedia.org/?curid=81 (Wikipedia, CC BY-SA, article id 81)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-82-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah bahasa yang digunakan untuk menuliskan teks ini?", "gold_passage_id": "ms-wiki-82-2", "gold_passage_text": "Terdapat juga istilah biram () dan leman (; daripada ) yang digunakan dalam penulisan hikayat-hikayat Melayu. Istilah leman kata yang asli sebelum terganti dengan gajah pinjaman Sanskrit.", "gold_answer": "Bahasa Malay", "source_citation": "https://ms.wikipedia.org/?curid=82 (Wikipedia, CC BY-SA, article id 82)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-83-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah spesies gajah yang menjadi perhatian dalam konteks ini?", "gold_passage_id": "ms-wiki-83-0", "gold_passage_text": "Gajah Asia (Elephas maximus) merupakan salah satu daripada tiga spesies gajah yang masih tinggal. Spesies ini dianggap terancam, dengan antara 25,600 dan 32,750 ekor yang masih hidup liar .", "gold_answer": "Gajah Asia atau Elephas maximus.", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-83-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa kiraan ekor gajah yang masih hidup liar menurut perkiraan yang diberikan?", "gold_passage_id": "ms-wiki-83-0", "gold_passage_text": "Gajah Asia (Elephas maximus) merupakan salah satu daripada tiga spesies gajah yang masih tinggal. Spesies ini dianggap terancam, dengan antara 25,600 dan 32,750 ekor yang masih hidup liar .", "gold_answer": "Terdapat antara 25.600 hingga 32.750 ekor gajah yang masih hidup liar.", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-83-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah spesies gajah Asia dianggap terancam?", "gold_passage_id": "ms-wiki-83-0", "gold_passage_text": "Gajah Asia (Elephas maximus) merupakan salah satu daripada tiga spesies gajah yang masih tinggal. Spesies ini dianggap terancam, dengan antara 25,600 dan 32,750 ekor yang masih hidup liar .", "gold_answer": "Karena jumlah populasi yang tersisa, antara 25.600 dan 32.750 ekor yang masih hidup liar.", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-83-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapa banyak spesies subspesies gajah yang disebut di dalam teks ini?", "gold_passage_id": "ms-wiki-83-1", "gold_passage_text": "Subspesies gajah Asia adalah seperti berikut :-\n* Gajah India - Elephas maximus indicus - Gajah Asia terbanyak\n* Gajah Sri Lanka - Elephas maximus maximus - Gajah Asia terbesar\n* Gajah Sumatera - Elephas maximus sumantrensis - Gajah di Pulau Sumatera\n* Gajah Borneo - Elephas maximus borneensis - Gajah Kerdil di Borneo\n* Gajah Malaysia - Elephas maximus hirsutus - Gajah di Malaysia", "gold_answer": "Lima, kerana subspesies yang disebut adalah Gajah India, Gajah Sri Lanka, Gajah Sumatera, Gajah Borneo, dan Gajah Malaysia.", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-83-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Manakah spesies gajah yang merupakan spesies paling banyak di seluruh dunia?", "gold_passage_id": "ms-wiki-83-1", "gold_passage_text": "Subspesies gajah Asia adalah seperti berikut :-\n* Gajah India - Elephas maximus indicus - Gajah Asia terbanyak\n* Gajah Sri Lanka - Elephas maximus maximus - Gajah Asia terbesar\n* Gajah Sumatera - Elephas maximus sumantrensis - Gajah di Pulau Sumatera\n* Gajah Borneo - Elephas maximus borneensis - Gajah Kerdil di Borneo\n* Gajah Malaysia - Elephas maximus hirsutus - Gajah di Malaysia", "gold_answer": "Gajah India (Elephas maximus indicus), kerana teks menyatakan bahawa ia adalah 'Gajah Asia terbanyak'.", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-83-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan isi bacaan, gajah mana yang lebih suka hidup bersendirian?", "gold_passage_id": "ms-wiki-83-2", "gold_passage_text": "Gajah betina dan anaknya hidup dalam kumpulan kecil manakala gajah jantan lebih suka hidup bersendirian. Gajah biasanya berehat ketika cuaca panas. Setiap kumpulan mempunyai kawasan mereka tersendiri untuk mencari makanan. Mereka suka berenang dan mandi di sungai.", "gold_answer": "Gajah jantan.", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-83-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa gajah betina dan anaknya hidup dalam kumpulan kecil?", "gold_passage_id": "ms-wiki-83-2", "gold_passage_text": "Gajah betina dan anaknya hidup dalam kumpulan kecil manakala gajah jantan lebih suka hidup bersendirian. Gajah biasanya berehat ketika cuaca panas. Setiap kumpulan mempunyai kawasan mereka tersendiri untuk mencari makanan. Mereka suka berenang dan mandi di sungai.", "gold_answer": "Sebab mereka hidup dalam kumpulan kecil.", "source_citation": "https://ms.wikipedia.org/?curid=83 (Wikipedia, CC BY-SA, article id 83)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-84-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama yang pernah digunakan untuk subspesies Gajah Malaysia?", "gold_passage_id": "ms-wiki-84-0", "gold_passage_text": "Gajah Malaysia atau dahulunya dikenali sebagai Elephas maximus hirsutus ialah subspesies Gajah Asia yang tinggal di Semenanjung Malaysia. Sekarang Gajah Malaysia diklasifikasikan sebagai sebahagian dari Gajah India (Elephas maximus indicus) kecuali Gajah Borneo.", "gold_answer": "Sebelum itu dikenali sebagai Elephas maximus hirsutus.", "source_citation": "https://ms.wikipedia.org/?curid=84 (Wikipedia, CC BY-SA, article id 84)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fin , "gold_passage_text": "Perbandingan gen menunjukkan bahawa orang utan Tapanuli terpisah daripada spesies Sumatera kira-kira 3.4 juta tahun dahulu. Orang utan Tapanuli berpisah dari orang utan Borneo jauh lebih lama, iaitu sekitar 670,000 tahun dahulu. Orang utan merupakan satu-satunya ahli yang masih wujud dalam subkeluarga Ponginae yang merangkumi spesies-spesies seperti tiga spesies pupus dalam genus Gigpantopithecus, termasuklah primat paling besar yang dikenali iaitu Gigantopithecus blacki. Leluhur sub.keluarga Ponginae berpisah dari salasilah mawas utama di Afrika pada 16 hingga 19 juta tahun dahulu lalu tersebar ke dalam Asia.", "gold_answer": "3.4 juta tahun dahulu.", "source_citation": "https://ms.wikipedia.org/?curid=85 (Wikipedia, CC BY-SA, article id 85)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text"}, {"id": "ms-wiki-85-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah spesies primat terbesar yang dikenali di dalam subkeluarga Ponginae menurut teks?", "gold_passage_id": "ms-wiki-85-1", "gold_passage_text": "Perbandingan gen menunjukkan bahawa orang utan Tapanuli terpisah daripada spesies Sumatera kira-kira 3.4 juta tahun dahulu. Orang utan Tapanuli berpisah dari orang utan Borneo jauh lebih lama, iaitu sekitar 670,000 tahun dahulu. Orang utan merupakan satu-satunya ahli yang masih wujud dalam subkeluarga Ponginae yang merangkumi spesies-spesies seperti tiga spesies pupus dalam genus Gigpantopithecus, termasuklah primat paling besar yang dikenali iaitu Gigantopithecus blacki. Leluhur sub.keluarga Ponginae berpisah dari salasilah mawas utama di Afrika pada 16 hingga 19 juta tahun dahulu lalu tersebar ke dalam Asia.", "gold_answer": "Gigantopithecus blacki.", "source_citation": "https://ms.wikipedia.org/?curid=85 (Wikipedia, CC BY-SA, article id 85)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text"}, {"id": "ms-wiki-85-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang dilakukan orang utan antara lain?", "gold_passage_id": "ms-wiki-85-2", "gold_passage_text": "Orang utan antara primat yang paling cerdas, dengan menggunakan pelbagai alat-alat canggih serta membina sarang tidur yang teliti daripada dahan ranting dan daun setiap malam. Orang utan banyak dikaji untuk kemampuan belajar, malah mungkin dapat membentuk budaya tersendiri dalam populasi. Kajian lapangan terhadap orang utan dimulakan oleh ahli primatologi Birutė Galdikas. Ketiga-tiga spesies orang utan dikira terancam genting. Antara ancaman terhadap populasi orang utan liar termasuk pemburuan haram, kemusnahan habitat dan perdagangan haiwan peliharaan haram. Terdapat beberapa pertubuhan pemuliharaan dan rehabilitasi yang berdedikasi terhadap kemandirian orang utan liar.", "gold_answer": "Menggunakan pelbagai alat-alat canggih, membina sarang tidur yang teliti daripada dahan ranting dan daun setiap malam.", "source_citation": "https://ms.wikipedia.org/?curid=85 (Wikipedia, CC BY-SA, article id 85)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-85-2-q2", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang dimaksudkan dengan ancaman terbesar terhadap populasi orang utan?", "gold_passage_id": "ms-wiki-85-2", "gold_passage_text": "Orang utan antara primat yang paling cerdas, dengan menggunakan pelbagai alat-alat canggih serta membina sarang tidur yang teliti daripada dahan ranting dan daun setiap malam. Orang utan banyak dikaji untuk kemampuan belajar, malah mungkin dapat membentuk budaya tersendiri dalam populasi. Kajian lapangan terhadap orang utan dimulakan oleh ahli primatologi Birutė Galdikas. Ketiga-tiga spesies orang utan dikira terancam genting. Antara ancaman terhadap populasi orang utan liar termasuk pemburuan haram, kemusnahan habitat dan perdagangan haiwan peliharaan haram. Terdapat beberapa pertubuhan pemuliharaan dan rehabilitasi yang berdedikasi terhadap kemandirian orang utan liar.", "gold_answer": "Kebanyakan ancaman seperti pemburuan haram, kemusnahan habitat, dan perdagangan haiwan peliharaan haram.", "source_citation": "https://ms.wikipedia.org/?curid=85 (Wikipedia, CC BY-SA, article id 85)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-87-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah wilayah yang ditempati spesies harimau yang diduduki di kawasan Mesopotamia dan Caucasus?", "gold_passage_id": "ms-wiki-87-1", "gold_passage_text": "Terdapat beberapa spesies harimau yang duduk di kawasan taiga Siberia, padang rumput terbuka, dan paya bakau tropika, antara lainnya. Harimau haiwan yang gemar bersendiri dan kuat mempertahankan kawasan wilayahnnya yang sangat luas untuk menampung keperluan memburu mangsanya. Konflik antara harimau dan manusia yang sering menceroboh kawasannya sering terjadi. Tiga daripada sembilan subspesies harimau moden sudah diisytiharkan pupus dan enam yang selebihnya dikenalpasti terancam akibat kemusnahan dan penyerpihan habitat, dan juga kegiatan memburu. Harimau yang pernah menduduki kawasan-kawasan seluas Mesopotamia dan Caucasus hingga Asia Selatan dan Timur, kini semakin berkurangan bilangannya. Walaupun semua spesies yang masih ada diberi perlindungan undang-undang, namun pemburuan, kemusnahan habitat dan kemurungan pembiakbakaan dalam tetap menjadi ancaman.", "gold_answer": "Kawasan Mesopotamia dan Caucasus hingga Asia Selatan dan Timur.", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-87-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa keanekaragaman spesies harimau semakin berkurang?", "gold_passage_id": "ms-wiki-87-1", "gold_passage_text": "Terdapat beberapa spesies harimau yang duduk di kawasan taiga Siberia, padang rumput terbuka, dan paya bakau tropika, antara lainnya. Harimau haiwan yang gemar bersendiri dan kuat mempertahankan kawasan wilayahnnya yang sangat luas untuk menampung keperluan memburu mangsanya. Konflik antara harimau dan manusia yang sering menceroboh kawasannya sering terjadi. Tiga daripada sembilan subspesies harimau moden sudah diisytiharkan pupus dan enam yang selebihnya dikenalpasti terancam akibat kemusnahan dan penyerpihan habitat, dan juga kegiatan memburu. Harimau yang pernah menduduki kawasan-kawasan seluas Mesopotamia dan Caucasus hingga Asia Selatan dan Timur, kini semakin berkurangan bilangannya. Walaupun semua spesies yang masih ada diberi perlindungan undang-undang, namun pemburuan, kemusnahan habitat dan kemurungan pembiakbakaan dalam tetap menjadi ancaman.", "gold_answer": "Berlebihnya ancaman seperti pemburuan, kemusnahan habitat, dan kemurungan pembiakbakaan.", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-87-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah harimau dikenali sebagai salah satu spesies megafauna berkarisma di dunia?", "gold_passage_id": "ms-wiki-87-2", "gold_passage_text": "Walau bagaimanapun, harimau tetap menjadi salah sejenis megafauna berkarisma yang paling terkenal di dunia. Harimau banyak memainkan peranan penting dalam mitos dan budaya rakyat, di samping masih mendapat tempat dalam bidang perfileman dan kesusasteraan moden. Lukisan harimau sering dijumpai pada bendera dan jata negara, sebagai maskot sukan, dan haiwan kebangsaan sebilangan negara Asia, termasuk Malaysia.", "gold_answer": "Harimau dianggap sebagai salah satu spesies megafauna berkarisma di dunia.", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-87-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Diantara sektor mana harimau masih memegang tempat yang mencabar dalam budaya dan kemasyarakatan?", "gold_passage_id": "ms-wiki-87-2", "gold_passage_text": "Walau bagaimanapun, harimau tetap menjadi salah sejenis megafauna berkarisma yang paling terkenal di dunia. Harimau banyak memainkan peranan penting dalam mitos dan budaya rakyat, di samping masih mendapat tempat dalam bidang perfileman dan kesusasteraan moden. Lukisan harimau sering dijumpai pada bendera dan jata negara, sebagai maskot sukan, dan haiwan kebangsaan sebilangan negara Asia, termasuk Malaysia.", "gold_answer": "Harimau mendapat tempat penting dalam bidang perfileman dan kesusasteraan moden, serta terus menjadi simbol nasional di Asia termasuk Malaysia.", "source_citation": "https://ms.wikipedia.org/?curid=87 (Wikipedia, CC BY-SA, article id 87)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-88-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah julat warna kepala Seladang jantan yang sangat tua?", "gold_passage_id": "ms-wiki-88-2", "gold_passage_text": "Seladang jantan dewasa berwarna antara perang gelap sehingga hampir hitam bagi Seladang yang amat tua. Bagaimanapun, bahagian atas kepala dari atas mata sehingga tengkuk berwarna kelabu atau kekadangnya putih kotor. Muncung Seladang jantan berwarna pucat, dengan bahagian bawah kakinya berwarna putih tulen. Bulu jantan yang tua sangat nipis pada bahagian belakangnya. Sebaliknya, warna Seladang betina dan anak lebih pucat dan kekadang mempunyai warna kuning keperang-perangan sedikit yang paling ketara bagi Seladang yang hidup di daerah kering dan terbuka. Tanduk Seladang berwarna hijau pucat atau kuning hampir pada sepanjangnya tetapi hujung tanduk berwarna hitam.", "gold_answer": "Perang gelap sehingga hampir hitam.", "source_citation": "https://ms.wikipedia.org/?curid=88 (Wikipedia, CC BY-SA, article id 88)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-88-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Menganaakah warna bulu jantan yang tua berubah pada bahagian belakangnya?", "gold_passage_id": "ms-wiki-88-2", "gold_passage_text": "Seladang jantan dewasa berwarna antara perang gelap sehingga hampir hitam bagi Seladang yang amat tua. Bagaimanapun, bahagian atas kepala dari atas mata sehingga tengkuk berwarna kelabu atau kekadangnya putih kotor. Muncung Seladang jantan berwarna pucat, dengan bahagian bawah kakinya berwarna putih tulen. Bulu jantan yang tua sangat nipis pada bahagian belakangnya. Sebaliknya, warna Seladang betina dan anak lebih pucat dan kekadang mempunyai warna kuning keperang-perangan sedikit yang paling ketara bagi Seladang yang hidup di daerah kering dan terbuka. Tanduk Seladang berwarna hijau pucat atau kuning hampir pada sepanjangnya tetapi hujung tanduk berwarna hitam.", "gold_answer": "Sangat nipis.", "source_citation": "https://ms.wikipedia.org/?curid=88 (Wikipedia, CC BY-SA, article id 88)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-89-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa banyak jalur putih terdapat pada Bendera Malaysia?", "gold_passage_id": "ms-wiki-89-0", "gold_passage_text": "Bendera Malaysia; () atau nama rasminya Jalur Gemilang (), mengandungi 14 jalur merah dan putih (melintang) yang sama lebar bermula dengan jalur merah yang melambangkan keberanian rakyat Malaysia yang tiada bandingnya terhadap negara ini, di sebelah atas bermula dari jalur putih kedua bersilang sehingga jalur putih yang terakhir melambangkan kesucian negara, tanda keanggotaan yang sama dalam persekutuan 13 buah negeri dan 1 Wilayah Persekutuan dan ianya menjadi simbol untuk 14 jalur pada Jalur Gemilang.", "gold_answer": "3", "source_citation": "https://ms.wikipedia.org/?curid=89 (Wikipedia, CC BY-SA, article id 89)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "VERY_SHORT_ANSWER"}, {"id": "ms-wiki-89-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa bahagian segi empat berwarna biru tua yang terletak di atas sebelah kiri jalur merah kelima itu?", "gold_passage_id": "ms-wiki-89-1", "gold_passage_text": "Bahagian segi empat (atau kanton) yang berwarna biru tua di atas sebelah kiri menegak dari atas hingga ke bawah jalur merah yang kelima itu melambangkan perpaduan rakyat Malaysia; kanton tersebut mengandungi anak bulan yang melambangkan agama Islam sebagai agama bagi Persekutuan (seperti yang telah tertakluk di dalam Perlembagaan Persekutuan Malaysia). Bintang pecah 14 itu melambangkan perpaduan 13 buah negeri dan Kerajaan Persekutuan. Warna kuning pada anak bulan dan bintang melambangkan warna diraja bagi Duli-duli Yang Maha Mulia Baginda Raja-raja Melayu.", "gold_answer": "Bahagian segi empat (atau kanton) yang menegak dari atas hingga ke bawah jalur merah yang kelima itu melambangkan perpaduan rakyat Malaysia.", "source_citation": "https://ms.wikipedia.org/?curid=89 (Wikipedia, CC BY-SA, article id 89)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-89-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang melambangkan agama Islam, atau agama bagi Persekutuan, di dalam kanton tersebut?", "gold_passage_id": "ms-wiki-89-1", "gold_passage_text": "Bahagian segi empat (atau kanton) yang berwarna biru tua di atas sebelah kiri menegak dari atas hingga ke bawah jalur merah yang kelima itu melambangkan perpaduan rakyat Malaysia; kanton tersebut mengandungi anak bulan yang melambangkan agama Islam sebagai agama bagi Persekutuan (seperti yang telah tertakluk di dalam Perlembagaan Persekutuan Malaysia). Bintang pecah 14 itu melambangkan perpaduan 13 buah negeri dan Kerajaan Persekutuan. Warna kuning pada anak bulan dan bintang melambangkan warna diraja bagi Duli-duli Yang Maha Mulia Baginda Raja-raja Melayu.", "gold_answer": "Anak bulan yang melambangkan agama Islam, kerana ia telah tertakluk di dalam Perlembagaan Persekutuan Malaysia.", "source_citation": "https://ms.wikipedia.org/?curid=89 (Wikipedia, CC BY-SA, article id 89)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-89-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah makna empat warna yang digambarkan dalam teks?", "gold_passage_id": "ms-wiki-89-2", "gold_passage_text": "Empat warna ini yang melambangkan keberanian, kesucian, perpaduan rakyat Malaysia, dan kemuliaan Duli-duli Yang Maha Mulia Raja-raja sebagai Ketua Agama dan Ketua Negeri bagi seluruh negeri di Malaysia.", "gold_answer": "Perayaan keberanian, kesucian, perpaduan rakyat Malaysia, dan kemuliaan Duli-duli Yang Maha Mulia Raja-raja sebagai Ketua Agama dan Ketua Negeri bagi seluruh negeri di Malaysia.", "source_citation": "https://ms.wikipedia.org/?curid=89 (Wikipedia, CC BY-SA, article id 89)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-89-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang dituntut untuk menjadi Ketua Agama dan Ketua Negeri bagi seluruh negeri di Malaysia?", "gold_passage_id": "ms-wiki-89-2", "gold_passage_text": "Empat warna ini yang melambangkan keberanian, kesucian, perpaduan rakyat Malaysia, dan kemuliaan Duli-duli Yang Maha Mulia Raja-raja sebagai Ketua Agama dan Ketua Negeri bagi seluruh negeri di Malaysia.", "gold_answer": "Raja-raja.", "source_citation": "https://ms.wikipedia.org/?curid=89 (Wikipedia, CC BY-SA, article id 89)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-90-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana ahli Tumbuhan mendefinisikan sempadan pentakrifannya berbanding definisi biasa tumbuhan?", "gold_passage_id": "ms-wiki-90-1", "gold_passage_text": "Kesulitan dalam penakrifan\nIstilah tumbuhan jauh lebih sukar untuk ditakrifkan dari anggapan biasa. Walaupun pakar botani menggambarkan Alam Tumbuhan, sempadan pentakrifan ahli Tumbuhan adalah lebih ketat dari definisi biasa tumbuhan. Kita cenderung untuk menganggap tumbuhan sebagai organisma multisel eukariotik yang biasanya tidak mempunyai organ deria atau pergerakan terkawal dan lengkap dengan akar, batang, dan daun. Bagaimanapun, secara botani hanya tumbuhan vaskular (vascular plant) mempunyai \"akar, batang, dan daun\", dan sesetengah tumbuhan vaskular, seperti tumbuhan kanivor dan pokok janggut nabi, tidak menepati istilah tersebut. Tetapi agar berlaku adil, tumbuhan vaskular adalah tumbuhan yang kita sering nampak setiap hari.", "gold_answer": "Sempadan pentakrifan ahli Tumbuhan adalah lebih ketat berbanding definisi biasa tumbuhan.", "source_citation": "https://ms.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-90-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Manakah jenis tumbuhan yang secara botani dikategorikan sebagai vaskular?", "gold_passage_id": "ms-wiki-90-1", "gold_passage_text": "Kesulitan dalam penakrifan\nIstilah tumbuhan jauh lebih sukar untuk ditakrifkan dari anggapan biasa. Walaupun pakar botani menggambarkan Alam Tumbuhan, sempadan pentakrifan ahli Tumbuhan adalah lebih ketat dari definisi biasa tumbuhan. Kita cenderung untuk menganggap tumbuhan sebagai organisma multisel eukariotik yang biasanya tidak mempunyai organ deria atau pergerakan terkawal dan lengkap dengan akar, batang, dan daun. Bagaimanapun, secara botani hanya tumbuhan vaskular (vascular plant) mempunyai \"akar, batang, dan daun\", dan sesetengah tumbuhan vaskular, seperti tumbuhan kanivor dan pokok janggut nabi, tidak menepati istilah tersebut. Tetapi agar berlaku adil, tumbuhan vaskular adalah tumbuhan yang kita sering nampak setiap hari.", "gold_answer": "Tumbuhan vaskular (vascular plant).", "source_citation": "https://ms.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-90-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa definisi yang diletakkan terhadap tumbuhan secara luas berdasarkan maklumat ini?", "gold_passage_id": "ms-wiki-90-2", "gold_passage_text": "Istilah tumbuhan yang lebih luas adalah semua autotrof (autotroph) — iaitu, yang menghasilkan makanannya sendiri daripada bahan mentah bukan organik dan cahaya matahari. Ini adalah istilah yang manusahabah, dan yang menumpukan kepada peranan biasa tumbuhan dalam sistem ekologi. Bagaimanapun terdapat fotoautotrof (photoautotrophs) dalam Prokaryote, khususnya bakteria photoautotrophik dan cyanobacteria. Tumbuhan memerlukan pelbagai nutrien penting yang disesuaikan dengan fasa pertumbuhan tumbuhan, seperti vitamin, mineral, hormon, dan lain-lain. Dalam pertanian komersil keperluan pemakanan tumbuhan dibekalkan oleh manusia melalui kejuruteraan bioteknologi, termasuk penggunaan baja.", "gold_answer": "Semua autotrof (autotroph), iaitu yang menghasilkan makanannya sendiri daripada bahan mentah bukan organik dan cahaya matahari.", "source_citation": "https://ms.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-90-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di dalam sistem ekologi, manakah peranan yang menumpuk kepada tumbuhan dalam konteks umum?", "gold_passage_id": "ms-wiki-90-2", "gold_passage_text": "Istilah tumbuhan yang lebih luas adalah semua autotrof (autotroph) — iaitu, yang menghasilkan makanannya sendiri daripada bahan mentah bukan organik dan cahaya matahari. Ini adalah istilah yang manusahabah, dan yang menumpukan kepada peranan biasa tumbuhan dalam sistem ekologi. Bagaimanapun terdapat fotoautotrof (photoautotrophs) dalam Prokaryote, khususnya bakteria photoautotrophik dan cyanobacteria. Tumbuhan memerlukan pelbagai nutrien penting yang disesuaikan dengan fasa pertumbuhan tumbuhan, seperti vitamin, mineral, hormon, dan lain-lain. Dalam pertanian komersil keperluan pemakanan tumbuhan dibekalkan oleh manusia melalui kejuruteraan bioteknologi, termasuk penggunaan baja.", "gold_answer": "Peranan tumbuhan dalam sistem ekologi yang menumpuk kepada peranan biasa tumbuhan.", "source_citation": "https://ms.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-92-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama英文名称 dan nama sains bagi pokok bunga teluki?", "gold_passage_id": "ms-wiki-92-0", "gold_passage_text": "Teluki () dikenali dalam bahasa Inggeris sebagai \"Carnation\", mempunyai nama sains Dianthus caryophyllus. Pokok bunga teluki adalah sejenis bunga iklim sederhana yang berasal dari kawasan Mediteranean.", "gold_answer": "Teluki dikenali dalam bahasa Inggeris sebagai 'Carnation' dan mempunyai nama sains 'Dianthus caryophyllus'.", "source_citation": "https://ms.wikipedia.org/?curid=92 (Wikipedia, CC BY-SA, article id 92)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-92-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Dari mana asal pokok bunga teluki dalam konteks teks ini?", "gold_passage_id": "ms-wiki-92-0", "gold_passage_text": "Teluki () dikenali dalam bahasa Inggeris sebagai \"Carnation\", mempunyai nama sains Dianthus caryophyllus. Pokok bunga teluki adalah sejenis bunga iklim sederhana yang berasal dari kawasan Mediteranean.", "gold_answer": "Pokok bunga teluki berasal dari kawasan Mediteranean.", "source_citation": "https://ms.wikipedia.org/?curid=92 (Wikipedia, CC BY-SA, article id 92)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-92-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana iklim di Tanah Tinggi Cameron mempengaruhi penanaman bunga teluki?", "gold_passage_id": "ms-wiki-92-1", "gold_passage_text": "Penanaman bunga teluki di Malaysia adalah tertumpu di kawasan dataran tinggi seperti di Tanah Tinggi Cameron. Di Tanah Tinggi Cameron iklimnya menyerupai iklim hawa sederhana (suhu maksimum sekitar 21&nbsp;°C) dan pokok bunga teluki boleh ditanam sepanjang tahun.", "gold_answer": "Iklimnya menyerupai iklim hawa sederhana dengan suhu maksimum sekitar 21°C, sehingga pokok bunga teluki boleh ditanam sepanjang tahun.", "source_citation": "https://ms.wikipedia.org/?curid=92 (Wikipedia, CC BY-SA, article id 92)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-92-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah jenis jenis pokok bunga teluki?", "gold_passage_id": "ms-wiki-92-2", "gold_passage_text": "Oleh kerana pokok bunga teluki mempunyai bunga yang berwarna-warni dan terang, pokok bunga teluki menjadi kegemaran ramai. Pokok bunga teluki tergolong dalam famili Caryophllaceae. Terdapat dua jenis pokok bunga teluki iaitu jenis satu bunga bagi setiap tangkai dan jenis `spray', banyak bunga bagi setiap tangkai.", "gold_answer": "Ada dua jenis pokok bunga teluki: jenis satu bunga bagi setiap tangkai dan jenis spray dengan banyak bunga bagi setiap tangkai.", "source_citation": "https://ms.wikipedia.org/?curid=92 (Wikipedia, CC BY-SA, article id 92)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-92-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa ramai menganggap pokok bunga teluki menjadi kegemaran?", "gold_passage_id": "ms-wiki-92-2", "gold_passage_text": "Oleh kerana pokok bunga teluki mempunyai bunga yang berwarna-warni dan terang, pokok bunga teluki menjadi kegemaran ramai. Pokok bunga teluki tergolong dalam famili Caryophllaceae. Terdapat dua jenis pokok bunga teluki iaitu jenis satu bunga bagi setiap tangkai dan jenis `spray', banyak bunga bagi setiap tangkai.", "gold_answer": "Ia menjadi kegemaran ramai kerana pokok bunga teluki mempunyai bunga yang berwarna-warni dan terang.", "source_citation": "https://ms.wikipedia.org/?curid=92 (Wikipedia, CC BY-SA, article id 92)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-94-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah jumlah nama botani yang digunakan untuk bunga raya dalam teks tersebut?", "gold_passage_id": "ms-wiki-94-0", "gold_passage_text": "Bunga raya (nama botani: Hibiscus rosa-sinensis)ialah spesies tumbuhan berbunga tropika genus Hibiscus dalam suku Hibisceae keluarga Malvaceae. Ia banyak ditanam sebagai tanaman hiasan di kawasan tropika dan subtropika, namun ia bertaburan asalnya di Vanuatu.", "gold_answer": "Satu, yaitu Hibiscus rosa-sinensis.", "source_citation": "https://ms.wikipedia.org/?curid=94 (Wikipedia, CC BY-SA, article id 94)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-94-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa makna khusus daripada julukan 'rosa-sinensis' bagi tumbuhan tersebut?", "gold_passage_id": "ms-wiki-94-1", "gold_passage_text": "Taksonomi\nHibiscus rosa-sinensis julung kali digambarkan pada 1753 oleh Carl Linnaeus dalam Species Plantarum. Julukan spesifiknya rosa-sinensis secara terus bermaksud \"mawar China\", sungguhpun tumbuhan ini tidak berkait dengan mawar betul mahupun datang dari China. Genus Hibiscus ada dalam suku Hibisceae dan subkeluarga Malvoideae keluarga Malvaceae.", "gold_answer": "Mewakili 'mawar China', walaupun tumbuhan ini tidak berkait dengan mawar sebenar atau berasal dari China", "source_citation": "https://ms.wikipedia.org/?curid=94 (Wikipedia, CC BY-SA, article id 94)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-94-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa ketinggian dan lebar daun yang dimiliki pokok bunga raya kecil atau renek?", "gold_passage_id": "ms-wiki-94-2", "gold_passage_text": "Pokok dan daun\nPokok bunga raya kecil atau renek berbelukar dengan daun malar hijau yang tumbuh 2.5–5 meter tinggi dan 1.5–3 m lebar. Ia ada akar tunjang yang bercabang. Batang pokoknya tegak, hijau, berbentuk silinder dan berdahan.", "gold_answer": "Ketinggiannya 2.5–5 meter dan lebarnya 1.5–3 meter.", "source_citation": "https://ms.wikipedia.org/?curid=94 (Wikipedia, CC BY-SA, article id 94)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-94-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama akar yang dimiliki pokok bunga raya kecil atau renek?", "gold_passage_id": "ms-wiki-94-2", "gold_passage_text": "Pokok dan daun\nPokok bunga raya kecil atau renek berbelukar dengan daun malar hijau yang tumbuh 2.5–5 meter tinggi dan 1.5–3 m lebar. Ia ada akar tunjang yang bercabang. Batang pokoknya tegak, hijau, berbentuk silinder dan berdahan.", "gold_answer": "Ia mempunyai akar tunjang yang bercabang.", "source_citation": "https://ms.wikipedia.org/?curid=94 (Wikipedia, CC BY-SA, article id 94)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-95-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah ciri utama tumbuhan yang tergolong dalam semua spesies anggerik?", "gold_passage_id": "ms-wiki-95-2", "gold_passage_text": "Semua spesies anggerik ialah tumbuhan saka dan herba tanpa struktur berkayu kekal. Pokok bunga anggerik boleh tumbuh mengikut dua corak:\n* monopodial: batang pokok tumbuh dari tunas tunggal, daun ditambah dari apeks tunas setiap tahun dan batang tumbuh panjang mengikutnya.\n* simpodial: satu batang belakang yang tua dan satu batang depan yang muda. Pokok menumbuhkan beberapa pucuk bersebelahan yang mencapai saiz tertentu, berbunga dan layu diganti.", "gold_answer": "Tumbuhan anggerik ialah tumbuhan saka dan herba tanpa struktur berkayu kekal.", "source_citation": "https://ms.wikipedia.org/?curid=95 (Wikipedia, CC BY-SA, article id 95)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-95-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana pokok bunga anggerik boleh tumbuh dan berkembang biak?", "gold_passage_id": "ms-wiki-95-2", "gold_passage_text": "Semua spesies anggerik ialah tumbuhan saka dan herba tanpa struktur berkayu kekal. Pokok bunga anggerik boleh tumbuh mengikut dua corak:\n* monopodial: batang pokok tumbuh dari tunas tunggal, daun ditambah dari apeks tunas setiap tahun dan batang tumbuh panjang mengikutnya.\n* simpodial: satu batang belakang yang tua dan satu batang depan yang muda. Pokok menumbuhkan beberapa pucuk bersebelahan yang mencapai saiz tertentu, berbunga dan layu diganti.", "gold_answer": "Pokok bunga anggerik boleh tumbuh mengikut dua corak: monopodial atau simpodial, di mana dalam corak monopodial batang tumbuh panjang mengikut tunas tunggal, dan dalam corak simpodial batang belakang tua dan batang depan muda.", "source_citation": "https://ms.wikipedia.org/?curid=95 (Wikipedia, CC BY-SA, article id 95)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-97-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa spesies tumbuhan yang termasuk dalam mawar atau ros?", "gold_passage_id": "ms-wiki-97-0", "gold_passage_text": "Mawar () atau ros () merupakan sejenis tumbuhan berbunga dan saka digolong dalam genus Rosa keluarga Rosaceae; Tanaman ini berasal dari kawasan subtropika Hemisfera Utara; sebahagian kecil spesies dari Asia Selatan dan sebahagian spesies besar mawar dari tanah besar China dan sebahagian spesies lainnya dari benua Eropah. \nIa sering ditanam sebagai hiasan.", "gold_answer": "Sejenis tumbuhan berbunga dan saka.", "source_citation": "https://ms.wikipedia.org/?curid=97 (Wikipedia, CC BY-SA, article id 97)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-97-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana sumber asal bagi beberapa jenis mawar dan jenis lainnya?", "gold_passage_id": "ms-wiki-97-0", "gold_passage_text": "Mawar () atau ros () merupakan sejenis tumbuhan berbunga dan saka digolong dalam genus Rosa keluarga Rosaceae; Tanaman ini berasal dari kawasan subtropika Hemisfera Utara; sebahagian kecil spesies dari Asia Selatan dan sebahagian spesies besar mawar dari tanah besar China dan sebahagian spesies lainnya dari benua Eropah. \nIa sering ditanam sebagai hiasan.", "gold_answer": "Dari kawasan subtropika Hemisfera Utara; Asia Selatan; tanah besar China; dan benua Eropah.", "source_citation": "https://ms.wikipedia.org/?curid=97 (Wikipedia, CC BY-SA, article id 97)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-97-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Kapan Bunga Mawar disebut sebagai bunga kebangsaan Persekutuan Tanah Melayu dan mengapa ia dikalahkan dari bunga-bunga lain oleh bunga raya pada tahun 1960?", "gold_passage_id": "ms-wiki-97-1", "gold_passage_text": "Bunga mawar adalah salah satu jenis pokok bunga yang telah lama dikenali oleh masyarakat Melayu. Ia disebut dalam Hikayat Bayan Budiman yang ditulis sekitar 1370-an. Bunga mawar berbau harum, biasanya mawar kampung mempunyai bau yang paling kuat. Dalam kebudayaan-kebudayaan Barat dan Melayu, bunga mawar melambangkan cinta. Bunga ini pernah dicadangkan sebagai bunga kebangsaan Persekutuan Tanah Melayu tidak lama selepas ia dimasyhurkan kemerdekaannya sebelum dikalahkan dari bunga-bunga lain oleh bunga raya pada 1960.", "gold_answer": "Bunga Mawar dicadangkan sebagai bunga kebangsaan Persekutuan Tanah Melayu tidak lama selepas ia dimasyhurkan kemerdekaannya. Bunga raya, yang lebih kuat daripada Mawar, akhirnya mengalahkan Mawar dalam pengaduan tersebut.", "source_citation": "https://ms.wikipedia.org/?curid=97 (Wikipedia, CC BY-SA, article id 97)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-97-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa zaman pertama yang memuatkan buku tentang Bunga Mawar yang dikaitkan dengan tokoh Hikayat Bayan Budiman?", "gold_passage_id": "ms-wiki-97-1", "gold_passage_text": "Bunga mawar adalah salah satu jenis pokok bunga yang telah lama dikenali oleh masyarakat Melayu. Ia disebut dalam Hikayat Bayan Budiman yang ditulis sekitar 1370-an. Bunga mawar berbau harum, biasanya mawar kampung mempunyai bau yang paling kuat. Dalam kebudayaan-kebudayaan Barat dan Melayu, bunga mawar melambangkan cinta. Bunga ini pernah dicadangkan sebagai bunga kebangsaan Persekutuan Tanah Melayu tidak lama selepas ia dimasyhurkan kemerdekaannya sebelum dikalahkan dari bunga-bunga lain oleh bunga raya pada 1960.", "gold_answer": "Buku tersebut disebut Hikayat Bayan Budiman, yang ditulis sekitar 1370-an.", "source_citation": "https://ms.wikipedia.org/?curid=97 (Wikipedia, CC BY-SA, article id 97)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-97-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama asal nama genus Rose yang telah dikembalikan kepada bahasa Latin?", "gold_passage_id": "ms-wiki-97-2", "gold_passage_text": "Taksonomi\nNama genus Rosa (yang diserap menjadi \"ros\" daripada perkataan rose dalam bahasa Inggeris) dijejak semula kepada bahasa Latin berasal daripada kata bahasa Yunani rhódon juga meminjam daripada kata bahasa Parsi Kuno tersebut.", "gold_answer": "Berdasarkan teks, nama genus Rose diambil dari perkataan English 'rose' dan kembali ke bahasa Latin.", "source_citation": "https://ms.wikipedia.org/?curid=97 (Wikipedia, CC BY-SA, article id 97)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-97-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana asal usul perkataan 'Rosa' dalam bahasa Latin menurut teks?", "gold_passage_id": "ms-wiki-97-2", "gold_passage_text": "Taksonomi\nNama genus Rosa (yang diserap menjadi \"ros\" daripada perkataan rose dalam bahasa Inggeris) dijejak semula kepada bahasa Latin berasal daripada kata bahasa Yunani rhódon juga meminjam daripada kata bahasa Parsi Kuno tersebut.", "gold_answer": "Perkataan 'Rosa' berasal dari kata Yunani 'rhódon' yang juga meminjam dari kata Parsi Kuno.", "source_citation": "https://ms.wikipedia.org/?curid=97 (Wikipedia, CC BY-SA, article id 97)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-99-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa buah belimbing perlu dibalut?", "gold_passage_id": "ms-wiki-99-1", "gold_passage_text": "Pembalutan belimbing\nBuah belimbing mempunyai kulit yang sangat lembut dan amat disukai oleh lalat buah (Bactocera carambolae). Sejenis lagi lalat buah dari spesies yang dipanggil sebagai Daucus sp. yang juga menyerang buah belimbing. Buah belimbing perlu dibalut bagi mengatasi masalah serangan lalat buah agar tidak dirosakkan dan boleh dijual untuk pasaran eksport atau pasaran domestik.", "gold_answer": "Untuk mengatasi serangan lalat buah sehingga buah tidak dirosakkan dan boleh dijual untuk pasaran eksport atau domestik.", "source_citation": "https://ms.wikipedia.org/?curid=99 (Wikipedia, CC BY-SA, article id 99)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-99-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Manakah jenis lalat buah yang menyerang buah belimbing?", "gold_passage_id": "ms-wiki-99-1", "gold_passage_text": "Pembalutan belimbing\nBuah belimbing mempunyai kulit yang sangat lembut dan amat disukai oleh lalat buah (Bactocera carambolae). Sejenis lagi lalat buah dari spesies yang dipanggil sebagai Daucus sp. yang juga menyerang buah belimbing. Buah belimbing perlu dibalut bagi mengatasi masalah serangan lalat buah agar tidak dirosakkan dan boleh dijual untuk pasaran eksport atau pasaran domestik.", "gold_answer": "Lalat buah dengan kulit yang sangat lembut, spesies Bactocera carambolae, dan sejenis lalat buah dari spesies Daucus sp.", "source_citation": "https://ms.wikipedia.org/?curid=99 (Wikipedia, CC BY-SA, article id 99)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-100-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah fungsi pokok yang ditunjukkan dalam perumpamaan petola dalam perumpamaan ini?", "gold_passage_id": "ms-wiki-100-0", "gold_passage_text": "Biji-biji jenis petola ini boleh diambil sebagai julap. Daun yang ditumbuk lumat boleh dilumur pada kawasan panas untuk merawat demam, malah air daunnya juga diminum oleh ibu yang bersalin.", "gold_answer": "Sebagai julap.", "source_citation": "https://ms.wikipedia.org/?curid=100 (Wikipedia, CC BY-SA, article id 100)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-100-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang boleh diminum air daun yang ditumbuk dalam perumpamaan ini?", "gold_passage_id": "ms-wiki-100-0", "gold_passage_text": "Biji-biji jenis petola ini boleh diambil sebagai julap. Daun yang ditumbuk lumat boleh dilumur pada kawasan panas untuk merawat demam, malah air daunnya juga diminum oleh ibu yang bersalin.", "gold_answer": "Ibu yang bersalin.", "source_citation": "https://ms.wikipedia.org/?curid=100 (Wikipedia, CC BY-SA, article id 100)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-101-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama botani bagi pepaya?", "gold_passage_id": "ms-wiki-101-0", "gold_passage_text": "Betik, katis, ketela, ketelah, ketalah, pepaya atau kepaya (nama botani: Carica papaya) merupakan spesies tumbuhan dalam genus Carica keluarga Caricaceae. Tumbuhan ini berasal dari Mexico Selatan dan Amerika Tengah, namun kini pokoknya ditanam di hampir semua negara beriklim tropika termasuk di Asia Tenggara.", "gold_answer": "Carica papaya", "source_citation": "https://ms.wikipedia.org/?curid=101 (Wikipedia, CC BY-SA, article id 101)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-101-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan maklumat yang diberikan, apa yang dihasilkan oleh pokok betik?", "gold_passage_id": "ms-wiki-101-1", "gold_passage_text": "Pokok betik menghasilkan buah yang boleh dimakan. Buah betik banyak dijual di pasar-pasar, termasuk pasar tani, dan pasar sayur. Pucuk, daun muda dan bunga betik sering dicelur untuk dijadikan ulam dan dimakan bersama sambal belacan. Pucuk muda betik berasa pahit, manakala buah muda betik jika dibuat halwa berasa masam-masam manis.", "gold_answer": "Buah yang boleh dimakan.", "source_citation": "https://ms.wikipedia.org/?curid=101 (Wikipedia, CC BY-SA, article id 101)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-102-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama saintifik untuk tumbuhan cempedak yang disebutkan dalam teks?", "gold_passage_id": "ms-wiki-102-0", "gold_passage_text": "Cempedak ( [cĕm.pĕ.dak]), campedak (dua-dua dalam ), tibadak (Jawi: , ) atau baroh (Jawi: , ) merupakan sejenis tumbuhan yang menghasilkan buah yang boleh dimakan, nama saintifiknya ialah Artocarpus integer. Buah cempedak banyak dijual di pasar-pasar termasuk pasar tani, dan pasar sayur. sinonim Artocarpus champeden (Thunb.) Merr., Artocarpus polyphema Pers.). Pokok cempedak turut diperkenalkan ke Queensland. Pokok cempedak cepat tumbuh, dan pokok bersaiz serdahana mampu menghasilkan buah yang banyak.", "gold_answer": "Artocarpus integer", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-102-2-q10", "language": "ms", "domain": "wikipedia_general", "question": "Apakah jenis daun yang dimiliki oleh pokok saka?", "gold_passage_id": "ms-wiki-102-2", "gold_passage_text": "Batang dan dedaun\nPokok ini merupakan pokok saka yang boleh mencapai ketinggian sehingga 20 meter. Ia mempunyai daun ringkas yang kebanyakkannya berbentuk elliptik. Bahagian bawah urat daun (midrib) biasanya dipenuhi dengan bulu-bulu halus. Pangkal daun berbentuk tirus hingga obtus manakala hujung daun kebanyakkannya berbentuk kupsidat", "gold_answer": "Daun ringkas", "source_citation": "https://ms.wikipedia.org/?curid=102 (Wikipedia, CC BY-SA, article id 102)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": ""}, {"id": "ms-wiki-102-2-q11", "language": "ms", "domain": "wikipedia_general", "question": "Apakah nama buah yang dimiliki oleh pokok saka?", "gold_passage_id": "ms-wiki-102-2", "gold_passage_text": "Batang dan dedaun\nPokok ini merupakan pokok saka yang boleh mencapai ketinggian sehingga 20 meter. Ia mempunyai daun ringkas yang kebanyakkannya berbentuk e
