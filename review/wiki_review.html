<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AM-RAGBench Review Tool -- Wikipedia</title>
<style>
  :root {
    --bg: #faf9f7; --card-bg: #fff; --border: #e2ddd5; --text: #2b2622;
    --muted: #8a8078; --accent: #7a5c3e; --green: #3f7d54; --yellow: #b8860b; --red: #b5443a;
    --green-bg: #eef6f0; --yellow-bg: #fdf6e4; --red-bg: #fbecea;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  header { position: sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--border); padding:14px 20px; }
  h1 { font-size:17px; margin:0 0 8px 0; font-weight:600; }
  .warn-banner { background:#fdf6e4; border:1px solid #e9d9a8; color:#7a5c00; font-size:13px; padding:8px 12px; border-radius:8px; margin-bottom:10px; display:none; }
  .warn-banner.show { display:block; }
  .stats { display:flex; gap:16px; font-size:13px; color:var(--muted); flex-wrap:wrap; align-items:center; }
  .stats b { color: var(--text); }
  .progress-bar { flex:1; min-width:140px; height:8px; background:#eee; border-radius:4px; overflow:hidden; display:flex; }
  .progress-bar div { height:100%; }
  .pb-approve { background: var(--green); } .pb-edit { background: var(--yellow); } .pb-reject { background: var(--red); }
  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center; }
  .controls button, .controls select, .controls input[type=text] {
    font-size:13px; padding:6px 10px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--text);
  }
  .controls button.active { background: var(--accent); color:#fff; border-color:var(--accent); }
  .controls input[type=text] { cursor:text; min-width:180px; }
  main { max-width:820px; margin:0 auto; padding:18px 20px 80px; }
  .card { background:var(--card-bg); border:1px solid var(--border); border-left:5px solid var(--border); border-radius:10px; padding:16px 18px; margin-bottom:14px; transition: border-color .15s; }
  .card.done-approve { border-left-color: var(--green); }
  .card.done-edit { border-left-color: var(--yellow); }
  .card.done-reject { border-left-color: var(--red); opacity:.6; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .badges { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .badge { font-size:11px; padding:2px 7px; border-radius:10px; font-weight:600; letter-spacing:.02em; }
  .badge-ar { background:#eef2fb; color:#3555a8; }
  .badge-ms { background:#fbeef2; color:#a83566; }
  .badge-flag { background:var(--red-bg); color:var(--red); }
  .id-text { font-size:11px; color:var(--muted); font-family: ui-monospace, Menlo, monospace; }
  .passage { background:#f6f3ee; border-radius:8px; padding:12px 14px; margin:8px 0; font-size:16px; line-height:1.7; max-height:280px; overflow-y:auto; white-space:pre-wrap; }
  .rtl { direction: rtl; text-align:right; font-family: "Geeza Pro", "Traditional Arabic", "Arial", sans-serif; }
  .qa { margin:10px 0; }
  .qa .label { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:2px; }
  .qa .val { font-size:15px; }
  .qa.rtl .val { font-size:16px; }
  .citation { font-size:12px; color:var(--muted); margin-top:8px; }
  .flags { font-size:12px; color:var(--red); margin-top:6px; }
  .actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .actions button { flex:0 0 auto; padding:7px 14px; font-size:13px; border-radius:7px; border:1px solid var(--border); background:#fff; cursor:pointer; font-weight:600; }
  .btn-approve.sel, .btn-approve:hover { background:var(--green-bg); border-color:var(--green); color:var(--green); }
  .btn-edit.sel, .btn-edit:hover { background:var(--yellow-bg); border-color:var(--yellow); color:var(--yellow); }
  .btn-reject.sel, .btn-reject:hover { background:var(--red-bg); border-color:var(--red); color:var(--red); }
  .edit-fields { display:none; margin-top:10px; border-top:1px dashed var(--border); padding-top:10px; }
  .edit-fields.show { display:block; }
  .edit-fields label { font-size:11px; text-transform:uppercase; color:var(--muted); display:block; margin:8px 0 3px; }
  .edit-fields textarea { width:100%; font-size:14px; padding:8px; border-radius:6px; border:1px solid var(--border); font-family:inherit; resize:vertical; }
  .edit-fields textarea.rtl { direction:rtl; text-align:right; }
  .kbd-hint { font-size:11px; color:var(--muted); margin-left:auto; }
  .export-bar { position:sticky; bottom:0; background:#fff; border-top:1px solid var(--border); padding:12px 20px; display:flex; gap:10px; align-items:center; justify-content:center; }
  .export-bar button { font-size:14px; font-weight:600; padding:9px 18px; border-radius:8px; border:none; background:var(--accent); color:#fff; cursor:pointer; }
  .export-bar button:hover { opacity:.9; }
  .export-bar .note { font-size:12px; color:var(--muted); }
  .empty-state { text-align:center; color:var(--muted); padding:60px 0; font-size:14px; }
</style>
</head>
<body>

<header>
  <h1>AM-RAGBench &mdash; Wikipedia Human Review</h1>
  <div class="warn-banner" id="warnBanner"></div>
  <div class="stats">
    <span><b id="statTotal">0</b> total</span>
    <span><b id="statDone">0</b> reviewed</span>
    <span style="color:var(--green)"><b id="statApprove">0</b> approve</span>
    <span style="color:var(--yellow)"><b id="statEdit">0</b> edit</span>
    <span style="color:var(--red)"><b id="statReject">0</b> reject</span>
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="controls">
    <button data-filter="all" class="filter-btn active">All</button>
    <button data-filter="ar" class="filter-btn">Arabic only</button>
    <button data-filter="ms" class="filter-btn">Malay only</button>
    <button data-filter="flagged" class="filter-btn">Flagged only</button>
    <button data-filter="unreviewed" class="filter-btn">Unreviewed only</button>
    <input type="text" id="searchBox" placeholder="Search question / answer / passage...">
    <span class="kbd-hint">Shortcuts: A = approve &nbsp; E = edit &nbsp; R = reject &nbsp; &darr;/&uarr; = next/prev card</span>
  </div>
</header>

<main id="cardContainer"></main>

<div class="export-bar">
  <button id="exportBtn">Export review CSV</button>
  <span class="note">Downloads a CSV in the exact format from_review_csv.py expects. Your progress also auto-saves in this browser.</span>
</div>

model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1250-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي عام توفي ابن خلدون وماذا كان هو حين وفاته؟", "gold_passage_id": "ar-wiki-1250-1", "gold_passage_text": "ولما تشققّت الدوّلةُ في الأندلس وبدأت بالسقوط على يد ملك قشتالة نزح منها الأمير أبو زكريا الحفصي سنة 620هـ المُوافقة لسنة 1223م وقصد إفريقية، وغادر معه بنو خلدون خوفاً من سوء العاقبة إذا سقطت إشبيلية بيد النصارى. وقد نَعَمَ بنو خلدون بالجاه والسعة في الدّولة الحفصية وعاشوا معارك الدّولة مع الخوارج عليها. أمّا والد ابن خلدون فقد زهد بالحياة السياسية والتجأ لحياة الدرس والعلم وبرز في الفقه وعلوم اللّغة ونظم الشِعر وبقي في علمه حتّى وفاته إبان الفناء الكبير أو الطاعون الجارف سنة 749هـ المُوافقة لسنة 1349م حينما كان ابن خلدون في الثامنة عشرة من عمره.", "gold_answer": "توفي ابن خلدون سنة 749هـ (أو 1349م)، وكان في الثامنة عشرة من عمره.", "source_citation": "https://ar.wikipedia.org/?curid=1250 (Wikipedia, CC BY-SA, article id 1250)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1250-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي مجالات دراسية كان ابن خلدون متخصصاً في البداية قبل أن يدرس الفلسفة والمنطق؟", "gold_passage_id": "ar-wiki-1250-2", "gold_passage_text": "نشأ ابن خلدون على تراث أسرته عريقة العلم؛ فدأب على الدراسة في حِجر أبيه الذي كان معلمه الأول، فقرأ القرآن وحفظه ودرس القراءت السبع والحديث والتفسير والفقه إضافةً للنحو واللّغة مستثمراً أساتذة تونس التي كانت من أبرز مراكز العلوم والآداب في بلاد المغرب. ذكر ابن خلدون أسماء شيوخه في كلِّ علمٍ واهتم بترجمة أعمالهم وتحدث عن بعض الكُتب التي درسها، ويبدو ممّا درسه أنّه تخصص بالفقه المالكي وعلم اللّغة والشعر قبل أن يدخل في الفلسفة والمنطق حتّى بلوغه. وبعدها انتشر الفناء الكبير أو ا ُ الْهَاشِمِيَّة) هي دولة عربية تقع في منطقة جنوب بلاد الشام غرب آسيا، تتوسط الشرق الأوسط بوقوعها في الجزء الجنوبي من منطقة بلاد الشام، والشمالي لمنطقة شبه الجزيرة العربية. تحدها سوريا من الشمال، وفلسطين (إسرائيل) والضفة الغربية من الغرب، والعراق من الشرق، وتحدها السعودية شرقًا وجنوبًا، كما تطل على خليج العقبة في الجنوب الغربي، حيث تطل مدينة العقبة على البحر الأحمر، ويعتبر هذا المنفذ البحري الوحيد للأردن. سميت بالأردن نسبة إلى نهر الأردن الذي يمر على حدودها الغربية.", "gold_answer": "الدولة الرسمية التي تسمى الأردن هي المملكة الأردنية الهاشمية.", "source_citation": "https://ar.wikipedia.org/?curid=1253 (Wikipedia, CC BY-SA, article id 1253)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1253-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الجبال الرئيسية الموجودة في الأردن وأين تتواجد كل منها؟", "gold_passage_id": "ar-wiki-1253-1", "gold_passage_text": "تعتبر الأردن بلدًا يجمع بين ثقافات ولهجات عربية مختلفة بشكل مُلفت، ولا تفصله أي حدود طبيعية عن جيرانه العرب سوى نهر الأردن ونهر اليرموك اللذين يشكلان على التوالي جزءًا من حدوده مع فلسطين وسوريا. أما باقي الحدود فهي امتداد لبادية الشام في الشمال والشرق وصحراء النفوذ في الجنوب، ووادي عربة إلى الجنوب الغربي. تتنوع التضاريس في الأردن بشكل كبير، وأهم جباله جبال عجلون في الشمال الغربي، وجبال الشراة في الجنوب، أعلى قمة تلك الموجودة على جبل أم الدامي على ارتفاع 1854 مترًا عن سطح البحر، وأخفض نقطة في البحر الميت والتي تعتبر أخفض نقطة في العالم.", "gold_answer": "الجبال الرئيسية في الأردن هي جبال عجلون التي تتواجد في الشمال الغربي وجبال الشراة في الجنوب.", "source_citation": "https://ar.wikipedia.org/?curid=1253 (Wikipedia, CC BY-SA, article id 1253)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by ha : "wikipedia_general", "question": "من هو أحد المطورين الرئيسيين للأنظمة التي تُمثل توزيعات لينكس؟", "gold_passage_id": "ar-wiki-1255-2", "gold_passage_text": "من أبرز توزيعات لينكس نجد منها دبيان وفيدورا وأوبونتو. والتوزيعات التجارية مثل ريدهات لينكس وسوزه لينكس. تتضمن توزيعات لينكس نظام نوافذ مثل إكس11 ووايلاند، بالإضافة إلى بيئات رسومية مثل جنوم وكدي بلازما، وكل بيئة تقدم أسلوبًا مختلفًا في الشكل والتفاعل، من البساطة الخفيفة إلى الواجهات الغنية بالتأثيرات.", "gold_answer": "دبيان، وفيدورا، وأوبونتو.", "source_citation": "https://ar.wikipedia.org/?curid=1255 (Wikipedia, CC BY-SA, article id 1255)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1255-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي البيئة الرسومية المعروفة باسم جنوم؟", "gold_passage_id": "ar-wiki-1255-2", "gold_passage_text": "من أبرز توزيعات لينكس نجد منها دبيان وفيدورا وأوبونتو. والتوزيعات التجارية مثل ريدهات لينكس وسوزه لينكس. تتضمن توزيعات لينكس نظام نوافذ مثل إكس11 ووايلاند، بالإضافة إلى بيئات رسومية مثل جنوم وكدي بلازما، وكل بيئة تقدم أسلوبًا مختلفًا في الشكل والتفاعل، من البساطة الخفيفة إلى الواجهات الغنية بالتأثيرات.", "gold_answer": "تقدم جنوم أسلوبًا مختلفًا في الشكل والتفاعل.", "source_citation": "https://ar.wikipedia.org/?curid=1255 (Wikipedia, CC BY-SA, article id 1255)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1256-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو معنى المصطلح 'المصدر المفتوح' كما تم ذكره في النص؟", "gold_passage_id": "ar-wiki-1256-0", "gold_passage_text": "[[ملف:Galaxy Nexus smartphone.jpg|تصغير|أندرويد أشهر نظام للهواتف المحمولة من الأنظمة ذات المصدر المفتوح]]\nالمصدر المفتوح هو مصطلح يع  "من هي الخريجين الرئيسيين الذين ابتكروا لغة C في المعامل (معامل بيل) التابعة لشركة (إيه تي أند تي)؟", "gold_passage_id": "ar-wiki-1256-1", "gold_passage_text": "نشوء الفكرة\nبدأت الفكرة بشكل غير مباشر في أوائل السبعينيات من (معامل بيل) في شركة (إيه تي أند تي) إذ ابتكر الباحثين ريتشي وكيرنان (لغة السي C). وفي ذات الوقت تقريباً، اُبتكر نظام التشغيل يونكس الذي خرج من تلك المعامل وقد اشترك في كتابته العالم ريتشي.", "gold_answer": "الباحثين ريتشي وكيرنان.", "source_citation": "https://ar.wikipedia.org/?curid=1256 (Wikipedia, CC BY-SA, article id 1256)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1256-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي المشكلة الرئيسية التي كانت واجهها أنظمة التشغيل في ذلك الوقت؟", "gold_passage_id": "ar-wiki-1256-2", "gold_passage_text": "في ذاك الوقت كانت نظم التشغيل دائماً ما تكتب بلغة التجميع، والمعروف أن لغة التجميع تختلف تماماً من معالج لآخر. أي أن البرنامج أو نظام التشغيل المكتوب بلغة الآلة للمعالج بنتيوم 4 مثلاً لن يعمل على معالج (Power PC) ولا غيره. وبالتالي لم تكن أنظمة التشغيل ولا البرامج في ذلك الوقت تتطور بسرعة.", "gold_answer": "أنظمة التشغيل لا تتطور بسرعة لأن البرامج المكتوبة بلغة التجميع تختلف تماماً من معالج لآخر، مما يمنعها من العمل على معالجين مختلفين مثل بولينج 4 و Power PC.", "source_citation": "https://ar.wikipedia.org/?curid=1256 (Wikipedia, CC BY-SA, article id 1256)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1256-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو السبب الذي أدى إلى عدم تطور أنظمة التشغيل و البرامج في ذلك الوقت؟", "gold_passage_id": "ar-wiki-1256-2", "gold_passage_text": "في ذاك الوقت كانت نظم التشغيل دائماً ما تكتب بلغة التجميع، والمعروف أن لغة التجميع تختلف تماماً من معالج لآخر. أي أن البرنامج أو نظام التشغيل المكتوب بلغة الآلة للمعالج بنتيوم 4 مثلاً لن يعمل على معالج (Power PC) ولا غيره. وبالتالي لم تكن أنظمة التشغيل ولا البرامج في ذلك الوقت تتطور بسرعة.", "gold_answer": "السبب كان أن لغة التجميع مختلفة تماماً عن كل معالج، لذا فإن البرنامج المكتوب بلغة الآلة لن يعمل إلا على جهاز معالج معين.", "source_citation": "https://ar.wikipedia.org/?curid=1256 (Wikipedia, CC BY-SA, article id 1256)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1270-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو هدف التطوير الأصلي لبرنامج الميدياويكي؟", "gold_passage_id": "ar-wiki-1270-0", "gold_passage_text": "ميدياويكي هو برنامج لإدارة مواقع الويكي مستخدم في كل مشاريع مؤسسة ويكيميديا، وكل الويكيات المستضافة في ويكيا، بالإضافة إلى مواقع أخرى كثيرة. طُوّر برنامج الميدياويكي في الأصل ليخدم احتياجات ويكيبيديا، الموسوعة الحرة، لكنه الآن يستخدم لإدارة المعرفة وإدارة المحتوى. والجدير بالذكر أن نوفل (Novell) تستعمل الميدياويكي لتشغيل العديد من مواقعها التي تتلقّى الكثير من الزيارات.", "gold_answer": "خدمة احتياجات ويكيبيديا، الموسوعة الحرة.", "source_citation": "https://ar.wikipedia.org/?curid=1270 (Wikipedia, CC BY-SA, article id 1270)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1270-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "أي شركات تستخدم الميدياويكي وتشغيل مواقعها؟", "gold_passage_id": "ar-wiki-1270-0", "gold_passage_text": "ميدياويكي هو برنامج لإدارة مواقع الويكي مستخدم في كل مشاريع مؤسسة ويكيميديا، وكل الويكيات المستضافة في ويكيا، بالإضافة إلى مواقع أخرى كثيرة. طُوّر برنامج الميدياويكي في الأصل ليخدم احتياجات ويكيبيديا، الموسوعة الحرة، لكنه الآن يستخدم لإدارة المعرفة وإدارة المحتوى. والجدير بالذكر أن نوفل (Novell) تستعمل الميدياويكي لتشغيل العديد من مواقعها التي تتلقّى الكثير من الزيارات.", "gold_answer": "نوفل (Novell).", "source_citation": "https://ar.wikipedia.org/?curid=1270 (Wikipedia, CC BY-SA, article id 1270)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1270-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي اللغة المستخدمة في برمجة ميدياويكي؟", "gold_passage_id": "ar-wiki-1270-1", "gold_passage_text": "اللغة المستخدمة في برمجة ميدياويكي هي بي إتش بي (PHP)، وهي متكاملة مع قواعد بيانات ماي إس كيو إل (MySQL) وبوستجري إس كيو إل (PostgreSQL). برنامج الميدياويكي منشور تحت رخصة جنو العمومية، وهو حر ومفتوح المصدر. وهو قادر على معالجات كميات كبيرة من البيانات قد تصلُ إلى تيرابايتات عدّة، وهو يتضمّن 900 خيار لتعديل الإعدادات وأكثر من 2,000 إضافة متوفرة مجاناً على الإنترنت لتزويده بميزات إضافية.", "gold_answer": "هي PHP، وهي متكاملة مع قواعد بيانات MySQL وPostgreSQL.", "source_citation": "https://ar.wikipedia.org/?curid=1270 (Wikipedia, CC BY-SA, article id 1270)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1270-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي خصائص البرنامج الميدياويكي؟", "gold_passage_id": "ar-wiki-1270-1", "gold_passage_text": "اللغة المستخدمة في برمجة ميدياويكي هي بي إتش بي (PHP)، وهي متكاملة مع قواعد بيانات ماي إس كيو إل (MySQL) وبوستجري إس كيو إل (PostgreSQL). برنامج الميدياويكي منشور تحت رخصة جنو العمومية، وهو حر ومفتوح المصدر. وهو قادر على معالجات كميات كبيرة من البيانات قد تصلُ إلى تيرابايتات عدّة، وهو يتضمّن 900 خيار لتعديل الإعدادات وأكثر من 2,000 إضافة متوفرة مجاناً على الإنترنت لتزويده بميزات إضافية.", "gold_answer": "هو منشور تحت رخصة الجنو العمومية، وهو حر ومفتوح المصدر، وقادر على معالجة تيرابايتات من البيانات، ويحتوي على 900 خيار لتعديل الإعدادات، 2000 إضافة مجانية، وتضمين 900 خيار لتعديل الإعدادات.", "source_citation": "https://ar.wikipedia.org/?curid=1270 (Wikipedia, CC BY-SA, article id 1270)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_answer; REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1270-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو الأصلية المؤلف الأصلي للبرنامج ويكيبيديا الحالي، وما هي صفة الواجهة الأصلية له؟", "gold_passage_id": "ar-wiki-1270-2", "gold_passage_text": "البرنامج الحالي من ميدياويكي كتب أصلا من أجل ويكيبيديا من قبل لي دانيل كروكر، وكانت الواجهة من تصميم ماجنس مانسكي. في الأصل كانت ويكيبيديا تستخدم محرك ويكي صغير يدعى يوزر مود ويكي (UserModWiki) وكان مكتوباً بلغة بيرل. فيما بعد تم الانتقال إلى برنامج مانسكي المبني على لغة بي إتش بي (PHP) لتقديم المزيد من الإضافات. لكن مع الاستخدام المتزايد الذي أدى إلى مشاكل في التحميل، قام دانيل كروكر بإعادة كتابة البرنامج مع قواعد بيانات ماي إس كيو إل (MySQL) قابلة للتوسيع.", "gold_answer": "كان المؤلف الأصلي لي دانيل كروكر، وكانت الواجهة من تصميم ماجنس مانسكي.", "source_citation": "https://ar.wikipedia.org/?curid=1270 (Wikipedia, CC BY-SA, article id 1270)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1270-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي التغييرات التقنية الرئيسية التي تمت في البرنامج مقارنة بالمرحلة الأصلية؟", "gold_passage_id": "ar-wiki-1270-2", "gold_passage_text": "البرنامج الحالي من ميدياويكي كتب أصلا من أجل ويكيبيديا من قبل لي دانيل كروكر، وكانت الواجهة من تصميم ماجنس مانسكي. في الأصل كانت ويكيبيديا تستخدم محرك ويكي صغير يدعى يوزر مود ويكي (UserModWiki) وكان مكتوباً بلغة بيرل. فيما بعد تم الانتقال إلى برنامج مانسكي المبني على لغة بي إتش بي (PHP) لتقديم المزيد من الإضافات. لكن مع الاستخدام المتزايد الذي أدى إلى مشاكل في التحميل، قام دانيل كروكر بإعادة كتابة البرنامج مع قواعد بيانات ماي إس كيو إل (MySQL) قابلة للتوسيع.", "gold_answer": "تم الانتقال من محرك ويكي صغير بلغة بيرل، إلى برنامج مبني على لغة PHP، وإلى قواعد بيانات ماي إس كيو إل (MySQL) قابلة للتوسعة.", "source_citation": "https://ar.wikipedia.org/?curid=1270 (Wikipedia, CC BY-SA, article id 1270)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1271-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما المعنى الدلالي للكلمة «ويكي» في لغة هاواي، ولماذا استخدمت برامج الويكي هذا المعنى؟", "gold_passage_id": "ar-wiki-1271-0", "gold_passage_text": "ويكي هو نوع من المواقع الإلكترونية يسمح للزوار بإضافة المحتويات وتعديلها دون أية قيود في الغالب، وقد تشير كلمة ويكي أيضًا إلى برامج الويكي المستخدمة في تشغيل هذا النوع من المواقع، تعني كلمة ويكي (/wiːkiː/) بلغة هاواي «بالغ السرعة»، وقد استخدمت هذه الكلمة لهذا النوع من أنظمة إدارة المحتوى للدلالة على السرعة والسهولة في تعديل محتويات المواقع.", "gold_answer": "معنى الكلمة هو «بالغة السرعة»، وتم استخدام هذا المعنى لتوضيح سهولة وتعديل المحتويات على أنظمة إدارة المحتوى.", "source_citation": "https://ar.wikipedia.org/?curid=1271 (Wikipedia, CC BY-SA, article id 1271)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1271-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي ميزة وظيفية للمواقع التي يملكها الزوار بناءً على وصف فيكي؟", "gold_passage_id": "ar-wiki-1271-0", "gold_passage_text": "ويكي هو نوع من المواقع الإلكترونية يسمح للزوار بإضافة المحتويات وتعديلها دون أية قيود في الغالب، وقد تشير كلمة ويكي أيضًا إلى برامج الويكي المستخدمة في تشغيل هذا النوع من المواقع، تعني كلمة ويكي (/wiːkiː/) بلغة هاواي «بالغ السرعة»، وقد استخدمت هذه الكلمة لهذا النوع من أنظمة إدارة المحتوى للدلالة على السرعة والسهولة في تعديل محتويات المواقع.", "gold_answer": "تم السماح للزوار بإضافة المحتويات وتعديلها دون قيود تقريباً.", "source_citation": "https://ar.wikipedia.org/?curid=1271 (Wikipedia, CC BY-SA, article id 1271)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1271-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي تاريخ ظهر أول موقع يُدعى «ويكي»؟", "gold_passage_id": "ar-wiki-1271-1", "gold_passage_text": "أول موقع أطلق عليه اسم «ويكي» ظهر في 25 مارس 1995 وهو موقع (بورتلاند باترن ريبوزيتوري Portland Pattern Repository) أي «مستودع بورتلاند للنماذج - أو للصيغ». وقد أنشأه وورد كانينغهام وهو الذي اختار لفظ «ويكي» لهذا النوع من المواقع، وفي أواخر التسعينيات من القرن الماضي ازداد استخدام برامج ويكي لإنشاء قواعد معلومات خاصة أو عامة، واليوم يعتبر القسم الإنجليزي من موسوعة ويكيبيديا أكبر موقع ويكي على شبكة الإنترنت. ويكي يتيح للمستخدمين إضافة أو تعديل أو حذف محتوياته عن طريق متصفح «ويب».", "gold_answer": "في 25 مارس 1995.", "source_citation": "https://ar.wikipedia.org/?curid=1271 (Wikipedia, CC BY-SA, article id 1271)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1271-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "من هو مؤسس الموقع الويكي واختار لكلمة «ويكي»؟", "gold_passage_id": "ar-wiki-1271-1", "gold_passage_text": "أول موقع أطلق عليه اسم «ويكي» ظهر في 25 مارس 1995 وهو موقع (بورتلاند باترن ريبوزيتوري Portland Pattern Repository) أي «مستودع بورتلاند للنماذج - أو للصيغ». وقد أنشأه وورد كانينغهام وهو الذي اختار لفظ «ويكي» لهذا النوع من المواقع، وفي أواخر التسعينيات من القرن الماضي ازداد استخدام برامج ويكي لإنشاء قواعد معلومات خاصة أو عامة، واليوم يعتبر القسم الإنجليزي من موسوعة ويكيبيديا أكبر موقع ويكي على شبكة الإنترنت. ويكي يتيح للمستخدمين إضافة أو تعديل أو حذف محتوياته عن طريق متصفح «ويب».", "gold_answer": "ورد كانينغهام.", "source_citation": "https://ar.wikipedia.org/?curid=1271 (Wikipedia, CC BY-SA, article id 1271)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1271-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الطريقة التي يتلقاها الزائر عند استخدام برامج وكي للتعديل على مواضيع الموقع؟", "gold_passage_id": "ar-wiki-1271-2", "gold_passage_text": "تتيح برامج الويكي للزوار أن يحرروا مواضيع الموقع جماعيًا وبلغة ترميز بسيطة وباستخدام المتصفح. ما يميز مواقع الويكي بشكل عام هو سهولة إنشاء مواضيع جديدة أو تحديث مواضيع قديمة وتعديلها دون الحاجة إلى وجود رقابة توافق على إنشاء الصفحات أو تعديلها عادةً، وبعض مواقع الويكي لا تتطلب حتى تسجيل الدخول في الموقع لإنشاء أو تعديل مواضيع فيها مميزات إضافية.", "gold_answer": "يتمتع الزائر بالحرية لإدخال الموضوعات جماعيًا بلغة ترميز بسيطة وبشكل بسيط باستخدام المتصفح.", "source_citation": "https://ar.wikipedia.org/?curid=1271 (Wikipedia, CC BY-SA, article id 1271)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1271-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو أحد المميزات الإضافية التي تقدمها بعض مواقع الويكي؟", "gold_passage_id": "ar-wiki-1271-2", "gold_passage_text": "تتيح برامج الويكي للزوار أن يحرروا مواضيع الموقع جماعيًا وبلغة ترميز بسيطة وباستخدام المتصفح. ما يميز مواقع الويكي بشكل عام هو سهولة إنشاء مواضيع جديدة أو تحديث مواضيع قديمة وتعديلها دون الحاجة إلى وجود رقابة توافق على إنشاء الصفحات أو تعديلها عادةً، وبعض مواقع الويكي لا تتطلب حتى تسجيل الدخول في الموقع لإنشاء أو تعديل مواضيع فيها مميزات إضافية.", "gold_answer": "تتطلب بعض مواقع الويكي حتى تسجيل الدخول في الموقع لإنشاء أو تعديل مواضيع فيها.", "source_citation": "https://ar.wikipedia.org/?curid=1271 (Wikipedia, CC BY-SA, article id 1271)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1275-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو النظام التشغيل الذي يتم تعريفه في النص، وما هي أبرز مهامه؟", "gold_passage_id": "ar-wiki-1275-0", "gold_passage_text": "نظام التشغيل ، اختصارًا بالانجليزية OS هو مجموعة من البرمجيات المسؤولة عن إدارة الموارد، والبرمجيات ويمثل وسيط بين المستخدم، وعتاد الحاسوب. وبتعريفٍ آخر، هو وسيلة لتشغيل برامج المستخدم، ويقوم بالمهام الأساسية مثل: إدارة وتخصيص موارد الحاسوب كالذاكرة والقرص الصلب الوصول للأجهزة الملحقة مثلا. كما يهتم بترتيب أولوية التعامل مع الأوامر، والتحكم في أجهزة الإدخال، والإخراج مثل: لوحة المفاتيح، وكذلك تسهيل التعامل مع الشبكات، وإدارة الملفات.", "gold_answer": "النظام التشغيل هو اختصار لـ Operating System (OS)، ويتمتع بمهام أساسية تشمل إدارة وتخصيص موارد الحاسوب كالذاكرة والقرص الصلب، الوصول للأجهزة الملحقة مثل لوحة المفاتيح، تسهيل التعامل مع الشبكات وإدارة الملفات، والتركيز على ترتيب أولوية التعامل مع الأوامر.", "source_citation": "https://ar.wikipedia.org/?curid=1275 (Wikipedia, CC BY-SA, article id 1275)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1275-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الوظائف الرئيسية التي يقوم بها النظام التشغيل؟", "gold_passage_id": "ar-wiki-1275-0", "gold_passage_text": "نظام التشغيل ، اختصارًا بالانجليزية OS هو مجموعة من البرمجيات المسؤولة عن إدارة الموارد، والبرمجيات ويمثل وسيط بين المستخدم، وعتاد الحاسوب. وبتعريفٍ آخر، هو وسيلة لتشغيل برامج المستخدم، ويقوم بالمهام الأساسية مثل: إدارة وتخصيص موارد الحاسوب كالذاكرة والقرص الصلب الوصول للأجهزة الملحقة مثلا. كما يهتم بترتيب أولوية التعامل مع الأوامر، والتحكم في أجهزة الإدخال، والإخراج مثل: لوحة المفاتيح، وكذلك تسهيل التعامل مع الشبكات، وإدارة الملفات.", "gold_answer": "يقوم النظام التشغيل بترتيب أولوية التعامل مع الأوامر، التحكم في أجهزة الإدخال والإخراج مثل لوحة المفاتيح، تسهيل التعامل مع الشبكات، وإدارة ملفات الحاسوب.", "source_citation": "https://ar.wikipedia.org/?curid=1275 (Wikipedia, CC BY-SA, article id 1275)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1275-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "تتكون أنظمة التشغيل من برامج تدير تطبيقات وتوظائف الأجهزة الموجودة على الجهاز، وتعمل هذه البرامج على أي من الأجهزة التالية؟", "gold_passage_id": "ar-wiki-1275-1", "gold_passage_text": "مقدمة\n[[ملف:Debian 9 Stretch-gnome desktop.png|تصغير|300بك|نظام التشغيل دبيان]]\nتأتي أجهزة الحاسوب دائِمًا بنظامِ تشغيل. يتكون نظام التشغيل من برامج تُدير التطبيقات والوظائف والأجهزة الموجودة على الجهاز، ويوفر واجهة تُستخدم للتفاعل مع هذه الميزات. تعمل برامج نظام التشغيل على أجهزة الكمبيوتر المحمولة وأجهزة الكمبيوتر المكتبية والهواتف الذكية والأجهزة اللوحية وأجهزة توجيه الشبكة والأجهزة الذكية الأُخرى.", "gold_answer": "تعمل هذه البرامج على أجهزة الكمبيوتر المحمولة، أجهزة الكمبيوتر المكتبية، الهواتف الذكية، الأجهزة اللوحية، أجهزة توجيه الشبكة، وأجهزة ذكية أخرى.", "source_citation": "https://ar.wikipedia.org/?curid=1275 (Wikipedia, CC BY-SA, article id 1275)", " هلسنكي الكبرى الإجمالية، وكم من هذا العدد يمثل النسبة المئوية للمعتمدين من الفنلندا؟", "gold_passage_id": "ar-wiki-1298-1", "gold_passage_text": "تشكل بلدية هلسنكي قلب منطقة هلسنكي الكبرى التي تضم مدينة هلسنكي وثلاث مدن مجاورة. اثنتان من هذه المدن هما إسبو وفانتا ملاصفتان لحدود هلسنكي البلدية غربًا وشمالًا. المدينة الثالثة كاونياينن جيب داخلي لمدينة إسبو كما تضم المنطقة 9 ضواحي تابعة. منطقة هلسنكي الكبرى هي أقصى المناطق الحضرية شمالاً على الأرض ويعيش بها إجمالًا 1.3 مليون نسمة، أي أن ما يقرب من رُبع الفنلنديين. كما أن المدينة هي أقصى عواصم أعضاء الاتحاد الأوروبي شمالًا.", "gold_answer": "يقيم الإجمال 1.3 مليون نسمة، أي ما يقرب من رُبع الفنلنديين.", "source_citation": "https://ar.wikipedia.org/?curid=1298 (Wikipedia, CC BY-SA, article id 1298)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1298-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي مدينة هلسنكي في فنلندا؟", "gold_passage_id": "ar-wiki-1298-2", "gold_passage_text": "و هلسنكي هي أكبر مركز سياسي وتعليمي ومالي وثقافي وبحثي في فنلندا. كما أنها مدينة إقليمية هامة في بحر البلطيق وشمال أوروبا. وقد استقرت حوالي 70٪ من الشركات الأجنبية العاملة في فنلندا بمنطقة هلسنكي.", "gold_answer": "هي مدينة إقليمية هامة في بحر البلطيق وشمال أوروبا.", "source_citation": "https://ar.wikipedia.org/?curid=1298 (Wikipedia, CC BY-SA, article id 1298)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1299-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الحالة التي قد يكون فيها جزء من البرمجيات الحرة مدفوعًا؟", "gold_passage_id": "ar-wiki-1299-0", "gold_passage_text": "[[ملف:Free Software Concept Map Final2.png|300بك|تصغير|يسار|خارطة تصورية للبرامج الحرة]]\nالبرمجيات الحرة هي برمجيات حاسوبية يمكن استخدامها ودراستها وتعديلها لأي غرض دون قيود، وكذلك نسخها وتداولها مُعدّلة أو غير كذلك، بقيود أو دون قيود. أو تضمن أن متلقيها ستكون لهم الحقوق ذاتها. البرمجياتُ الحرةُ عموما مجانية، إلا أن بعضها قد يكون بمقابل. الطريق المعتاد لتوزيع البرمجيات كبرمجيات حرة هو ترخيصها للمتلقي تحت رخصة حرّة، أو بوضعها في الملك العام، ونشر الشفرة المصدرية لها.", "gold_answer": "بعض البرمجيات الحرة قد تكون مدفوعة، أي قد تكون بمقابل.", "source_citation": "https://ar.wikipedia.org/?curid=1299 (Wikipedia, CC BY-SA, article id 1299)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1299-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ماذا تعني الكلمات 'free' في السياق الذي يوضح فيه مصطلح 'برمجيات الحرة'، وفقاً للنص؟", "gold_passage_id": "ar-wiki-1299-1", "gold_passage_text": "في اللغة الإنجليزية التي نشأ فيها المصطلح فإن \"free\" تعني «حُرٌّ» وكذلك تعني «مجانيٌّ». لذا فهناك تأكيد من قبل دعاة البرمجيات الحرة على أنه يوجد فرق جوهري بين البرمجيات الحُرَّة والبرمجيات المجانية التي يَسمحُ ناشروها (حائزو حق الملكية الفكرية لها) بتداولها دون مقابل مادي إلا أنهم يحتفظون لأنفسهم بحقوق الطبع بما لا يسمح بالضرورة للآخرين بحرية استخدامها، ونسخها دون قيود، ودراستها، وتعديلها، وإعادة توزيعها بعد تعديلها، وبالطبع بيعها. وعادة لا تُنشر الشفرة المصدرية للبرمجيات المجانية غير الحُرّة. لا تعارض بين كون برمجية ما حرة وبين الاستفادة منها تجاريا، بل إن حرية استغلال البرمجيات للأغراض التجارية أحد شروط الحرية.", "gold_answer": "تُطلق عليه 'حُرٌّ' وتُطلق عليه أيضاً 'مجانيٌّ'.", "source_citation": "https://ar.wikipedia.org/?curid=1299 (Wikipedia, CC BY-SA, article id 1299)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1299-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الفرق الجوهري بين البرمجيات الحرة والبرمجيات المجانية وفقاً للنص؟", "gold_passage_id": "ar-wiki-1299-1", "gold_passage_text": "في اللغة الإنجليزية التي نشأ فيها المصطلح فإن \"free\" تعني «حُرٌّ» وكذلك تعني «مجانيٌّ». لذا فهناك تأكيد من قبل دعاة البرمجيات الحرة على أنه يوجد فرق جوهري بين البرمجيات الحُرَّة والبرمجيات المجانية التي يَسمحُ ناشروها (حائزو حق الملكية الفكرية لها) بتداولها دون مقابل مادي إلا أنهم يحتفظون لأنفسهم بحقوق الطبع بما لا يسمح بالضرورة للآخرين بحرية استخدامها، ونسخها دون قيود، ودراستها، وتعديلها، وإعادة توزيعها بعد تعديلها، وبالطبع بيعها. وعادة لا تُنشر الشفرة المصدرية للبرمجيات المجانية غير الحُرّة. لا تعارض بين كون برمجية ما حرة وبين الاستفادة منها تجاريا، بل إن حرية استغلال البرمجيات للأغراض التجارية أحد شروط الحرية.", "gold_answer": "البرمجيات الحُرّة تتيح الاستخدام غير المعزول دون قيود مثل تعديل أو نسخ أو بيع، بينما البرمجيات المجانية تسمح بتداولها دون مقابل مادي فقط.", "source_citation": "https://ar.wikipedia.org/?curid=1299 (Wikipedia, CC BY-SA, article id 1299)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1299-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "متى بدأ مؤسس مشروع جنو GNU، وهو البروفيسور ريتشارد ماثيو ستالمن، بإطلاق المشروع بعد تطوير نظام يونكس؟", "gold_passage_id": "ar-wiki-1299-2", "gold_passage_text": "تاريخ البرمجيات الحرة\nتعود أصول البرمجيات الحرة إلى انتشار نظام التشغيل يونكس في سبعينيات القرن الماضي، إذ شمل عدة قطاعات في الحكومات ومراكز الأبحاث كونه حر.\nظل هذا الوضع قائما حتى سنة 1983 إلى أن قررت الشركة المالكة للنظام بالتوقف عن إتاحة الشيفرة المصدرية للبرنامج، وطلب ترخيص استعمال من الشركة.\nهذه الخطوة أثارت انزعاج الكثير ممن ساهموا في تطوير نظام يونكس، من بينهم البروفيسور ريتشارد ماثيو ستالمن وهو أستاذ بمختبر الذكاء الصناعي في معهد مساثوسيتس للتكنولوجيا MIT ، الذي أطلق سنة 1984 مشروع جنو GNU يهدف إلى إنتاج نظام تشغيل حر مشابه ليونكس.\nفي سنة 1985، أنشأ مؤسسة غير ربحية تدعم قانونيا وماليا مشرع جنو.", "gold_answer": "انطلق مشروع جنو GNU في عام 1984.", "source_citation": "https://ar.wikipedia.org/?curid=1299 (Wikipedia, CC BY-SA, article id 1299)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1299-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي سنة قرر مؤسس مشروع جنو GNU، البروفيسور ريتشارد ماثيو ستالمن، إنشاء مؤسسة غير ربحية تدعم قانونيًا وماليا مشروع جنو؟", "gold_passage_id": "ar-wiki-1299-2", "gold_passage_text": "تاريخ البرمجيات الحرة\nتعود أصول البرمجيات الحرة إلى انتشار نظام التشغيل يونكس في سبعينيات القرن الماضي، إذ شمل عدة قطاعات في الحكومات ومراكز الأبحاث كونه حر.\nظل هذا الوضع قائما حتى سنة 1983 إلى أن قررت الشركة المالكة للنظام بالتوقف عن إتاحة الشيفرة المصدرية للبرنامج، وطلب ترخيص استعمال من الشركة.\nهذه الخطوة أثارت انزعاج الكثير ممن ساهموا في تطوير نظام يونكس، من بينهم البروفيسور ريتشارد ماثيو ستالمن وهو أستاذ بمختبر الذكاء الصناعي في معهد مساثوسيتس للتكنولوجيا MIT ، الذي أطلق سنة 1984 مشروع جنو GNU يهدف إلى إنتاج نظام تشغيل حر مشابه ليونكس.\nفي سنة 1985، أنشأ مؤسسة غير ربحية تدعم قانونيا وماليا مشرع جنو.", "gold_answer": "انتهى ذلك في عام 1985.", "source_citation": "https://ar.wikipedia.org/?curid=1299 (Wikipedia, CC BY-SA, article id 1299)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1309-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "أي دولة عربية تقع في وسط غرب القارة الآسيوية؟", "gold_passage_id": "ar-wiki-1309-0", "gold_passage_text": "لُبنَان (رسميًّا: الجُمْهُورِيَّة اللبنانيَّة) هي دولة عربيّة واقِعَة في الشَرق الأوسط في غرب القارة الآسيويّة. تَحُدّها سوريا من الشمال والشرق، وفلسطين المحتلة (إسرائيل) من الجنوب، وتطل من جهة الغرب على البحر الأبيض المتوسط. هو بلد ديمقراطي جمهوري طوائفي. مُعظم سكانه من العرب المسلمين والمسيحيين. وبخلاف غالبيّة الدول العربيّة هناك وجود فعّال للمسيحيين في الحياة العامّة والسياسيّة. هاجر وانتشر أبناؤه حول العالم منذ أيام الفينيقيين، وحاليًّا فإن عدد اللبنانيين المهاجرين يُقدَّر بضعف عدد اللبنانيين المقيمين.", "gold_answer": "دولتي لبنان", "source_citation": "https://ar.wikipedia.org/?curid=1309 (Wikipedia, CC BY-SA, article id 1309)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1309-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الموقع الجغرافي الذي يفسر تنوع الثقافات في لبنان من قبل الحروب والنزاعات في الماضي؟", "gold_passage_id": "ar-wiki-1309-1", "gold_passage_text": "واجه لبنان منذ القدم تعدد الحضارات التي عبرت فيه أو احتلّت أراضيه وذلك لموقعه الوسطي بين الشمال الأوروبي والجنوب العربي والشرق الآسيوي والغرب الأفريقي، ويعد هذا الموقع المتوسط من أبرز الأسباب لتنوع الثقافات في لبنان، وفي الوقت ذاته من الأسباب المؤدية للحروب والنزاعات على مر العصور تجلت بحروب أهلية ونزاع مصيري مع إسرائيل. ويعود أقدم دليل على استيطان الإنسان في لبنان ونشوء حضارة على أرضه إلى أكثر من 7000 سنة.", "gold_answer": "الموقع المتوسط بين الشمال الأوروبي والجنوب العربي والشرق الآسيوي والغرب الأفريقي.", "source_citation": "https://ar.wikipedia.org/?curid=1309 (Wikipedia, CC BY-SA, article id 1309)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1309-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "أي عام تاريخي يُعد أقدم دليل على استيطان الإنسان في لبنان ونشوء حضارة عليه؟", "gold_passage_id": "ar-wiki-1309-1", "gold_passage_text": "واجه لبنان منذ القدم تعدد الحضارات التي عبرت فيه أو احتلّت أراضيه وذلك لموقعه الوسطي بين الشمال الأوروبي والجنوب العربي والشرق الآسيوي والغرب الأفريقي، ويعد هذا الموقع المتوسط من أبرز الأسباب لتنوع الثقافات في لبنان، وفي الوقت ذاته من الأسباب المؤدية للحروب والنزاعات على مر العصور تجلت بحروب أهلية ونزاع مصيري مع إسرائيل. ويعود أقدم دليل على استيطان الإنسان في لبنان ونشوء حضارة على أرضه إلى أكثر من 7000 سنة.", "gold_answer": "> 7000 سنة.", "source_citation": "https://ar.wikipedia.org/?curid=1309 (Wikipedia, CC BY-SA, article id 1309)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_answer; REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1313-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو المقر الدائم للجامعة الدول العربية؟", "gold_passage_id": "ar-wiki-1313-0", "gold_passage_text": "جامعة الدول العربية هي منظمة إقليمية تضم دولاً عربية في آسيا وإفريقيا. ينص ميثاقها على التنسيق بين الدول الأعضاء في الشؤون الاقتصادية، ومن ضمنها العلاقات التجارية، الاتصالات، العلاقات الثقافية، الجنسيات ووثائق وأذونات السفر والعلاقات الاجتماعية والصحة. المقر الدائم لجامعة الدول العربية يقع في القاهرة، عاصمة مصر (تونس من 1979 إلى 1990). وأمينها العام الحاليّ هو أحمد أبو الغيط. المجموع الكلي لمساحة الدول الأعضاء في المنظمة 13,953,041 كم²، حيث أن مجموع مساحة الوطن العربي يجعل مساحته الثاني عالمياً بعد روسيا ومجموع سكانها هو الرابع عالمياً بعد الصين، الهند والاتحاد الأوروبي. حيث يبلغ مجموع السكان العرب سنة 2021 في الوطن العربي حوالي 437,812,546 نسمة والذي يمثل نسبة %5.5 من سكان العالم والبالغ عددهم 7,956,486,115 نسمة.", "gold_answer": "يُعتبر المقر الدائم للجامعة الدول العربية القاهرة، عاصمة مصر (تونس من 1979 إلى 1990).", "source_citation": "https://ar.wikipedia.org/?curid=1313 (Wikipedia, CC BY-SA, article id 1313)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1313-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو عدد السكان العرب في الوطن العربي لعام 2021؟", "gold_passage_id": "ar-wiki-1313-0", "gold_passage_text": "جامعة الدول العربية هي منظمة إقليمية تضم دولاً عربية في آسيا وإفريقيا. ينص ميثاقها على التنسيق بين الدول الأعضاء في الشؤون الاقتصادية، ومن ضمنها العلاقات التجارية، الاتصالات، العلاقات الثقافية، الجنسيات ووثائق وأذونات السفر والعلاقات الاجتماعية والصحة. المقر الدائم لجامعة الدول العربية يقع في القاهرة، عاصمة مصر (تونس من 1979 إلى 1990). وأمينها العام الحاليّ هو أحمد أبو الغيط. المجموع الكلي لمساحة الدول الأعضاء في المنظمة 13,953,041 كم²، حيث أن مجموع مساحة الوطن العربي يجعل مساحته الثاني عالمياً بعد روسيا ومجموع سكانها هو الرابع عالمياً بعد الصين، الهند والاتحاد الأوروبي. حيث يبلغ مجموع السكان العرب سنة 2021 في الوطن العربي حوالي 437,812,546 نسمة والذي يمثل نسبة %5.5 من سكان العالم والبالغ عددهم 7,956,486,115 نسمة.", "gold_answer": "يعرف مجموع السكان العرب في الوطن العربي في عام 2021 حوالي 437,812,546 نسمة.", "source_citation": "https://ar.wikipedia.org/?curid=1313 (Wikipedia, CC BY-SA, article id 1313)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1313-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "لمدة ما كمسار من الزمن كان مجلس الوحدة الاقتصادية العربية يُعد منصةً لصياغة وإبرام الوثائق التاريخية لتعزيز التكامل الاقتصادي؟", "gold_passage_id": "ar-wiki-1313-1", "gold_passage_text": "تسهل الجامعة العربية إجراء برامج سياسية واقتصادية وثقافية وعلمية واجتماعية لتنمية مصالح العالم العربي من خلال مؤسساتٍ مثل المنظمة العربية للتربية والثقافة والعلوم (أليسكو) ومجلس الوحدة الاقتصادية العربية. وقد كانت الجامعة العربية بمثابة منتدىً لتنسيق المواقف السياسية للدول الأعضاء، وللتداول ومناقشة المسائل التي تثير الهام المشترك، ولتسوية بعض المنازعات العربية والحد من صراعاتها، كصراع أزمة لبنان عام 1958. كما مثلت الجامعة منصةً لصياغة وإبرام العديد من الوثائق التاريخية لتعزيز التكامل الاقتصادي بين بلدان الجامعة. أحد أمثلة هذه الوثائق المهمة وثيقة العمل الاقتصادي العربي المشترك، والتي تحدد مبادئ الأنشطة الاقتصادية في المنطقة.", "gold_answer": "الفترة التي قمت بها الجامعة العربية بإبرام وثيقة العمل الاقتصادي العربي المشترك.", "source_citation": "https://ar.wikipedia.org/?curid=1313 (Wikipedia, CC BY-SA, article id 1313)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1313-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "كيف كان صوت الدول الأعضاء في مجلس الجامعة بشأن قراراتها؟", "gold_passage_id": "ar-wiki-1313-2", "gold_passage_text": "لكل دولةٍ عضوٌ صوتٌ واحدٌ في مجلس الجامعة، ولكن القرارات تلزم الدول التي صوتت لهذه القرارات فقط. كانت أهداف الجامعة في عام 1945:\n* التعزيز والتنسيق في البرامج السياسية والبرامج الثقافية والاقتصادية والاجتماعية لأعضائها.\n* التوسط في حل النزاعات التي تنشأ بين دولها، أو النزاعات بين دولها وأطرافٍ ثالثة.\n* الدول التي وقعت على اتفاقِ الدفاع المشترك والتعاون الاقتصادي في 13 أبريل 1950 ملزمةٌ على تنسيق تدابير الدفاع العسكري.", "gold_answer": "كانت القرارات تلزم الدول التي صوتت لهذه القرارات فقط.", "source_citation": "https://ar.wikipedia.org/?curid=1313 (Wikipedia, CC BY-SA, article id 1313)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1313-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي أول ثلاثة أهداف الجامعة التي تم ذكرها في عام 1945؟", "gold_passage_id": "ar-wiki-1313-2", "gold_passage_text": "لكل دولةٍ عضوٌ صوتٌ واحدٌ في مجلس الجامعة، ولكن القرارات تلزم الدول التي صوتت لهذه القرارات فقط. كانت أهداف الجامعة في عام 1945:\n* التعزيز والتنسيق في البرامج السياسية والبرامج الثقافية والاقتصادية والاجتماعية لأعضائها.\n* التوسط في حل النزاعات التي تنشأ بين دولها، أو النزاعات بين دولها وأطرافٍ ثالثة.\n* الدول التي وقعت على اتفاقِ الدفاع المشترك والتعاون الاقتصادي في 13 أبريل 1950 ملزمةٌ على تنسيق تدابير الدفاع العسكري.", "gold_answer": "التعزيز والتنسيق في البرامج السياسية والبرامج الثقافية والاقتصادية والاجتماعية لأعضائها، التوسط في حل النزاعات بين دولها أو أطراف ثالثة، وإلزام الدول التي وقعت على اتفاق الدفاع المشترك والتعاون الاقتصادي في 13 أبريل 1950 بتنسيق تدابير الدفاع العسكري.", "source_citation": "https://ar.wikipedia.org/?curid=1313 (Wikipedia, CC BY-SA, article id 1313)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1318-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو تعريف الجبر بناءً على النص?", "gold_passage_id": "ar-wiki-1318-1", "gold_passage_text": "والجبر هو مفهوم أوسع وأشمل من الحساب أو الجبر الابتدائي. فهو لا يتعامل مع الأرقام فحسب، بل يصوغ التعاملات مع الرموز والمتغيرات والفئات كذلك. ويصوغ الجبر البدهيات والعلاقات التي بواسطتها يمكن تمثيل أي ظاهرة في الكون. ولذا يعتبر من الأساسيات المنظمة لطرق البرهان.", "gold_answer": "الجبر هو مفهوم أوسع وأشمل من الحساب أو الجبر الابتدائي، حيث يتعامل مع الأرقام، الرموز، المتغيرات، والفئات، بصيغة لا تفهم فقط من الحساب.", "source_citation": "https://ar.wikipedia.org/?curid=1318 (Wikipedia, CC BY-SA, article id 1318)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1318-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الوظيفة الأساسية للتعاملات الرمزية والجبرية في الجبر؟", "gold_passage_id": "ar-wiki-1318-1", "gold_passage_text": "والجبر هو مفهوم أوسع وأشمل من الحساب أو الجبر الابتدائي. فهو لا يتعامل مع الأرقام فحسب، بل يصوغ التعاملات مع الرموز والمتغيرات والفئات كذلك. ويصوغ الجبر البدهيات والعلاقات التي بواسطتها يمكن تمثيل أي ظاهرة في الكون. ولذا يعتبر من الأساسيات المنظمة لطرق البرهان.", "gold_answer": "تصوغ وتعبير العلاقات والدلالات، والتي بواسطتها يمكن تمثيل أي ظاهرة في الكون.", "source_citation": "https://ar.wikipedia.org/?curid=1318 (Wikipedia, CC BY-SA, article id 1318)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1318-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "كيف يُعرّف الوصف المعطى في النص على أنه جزء من علم الجبر؟", "gold_passage_id": "ar-wiki-1318-2", "gold_passage_text": "يوجد لذلك الوصف نفس الاختلاف:\n* بدون المادة. تعني جزء من علم الجبر، مثل الجبر الخطي، الجبر الابتدائي (قواعد معالجة-الرموز التي تدرس في مناهج الرياضيات كجزء من التعليم الأساسي والتعليم الثانوي) أو الجبر المجرد (دراسة الهياكل الجبرية مع المادة).\n* فهذا يعني إنه مثيل لبعض التراكيب المجردة، مثل جبر تبادلي أو الجبر الترابطي.\n* كما هو الحال في الجملة: الجبر التبادلي هو دراسة الحلقات، الحلقات التبادلية، التي تعرف كلها بالجبر التبادلي على الأعداد الصحيحة.", "gold_answer": "تُعَرّف هذه الوصفة بأنها جزء من علم الجبر مثل الجبر الخطي أو الجبر الابتدائي أو الجبر المجرد، أي أنه يدرس هياكل جبرية مع المادة.", "source_citation": "https://ar.wikipedia.org/?curid=1318 (Wikipedia, CC BY-SA, article id 1318)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1318-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي المجالات التي ينتمي إليها الوصف المعطى في النص؟", "gold_passage_id": "ar-wiki-1318-2", "gold_passage_text": "يوجد لذلك الوصف نفس الاختلاف:\n* بدون المادة. تعني جزء من علم الجبر، مثل الجبر الخطي، الجبر الابتدائي (قواعد معالجة-الرموز التي تدرس في مناهج الرياضيات كجزء من التعليم الأساسي والتعليم الثانوي) أو الجبر المجرد (دراسة الهياكل الجبرية مع المادة).\n* فهذا يعني إنه مثيل لبعض التراكيب المجردة، مثل جبر تبادلي أو الجبر الترابطي.\n* كما هو الحال في الجملة: الجبر التبادلي هو دراسة الحلقات، الحلقات التبادلية، التي تعرف كلها بالجبر التبادلي على الأعداد الصحيحة.", "gold_answer": "ينتمي الوصف المعطى إلى الجبر التبادلي والجبر الترابطي.", "source_citation": "https://ar.wikipedia.org/?curid=1318 (Wikipedia, CC BY-SA, article id 1318)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1319-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو أبو عبد الله أحمد المعروف أيضاً بـ أبي جعفر؟", "gold_passage_id": "ar-wiki-1319-0", "gold_passage_text": "أَبُو عَبْدِ ٱللهِ، مُحَمَّدُ بْنُ مُوسَى ٱلْخَوَارَزْمِيُّ عالِمُ رياضيَّاتٍ، وفَلَكٍ، وجغرافيا، مسلم.\nيكنَّىٰ بـ‌أَبِي جَعْفَرٍ. قيل: إنه ولد نحو 164 هـ / 781 م، وقيل: إنه تُوُفِّيَ بعد 232 هـ / 847 م.\nوهو من أوائل علماء الرياضيات المسلمين؛ فإنَّ لأعمالِه الفضلَ العظيم في تقدم الرياضيات في عصره.\nاتصل بالخليفة العباسي المأمون، وعمِل في بيت الحكمة بِبَغداد، وكسَب ثقة الخليفة إذ ولاه المأمون بيت الحكمة، وعهِد إليه رسمَ خريطة للأرض عمِل فيها أكثرُ من سبعين جغرافيًّا.\nو كان الخَوارَزميُّ قبل وفاته في 232 هـ / 850 م، ترك كثيرًا من التآليف (المؤلَّفات) في علوم الرياضيات، والفَلَك، والجغرافيا، أشهرُها: كتاب المُختصَر في حِسابِ الجَبْرِ والمُقابَلة، وهو أَجَلُّ كتبه.", "gold_answer": "هو محمد بن موسى الخوارزمي.", "source_citation": "https://ar.wikipedia.org/?curid=1319 (Wikipedia, CC BY-SA, article id 1319)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flag  "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1330-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي المدينة التي يُعتبرها النص مركزًا سياسيًا رئيسيًا ومركزًا لحركة اقتصادية معنية؟", "gold_passage_id": "ar-wiki-1330-1", "gold_passage_text": "بيروت هي مركز الثقل السياسي اللبناني حيث مقر معظم الدوائر السياسية مثل البرلمان ورئاسة الحكومة بالإضافة لمراكز معظم الوزارات والدوائر الحكومية. تلعب الدور الرئيسي في الحركة الاقتصادية اللبنانية. وتعد المدينة إحدى أهم المؤثرات الثقافية في منطقة الشرق الأوسط والوطن العربي لغناها بالأنشطة الثقافية مثل الصحافة الحرة والمسارح ودور النشر ومعارض الفنون والمتاحف وعدد كبير من الجامعات الدولية.", "gold_answer": "بيروت، والتي تُوصف في النص كحضر مركزية في الشؤون اللبنانية وتلعب دورًا رئيسيًا في الحركة الاقتصادية.", "source_citation": "https://ar.wikipedia.org/?curid=1330 (Wikipedia, CC BY-SA, article id 1330)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1330-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي مجالات تُعد بيروت مؤثرة ثقافيًا كما ينص النص؟", "gold_passage_id": "ar-wiki-1330-1", "gold_passage_text": "بيروت هي مركز الثقل السياسي اللبناني حيث مقر معظم الدوائر السياسية مثل البرلمان ورئاسة الحكومة بالإضافة لمراكز معظم الوزارات والدوائر الحكومية. تلعب الدور الرئيسي في الحركة الاقتصادية اللبنانية. وتعد المدينة إحدى أهم المؤثرات الثقافية في منطقة الشرق الأوسط والوطن العربي لغناها بالأنشطة الثقافية مثل الصحافة الحرة والمسارح ودور النشر ومعارض الفنون والمتاحف وعدد كبير من الجامعات الدولية.", "gold_answer": "تُعد بيروت مؤثرة ثقافيًا في مجالات الصحافة الحرة، والمسارح، دور النشر، معرض الفنون، والمتاحف، بالإضافة إلى كونها تضم عددًا كبيرًا من الجامعات الدولية.", "source_citation": "https://ar.wikipedia.org/?curid=1330 (Wikipedia, CC BY-SA, article id 1330)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1330-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "لمن قُدِمَت بيروت في سنة 2009 كواحدة من أفضل المدن السياحية؟", "gold_passage_id": "ar-wiki-1330-2", "gold_passage_text": "مرت المدينة بالعديد من الكوارث من زلازل وحروب على مر التاريخ كان أهمها الحرب الأهلية اللبنانية المدمرة. وبعد انتهاء الحرب سنة 1990، أعادت الدولة في عهد حكومة رئيس وزراء لبنان آنذاك رفيق الحريري إعمار وتأهيل المدينة وبخاصة وسطها التجاري وواجهتها البحرية وملاهيها الليلية مما أعاد تألق سياحتها وجعلها مقصداً سياحياً جذاباً. قامت صحيفة النيويورك تايمز بمنح بيروت المركز الأول بين قائمة الأماكن التي ينبغي زيارتها في سنة 2009، كما صُنّفت ضمن المدن العشرة الأوائل الأكثر حيوية في عام 2009 بواسطة دليل لونلي بلانت السياحي. وفي عام 2020، مرّت بيروت بكارثة أُخرى حيث حصلَ انفجار ضخم في مرفأ المدينة مما خلف عشرات القتلى وآلاف الجرحى وتسبب بدمار كبير في عدد من أحيائها نتج عنه نزوح 300 ألف مواطن لبناني.", "gold_answer": "قُدِمَت بيروت على وجه التحديد من قبل صحيفة نيويورك تايمز كواحدة من أفضل الأماكن التي ينبغي زيارتها، كما صُنفت ضمن المدن العشرة الأوائل الأكثر حيوية في ذلك العام حسب دليل لونلي بلانت السياحي.", "source_citation": "https://ar.wikipedia.org/?curid=1330 (Wikipedia, CC BY-SA, article id 1330)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1330-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو السبب الرئيسي للنتائج الإنسانية الكبيرة التي حدثت في بيروت عام 2020؟", "gold_passage_id": "ar-wiki-1330-2", "gold_passage_text": "مرت المدينة بالعديد من الكوارث من زلازل وحروب على مر التاريخ كان أهمها الحرب الأهلية اللبنانية المدمرة. وبعد انتهاء الحرب سنة 1990، أعادت الدولة في عهد حكومة رئيس وزراء لبنان آنذاك رفيق الح  "wikipedia_general", "question": "ما هو الموقع الجغرافي الذي يحيط بالبحر الأَبْيَضُ؟", "gold_passage_id": "ar-wiki-1333-0", "gold_passage_text": "البَحْرُ الأَبْيَضُ المُتَوَسِّطُ أو البَحْرُ المُتَوَسِّطُ -سمَّاه العرب قديمًا بَحْرَ الرُّومِ أو البَحْرَ الشَّامِيَّ- هو بحر متصل بالمحيط الأطلسي وتحيط به منطقة البحر الأبيض المتوسط وهو شبه محاط تمامًا بالبر: من الشمال الأناضول وأوروبا ومن الجنوب شمال أفريقيا ومن الشرق بلاد الشام. يُعد البحر من الناحية الفنية جزءً من المحيط الأطلسي على الرغم من أنه يوصف عادة باعتباره كيانًا مستقلًا تمامًا.", "gold_answer": "يمتد البَحْر من الشمال إلى الأناضول وأوروبا، من الجنوب إلى شمال أفريقيا، ومن الشرق إلى بلاد الشام، ويتصل بالمحيط الأطلسي.", "source_citation": "https://ar.wikipedia.org/?curid=1333 (Wikipedia, CC BY-SA, article id 1333)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1333-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي المساحة الكلية للمساحة التي يغطيها البحر الأبيض المتوسط؟", "gold_passage_id": "ar-wiki-1333-1", "gold_passage_text": "يغطي البحر الأبيض المتوسط مساحة تقارب 2.5 مليون كيلومتر مربع (965,000 ميل مربع)، ولكن نقطة ارتباطه بالأطلسي (مضيق جبل طارق) هي فقط بعرض 14 كم (8.7 ميل). في علم المحيطات، يطلق عليه أحيانا البحر المتوسط الأوروبي أفريقي أو البحر المتوسط الأوروبي لتمييزه عن البحار المتوسطة في أماكن أخرى من العالم. الدول المطلة على البحر المتوسط بترتيب عقارب الساعة هي إسبانيا وفرنسا وموناكو وإيطاليا وسلوفينيا وكرواتيا والبوسنة والهرسك والجبل الأسود وألبانيا واليونان وتركيا وسوريا ولبنان وفلسطين ومصر وليبيا وتونس والجزائر والمغرب، أما دولتا مالطا وقبرص فهما جزيرتان في المتوسط. كما يطل كل من قطاع غزة وإقليمي ما وراء البحار البريطانيان أكروتيري ودكليا وجبل طارق على البحر.", "gold_answer": "تقارب 2.5 مليون كيلومتر مربع (965,000 ميل مربع)", "source_citation": "https://ar.wikipedia.org/?curid=1333 (Wikipedia, CC BY-SA, arti ipedia, CC BY-SA, article id 1343)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1343-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي تاريخ تم توحيد مستوطنة (Cölln) وبرلين لتكون مدينة واحدة؟", "gold_passage_id": "ar-wiki-1343-2", "gold_passage_text": "التاريخ\nتشكلت برلين من اندماج مستوطنتين هما (Cölln)، التي تقع حالياً في جزيرة المتاحف (Museums Island)، وبرلين التي تقع على الضفة الشمالية لنهر شبريه (Spree)، واللتان يعود تشكلهما إلى القرن الثالث عشر الميلادي. وقد تمت الإشارة لأول مرة إلى مستوطنة (Cölln) في الثامن والعشرين من أكتوبر عام 1278م، وفي عام 1307م تم توحيد المستوطنتين، أي (Cölln) وبرلين، لِينتج عنها مدينة واحدة.", "gold_answer": "في عام 1307م.", "source_citation": "https://ar.wikipedia.org/?curid=1343 (Wikipedia, CC BY-SA, article id 1343)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1346-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو الشخص الذي أنشأ لغة إسبرانتو وأين وشعوره؟", "gold_passage_id": "ar-wiki-1346-0", "gold_passage_text": "إسبرانتو (/ˌɛspəˈrɑːntoʊ/، /-æntoʊ/) هي لغة مصطنعة دولية مساعدة الأكثر انتشارًا في العالم. أنشأها لودفيك زامنهوف عام 1887 لتكون \"اللغة الدولية\"، وقد صُممت لتكون لغة ثانية عالمية للتواصل الدولي. وصف زامنهوف اللغة في كتابه \"اللغة الدولية للدكتور إسبرانتو\" الذي نُشر تحت اسم مستعار هو \"دكتور إسبرانتو\". وقد أعجب المتبنون الأوائل للغة بهذا الاسم وسرعان ما استخدموه للإشارة إلى اللغة نفسها. تعني الكلمة بالإسبرانتو \"الشخص الذي يأمل\".", "gold_answer": "أنشأها لودفيك زامنهوف عام 1887 لتكون 'اللغة الدولية'.", "source_citation": "https://ar.wikipedia.org/?curid=1346 (Wikipedia, CC BY-SA, article id 1346)", "annotator_id": "ollama_draft", "draft_mod مركز في مقرها في مدينة نيويورك؟", "gold_passage_id": "ar-wiki-1358-1", "gold_passage_text": "وتعتبر مدينة نيويورك أحد أهم مراكز التجارة والمال في العالم، فهي عاصمة اقتصادية للولايات المتحدة لكثرة الشركات والبنوك العالمية فيها، ويوجد بها مقر الأمم المتحدة وسوق الأوراق المالية ومؤشر الداو جونز الصناعي. توصف مدينة نيويورك بأنها العاصمة الثقافية والإقتصادية للعالم.", "gold_answer": "أمم المتحدة ومركز الأمم المتحدة وسوق الأوراق المالية ومؤشر الداو جونز الصناعي", "source_citation": "https://ar.wikipedia.org/?curid=1358 (Wikipedia, CC BY-SA, article id 1358)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1360-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو قابوس بن سعيد آل سعيد وأمام ماذا حكم في عمان؟", "gold_passage_id": "ar-wiki-1360-0", "gold_passage_text": "قابوس بن سعيد آل سعيد (18 نوفمبر 1940 - 10 يناير 2020) كان السلطان التاسع لسلطنة عُمان، حكم من 23 يوليو 1970 حتى وفاته في عام 2020، وهو الحاكم الثالث عشر من أسرة آل بو سعيد، وهو أيضا رئيس مجلس الوزراء، ووزير الدفاع، والقائد الأعلى للقوات المسلحة. عُدَّ صاحب أطول فترة حكم في الشرق الأوسط والعالم العربي وقت وفاته، بعد أن حكم ما يقرب من خمسين عاما.", "gold_answer": "كان قابوس بن سعيد آل سعيد السلطان التاسع لسلطنة عمان، حكم من عام 1970 حتى وفاته في عام 2020، وحقده ما يقرب من خمسين عاماً.", "source_citation": "https://ar.wikipedia.org/?curid=1360 (Wikipedia, CC BY-SA, article id 1360)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1360-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي أهم المهن التي مارسها قابوس بن سعيد آل سعيد قبل وفاته؟", "gold_passage_id": "ar-wiki-1360-0", "gold_passage_text": "قابوس بن سعيد آل سعيد (18 نوفمبر 1940 - 10 ينا
