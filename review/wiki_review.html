pika dan sub tropika. Di Malaysia kawasan penanaman secara komersil bermula pada pertengahan tahun 1980.", "gold_answer": "Di Malaysia kawasan penanaman Jambu batu secara komersial bermula pada pertengahan tahun 1980.", "source_citation": "https://ms.wikipedia.org/?curid=105 (Wikipedia, CC BY-SA, article id 105)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-106-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mana asal bahagian dari negara Malaysia di mana buah durian berkembang dan dikenali?", "gold_passage_id": "ms-wiki-106-1", "gold_passage_text": "Durian ialah buah tropikal yang berasal dari Semenanjung Melayu Malaysia serta pulau-pulau Filipina, Borneo, tetapi telah dikenali di dunia Barat sekitar 600 tahun lepas. Ahli alamiah British abad ke-19, Alfred Russel Wallace, masyhur memerikan isi buah ini sebagai \"kastard kaya dengan rasa badam\". Buah ini boleh dimakan walaupun belum betul-betul masak, dan digunakan sebagai perisa kepada pelbagai jenis makanan berperisa dan manis dalam masakan Asia Tenggara. Bijinya juga boleh dimakan jika dimasak.", "gold_answer": "Semenanjung Melayu.", "source_citation": "https://ms.wikipedia.org/?curid=106 (Wikipedia, CC BY-SA, article id 106)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-106-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimanakah buah durian dikenali oleh ahli alamiah British Alfred Russel Wallace?", "gold_passage_id": "ms-wiki-106-1", "gold_passage_text": "Durian ialah buah tropikal yang berasal dari Semenanjung Melayu Malaysia serta pulau-pulau Filipina, Borneo, tetapi telah dikenali di dunia Barat sekitar 600 tahun lepas. Ahli alamiah British abad ke-19, Alfred Russel Wallace, masyhur memerikan isi buah ini sebagai \"kastard kaya dengan rasa badam\". Buah ini boleh dimakan walaupun belum betul-betul masak, dan digunakan sebagai perisa kepada pelbagai jenis makanan berperisa dan manis dalam masakan Asia Tenggara. Bijinya juga boleh dimakan jika dimasak.", "gold_answer": "Dikenali sebagai 'kastard kaya dengan rasa badam'.", "source_citation": "https://ms.wikipedia.org/?curid=106 (Wikipedia, CC BY-SA, article id 106)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-107-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana asal-usul kata 'pauh' dalam bahasa Melayu?", "gold_passage_id": "ms-wiki-107-0", "gold_passage_text": "* pauh merupakan perkataan asli Melayu untuk buah ini turunan akar *pahuq,\n* mempelam menyerap dari gabungan மாம் mam \"pauh\" dan பழம் paḻam \"buah\"\n* mangga menyerap dari bahasa sama iaitu மாங்காய் māṅkāy khusus bermaksud \"pauh muda/belum masak\" melalui bahasa Portugis.", "gold_answer": "Pauh merupakan perkataan asli Melayu untuk buah ini turunan akar *pahuq*.", "source_citation": "https://ms.wikipedia.org/?curid=107 (Wikipedia, CC BY-SA, article id 107)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-107-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana makna kata 'mempelam' terbentuk, dan apa bahasanya?", "gold_passage_id": "ms-wiki-107-0", "gold_passage_text": "* pauh merupakan perkataan asli Melayu untuk buah ini turunan akar *pahuq,\n* mempelam menyerap dari gabungan மாம் mam \"pauh\" dan பழம் paḻam \"buah\"\n* mangga menyerap dari bahasa sama iaitu மாங்காய் māṅkāy khusus bermaksud \"pauh muda/belum masak\" melalui bahasa Portugis.", "gold_answer": "Mempelam menyerap gabungan 'mām' mam 'pauh' dan 'buah' dari bahasa Portugis.", "source_citation": "https://ms.wikipedia.org/?curid=107 (Wikipedia, CC BY-SA, article id 107)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-107-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah kawasan-kawasan tropika atau subtropika yang bebas daripada fros di mana pokok mangga kini ditanam secara luas?", "gold_passage_id": "ms-wiki-107-1", "gold_passage_text": "Penanaman\nMangga kini ditanam dengan meluas sebagai pokok buah di kawasan-kawasan tropika dan subtropika yang bebas daripada fros, yaitu di seluruh benua India, Tengah serta Selatan, Caribbean, Afrika tengah serta selatan, Australia, dan Asia Tenggara. Pokok ini mudah ditanam, dan kini terdapat melebihi 1,000 kultivar yang berbeza-beza dari buah mangga turpentin (namanya berasal daripada rasa turpentinnya dan menurut Buku Panduan Makanan Oxford, sebilangan jenis benar-benar mengandungi bahan kimia ini) hingga ke huevos de toro testikel buah pelir]] kerbau\"; namanya mendasarkan bentuk dan saiznya).", "gold_answer": "Kawasan-kawasan tersebut ialah seluruh benua India, Tengah, Selatan, Caribbean, Afrika tengah serta selatan, Australia, dan Asia Tenggara.", "source_citation": "https://ms.wikipedia.org/?curid=107 (Wikipedia, CC BY-SA, article id 107)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-107-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Sebilangan jenis mangga yang ditanam kini berbeza-beza kerana apa sifatnya yang memberi nama bagi kultivarnya?", "gold_passage_id": "ms-wiki-107-1", "gold_passage_text": "Penanaman\nMangga kini ditanam dengan meluas sebagai pokok buah di kawasan-kawasan tropika dan subtropika yang bebas daripada fros, yaitu di seluruh benua India, Tengah serta Selatan, Caribbean, Afrika tengah serta selatan, Australia, dan Asia Tenggara. Pokok ini mudah ditanam, dan kini terdapat melebihi 1,000 kultivar yang berbeza-beza dari buah mangga turpentin (namanya berasal daripada rasa turpentinnya dan menurut Buku Panduan Makanan Oxford, sebilangan jenis benar-benar mengandungi bahan kimia ini) hingga ke huevos de toro testikel buah pelir]] kerbau\"; namanya mendasarkan bentuk dan saiznya).", "gold_answer": "Ia berbeza kerana mempunyai rasa turpentin, menurut Buku Panduan Makanan Oxford.", "source_citation": "https://ms.wikipedia.org/?curid=107 (Wikipedia, CC BY-SA, article id 107)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-107-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa petani-petani buah mangga hanya menerima harga yang rendah? Answer: Disebabkan buah mangga telah menjadi satu barang 'perdagangan saksama' di sebilangan negara.", "gold_passage_id": "ms-wiki-107-2", "gold_passage_text": "Buah mangga dikatakan merupakan buah segar yang paling banyak dimakan di seluruh dunia. Walaupun demikian, petani-petani buah mangga hanya menerima harga yang rendah untuk hasil mereka. Disebabkan ini, buah mangga telah menjadi satu barang 'perdagangan saksama' di sebilangan negara.", "gold_answer": "Disebabkan buah mangga telah menjadi satu barang 'perdagangan saksama' di sebilangan negara.", "source_citation": "https://ms.wikipedia.org/?curid=107 (Wikipedia, CC BY-SA, article id 107)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-108-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah nama botani untuk tumbuhan ini?", "gold_passage_id": "ms-wiki-108-0", "gold_passage_text": "Manggis (), sementah (), manggista, mesetor, mesetar atau mesta (nama botani: Garcinia mangostana) ialah tumbuhan malar hijau dalam genus Garcinia yang bertaburan asal di kawasan tropika sekeliling Lautan Hindi. Pokok-pokoknya ditanam sejak zaman prasejarah lagi.", "gold_answer": "Garcinia mangostana.", "source_citation": "https://ms.wikipedia.org/?curid=108 (Wikipedia, CC BY-SA, article id 108)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-108-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa peringkat atau sebutan yang diberikan kepada buah durian berdasarkan perbandingan dalam paragraf ini?", "gold_passage_id": "ms-wiki-108-1", "gold_passage_text": "Buah manggis sering digandingkan dengan buah durian sebagai \"ratu buah\" pasangan kepada durian yang \"raja segala buah\". Walau bagaimanapun, buahnya mudah cepat rosak serta membesar pada kadar relatif perlahan sehinggakan ia hanya dapat dipasarkan dalam tempoh singkat antara enam hingga sepuluh minggu.", "gold_answer": "Peringkat 'raja segala buah'.", "source_citation": "https://ms.wikipedia.org/?curid=108 (Wikipedia, CC BY-SA, article id 108)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-108-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa jangka hayat yang singkat untuk buah manggis sebelum ia boleh dipasarkan?", "gold_passage_id": "ms-wiki-108-1", "gold_passage_text": "Buah manggis sering digandingkan dengan buah durian sebagai \"ratu buah\" pasangan kepada durian yang \"raja segala buah\". Walau bagaimanapun, buahnya mudah cepat rosak serta membesar pada kadar relatif perlahan sehinggakan ia hanya dapat dipasarkan dalam tempoh singkat antara enam hingga sepuluh minggu.", "gold_answer": "Tempoh antara enam hingga sepuluh minggu.", "source_citation": "https://ms.wikipedia.org/?curid=108 (Wikipedia, CC BY-SA, article id 108)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-109-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama botani dan lokasi asal nangka?", "gold_passage_id": "ms-wiki-109-0", "gold_passage_text": "Nangka ( ; nama botani: Artocarpus heterophyllus) merupakan spesies pokok dalam keluarga Moraceae serumpun dengan kertau dan bertaburan asal di Asia Tenggara dan Selatan. Ia merupakan pokok kebangsaan Bangladesh. Pokok nangka juga didapati di Afrika Timur contohnya di Uganda dan Mauritius, termasuk juga di keseluruhan Brazil.", "gold_answer": "Nama botani nangka ialah Artocarpus heterophyllus dan ia berasal dari Asia Tenggara dan Selatan.", "source_citation": "https://ms.wikipedia.org/?curid=109 (Wikipedia, CC BY-SA, article id 109)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-109-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah negara yang merangkumi nangka sebagai pokok kebangsanyanya?", "gold_passage_id": "ms-wiki-109-0", "gold_passage_text": "Nangka ( ; nama botani: Artocarpus heterophyllus) merupakan spesies pokok dalam keluarga Moraceae serumpun dengan kertau dan bertaburan asal di Asia Tenggara dan Selatan. Ia merupakan pokok kebangsaan Bangladesh. Pokok nangka juga didapati di Afrika Timur contohnya di Uganda dan Mauritius, termasuk juga di keseluruhan Brazil.", "gold_answer": "Bangladesh merupakan negara yang merangkumi nangka sebagai pokok kebangsanyanya.", "source_citation": "https://ms.wikipedia.org/?curid=109 (Wikipedia, CC BY-SA, article id 109)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-109-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berguna apa bagi manusia apabila menghayati kandungan dalam teks ini?", "gold_passage_id": "ms-wiki-109-1", "gold_passage_text": "Pokoknya menghasilkan buah yang boleh dimakan. Nangka banyak terjual di pasar-pasar termasuk pasar tani, dan pasar sayur. Tumbuhan ini berasal dari India dan Asia Tenggara. Ia mula ditanam orang Austronesia di pulau Jawa atau Semenanjung Melayu.", "gold_answer": "Bagi manusia, pokok tersebut bermanfaat apabila ia menghasilkan buah yang boleh dimakan dan banyak terjual di pasaran.", "source_citation": "https://ms.wikipedia.org/?curid=109 (Wikipedia, CC BY-SA, article id 109)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-109-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana asal mula dari tumbuhan ini? Siapa yang menanamnya dahulu?", "gold_passage_id": "ms-wiki-109-1", "gold_passage_text": "Pokoknya menghasilkan buah yang boleh dimakan. Nangka banyak terjual di pasar-pasar termasuk pasar tani, dan pasar sayur. Tumbuhan ini berasal dari India dan Asia Tenggara. Ia mula ditanam orang Austronesia di pulau Jawa atau Semenanjung Melayu.", "gold_answer": "Tumbuhan ini berasal dari India dan Asia Tenggara, dan mula ditanam oleh orang Austronesia di pulau Jawa atau Semenanjung Melayu.", "source_citation": "https://ms.wikipedia.org/?curid=109 (Wikipedia, CC BY-SA, article id 109)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-109-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah pokok nangka diklasifikasikan sebagai pokok kayu berbuah terbesar di dunia?", "gold_passage_id": "ms-wiki-109-2", "gold_passage_text": "Botani\nIa sangat sesuai tumbuh di tanah rendah tropika. Pokok nangka merupakan pokok kayu berbuah terbesar di dunia. ia tumbuh mencapai ketinggian 9-21 meter dengan batang yang tebal diameter. Helai daunnya berbentuk bujur dengan ukuran 22.5 sm panjang, permukaannya keras dan berkilat.", "gold_answer": "Karena ia sangat sesuai untuk tumbuh di tanah rendah tropika.", "source_citation": "https://ms.wikipedia.org/?curid=109 (Wikipedia, CC BY-SA, article id 109)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-109-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa tinggi dan seberapa besar diameter batang pokok nangka?", "gold_passage_id": "ms-wiki-109-2", "gold_passage_text": "Botani\nIa sangat sesuai tumbuh di tanah rendah tropika. Pokok nangka merupakan pokok kayu berbuah terbesar di dunia. ia tumbuh mencapai ketinggian 9-21 meter dengan batang yang tebal diameter. Helai daunnya berbentuk bujur dengan ukuran 22.5 sm panjang, permukaannya keras dan berkilat.", "gold_answer": "Tinggi pohonnya mencapai 9-21 meter, dan diameter batangnya tidak ditentukan dalam teks.", "source_citation": "https://ms.wikipedia.org/?curid=109 (Wikipedia, CC BY-SA, article id 109)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-111-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berdasarkan teks, nama botanik yang tepat untuk jenis terung tersebut adalah...", "gold_passage_id": "ms-wiki-111-0", "gold_passage_text": "Terung () ialah tumbuhan yang tergolong dalam keluarga Solanaceae dan genus Solanum. Ia berasal dari India dan Sri Lanka, dan amat berkait dengan tomato dan ubi kentang. Terung biasanya digunakan sebagai sayur untuk masakan. Nama botaninya Solanum melongena.", "gold_answer": "Solanum melongena", "source_citation": "https://ms.wikipedia.org/?curid=111 (Wikipedia, CC BY-SA, article id 111)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in question"}, {"id": "ms-wiki-111-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di mana asal mula dari tumbuhan jenis terung yang dijelaskan dalam teks...", "gold_passage_id": "ms-wiki-111-0", "gold_passage_text": "Terung () ialah tumbuhan yang tergolong dalam keluarga Solanaceae dan genus Solanum. Ia berasal dari India dan Sri Lanka, dan amat berkait dengan tomato dan ubi kentang. Terung biasanya digunakan sebagai sayur untuk masakan. Nama botaninya Solanum melongena.", "gold_answer": "Dari India dan Sri Lanka", "source_citation": "https://ms.wikipedia.org/?curid=111 (Wikipedia, CC BY-SA, article id 111)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in question"}, {"id": "ms-wiki-15-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Adakah Bahasa Melayu merupakan bahasa rasmi di sebahagian daripada negara-negara yang disebutkan dalam paragraf?", "gold_passage_id": "ms-wiki-15-0", "gold_passage_text": "Bahasa Melayu (Tulisan Jawi: بهاس ملايو; Rejang: ꤷꥁꤼ ꤸꥍꤾꤿꥈ) ialah salah satu daripada bahasa-bahasa Melayu-Polinesia di bawah keluarga bahasa Polinesia, yang merupakan bahasa rasmi di Malaysia, Brunei, Indonesia, dan Singapura, serta dituturkan di Timor Leste dan sebahagian wilayah di Kemboja , Filipina dan Thailand. Jumlah penutur bahasa ini mencakupi lebih daripada 290 juta penutur (termasuk sebanyak 260 juta orang penutur bahasa Indonesia) merentasi kawasan maritim Asia Tenggara.", "gold_answer": "Ya, Bahasa Melayu merupakan bahasa rasmi di Malaysia, Brunei, Indonesia, dan Singapura.", "source_citation": "https://ms.wikipedia.org/?curid=15 (Wikipedia, CC BY-SA, article id 15)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-15-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bilangan keseluruhan penutur Bahasa Melayu menurut paragraf adalah berapa manakah?", "gold_passage_id": "ms-wiki-15-0", "gold_passage_text": "Bahasa Melayu (Tulisan Jawi: بهاس ملايو; Rejang: ꤷꥁꤼ ꤸꥍꤾꤿꥈ) ialah salah satu daripada bahasa-bahasa Melayu-Polinesia di bawah keluarga bahasa Polinesia, yang merupakan bahasa rasmi di Malaysia, Brunei, Indonesia, dan Singapura, serta dituturkan di Timor Leste dan sebahagian wilayah di Kemboja , Filipina dan Thailand. Jumlah penutur bahasa ini mencakupi lebih daripada 290 juta penutur (termasuk sebanyak 260 juta orang penutur bahasa Indonesia) merentasi kawasan maritim Asia Tenggara.", "gold_answer": "Lebih daripada 290 juta penutur Bahasa Melayu.", "source_citation": "https://ms.wikipedia.org/?curid=15 (Wikipedia, CC BY-SA, article id 15)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-15-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana perbezaan utama yang menyebabkan Bahasa Melayu Klasik dikenali sebagai bahasa Melayu Melaka, Johor, Riau?", "gold_passage_id": "ms-wiki-15-1", "gold_passage_text": "Bahasa Melayu Klasik, secara spesifiknya \"bahasa istana\" (atau dikenali sebagai Court Malay dalam bahasa Inggeris), ialah bahasa piawai sastera bersusurgalur daripada kesultanan Melaka dan kesultanan Johor, disebabkan itulah bahasa ini juga dikenali sebagai bahasa Melayu Melaka, Johor, Riau (atau pelbagai jenis gabungan nama yang berasaskan mana-mana dari tiga nama tempat ini) untuk membezakannya daripada bahasa-bahasa Melayik yang lain. Menurut Ethnologue 26, beberapa kelainan bahasa-bahasa Melayik disenaraikan sebagai bahasa-bahasa yang terpisah, termasuklah kelainan bahasa-bahasa Melayu Semenanjung yang dituturkan oleh Orang Asli, yang sangat rapat hubungannya dengan bahasa Melayu Baku yang boleh dianggap sebagai dialek-dialeknya. Terdapat beberapa bahasa dagang atau bahasa kreol Melayu yang berdasarkan satu bentuk lingua franca yang disusurgalurkan ke bahasa Melayu Klasik.", "gold_answer": "Bahasa ini dikenali dengan nama tersebut untuk membezakannya daripada bahasa-bahasa Melayu lain, terutamanya apabila digunakan untuk membezakannya daripada bahasa-bahasa Melayu yang lain.", "source_citation": "https://ms.wikipedia.org/?curid=15 (Wikipedia, CC BY-SA, article id 15)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-15-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah bahasa-bahasa yang dipisahkan dari bahasa-bahasa Melayu Semenanjung dalam Ethnologue 26, yang merupakan dialek yang rapat dengan Melayu Baku?", "gold_passage_id": "ms-wiki-15-1", "gold_passage_text": "Bahasa Melayu Klasik, secara spesifiknya \"bahasa istana\" (atau dikenali sebagai Court Malay dalam bahasa Inggeris), ialah bahasa piawai sastera bersusurgalur daripada kesultanan Melaka dan kesultanan Johor, disebabkan itulah bahasa ini juga dikenali sebagai bahasa Melayu Melaka, Johor, Riau (atau pelbagai jenis gabungan nama yang berasaskan mana-mana dari tiga nama tempat ini) untuk membezakannya daripada bahasa-bahasa Melayik yang lain. Menurut Ethnologue 26, beberapa kelainan bahasa-bahasa Melayik disenaraikan sebagai bahasa-bahasa yang terpisah, termasuklah kelainan bahasa-bahasa Melayu Semenanjung yang dituturkan oleh Orang Asli, yang sangat rapat hubungannya dengan bahasa Melayu Baku yang boleh dianggap sebagai dialek-dialeknya. Terdapat beberapa bahasa dagang atau bahasa kreol Melayu yang berdasarkan satu bentuk lingua franca yang disusurgalurkan ke bahasa Melayu Klasik.", "gold_answer": "Bahasa-bahasa Melayu Semenanjung yang dituturkan oleh Orang Asli.", "source_citation": "https://ms.wikipedia.org/?curid=15 (Wikipedia, CC BY-SA, article id 15)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-15-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Di mana asal usul bahasa Melayu menurut ahli-ahli linguistik?", "gold_passage_id": "ms-wiki-15-2", "gold_passage_text": "Asal usul bahasa Melayu اصل أصول بهاس ملايو\nAhli-ahli linguistik bahasa Melayu bersetuju dengan kemungkinan bahawa asal usul bahasa Melayu terletak di barat pulau Borneo. Satu bentuk bahasa yang kini dikenali sebagai bahasa Melayu Purba (dari segi linguistik dikenali sebagai bahasa Melayik Purba) dituturkan di pulau Borneo sekurang-kurangnya pada 1000 tahun sebelum Masihi dan dianggap sebagai leluhur kepada kesemua bahasa di bawah kumpulan Melayik. Leluhur bahasa purba ini ialah bahasa Melayu-Polinesia Purba, yang merupakan turunan dari bahasa Austronesia Purba, mula bercambah sekurang-kurangnya pada 2000 tahun sebelum Masihi, yang mungkin hasil daripada penerokaan orang Austronesia dari pulau Taiwan ke arah kawasan yang terletak lebih selatan yakni kawasan maritim Asia Tenggara", "gold_answer": "Di barat pulau Borneo.", "source_citation": "https://ms.wikipedia.org/?curid=15 (Wikipedia, CC BY-SA, article id 15)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text"}, {"id": "ms-wiki-15-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa lama sebelum Masihi bahasa Melayu-Polinesia Purba dituturkan dan berakar ke masa berapa?", "gold_passage_id": "ms-wiki-15-2", "gold_passage_text": "Asal usul bahasa Melayu اصل أصول بهاس ملايو\nAhli-ahli linguistik bahasa Melayu bersetuju dengan kemungkinan bahawa asal usul bahasa Melayu terletak di barat pulau Borneo. Satu bentuk bahasa yang kini dikenali sebagai bahasa Melayu Purba (dari segi linguistik dikenali sebagai bahasa Melayik Purba) dituturkan di pulau Borneo sekurang-kurangnya pada 1000 tahun sebelum Masihi dan dianggap sebagai leluhur kepada kesemua bahasa di bawah kumpulan Melayik. Leluhur bahasa purba ini ialah bahasa Melayu-Polinesia Purba, yang merupakan turunan dari bahasa Austronesia Purba, mula bercambah sekurang-kurangnya pada 2000 tahun sebelum Masihi, yang mungkin hasil daripada penerokaan orang Austronesia dari pulau Taiwan ke arah kawasan yang terletak lebih selatan yakni kawasan maritim Asia Tenggara", "gold_answer": "Terurut pada sekurang-kurangnya 1000 tahun sebelum Masihi, berakar ke masa sekurang-kurangnya 2000 tahun sebelum Masihi.", "source_citation": "https://ms.wikipedia.org/?curid=15 (Wikipedia, CC BY-SA, article id 15)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_answer; REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-18-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah sifat air yang ditunjukkan oleh pernyataan 'tiada rasa, warna atau bau'?", "gold_passage_id": "ms-wiki-18-0", "gold_passage_text": "Air (, formula kimia: H2O) merupakan bahan kimia yang berada dalam bentuk cecair pada tekanan biasa dan pada suhu bilik. Air yang tulen tiada rasa, warna atau bau. Formula kimianya menunjukkan satu molekul air terbina daripada dua atom hidrogen dan satu atom oksigen. Setiap kehidupan di bumi ini memerlukan air untuk terus hidup.", "gold_answer": "Air ialah bahan yang tulen tanpa rasa, warna, atau bau.", "source_citation": "https://ms.wikipedia.org/?curid=18 (Wikipedia, CC BY-SA, article id 18)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-18-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapa bahagian permukaan Bumi yang dibaruki oleh Air?", "gold_passage_id": "ms-wiki-18-1", "gold_passage_text": "Air wujud dalam 3 bentuk iaitu pepejal, cecair, dan gas. Air dalam bentuk cecair adalah bentuk air yang paling utama ditemui di muka bumi ini. Air dalam bentuk gas adalah kukus atau wap air yang dihasilkan apabila air disejat atau dididihkan. Air dalam bentuk pepejal adalah ais yang dihasilkan apabila air dibekukan. Air meliputi 71% daripada permukaan Bumi, banyaknya di laut dan lautan (kira-kira 96.5%).", "gold_answer": "71% daripada permukaan Bumi.", "source_citation": "https://ms.wikipedia.org/?curid=18 (Wikipedia, CC BY-SA, article id 18)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-18-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah bentuk air yang paling utama ditemui di muka bumi ini?", "gold_passage_id": "ms-wiki-18-1", "gold_passage_text": "Air wujud dalam 3 bentuk iaitu pepejal, cecair, dan gas. Air dalam bentuk cecair adalah bentuk air yang paling utama ditemui di muka bumi ini. Air dalam bentuk gas adalah kukus atau wap air yang dihasilkan apabila air disejat atau dididihkan. Air dalam bentuk pepejal adalah ais yang dihasilkan apabila air dibekukan. Air meliputi 71% daripada permukaan Bumi, banyaknya di laut dan lautan (kira-kira 96.5%).", "gold_answer": "Bentuk air yang paling utama ditemui di muka bumi ini adalah dalam bentuk cecair.", "source_citation": "https://ms.wikipedia.org/?curid=18 (Wikipedia, CC BY-SA, article id 18)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-23-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang dimaksudkan dengan konten terbuka, dan bagaimanakah ia dicadangkan untuk digunakan?", "gold_passage_id": "ms-wiki-23-0", "gold_passage_text": "Kandungan terbuka, dicipta dengan analogi dari \"sumber terbuka\", memerikan apa-apa kerja kreatif termasuklah rencana, gambar, audio dan video yang diterbitkan dalam format yang dengan jelas menyatakan ia boleh disalin. Dari segi teknik, ia seperti share alike tapi tanpa apa-apa sekatan. Bahan tersebut boleh berada dalam domain awam atau di bawah lesen seperti Lesen Dokumentasi Bebas GNU. Istilah ini juga digunakan untuk menegaskan bahawa kandungannya boleh diubah suai oleh sesiapa; bukan oleh sesuatu pertubuhan, syarikat atau individu secara eksklusif.", "gold_answer": "Contenut terbuka adalah sesuatu yang dicipta dengan analogi daripada 'sumber terbuka', memerikan kerja kreatif seperti rencana, gambar, audio, dan video yang diterbitkan dalam format yang menyatakan ia boleh disalin. Dari segi teknik, ia seperti share alike tanpa sekatan. Bahan tersebut boleh berada dalam domain awam atau bawah lesen seperti Lesen Dokumentasi Bebas GNU.", "source_citation": "https://ms.wikipedia.org/?curid=23 (Wikipedia, CC BY-SA, article id 23)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-23-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Adakah boleh seseorang mengubah atau menggunakan kandungan tersebut tanpa melibatkan sesuatu pertubuhan, syarikat, atau individu secara eksklusif?", "gold_passage_id": "ms-wiki-23-0", "gold_passage_text": "Kandungan terbuka, dicipta dengan analogi dari \"sumber terbuka\", memerikan apa-apa kerja kreatif termasuklah rencana, gambar, audio dan video yang diterbitkan dalam format yang dengan jelas menyatakan ia boleh disalin. Dari segi teknik, ia seperti share alike tapi tanpa apa-apa sekatan. Bahan tersebut boleh berada dalam domain awam atau di bawah lesen seperti Lesen Dokumentasi Bebas GNU. Istilah ini juga digunakan untuk menegaskan bahawa kandungannya boleh diubah suai oleh sesiapa; bukan oleh sesuatu pertubuhan, syarikat atau individu secara eksklusif.", "gold_answer": "Ya, istilah ini digunakan untuk menegaskan bahawa kandungannya boleh diubah suai oleh sesiapa; bukan oleh sesuatu pertubuhan, syarikat atau individu secara eksklusif.", "source_citation": "https://ms.wikipedia.org/?curid=23 (Wikipedia, CC BY-SA, article id 23)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-23-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapakah pengarang utama yang menulis buku panduan 'Community Created Content; Law, Business and Policy' yang diterbitkan oleh FOSS?", "gold_passage_id": "ms-wiki-23-1", "gold_passage_text": "* Ensiklokamus Teknologi Maklumat:Kandungan terbuka secara ringkas \n* e-Primer Kandungan Terbuka IOSN — darip 1 tahun bermula tahun 685 M hingga 705 M.", "source_citation": "https://ms.wikipedia.org/?curid=25 (Wikipedia, CC BY-SA, article id 25)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-25-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah rupa yang Muawiyah menerima ketika pemerintahan ayahnya?", "gold_passage_id": "ms-wiki-25-2", "gold_passage_text": "Ketika zaman pemerintahan Muawiyah, beliau telah dilantik menjadi pemimpin tentera dari Madinah bagi menyerang Byzantium. Ketika pemerintahan Marwan pula, beliau telah menjadi penasihat kepada khalifah dan dilantik sebagai gabenor Palestin. Beliau bersama adiknya, Abdul Aziz juga telah dilantik sebagai putera mahkota ketika pemerintahan ayahnya.", "gold_answer": "Putera Mahkota.", "source_citation": "https://ms.wikipedia.org/?curid=25 (Wikipedia, CC BY-SA, article id 25)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-25-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimanakah beliau menerima pengangkatan ke majikan beliau ketika pemerintahan Marwan?", "gold_passage_id": "ms-wiki-25-2", "gold_passage_text": "Ketika zaman pemerintahan Muawiyah, beliau telah dilantik menjadi pemimpin tentera dari Madinah bagi menyerang Byzantium. Ketika pemerintahan Marwan pula, beliau telah menjadi penasihat kepada khalifah dan dilantik sebagai gabenor Palestin. Beliau bersama adiknya, Abdul Aziz juga telah dilantik sebagai putera mahkota ketika pemerintahan ayahnya.", "gold_answer": "Sebagai penasihat kepada khalifah.", "source_citation": "https://ms.wikipedia.org/?curid=25 (Wikipedia, CC BY-SA, article id 25)", "annotator_id": "ollama_draft", "draft_model": "qwe ,187 meter.", "gold_answer": "Gunung Tahan terletak dalam Taman Negara di negeri Pahang, selatan Semenanjung Melayu.", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-30-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah ketinggian Gunung Tahan?", "gold_passage_id": "ms-wiki-30-0", "gold_passage_text": "Gunung Tahan () terletak dalam Taman Negara di negeri Pahang, selatan Semenanjung Melayu; Gunung ini merupakan sebahagian daripada Banjaran Tahan, Banjaran Titiwangsa, Banjaran Negara Seri Dharmaraja dan banjaran induk Banjaran Tanah Seri. Gunung Tahan merupakan puncak tertinggi di wilayah semenanjung negara Malaysia dan juga Semenanjung Melayu yang menganjur dari wilayah Melayu Tanah Seri di Myanmar sehingga Tanjung Piai, Johor Bahru dan Singapura sekaligus puncak tertinggi Banjaran Tanah Seri dengan ketinggian 2,187 meter.", "gold_answer": "Ketinggian Gunung Tahan ialah 2,187 meter.", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-30-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa gunung ini dinamakan Tahan?", "gold_passage_id": "ms-wiki-30-1", "gold_passage_text": "Penamaan\nGunung ini dinamakan sebagai Tahan kerana pernah dianggap sebagai tempat larangan; gunung ini diceritakan mempunyai dua perigi \"ibu emas\" dan \"ibu perak\" yang boleh memberikan kuasa menukarkan apa-apa objek yang disentuh menjadi perak dan emas, tetapi ia ditunggu dua ekor mawas gergasi. Selain itu, gunung ini juga dipercayai dinamakan sedemikian kerana pendakian ke puncak gunung memerlukan ketahanan yang kuat bagi sesiapa yang ingin menawan Gunung Tahan.", "gold_answer": "Kerana pernah dianggap sebagai tempat larangan.", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-30-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Adakah gunung ini dipercayai mempunyai dua pendaki mawas?", "gold_passage_id": "ms-wiki-30-1", "gold_passage_text": "Penamaan\nGunung ini dinamakan sebagai Tahan kerana pernah dianggap sebagai tempat larangan; gunung ini diceritakan mempunyai dua perigi \"ibu emas\" dan \"ibu perak\" yang boleh memberikan kuasa menukarkan apa-apa objek yang disentuh menjadi perak dan emas, tetapi ia ditunggu dua ekor mawas gergasi. Selain itu, gunung ini juga dipercayai dinamakan sedemikian kerana pendakian ke puncak gunung memerlukan ketahanan yang kuat bagi sesiapa yang ingin menawan Gunung Tahan.", "gold_answer": "Ya, ia dipercayai mempunyai dua ekor mawas gergasi.", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-30-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapakah yang paling tidak disarankan untuk melakukan pendakian Gunung Tahan?", "gold_passage_id": "ms-wiki-30-2", "gold_passage_text": "Pendakian Gunung Tahan paling cepat adalah selama sembilan hari di dalam hutan bagi mereka yang sihat. Jika perjalanan dikira dari Kuala Lumpur, masa pendakian perlu ditambah lagi dua hari. Terpaksa merentas sungai dan runut yang sangat mencabar. Bagaimanapun, runut ini terbuka kepada orang ramai.", "gold_answer": "Orang yang sihat", "source_citation": "https://ms.wikipedia.org/?curid=30 (Wikipedia, CC BY-SA, article id 30)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-31-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah asal usul perkataan 'meter'?", "gold_passage_id": "ms-wiki-31-0", "gold_passage_text": "Sejarah\nPerkataan meter berasal daripada istilah métron dalam bahasa Yunani yang bermaksud \"ukuran\"; kata ini seasal dengan kata मात्रा mātrā yang sama maksudnya dalam bahasa Sanskrit; kedua-dua bahasa ini dikelompokkan dalam rumpun bahasa Indo-Eropah. Penetapan ini mula dipiawaikan dalam laporan yang dihantarkan kepada Akademi Sains Perancis oleh Jean-Charles de Borda, Joseph-Louis Lagrange, Nicolas de Condorcet dan Pierre-Simon de Laplace bahawa:", "gold_answer": "Perkataan meter berasal daripada istilah 'métron' dalam bahasa Yunani yang bermaksud 'ukuran'.", "source_citation": "https://ms.wikipedia.org/?curid=31 (Wikipedia, CC BY-SA, article id 31)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-31-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang menyampaikan laporan tentang meter kepada Akademi Sains Perancis?", "gold_passage_id": "ms-wiki-31-0", "gold_passage_text": "Sejarah\nPerkataan meter berasal daripada istilah métron dalam bahasa Yunani yang bermaksud \"ukuran\"; kata ini seasal dengan kata मात्रा mātrā yang sama maksudnya dalam bahasa Sanskrit; kedua-dua bahasa ini dikelompokkan dalam rumpun bahasa Indo-Eropah. Penetapan ini mula dipiawaikan dalam laporan yang dihantarkan kepada Akademi Sains Perancis oleh Jean-Charles de Borda, Joseph-Louis Lagrange, Nicolas de Condorcet dan Pierre-Simon de Laplace bahawa:", "gold_answer": "Jean-Charles de Borda, Joseph-Louis Lagrange, Nicolas de Condorcet, dan Pierre-Simon de Laplace.", "source_citation": "https://ms.wikipedia.org/?curid=31 (Wikipedia, CC BY-SA, article id 31)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-31-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang dilakukan pengikut teks ini untuk menentukan satuan ukur panjang?", "gold_passage_id": "ms-wiki-31-1", "gold_passage_text": "« Nous fixons l'unité de mesure à la dix-millionième partie du quart du méridien et nous la nommons mètre. »(\"Kami menetapkan satuan ukur panjang bersamaan satu persepuluh juta daripada satu perempat garis rembang, dan kami menamakannya mètre.\" )", "gold_answer": "Menggunakan satu persepuluh juta daripada satu perempat garis rembang.", "source_citation": "https://ms.wikipedia.org/?curid=31 (Wikipedia, CC BY-SA, article id 31)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-32-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Bahan-bahan apa yang termasuk dalam nebula yang membentuk Sistem Suria?", "gold_passage_id": "ms-wiki-32-0", "gold_passage_text": "Bahan tertua yang ditemui dalam Sistem Suria bertarikh Ga (bilion tahun dahulu). Dalam anggaran Ga, Bumi purba telah terbentuk. Jasad-jasad Sistem Suria terbentuk dan menjadi semakin besar seiring dengan Matahari. Secara teorinya, nebula suria menyekat sebahagian daripada isi padu awan molekul melalui keruntuhan graviti, kemudian mula berputar dan meleper menjadi cakera sirkumnajam, kemudian planet-planet mula terbentuk daripada cakera itu seiring dengan Matahari. Satu nebula mengandungi gas, ira air batu dan debu (juga termasuk nuklida primodium). Menurut teori nebula, planetesimal terbentuk melalui proses tokokan, dengan Bumi primodium dianggarkan berkemungkinan mengambil masa antara 70 hingga 100 juta tahun untuk terbentuk.", "gold_answer": "Gas, ira air, batu, dan debu (termasuk nuklida primordial).", "source_citation": "https://ms.wikipedia.org/?curid=32 (Wikipedia, CC BY-SA, article id 32)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-32-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah masa yang dikira untuk pembentukan planetesimal Bumi menurut teori pembentukan nebula?", "gold_passage_id": "ms-wiki-32-0", "gold_passage_text": "Bahan tertua yang ditemui dalam Sistem Suria bertarikh Ga (bilion tahun dahulu). Dalam anggaran Ga, Bumi purba telah terbentuk. Jasad-jasad Sistem Suria terbentuk dan menjadi semakin besar seiring dengan Matahari. Secara teorinya, nebula suria menyekat sebahagian daripada isi padu awan molekul melalui keruntuhan graviti, kemudian mula berputar dan meleper menjadi cakera sirkumnajam, kemudian planet-planet mula terbentuk daripada cakera itu seiring dengan Matahari. Satu nebula mengandungi gas, ira air batu dan debu (juga termasuk nuklida primodium). Menurut teori nebula, planetesimal terbentuk melalui proses tokokan, dengan Bumi primodium dianggarkan berkemungkinan mengambil masa antara 70 hingga 100 juta tahun untuk terbentuk.", "gold_answer": "Antara 70 hingga 100 juta tahun.", "source_citation": "https://ms.wikipedia.org/?curid=32 (Wikipedia, CC BY-SA, article id 32)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-32-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah era zaman di mana banyak hentaman asteroid berlaku dan apa yang mempengaruhi persekitaran permukaan Bulan serta Bumi?", "gold_passage_id": "ms-wiki-32-1", "gold_passage_text": "Anggaran umur Bulan paling awal terbentuk sejak 4.5 Ga atau lebih muda. Hipotesis terkemuka berkenaan pembentukan Bulan adalah melalui tokokan bahan yang terlepas daripada Bumi selepas sebuah jasad bersaiz Marikh dengan kira-kira 10% jisim Bumi yang bernama Theia itu berlanggar dengan Bumi. Ia menghentam Bumi melalui sudut sipi dan sebahagian daripada jisimnya telah bergabung dengan Bumi. Antara kira-kira 4.0 dan Ga, banyak hentaman asteroid berlaku sewaktu tempoh Pembedilan Berat Akhir menyebabkan perubahan ketara kepada persekitaran permukaan Bulan dan juga kepada Bumi menurut inferens yang sama.", "gold_answer": "Banyak hentaman asteroid berlaku pada era Zaman Akhir Perpaduan Berat (Zaman Berat Akhir), yang menyebabkan perubahan ketara kepada persekitaran permukaan Bulan dan Bumi.", "source_citation": "https://ms.wikipedia.org/?curid=32 (Wikipedia, CC BY-SA, article id 32)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-32-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah julat masa dan nama objek yang terlibat dalam teori pembentukan Bulan?", "gold_passage_id": "ms-wiki-32-1", "gold_passage_text": "Anggaran umur Bulan paling awal terbentuk sejak 4.5 Ga atau lebih muda. Hipotesis terkemuka berkenaan pembentukan Bulan adalah melalui tokokan bahan yang terlepas daripada Bumi selepas sebuah jasad bersaiz Marikh dengan kira-kira 10% jisim Bumi yang bernama Theia itu berlanggar dengan Bumi. Ia menghentam Bumi melalui sudut sipi dan sebahagian daripada jisimnya telah bergabung dengan Bumi. Antara kira-kira 4.0 dan Ga, banyak hentaman asteroid berlaku sewaktu tempoh Pembedilan Berat Akhir menyebabkan perubahan ketara kepada persekitaran permukaan Bulan dan juga kepada Bumi menurut inferens yang sama.", "gold_answer": "Teori pembentukan Bulan melibatkan jasad bersaiz Marikh bernama Theia yang berlanggar dengan Bumi, dengan anggarannya paling awal terbentuk sejak 4.5 Ga atau lebih muda.", "source_citation": "https://ms.wikipedia.org/?curid=32 (Wikipedia, CC BY-SA, article id 32)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-32-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah persentase kilauan Matahari semasa Bumi terbentuk, yang menyebabkan air tidak membeku dalam laut?", "gold_passage_id": "ms-wiki-32-2", "gold_passage_text": "Atmosfera dan lautan bumi terbentuk akibat aktiviti gunung berapi dan peluahgasan. Wap air daripada dua sumber ini terpeluwap ke dalam lautan, diimbuh dengan sumber air daripada asteroid, protoplanet dan komet. Air yang mencukupi untuk memenuhi lautan mungkin ada di Bumi sejak ia terbentuk. Dalam model ini, gas rumah hijau atmosfera menghalang lautan daripada membeku apabila Matahari yang baru terbentuk hanya mempunyai kekilauan 70% daripada nilai semasanya. Menjelang Ga, medan magnet Bumi telah terbentuk dan membantu menghalang atmosfera daripada ditanggalkan oleh angin suria.", "gold_answer": "70% daripada nilai semasa.", "source_citation": "https://ms.wikipedia.org/?curid=32 (Wikipedia, CC BY-SA, article id 32)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-32-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa fungsi medan magnet Bumi pada masa Ga untuk melindungi atmosfera?", "gold_passage_id": "ms-wiki-32-2", "gold_passage_text": "Atmosfera dan lautan bumi terbentuk akibat aktiviti gunung berapi dan peluahgasan. Wap air daripada dua sumber ini terpeluwap ke dalam lautan, diimbuh dengan sumber air daripada asteroid, protoplanet dan komet. Air yang mencukupi untuk memenuhi lautan mungkin ada di Bumi sejak ia terbentuk. Dalam model ini, gas rumah hijau atmosfera menghalang lautan daripada membeku apabila Matahari yang baru terbentuk hanya mempunyai kekilauan 70% daripada nilai semasanya. Menjelang Ga, medan magnet Bumi telah terbentuk dan membantu menghalang atmosfera daripada ditanggalkan oleh angin suria.", "gold_answer": "Menjaga atmosfera tidak ditanggalkan oleh angin suria.", "source_citation": "https://ms.wikipedia.org/?curid=32 (Wikipedia, CC BY-SA, article id 32)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-33-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Di mana tepat bersempadan Wilayah Luar Negeri Perancis Guiana Perancis dengan negara-negara lain?", "gold_passage_id": "ms-wiki-33-1", "gold_passage_text": "Perancis Metropolitan, iaitu wilayah Perancis yang utama, bersempadan dengan Teluk Biscay dan Selat Inggeris, antara Belgium dan Sepanyol, tenggara United Kingdom; bersempadan dengan Laut Mediterranean, antara Itali dan Sepanyol. Wilayah ini juga mempunyai sempadan dengan negara Belgium, Jerman dan Luxembourg di sebelah timur laut; Switzerland di sebelah timur; Itali dan Monaco di sebelah tenggara; dan Andorra dan Sepanyol di sebelah barat daya. Selain itu, Wilayah Luar Negeri Perancis Guiana Perancis juga berkongsi sempadan darat dengan Brazil dan Suriname, dan Saint-Martin pula bersempadan dengan Antillen Belanda. Perancis dihubungkan dengan United Kingdom melalui Terowong Selat, yang berlalu di bawah Selat Inggeris. 18 kawasan utama Perancis (lima daripadanya terletak di luar negeri) menjangkau keluasan dan lebih 67 juta orang penduduk ().", "gold_answer": "Dengan Brazil, Suriname, Antillen Belanda, dan Saint-Martin.", "source_citation": "https://ms.wikipedia.org/?curid=33 (Wikipedia, CC BY-SA, article id 33)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-33-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa luas dan berapa jumlah penduduk dalam satu kawasan utama Perancis menurut teks ini?", "gold_passage_id": "ms-wiki-33-1", "gold_passage_text": "Perancis Metropolitan, iaitu wilayah Perancis yang utama, bersempadan dengan Teluk Biscay dan Selat Inggeris, antara Belgium dan Sepanyol, tenggara United Kingdom; bersempadan dengan Laut Mediterranean, antara Itali dan Sepanyol. Wilayah ini juga mempunyai sempadan dengan negara Belgium, Jerman dan Luxembourg di sebelah timur laut; Switzerland di sebelah timur; Itali dan Monaco di sebelah tenggara; dan Andorra dan Sepanyol di sebelah barat daya. Selain itu, Wilayah Luar Negeri Perancis Guiana Perancis juga berkongsi sempadan darat dengan Brazil dan Suriname, dan Saint-Martin pula bersempadan dengan Antillen Belanda. Perancis dihubungkan dengan United Kingdom melalui Terowong Selat, yang berlalu di bawah Selat Inggeris. 18 kawasan utama Perancis (lima daripadanya terletak di luar negeri) menjangkau keluasan dan lebih 67 juta orang penduduk ().", "gold_answer": "Luas 67 juta orang penduduk, mengandungi 18 kawasan utama.", "source_citation": "https://ms.wikipedia.org/?curid=33 (Wikipedia, CC BY-SA, article id 33)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-33-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa kedudukan Perancis dalam Kesatuan Eropah?", "gold_passage_id": "ms-wiki-33-2", "gold_passage_text": "Perancis adalah antara anggota pertama dan utama Kesatuan Eropah, ahli Pertubuhan Perjanjian Atlantik Utara, Pertubuhan Kerjasama dan Pembangunan Ekonomi, G7 dan ahli tetap Majlis Keselamatan Pertubuhan Bangsa-Bangsa Bersatu.", "gold_answer": "Perancis adalah anggota pertama dan utama Kesatuan Eropah.", "source_citation": "https://ms.wikipedia.org/?curid=33 (Wikipedia, CC BY-SA, article id 33)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-33-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah Perancis dianggap sebagai ahli tetap Majlis Keselamatan Pertubuhan Bangsa-Bangsa Bersatu?", "gold_passage_id": "ms-wiki-33-2", "gold_passage_text": "Perancis adalah antara anggota pertama dan utama Kesatuan Eropah, ahli Pertubuhan Perjanjian Atlantik Utara, Pertubuhan Kerjasama dan Pembangunan Ekonomi, G7 dan ahli tetap Majlis Keselamatan Pertubuhan Bangsa-Bangsa Bersatu.", "gold_answer": "Perancis dianggap sebagai ahli tetap Majlis Keselamatan Pertubuhan Bangsa-Bangsa Bersatu.", "source_citation": "https://ms.wikipedia.org/?curid=33 (Wikipedia, CC BY-SA, article id 33)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-34-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa nama genus tumbuhan berbunga yang dikaitkan dengan spesies Pakma, padma, patma, dan kerubut?", "gold_passage_id": "ms-wiki-34-0", "gold_passage_text": "Pakma, padma, patma atau kerubut ialah sejenis tumbuhan berbunga dalam genus parasit Rafflesia keluarga Rafflesiaceae. Spesies-spesiesnya berbunga besar daripada kudup yang muncul terus dari tanah atau berpangkal pada pokok perumah; salah satu spesies genus ini mempunyai bunga yang terbesar di dunia. Genus ini memuatkan kira-kira 28 spesies (termasuk empat spesies yang belum selesai dicirikan sesuai yang dikenal pada 1997 oleh Willem Meijer dalam monograf terbaru genus itu), semua spesies dalam genus ini ditemui di Asia Tenggara.", "gold_answer": "Genus Rafflesia.", "source_citation": "https://ms.wikipedia.org/?curid=34 (Wikipedia, CC BY-SA, article id 34)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-34-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Siapa yang menemukan karya Louis Auguste Deschamps di Jawa pada tahun 1791 hingga 1794?", "gold_passage_id": "ms-wiki-34-1", "gold_passage_text": "Ia julung kali diberi perhatian oleh orang Barat melalui penemuan oleh pakar bedah dan alamiah Perancis, Louis Auguste Deschamps di Jawa antara 1791 dan 1794; namun, catatan dan gambarannya dirampas oleh tentera laut British pada 1803 dan tidak diterbitkan kepada ahli-ahli sains Barat sampai tahun 1861.", "gold_answer": "Paekar bedah dan alamiah Perancis, Louis Auguste Deschamps.", "source_citation": "https://ms.wikipedia.org/?curid=34 (Wikipedia, CC BY-SA, article id 34)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-34-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Pada tahun mana karya Deschamps dirampas oleh tentera laut British?", "gold_passage_id": "ms-wiki-34-1", "gold_passage_text": "Ia julung kali diberi perhatian oleh orang Barat melalui penemuan oleh pakar bedah dan alamiah Perancis, Louis Auguste Deschamps di Jawa antara 1791 dan 1794; namun, catatan dan gambarannya dirampas oleh tentera laut British pada 1803 dan tidak diterbitkan kepada ahli-ahli sains Barat sampai tahun 1861.", "gold_answer": "Pada tahun 1803.", "source_citation": "https://ms.wikipedia.org/?curid=34 (Wikipedia, CC BY-SA, article id 34)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-34-1-q3", "language": "ms", "domain": "wikipedia_general", "question": "Kapan orang Barat pertama kali diberi perhatian terhadap karya Deschamps?", "gold_passage_id": "ms-wiki-34-1", "gold_passage_text": "Ia julung kali diberi perhatian oleh orang Barat melalui penemuan oleh pakar bedah dan alamiah Perancis, Louis Auguste Deschamps di Jawa antara 1791 dan 1794; namun, catatan dan gambarannya dirampas oleh tentera laut British pada 1803 dan tidak diterbitkan kepada ahli-ahli sains Barat sampai tahun 1861.", "gold_answer": "Pada tahun 1791.", "source_citation": "https://ms.wikipedia.org/?curid=34 (Wikipedia, CC BY-SA, article id 34)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-34-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah nama padma diserap daripada perkataan 'padma' dalam bahasa Sanskrit yang bermaksud 'teratai'?", "gold_passage_id": "ms-wiki-34-2", "gold_passage_text": "Penamaan\nNama-nama padma (), pakma () dan patma () diserap daripada perkataan padma dalam bahasa Sanskrit yang bermaksud \"teratai\"; nama patma diberikan melalui bahasa Jawa yang juga dipakai di Sarawak. Nama pakma dikenali umum di Malaysia dan pernah dipakai khusus kepada spesies Rafflesia patma di Perak dan R. hasseltii di pulau Sumatera, nama padma dipakai di Indonesia.", "gold_answer": "Nama padma diserap daripada perkataan padma dalam bahasa Sanskrit yang bermaksud 'teratai'.", "source_citation": "https://ms.wikipedia.org/?curid=34 (Wikipedia, CC BY-SA, article id 34)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-34-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah nama padma yang digunakan di Indonesia?", "gold_passage_id": "ms-wiki-34-2", "gold_passage_text": "Penamaan\nNama-nama padma (), pakma () dan patma () diserap daripada perkataan padma dalam bahasa Sanskrit yang bermaksud \"teratai\"; nama patma diberikan melalui bahasa Jawa yang juga dipakai di Sarawak. Nama pakma dikenali umum di Malaysia dan pernah dipakai khusus kepada spesies Rafflesia patma di Perak dan R. hasseltii di pulau Sumatera, nama padma dipakai di Indonesia.", "gold_answer": "Nama padma yang dipakai di Indonesia.", "source_citation": "https://ms.wikipedia.org/?curid=34 (Wikipedia, CC BY-SA, article id 34)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-35-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Di mana spesies Bunga Patma tersebut dijumpai?", "gold_passage_id": "ms-wiki-35-0", "gold_passage_text": "Dr Joseph Arnold adalah salah seorang yang menjumpai dan merekodkan Bunga Patma bersama dengan Sir Stamford Raffles pada tahun 1816. Spesies Bunga Patma itu diberi nama Rafflesia arnoldii sempena nama mereka. Bunga Patma itu dijumpai di bandar Bengkulu (Bencoolen) di Sumatera.", "gold_answer": "Spesies Bunga Patma dijumpai di bandar Bengkulu (Bencoolen) di Sumatera.", "source_citation": "https://ms.wikipedia.org/?curid=35 (Wikipedia, CC BY-SA, article id 35)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-37-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa objek yang paling terang boleh dilihat di langit selepas Matahari?", "gold_passage_id": "ms-wiki-37-1", "gold_passage_text": "Bulan ialah objek yang paling terang boleh dilihat di langit selepas Matahari. Walau bagaimanapun, bulan tidak mempunyai sumber cahaya dan hanya memantulkan cahaya Matahari. Ppermukaannya amat gelap dengan kepantulan yang sama dengan arang. Bulan mempunyai 1/4 garis pusat bumi bersamaan dengan 3,476 kilometer dengan kekuatan graviti hanya 0.16 = (1/6) graviti Bumi. Bulan ialah satelit yang kedua paling mampat selepas Io, sebuah satelit Musytari.", "gold_answer": "Bulan.", "source_citation": "https://ms.wikipedia.org/?curid=37 (Wikipedia, CC BY-SA, article id 37)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-37-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapa jumlah garis pusat bumi yang dimiliki oleh bulan?", "gold_passage_id": "ms-wiki-37-1", "gold_passage_text": "Bulan ialah objek yang paling terang boleh dilihat di langit selepas Matahari. Walau bagaimanapun, bulan tidak mempunyai sumber cahaya dan hanya memantulkan cahaya Matahari. Ppermukaannya amat gelap dengan kepantulan yang sama dengan arang. Bulan mempunyai 1/4 garis pusat bumi bersamaan dengan 3,476 kilometer dengan kekuatan graviti hanya 0.16 = (1/6) graviti Bumi. Bulan ialah satelit yang kedua paling mampat selepas Io, sebuah satelit Musytari.", "gold_answer": "1/4 garis pusat bumi bersamaan dengan 3,476 kilometer.", "source_citation": "https://ms.wikipedia.org/?curid=37 (Wikipedia, CC BY-SA, article id 37)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-37-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa hubungan antara kelajuan orbit Bulan dengan ukuran orbit dan jaraknya dari Bumi?", "gold_passage_id": "ms-wiki-37-2", "gold_passage_text": "Penonjolan Bulan di langit dan fasa kitarannya yang tetap menjadikan Bulan sebuah pengaruh penting terhadap bahasa, takwim, seni dan mitologi umat manusia semenjak zaman kuno lagi. Pengaruh graviti Bulan mencetuskan ombak laut dan kepanjangan hari yang halus. Kejauhan orbit Bulan pada masa kini yang lebih kurang 30 kali diameter Bumi membuatnya kelihatan hampir sama besar dengan Matahari, dan membolehkannya hampir persis menudung Matahari sewaktu gerhana matahari. Kesamaan saiz yang kelihatan ini hanya kebetulan. Kejauhan lelurus Bulan dari Bumi sentiasa bertambah dan kini berada pada kadar 3.82 ± 0.07sm setiap tahun kendatipun kadar ini tidak malar.", "gold_answer": "Kelajuan orbit Bulan yang lebih tinggi menjadikannya jauh dari Bumi, sehingga jaraknya bertambah dan kini mencapai 3.82 ± 0.07 sm setiap tahun.", "source_citation": "https://ms.wikipedia.org/?curid=37 (Wikipedia, CC BY-SA, article id 37)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-37-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa kelihatan Bulan hampir sama besar dengan Matahari?", "gold_passage_id": "ms-wiki-37-2", "gold_passage_text": "Penonjolan Bulan di langit dan fasa kitarannya yang tetap menjadikan Bulan sebuah pengaruh penting terhadap bahasa, takwim, seni dan mitologi umat manusia semenjak zaman kuno lagi. Pengaruh graviti Bulan mencetuskan ombak laut dan kepanjangan hari yang halus. Kejauhan orbit Bulan pada masa kini yang lebih kurang 30 kali diameter Bumi membuatnya kelihatan hampir sama besar dengan Matahari, dan membolehkannya hampir persis menudung Matahari sewaktu gerhana matahari. Kesamaan saiz yang kelihatan ini hanya kebetulan. Kejauhan lelurus Bulan dari Bumi sentiasa bertambah dan kini berada pada kadar 3.82 ± 0.07sm setiap tahun kendatipun kadar ini tidak malar.", "gold_answer": "Ini berlaku kerana kejauhan orbit Bulan pada masa kini kira-kira 30 kali diameter Bumi.", "source_citation": "https://ms.wikipedia.org/?curid=37 (Wikipedia, CC BY-SA, article id 37)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-38-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapakah kawah Clavius bertahan berabad-abad lebih lama berbanding kawah di Bumi?", "gold_passage_id": "ms-wiki-38-0", "gold_passage_text": "Clavius ialah kawah qamari yang terbesar di Bulan, dengan garis pusat 230 kilometer dan sedalam 3.6 kilometer. Clavius dipercayai terhasil akibat hentaman komet atau asteroid pada permukaan Bulan. Ketiadaan air dan udara di Bulan menyebabkan kawah yang terbentuk kekal berjuta-juta tahun lamanya berbanding dengan kawah yang terdapat di Bumi.", "gold_answer": "Ketiadaan air dan udara di Bulan menyebabkan kawah yang terbentuk kekal berjuta-juta tahun lamanya, terasinya berbanding kawah di Bumi.", "source_citation": "https://ms.wikipedia.org/?curid=38 (Wikipedia, CC BY-SA, article id 38)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-39-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apakah planet Marikh merupakan planet mana dalam Sistem Suria?", "gold_passage_id": "ms-wiki-39-0", "gold_passage_text": "Marikh (lambang: ♂, daripada bahasa Arab atau Parsi: مريخ) merupakan planet yang keempat letaknya dari Matahari dalam Sistem Suria. Marikh terkenal dengan warna permukaannya yang merah apabila dilihat dari langit, terutamanya pada waktu malam. Ia mempunyai 2 satelit iaitu Phobos dan Deimos. Kedua-dua satelit tersebut menyerupai asteroid.", "gold_answer": "Planet yang keempat dari Matahari dalam Sistem Suria.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-39-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana permukaan planet Marikh terlihat apabila dilihat dari langit?", "gold_passage_id": "ms-wiki-39-0", "gold_passage_text": "Marikh (lambang: ♂, daripada bahasa Arab atau Parsi: مريخ) merupakan planet yang keempat letaknya dari Matahari dalam Sistem Suria. Marikh terkenal dengan warna permukaannya yang merah apabila dilihat dari langit, terutamanya pada waktu malam. Ia mempunyai 2 satelit iaitu Phobos dan Deimos. Kedua-dua satelit tersebut menyerupai asteroid.", "gold_answer": "Warnanya berwarna merah, terutamanya pada waktu malam.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-39-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Mengapa garis pusat pada garis khatulistiwa terpanjang bagi setiap planet dan bintang?", "gold_passage_id": "ms-wiki-39-1", "gold_passage_text": "Terdapat juga lingkaran asteroid yang kebanyakannya mengelilingi matahari di antara orbit planet ini dan Musytari. Putaran tersebut menyebabkan garis pusat pada garis khatulistiwa terpanjang bagi setiap planet dan bintang.", "gold_answer": "Sebab putaran tersebut menyebabkan lingkaran asteroid yang kebanyakannya mengelilingi matahari di antara orbit planet ini dan Musytari.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-39-1-q1", "language": "ms", "domain": "wikipedia_general", "question": "Di antara orbit planet dan Matahari, apakah objek lain yang kebanyakannya mengelilinginya?", "gold_passage_id": "ms-wiki-39-1", "gold_passage_text": "Terdapat juga lingkaran asteroid yang kebanyakannya mengelilingi matahari di antara orbit planet ini dan Musytari. Putaran tersebut menyebabkan garis pusat pada garis khatulistiwa terpanjang bagi setiap planet dan bintang.", "gold_answer": "Lingkaran asteroid.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-39-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Adakah Marikh dianggap mempunyai makhluk hidup oleh Percival Lowell?", "gold_passage_id": "ms-wiki-39-2", "gold_passage_text": "Marikh mempunyai tempat penting dalam imaginasi manusia disebabkan dipercayai ada makhluk hidup di Marikh. Ini disebabkan perjumpaan \"terusan Marikh\" oleh Percival Lowell (13 Mac 1855 – 12 November 1916), seorang penulis dan ahli astronomi Amerika yang menyatakan ia merupakan struktur buatan oleh penduduk planet Marikh dan perubahan kegelapan/kecerahan yang telah menyebabkan beliau percaya ada pertumbuhan vegetatif di Marikh. Di situ berpuncanya cereka tentang makhluk planet Marikh. Sekarang, pemerhatian Percival Lowell telah dikatakan tersesat dan dilabelkan sebagai paritan lama akibat pergerakan air pada zaman dahulu-kala.", "gold_answer": "Ya, berdasarkan teks, Percival Lowell menyatakan bahawa Marikh dianggap mempunyai makhluk hidup disebabkan perjumpaan 'terusan Marikh' yang beliau buat.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-39-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apa yang menyebabkan Percival Lowell percaya ada pertumbuhan vegetatif di planet Marikh?", "gold_passage_id": "ms-wiki-39-2", "gold_passage_text": "Marikh mempunyai tempat penting dalam imaginasi manusia disebabkan dipercayai ada makhluk hidup di Marikh. Ini disebabkan perjumpaan \"terusan Marikh\" oleh Percival Lowell (13 Mac 1855 – 12 November 1916), seorang penulis dan ahli astronomi Amerika yang menyatakan ia merupakan struktur buatan oleh penduduk planet Marikh dan perubahan kegelapan/kecerahan yang telah menyebabkan beliau percaya ada pertumbuhan vegetatif di Marikh. Di situ berpuncanya cereka tentang makhluk planet Marikh. Sekarang, pemerhatian Percival Lowell telah dikatakan tersesat dan dilabelkan sebagai paritan lama akibat pergerakan air pada zaman dahulu-kala.", "gold_answer": "Ini disebabkan oleh perubahan kegelapan/kecerahan di Marikh, yang beliau terfikir menyebabkan pertumbuhan vegetatif itu.", "source_citation": "https://ms.wikipedia.org/?curid=39 (Wikipedia, CC BY-SA, article id 39)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-40-0-q3", "language": "ms", "domain": "wikipedia_general", "question": "Bagaimana cahaya membantu untuk melihat?", "gold_passage_id": "ms-wiki-40-0", "gold_passage_text": "Cahaya (Jawi: ; pinjaman chāya), secara tepatnya dikenali sebagai cahaya tampak, merupakan tenaga berbentuk gelombang dan membantu manusia dan binatang melihat. Cahaya juga merupakan asas kepada ukuran meter yang mana 1 meter bersamaan dengan jarak dilalui cahaya melalui vakum pada 1/299,792,458 saat. Kelajuan cahaya ditakrifkan pada kelajuan 299,792,458 meter sesaat.", "gold_answer": "Menantu manusia dan binatang", "source_citation": "https://ms.wikipedia.org/?curid=40 (Wikipedia, CC BY-SA, article id 40)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-40-1-q0", "language": "ms", "domain": "wikipedia_general", "question": "Who are the two types of animals that eat only plants, and how are they named in the passage?", "gold_passage_id": "ms-wiki-40-1", "gold_passage_text": "Cahaya diperlukan dalam kehidupan seharian. Matahari ialah sumber cahaya yang utama. Tumbuhan hijau memerlukan cahaya untuk membuat makanan. Tumbuhan hijau ini akan menjadi makanan kepada haiwan lain yang akan menjadi makanan kepada haiwan lain pula. Interaksi ini membentuk rantaian makanan. Haiwan yang makan tumbuhan sahaja dikenali sebagai haiwan maun. Haiwan yang makan daging sahaja dikenali sebagai haiwan maging. Haiwan yang makan tumbuhan dan daging dikenali sebagai haiwan maserba.", "gold_answer": "Haiwan maun and haiwan maun", "source_citation": "https://ms.wikipedia.org/?curid=40 (Wikipedia, CC BY-SA, article id 40)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-42-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa sebutan yang diberikan kepada Laut Kaspia kerana ciri-ciri airnya yang masin?", "gold_passage_id": "ms-wiki-42-0", "gold_passage_text": "Laut Kaspia atau Laut Tabaristan merupakan sebuah jasad air pedalaman yang terletak di antara Asia dan Eropah. Ia tidak bersambung dengan mana-mana lautan, maka ia turut digelar sebagai tasik terbesar di dunia, namun ciri airnya yang masin menjadikannya mempunyai kedua-dua ciri laut dan tasik. Tahap kemasinannya ialah sekitar 1.2%, satu pertiga daripada kemasinan air laut biasa.", "gold_answer": "Dikenal sebagai tasik terbesar di dunia.", "source_citation": "https://ms.wikipedia.org/?curid=42 (Wikipedia, CC BY-SA, article id 42)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-42-0-q1", "language": "ms", "domain": "wikipedia_general", "question": "Berapakah kadar kemasinannya laut Kaspia, dan berapa peratus daripada kemasinan air laut biasa?", "gold_passage_id": "ms-wiki-42-0", "gold_passage_text": "Laut Kaspia atau Laut Tabaristan merupakan sebuah jasad air pedalaman yang terletak di antara Asia dan Eropah. Ia tidak bersambung dengan mana-mana lautan, maka ia turut digelar sebagai tasik terbesar di dunia, namun ciri airnya yang masin menjadikannya mempunyai kedua-dua ciri laut dan tasik. Tahap kemasinannya ialah sekitar 1.2%, satu pertiga daripada kemasinan air laut biasa.", "gold_answer": "Sekitar 1,2%, satu pertiga daripada kemasinan air laut biasa.", "source_citation": "https://ms.wikipedia.org/?curid=42 (Wikipedia, CC BY-SA, article id 42)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-42-0-q2", "language": "ms", "domain": "wikipedia_general", "question": "Di mana terletak Laut Kaspia?", "gold_passage_id": "ms-wiki-42-0", "gold_passage_text": "Laut Kaspia .", "source_citation": "https://ms.wikipedia.org/?curid=42 (Wikipedia, CC BY-SA, article id 42)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-42-2-q0", "language": "ms", "domain": "wikipedia_general", "question": "Di mana terletak Laut Kaspia dari segi jarak ke arah utara dan selatan?", "gold_passage_id": "ms-wiki-42-2", "gold_passage_text": "Laut Kaspia mempunyai luas permukaan 371,000 km2 dan kedalaman maksimum 980 m. Ia mengunjur sejauh 1,210 km dari utara ke selatan dan sejauh 210 hingga 436 km dari timur ke barat.", "gold_answer": "Ia mengunjur sejauh 1,210 km dari utara ke selatan.", "source_citation": "https://ms.wikipedia.org/?curid=42 (Wikipedia, CC BY-SA, article id 42)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-42-2-q1", "language": "ms", "domain": "wikipedia_general", "question": "Apakah julat jarak horizontal (dari timur ke barat) untuk Laut Kaspia?", "gold_passage_id": "ms-wiki-42-2", "gold_passage_text": "Laut Kaspia mempunyai luas permukaan 371,000 km2 dan kedalaman maksimum 980 m. Ia mengunjur sejauh 1,210 km dari utara ke selatan dan sejauh 210 hingga 436 km dari timur ke barat.", "gold_answer": "Julat jarak tersebut adalah antara 210 hingga 436 km.", "source_citation": "https://ms.wikipedia.org/?curid=42 (Wikipedia, CC BY-SA, article id 42)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ms-wiki-43-0-q0", "language": "ms", "domain": "wikipedia_general", "question": "Apa posisi Tasik Titicaca
