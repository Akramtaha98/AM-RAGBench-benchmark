the passage?", "gold_passage_id": "ar-wiki-1364-1", "gold_passage_text": "في منتصف السبعينيات، ذهب والده نيلس تورفالدس ذو الميول الشيوعية إلى موسكو ودرس وأقام في موسكو عاماً كاملاً، بعدها عمل في الصحافة، ووالدته آنا تورفالدس كانت تعمل لصحيفة فنلندية كـمترجمة ومنشئة للرسومات الإخبارية، كما أن جدّه كان يعمل في صحيفة فنلندية، وخاله كان يعمل في التلفزيون الفنلندي.", "gold_answer": "Niels Toffels' father was communist and went to Moscow in the middle of the 1970s to study and live there for a full year.", "source_citation": "https://ar.wikipedia.org/?curid=1364 (Wikipedia, CC BY-SA, article id 1364)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1364-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "What profession did his mother have according to the passage?", "gold_passage_id": "ar-wiki-1364-1", "gold_passage_text": "في منتصف السبعينيات، ذهب والده نيلس تورفالدس ذو الميول الشيوعية إلى موسكو ودرس وأقام في موسكو عاماً كاملاً، بعدها عمل في الصحافة، ووالدته آنا تورفالدس كانت تعمل لصحيفة فنلندية كـمترجمة ومنشئة للرسومات الإخبارية، كما أن جدّه كان يعمل في صحيفة فنلندية، وخاله كان يعمل في التلفزيون الفنلندي.", "gold_answer": "His mother, Anna Toffels, was a translator and graphic editor for a Finnish newspaper.", "source_citation": "https://ar.wikipedia.org/?curid=1364 (Wikipedia, CC BY-SA, article id 1364)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1364-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "أي من الشخصيات التالية ولدت في مدينة سان هوزيه؟", "gold_passage_id": "ar-wiki-1364-2", "gold_passage_text": "ينحدر لينوس من عائلة من الأقلّيّة الناطقة بالسويدية. انخرط في جامعة هلسنكي في العام 1988 للدّراسة، ويعيش لينوس حاليّاً في مدينة سان هوزيه في ولاية كاليفورنيا الأمريكيّة مع زوجته تووُفي الحائزة على البطولة في مباريات الكاراتيه في فنلندا 6 مرّات. تزوّجا في خريف العام 1988. لديهما 3 بنات وهما : باتريشا ميراندا والمولودة في 5 ديسمبر 1996، دانيلّا يولاندا والمولودة في 16 ابريل 1998، سيليست أماندا والمولودة في 20 نوفمبر 2000.", "gold_answer": "لينوس", "source_citation": "https://ar.wikipedia.org/?curid=1364 (Wikipedia, CC BY-SA, article id 1364)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text"}, {"id": "ar-wiki-1364-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي عام بدأت لينوس دراساته الجامعية؟", "gold_passage_id": "ar-wiki-1364-2", "gold_passage_text": "ينحدر لينوس من عائلة من الأقلّيّة الناطقة بالسويدية. انخرط في جامعة هلسنكي في العام 1988 للدّراسة، ويعيش لينوس حاليّاً في مدينة سان هوزيه في ولاية كاليفورنيا الأمريكيّة مع زوجته تووُفي الحائزة على البطولة في مباريات الكاراتيه في فنلندا 6 مرّات. تزوّجا في خريف العام 1988. لديهما 3 بنات وهما : باتريشا ميراندا والمولودة في 5 ديسمبر 1996، دانيلّا يولاندا والمولودة في 16 ابريل 1998، سيليست أماندا والمولودة في 20 نوفمبر 2000.", "gold_answer": "العام 1988", "source_citation": "https://ar.wikipedia.org/?curid=1364 (Wikipedia, CC BY-SA, article id 1364)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text"}, {"id": "ar-wiki-1367-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "أين تقع عاصمة روسيا؟", "gold_passage_id": "ar-wiki-1367-0", "gold_passage_text": "موسكو هي عاصمة روسيا وأكبر مدنها، تقع على نهر موسكفا المتصل بنهر فولغا عبر قناة موسكو في وسط روسيا، ويقدر عدد سكانها بنحو أكثر من 13 مليون نسمة داخل حدود المدينة، وأكثر من 19.1 مليون نسمة في المنطقة الحضرية، وأكثر من 21.5 مليون نسمة في منطقة موسكو العاصمة، موسكو هي مركز السياسة والاقتصاد والثقافة والدين والمالية والتعليم والنقل في روسيا، وتعتبر مدينة عالمية. وتعد موسكو من بين أكبر مدن العالم، حيث تعد المدينة الأكثر اكتظاظًا بالسكان في أوروبا بالكامل، وأكبر منطقة حضرية في أوروبا.", "gold_answer": "في وسط روسيا، على نهر موسكفا المتصل بنهر فولغا عبر قناة موسكو.", "source_citation": "https://ar.wikipedia.org/?curid=1367 (Wikipedia, CC BY-SA, article id 1367)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1367-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي أكبر مدينة في أوروبا؟", "gold_passage_id": "ar-wiki-1367-0", "gold_passage_text": "موسكو هي عاصمة روسيا وأكبر مدنها، تقع على نهر موسكفا المتصل بنهر فولغا عبر قناة موسكو في وسط روسيا، ويقدر عدد سكانها بنحو أكثر من 13 مليون نسمة داخل حدود المدينة، وأكثر من 19.1 مليون نسمة في المنطقة الحضرية، وأكثر من 21.5 مليون نسمة في منطقة موسكو العاصمة، موسكو هي مركز السياسة والاقتصاد والثقافة والدين والمالية والتعليم والنقل في روسيا، وتعتبر مدينة عالمية. وتعد موسكو من بين أكبر مدن العالم، حيث تعد المدينة الأكثر اكتظاظًا بالسكان في أوروبا بالكامل، وأكبر منطقة حضرية في أوروبا.", "gold_answer": "موسكو، حيث تعد الأكثر اكتظاظًا بالسكان في أوروبا.", "source_citation": "https://ar.wikipedia.org/?curid=1367 (Wikipedia, CC BY-SA, article id 1367)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1367-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي منطقة تقع مدينة موسكو geographically؟", "gold_passage_id": "ar-wiki-1367-1", "gold_passage_text": "تقع على نهر موسكفا في المنطقة الفيدرالية المركزية في المنطقة الأوروبية من روسيا. موسكو تقع على ملتقى ثلاث منصات جيولوجية. تاريخياً، كانت موسكو عاصمة الاتحاد السوفيتي، والإمبراطورية الروسية (لثلاث سنين 1728–1730)، روسيا القيصرية، ودوقية موسكو، وهي موقع كرملن موسكو، أحد مواقع التراث العالمي في المدينة، الذي يخدم الرئيس الروسي كمنزل. البرلمان الروسي (مجلس الدوما ومجلس الاتحاد) والحكومة الروسية يقعون في المدينة أيضاً.", "gold_answer": "تقع في المنطقة الفيدرالية المركزية في المنطقة الأوروبية من روسيا.", "source_citation": "https://ar.wikipedia.org/?curid=1367 (Wikipedia, CC BY-SA, article id 1367)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1367-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الأهمية الثقافية أو التاريخية لدولة موسكو؟", "gold_passage_id": "ar-wiki-1367-1", "gold_passage_text": "تقع على نهر موسكفا في المنطقة الفيدرالية المركزية في المنطقة الأوروبية من روسيا. موسكو تقع على ملتقى ثلاث منصات جيولوجية. تاريخياً، كانت موسكو عاصمة الاتحاد السوفيتي، والإمبراطورية الروسية (لثلاث سنين 1728–1730)، روسيا القيصرية، ودوقية موسكو، وهي موقع كرملن موسكو، أحد مواقع التراث العالمي في المدينة، الذي يخدم الرئيس الروسي كمنزل. البرلمان الروسي (مجلس الدوما ومجلس الاتحاد) والحكومة الروسية يقعون في المدينة أيضاً.", "gold_answer": "تاريخيًا، كانت عاصمة الاتحاد السوفيتي، والإمبراطورية الروسية، روسيا القيصرية، ودوقية موسكو.", "source_citation": "https://ar.wikipedia.org/?curid=1367 (Wikipedia, CC BY-SA, article id 1367)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1367-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي مكان يقع النظام الثاني من خطوط مترو الأنفاق وتبلغ كثافته فيه أعلى من أي مدينة أخرى؟", "gold_passage_id": "ar-wiki-1367-2", "gold_passage_text": "تعتبر موسكو مركزاً اقتصادياً رئيسياً، فهي تحتوي العديد من المؤسسات العلمية والتعليمية، والعديد من المرافق الرياضية كذلك. فهي تمتلك نظام نقل معقد يشمل أربعة مطارات دولية، تسعة محطات للسكك الحديدية، ونظام المترو الثاني أكثر ازدحاماً في العالم (بعد طوكيو) الذي يشتهر بهندسته المعمارية والأعمال الفنية. المترو هو المترو أكثر ازدحاماً المشغل بالفرد في العالم.", "gold_answer": "في طوكيو، حيث هو المترو الأكثر ازدحاماً من حيث كثافة المستخدمين في العالم.", "source_citation": "https://ar.wikipedia.org/?curid=1367 (Wikipedia, CC BY-SA, article id 1367)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1367-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي المزايا الرئيسية التي تتميز بها موسكو كمركز اقتصادي رئيسي؟", "gold_passage_id": "ar-wiki-1367-2", "gold_passage_text": "تعتبر موسكو مركزاً اقتصادياً رئيسياً، فهي تحتوي العديد من المؤسسات العلمية والتعليمية، والعديد من المرافق الرياضية كذلك. فهي تمتلك نظام نقل معقد يشمل أربعة مطارات دولية، تسعة محطات للسكك الحديدية، ونظام المترو الثاني أكثر ازدحاماً في العالم (بعد طوكيو) الذي يشتهر بهندسته المعمارية والأعمال الفنية. المترو هو المترو أكثر ازدحاماً المشغل بالفرد في العالم.", "gold_answer": "تمتلك موسكو العديد من المؤسسات العلمية والتعليمية، بالإضافة إلى عدد كبير من المرافق الرياضية.", "source_citation": "https://ar.wikipedia.org/?curid=1367 (Wikipedia, CC BY-SA, article id 1367)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1369-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "متى تم اعتماد الرقم السكاني لليمن في السطور المقدمة؟", "gold_passage_id": "ar-wiki-1369-0", "gold_passage_text": "اليَمَنُ (أو رَسْمِيًّا: الجُمْهُوْرِيَّةُ اليَمَنِيَّةُ)، هي دولة عربية تقع جنوب غرب شبه الجزيرة العربية في غرب آسيا. تبلغ مساحتها حوالي 555،000 كيلومترًا مربعًا، ويبلغ عدد سكانها 32،684،503 نسمة حسب الإسقاط السكاني لعام 2023. يحد اليمن من الشمال المملكة العربية السعودية ومن الشرق سلطنة عمان، ولها ساحل جنوبي على بحر العرب وساحل غربي على البحر الأحمر. ولدى اليمن أكثر من مائتي جزيرة في البحر الأحمر وبحر العرب أكبرها جزيرتي سقطرى وحنيش. ينص الدستور اليمني على ديمقراطية الدولة وإقرارها التعددية الحزبية والسياسية وتبنيها نظامًا اقتصاديًا حرًا والالتزام بالمواثيق والعهود الدولية المنصوص عليها في الإعلان العالمي لحقوق الإنسان وأن الشريعة الإسلامية هي مصدر جميع التشريعات. اليمن عضو في جامعة الدول العربية والأمم المتحدة وحركة عدم الانحياز ومنظمة التعاون الإسلامي ومنظمة التجارة العالمية.", "gold_answer": "حسب السطور المقدمة، تم تحديد عدد السكان لليمن على أساس الإحصاء السكاني لعام 2023.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1369-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "متى تم تسمية اليمن 'الجُمْهُوْرِيَّةُ اليَمَنِيَّةُ'؟", "gold_passage_id": "ar-wiki-1369-0", "gold_passage_text": "اليَمَنُ (أو رَسْمِيًّا: الجُمْهُوْرِيَّةُ اليَمَنِيَّةُ)، هي دولة عربية تقع جنوب غرب شبه الجزيرة العربية في غرب آسيا. تبلغ مساحتها حوالي 555،000 كيلومترًا مربعًا، ويبلغ عدد سكانها 32،684،503 نسمة حسب الإسقاط السكاني لعام 2023. يحد اليمن من الشمال المملكة العربية السعودية ومن الشرق سلطنة عمان، ولها ساحل جنوبي على بحر العرب وساحل غربي على البحر الأحمر. ولدى اليمن أكثر من مائتي جزيرة في البحر الأحمر وبحر العرب أكبرها جزيرتي سقطرى وحنيش. ينص الدستور اليمني على ديمقراطية الدولة وإقرارها التعددية الحزبية والسياسية وتبنيها نظامًا اقتصاديًا حرًا والالتزام بالمواثيق والعهود الدولية المنصوص عليها في الإعلان العالمي لحقوق الإنسان وأن الشريعة الإسلامية هي مصدر جميع التشريعات. اليمن عضو في جامعة الدول العربية والأمم المتحدة وحركة عدم الانحياز ومنظمة التعاون الإسلامي ومنظمة التجارة العالمية.", "gold_answer": "لم يتم ذكر التاريخ في النصوص المقدمة؛ النص يشير فقط إلى أن التسمية تعكس النظم التي تم إنجازه في اليمن.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1369-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "كيف يرتبط القطاع النفطي بالأدوار الاقتصادية لليمن كما ذكرها النص؟", "gold_passage_id": "ar-wiki-1369-1", "gold_passage_text": "يعتمد اقتصاد اليمن على موارد محدودة من النفط والغاز لم تستغل جيداً ولا يزال هذا القطاع رغم أنه يشكل النسبة الأكبر من الناتج المحلي الإجمالي غير مطور. تاريخياً، اليمن بلد زراعي، ولكنه يعتمد على مداخيل ممراته البحرية وموانئه.\nتمر البلاد بأوضاع سياسية واقتصادية صعبة نتيجة الفساد والصراعات المسلحة التي تعيق مسيرة التنمية. اليمن دولة نامية ومن بين البلدان الأقل نماءً حيث احتلت المرتبة الثامنة في قائمة الدول الأكثر هشاشة حول العالم لعام 2014.", "gold_answer": "يعتمد اقتصاد اليمن على موارد محدودة من النفط والغاز التي لم تستغل جيدًا، رغم أنها تشكل النسبة الأكبر من الناتج المحلي الإجمالي غير المطور.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1369-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي تصنيف دولي تُفرد اليمن في القائمة التي ذكرتها النص؟", "gold_passage_id": "ar-wiki-1369-1", "gold_passage_text": "يعتمد اقتصاد اليمن على موارد محدودة من النفط والغاز لم تستغل جيداً ولا يزال هذا القطاع رغم أنه يشكل النسبة الأكبر من الناتج المحلي الإجمالي غير مطور. تاريخياً، اليمن بلد زراعي، ولكنه يعتمد على مداخيل ممراته البحرية وموانئه.\nتمر البلاد بأوضاع سياسية واقتصادية صعبة نتيجة الفساد والصراعات المسلحة التي تعيق مسيرة التنمية. اليمن دولة نامية ومن بين البلدان الأقل نماءً حيث احتلت المرتبة الثامنة في قائمة الدول الأكثر هشاشة حول العالم لعام 2014.", "gold_answer": "تُعد اليمن دولة نامية، ومن بين أقل البلدان نمواً، حيث احتلت المرتبة الثامنة في قائمة الدول الأكثر هشاشة حول العالم لعام 2014.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1369-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي عام اندلعت احتجاجات شعبية مطالبة بإسقاط نظام علي عبد الله صالح؟", "gold_passage_id": "ar-wiki-1369-2", "gold_passage_text": "اندلعت احتجاجات شعبية مطالبة بإسقاط نظام علي عبد الله صالح في 2011، والذي حَكم اليمن منذ 1978. وُصف ذلك النظام «بالإقطاعي الذي تطور ليصبح خليطاً من الكليبتوقراطية والبلوتوقراطية». تقدمت السعودية بمبادرة للحفاظ على نفوذها عبر شخصيات من ذلك النظام، وافق عليها المجتمع الدولي للاستمرار في عمليات مكافحة الإرهاب. تنحى الرئيس صالح ومُنح و500 من أعوانه حصانة من الملاحقة القانونية عبر مجلس النواب. أُنتخب نائبه عبد ربه منصور هادي في انتخابات مرشح واحد في 21 فبراير 2012 لرئاسة مرحلة انتقالية لمدة سنتين. انعقدت جلسات الحوار الوطني اليمني في 18 مارس 2013 واختتمت بالتوقيع على وثيقة الحوار الوطني الشامل، ومُددت فترة رئاسة هادي لسنة أخرى من قِبَل المشاركين خلال ذلك المؤتمر.", "gold_answer": "في عام 2011.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1369-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الفترة التي حكمها اليمن بموجب النظام الذي وصفه بأنه «الإقطاعي»؟", "gold_passage_id": "ar-wiki-1369-2", "gold_passage_text": "اندلعت احتجاجات شعبية مطالبة بإسقاط نظام علي عبد الله صالح في 2011، والذي حَكم اليمن منذ 1978. وُصف ذلك النظام «بالإقطاعي الذي تطور ليصبح خليطاً من الكليبتوقراطية والبلوتوقراطية». تقدمت السعودية بمبادرة للحفاظ على نفوذها عبر شخصيات من ذلك النظام، وافق عليها المجتمع الدولي للاستمرار في عمليات مكافحة الإرهاب. تنحى الرئيس صالح ومُنح و500 من أعوانه حصانة من الملاحقة القانونية عبر مجلس النواب. أُنتخب نائبه عبد ربه منصور هادي في انتخابات مرشح واحد في 21 فبراير 2012 لرئاسة مرحلة انتقالية لمدة سنتين. انعقدت جلسات الحوار الوطني اليمني في 18 مارس 2013 واختتمت بالتوقيع على وثيقة الحوار الوطني الشامل، ومُددت فترة رئاسة هادي لسنة أخرى من قِبَل المشاركين خلال ذلك المؤتمر.", "gold_answer": "من 1978 حتى اندلاع الاحتجاجات في 2011.", "source_citation": "https://ar.wikipedia.org/?curid=1369 (Wikipedia, CC BY-SA, article id 1369)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1371-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "أي من النصوص تشير إلى أن المساجد تُطلق عليها اسم جامع خاصة إذا كان كبيرًا؟", "gold_passage_id": "ar-wiki-1371-0", "gold_passage_text": "المَسْجِد أو الجامع هو دار عبادة المسلمين، وتُقام فيه الصلوات الخمس المفروضة وغيرها، وسمي مسجداً لأنه مكان للسجود لله، ويُطلق على المسجد أيضاً اسم جامع، وخاصةً إذا كان كبيراً، وفي الغالب يُطلق على اسم «جامع» لمن يجمع الناس لأداء صلاة الجمعة فيه فكل جامع مسجد وليس كل مسجد بجامع، كذلك يطلق اسم مصلى بدل من اسم مسجد عند أداء بعض الصلوات الخمس المفروضة فيه وليس كلها مثل مصليات المدارس والمؤسسات والشركات وطرق السفر وغيرها التي غالباً ما يؤدى فيها صلاة محدودة بحسب الفترة الزمنية الحالية، ويدعى للصلاة في المسجد عن طريق الأذان، وذلك خمس مرات في اليوم.", "gold_answer": "تُطلق على المسجد أيضًا اسم جامع، وخاصةً إذا كان كبيراً.", "source_citation": "https://ar.wikipedia.org/?curid=1371 (Wikipedia, CC BY-SA, article id 1371)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1371-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الفعل الذي تُعتمد عليه الصلاة في المساجد؟", "gold_passage_id": "ar-wiki-1371-0", "gold_passage_text": "المَسْجِد أو الجامع هو دار عبادة المسلمين، وتُقام فيه الصلوات الخمس المفروضة وغيرها، وسمي مسجداً لأنه مكان للسجود لله، ويُطلق على المسجد أيضاً اسم جامع، وخاصةً إذا كان كبيراً، وفي الغالب يُطلق على اسم «جامع» لمن يجمع الناس لأداء صلاة الجمعة فيه فكل جامع مسجد وليس كل مسجد بجامع، كذلك يطلق اسم مصلى بدل من اسم مسجد عند أداء بعض الصلوات الخمس المفروضة فيه وليس كلها مثل مصليات المدارس والمؤسسات والشركات وطرق السفر وغيرها التي غالباً ما يؤدى فيها صلاة محدودة بحسب الفترة الزمنية الحالية، ويدعى للصلاة في المسجد عن طريق الأذان، وذلك خمس مرات في اليوم.", "gold_answer": "يدعى للصلاة في المسجد عن طريق الأذان.", "source_citation": "https://ar.wikipedia.org/?curid=1371 (Wikipedia, CC BY-SA, article id 1371)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1371-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "عُقد أن المسجد النبوي كان أول مبنى في العاصمة الإسلامية بعد وصول النبي محمد عليه الصلاة والسلام من مكة؟", "gold_passage_id": "ar-wiki-1371-1", "gold_passage_text": "[[ملف:Kaba.jpg|تصغير|الحرم المكي وفي وسطه الكعبة المشرفة بمكة المكرمة سنة 1880م.]]\n[[ملف:Old_Al-Masjid_Al-Nabawi_1908.jpg|تصغير|المسجد النبوي بالمدينة المنورة سنة 1905م.]]\nوكان المسجد هو أول مبنى تشهده المدينة المنورة العاصمة الأولى للدولة الإسلامية مباشرة بعد وصول النبي محمد عليه الصلاة والسلام مهاجرا من مكة، وشكل هذا المسجد إحدى ركائز بناء مجتمع مسلم من جميع النواحي الدينية والسياسية والاجتماعية.", "gold_answer": "نعم، كان المسجد هو أول مبنى تشهده المدينة المنورة مباشرة بعد وصول النبي محمد عليه الصلاة والسلام مهاجرا من مكة.", "source_citation": "https://ar.wikipedia.org/?curid=1371 (Wikipedia, CC BY-SA, article id 1371)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1371-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "أي من الأبعاد (الديني، السياسي، الاجتماعي) كان يُشكله المسجد النبوي؟", "gold_passage_id": "ar-wiki-1371-1", "gold_passage_text": "[[ملف:Kaba.jpg|تصغير|الحرم المكي وفي وسطه الكعبة المشرفة بمكة المكرمة سنة 1880م.]]\n[[ملف:Old_Al-Masjid_Al-Nabawi_1908.jpg|تصغير|المسجد النبوي بالمدينة المنورة سنة 1905م.]]\nوكان المسجد هو أول مبنى تشهده المدينة المنورة العاصمة الأولى للدولة الإسلامية مباشرة بعد وصول النبي محمد عليه الصلاة والسلام مهاجرا من مكة، وشكل هذا المسجد إحدى ركائز بناء مجتمع مسلم من جميع النواحي الدينية والسياسية والاجتماعية.", "gold_answer": "شكل المسجد إحدى ركائز بناء مجتمع مسلم من جميع النواحي الدينية والسياسية والاجتماعية.", "source_citation": "https://ar.wikipedia.org/?curid=1371 (Wikipedia, CC BY-SA, article id 1371)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1371-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "كيف تم تسمية الموضع الذي يمتنع فيه الناس بعد ذلك على أنه 'جامع'؟", "gold_passage_id": "ar-wiki-1371-2", "gold_passage_text": "أصل كلمة مسجد في اللغة العربية\nالمسجد هو الموضع الذي يسجد فيه، وكل موضع يتعبد فيه فهو مسجد، حيث قال الله تعالى ،\nو، أما الجامع فهو نعت للمسجد، ونعت بذلك لأنه علامة الاجتماع، وفي الصدر الأول كانوا يقتصرون على كلمة مسجد، ثم صنفوا فقالوا المسجد الجامع، وآونة يضيفونها إلى الصفة فيقولون مسجد الجامع، ثم تجوز الناس واقتصروا على الصفة فقالوا للمسجد الكبير الذي تصلى فيه الجمعة وإن كان صغيراً الجامع؛ لأنه يجمع الناس لوقت معلوم.", "gold_answer": "لأنها علامة الاجتماع", "source_citation": "https://ar.wikipedia.org/?curid=1371 (Wikipedia, CC BY-SA, article id 1371)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1371-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي مرحلة من مراحل التسمية تم تحديد 'المسجد الكبير' كمصطلح خاص بوقت الجمعة؟", "gold_passage_id": "ar-wiki-1371-2", "gold_passage_text": "أصل كلمة مسجد في اللغة العربية\nالمسجد هو الموضع الذي يسجد فيه، وكل موضع يتعبد فيه فهو مسجد، حيث قال الله تعالى ،\nو، أما الجامع فهو نعت للمسجد، ونعت بذلك لأنه علامة الاجتماع، وفي الصدر الأول كانوا يقتصرون على كلمة مسجد، ثم صنفوا فقالوا المسجد الجامع، وآونة يضيفونها إلى الصفة فيقولون مسجد الجامع، ثم تجوز الناس واقتصروا على الصفة فقالوا للمسجد الكبير الذي تصلى فيه الجمعة وإن كان صغيراً الجامع؛ لأنه يجمع الناس لوقت معلوم.", "gold_answer": "عندما تجاوز الناس التسمية الأصلية 'المسجد' واستخدموا الصفة فقط.", "source_citation": "https://ar.wikipedia.org/?curid=1371 (Wikipedia, CC BY-SA, article id 1371)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1372-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي بلد تقع مدينة سمرقند؟", "gold_passage_id": "ar-wiki-1372-0", "gold_passage_text": "سمرقند (بالأوزبكية: Samarqand؛ بالطاجيكية: Самарқанд؛ بالفارسية: سمرقند) هي مدينة تقع في جنوب شرق أوزبكستان، وهي من أقدم المدن المأهولة بالسكان في آسيا الوسطى، ويبلغ عدد سكانها 593,000 نسمة (2021)، وهي ثالث أكبر مدينة في أوزبكستان.", "gold_answer": "تقع سمرقند في أوزبكستان.", "source_citation": "https://ar.wikipedia.org/?curid=1372 (Wikipedia, CC BY-SA, article id 1372)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1372-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو عدد سكان سمرقند عام 2021؟", "gold_passage_id": "ar-wiki-1372-0", "gold_passage_text": "سمرقند (بالأوزبكية: Samarqand؛ بالطاجيكية: Самарқанд؛ بالفارسية: سمرقند) هي مدينة تقع في جنوب شرق أوزبكستان، وهي من أقدم المدن المأهولة بالسكان في آسيا الوسطى، ويبلغ عدد سكانها 593,000 نسمة (2021)، وهي ثالث أكبر مدينة في أوزبكستان.", "gold_answer": "بلغ عدد سكانها 593,000 نسمة.", "source_citation": "https://ar.wikipedia.org/?curid=1372 (Wikipedia, CC BY-SA, article id 1372)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_answer; REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1372-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "هل يُسَمّى (شمركنت) بناءً على أحد الشخصيات المذكورة في نص أم تُصنّف على أنها مدينة؟", "gold_passage_id": "ar-wiki-1372-1", "gold_passage_text": "اختلفت الآراء حول مؤسسها فهناك بعض الآراء ترى أنه (كيكاوس بن كيقباذ) وهناك آراء تقول إنه (الإسكندر الأكبر) وهناك من يرى أنه (شمر أبو كرب) ولذلك سميت (شمركنت) وعربت إلى (سمرقند).", "gold_answer": "تُصنّف على أنها مدينة، لأن النص ينص على أنها 'عربت إلى (سمرقند)' بينما تُذكر أسماء شخصية.", "source_citation": "https://ar.wikipedia.org/?curid=1372 (Wikipedia, CC BY-SA, article id 1372)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1372-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الآراء الواردة في النص بخصوص من هو مؤسس (شمركنت)؟", "gold_passage_id": "ar-wiki-1372-1", "gold_passage_text": "اختلفت الآراء حول مؤسسها فهناك بعض الآراء ترى أنه (كيكاوس بن كيقباذ) وهناك آراء تقول إنه (الإسكندر الأكبر) وهناك من يرى أنه (شمر أبو كرب) ولذلك سميت (شمركنت) وعربت إلى (سمرقند).", "gold_answer": "الآراء الواردة في النص هي أن مؤسس (شمركنت) قد هو (كيكاوس بن كيقباذ) أو (الإسكندر الأكبر) أو (شمر أبو كرب).", "source_citation": "https://ar.wikipedia.org/?curid=1372 (Wikipedia, CC BY-SA, article id 1372)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1372-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو المؤسس الذي سيطر على سمرقند وتولى عرشها في العصور الوسطى؟", "gold_passage_id": "ar-wiki-1372-2", "gold_passage_text": "عقب سيطرته على سمرقند في العصور الوسطى، أعلنها تيمورلنك، مؤسس إمبراطورية تيمور العظمى، عاصمة لدولته. وأحضر تيمورلنك أفضل المعمارين، والفنانين والحرفيين من شتى بقاع الأرض من الشرق إلى الغرب ومن الشمال إلى الجنوب، لبناء سمرقند بأفضل شكل ممكن، ما جعلها مركز ثقل العالم في تلك المرحلة من التاريخ. وتحولت المدينة إلى مركز علمي عالمي في عهد ابنه أولوغ بيك. ونجحت المدينة في نيل إعجاب كل من زارها على مر القرون الماضية، لا سيما أنها كانت من أهم أجزاء طريق الحرير. ولا تزال المدينة التي حظيت بمكانة واسعة في أشعار ومدائح وروايات الشعراء والكتّاب، تحافظ على رونقها التاريخي في يومنا الحالي.", "gold_answer": "تمورلنك", "source_citation": "https://ar.wikipedia.org/?curid=1372 (Wikipedia, CC BY-SA, article id 1372)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1372-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو السبب الذي يجعل المدينة اليوم مركزاً عالمياً للعلم؟", "gold_passage_id": "ar-wiki-1372-2", "gold_passage_text": "عقب سيطرته على سمرقند في العصور الوسطى، أعلنها تيمورلنك، مؤسس إمبراطورية تيمور العظمى، عاصمة لدولته. وأحضر تيمورلنك أفضل المعمارين، والفنانين والحرفيين من شتى بقاع الأرض من الشرق إلى الغرب ومن الشمال إلى الجنوب، لبناء سمرقند بأفضل شكل ممكن، ما جعلها مركز ثقل العالم في تلك المرحلة من التاريخ. وتحولت المدينة إلى مركز علمي عالمي في عهد ابنه أولوغ بيك. ونجحت المدينة في نيل إعجاب كل من زارها على مر القرون الماضية، لا سيما أنها كانت من أهم أجزاء طريق الحرير. ولا تزال المدينة التي حظيت بمكانة واسعة في أشعار ومدائح وروايات الشعراء والكتّاب، تحافظ على رونقها التاريخي في يومنا الحالي.", "gold_answer": "تحوّلت المدينة إلى مركز علمي عالمي خلال عهد ابنها أولوغ بيك، كما أنه كانت من أهم أجزاء طريق الحرير وجذب إعجاب زوارها على مر القرون الماضية.", "source_citation": "https://ar.wikipedia.org/?curid=1372 (Wikipedia, CC BY-SA, article id 1372)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1378-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو أسامة بن لادن وما هي أبرز أدواره الوظيفية؟", "gold_passage_id": "ar-wiki-1378-0", "gold_passage_text": "أسامة بن لادن (10 مارس 1957 – 2 مايو 2011) كان جهاديًا إسلاميًا سعودي المولد، وكان المؤسس وأول أمير عام لتنظيم القاعدة من عام 1988 حتى وفاته في عام 2011. ومن الناحية الأيديولوجية، فهو إسلامي، وقد تم تصنيف منظمته كمجموعة إرهابية من قبل مجلس الأمن التابع للأمم المتحدة، ومنظمة حلف شمال الأطلسي (الناتو) والاتحاد الأوروبي والعديد من البلدان الأخرى. وهو معروف على نطاق واسع بأنه العقل المدبر لهجمات 11 سبتمبر في الولايات المتحدة.", "gold_answer": "أسامة بن لادن كان سعودي مواليد عام 1957، ومؤسس وأول أمير لتنظيم القاعدة، وتوفي في عام 2011.", "source_citation": "https://ar.wikipedia.org/?curid=1378 (Wikipedia, CC BY-SA, article id 1378)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1378-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "بما في هذا النص، ما التصنيفات الدولية التي صنفت تنظيم أسامة بن لادن كمجموعة إرهابية؟", "gold_passage_id": "ar-wiki-1378-0", "gold_passage_text": "أسامة بن لادن (10 مارس 1957 – 2 مايو 2011) كان جهاديًا إسلاميًا سعودي المولد، وكان المؤسس وأول أمير عام لتنظيم القاعدة من عام 1988 حتى وفاته في عام 2011. ومن الناحية الأيديولوجية، فهو إسلامي، وقد تم تصنيف منظمته كمجموعة إرهابية من قبل مجلس الأمن التابع للأمم المتحدة، ومنظمة حلف شمال الأطلسي (الناتو) والاتحاد الأوروبي والعديد من البلدان الأخرى. وهو معروف على نطاق واسع بأنه العقل المدبر لهجمات 11 سبتمبر في الولايات المتحدة.", "gold_answer": "تم تصنيف تنظيم أسامة بن لادن على أنه مجموعة إرهابية من قبل مجلس الأمن التابع للأمم المتحدة، وناتو (هلف شمال الأطلسي)، والاتحاد الأوروبي، بالإضافة إلى العديد من البلدان الأخرى.", "source_citation": "https://ar.wikipedia.org/?curid=1378 (Wikipedia, CC BY-SA, article id 1378)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1378-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي عام تم اغتيال أسامة بن لادن، وبعد متى بدأت الحرب في الولايات المتحدة التي وصف بأنه أطول حرب مستمرة في تاريخها؟", "gold_passage_id": "ar-wiki-1378-2", "gold_passage_text": "كان أسامة بن لادن مِحوَر الهجوم الإعلامي الدولي، بعد أحداث هجمات الحادي عشر من سبتمبر، التي نفذها تنظيمه على أمريكا. فشنت الولايات المتحدة وحلفاؤها على تنظيمه حرباً صُنِّفت كأطول حرب مستمرة في تاريخ الولايات المتحدة. ومنذ بداية الحرب، تمكن ابن لادن من الاختباء لمدة عشر سنوات كاملة. إلى أن تمكنت قوة مغاوير أمريكية من مباغتته، في فجر يوم الاثنين 2 مايو عام 2011. عندما كان في مسكنه قرب إسلام آباد. وأردته قتيلاً بطلقة في الرأس، ثم ألقت بجثتهِ سراً في البحر، من على متن حاملة الطائرات يو إس إس كارل فينسن. وذلك بعد القيام بما وصفته الحكومة الأمريكية بإتمام الغسل وإجراءات الدفن وفقا لأحكام الشريعة الإسلامية.", "gold_answer": "في عام 2011، بعد بدء الحرب في الولايات المتحدة منذ 2001.", "source_citation": "https://ar.wikipedia.org/?curid=1378 (Wikipedia, CC BY-SA, article id 1378)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1380-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "كم عدد الأيام التي تلتها بعد تاريخ 11 سبتمبر حتى انتهاء السنة القالية في التقويم الميلادي الغربي؟", "gold_passage_id": "ar-wiki-1380-0", "gold_passage_text": "11 سبتمبر أو 11 أيلول أو يوم 11 \\ 9 (اليوم الحادي عشر من الشهر التاسع) هو اليوم الرابع والخمسون بعد المئتين (254) من السنوات البسيطة، أو اليوم الخامس والخمسون بعد المئتين (255) من السنوات الكبيسة وفقًا للتقويم الميلادي الغربي (الغريغوري). يبقى بعده 111 يوما لانتهاء السنة.", "gold_answer": "111 يومًا.", "source_citation": "https://ar.wikipedia.org/?curid=1380 (Wikipedia, CC BY-SA, article id 1380)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_answer; REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1380-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو التاريخ الميلادي لعيد 11 سبتمبر في التقويم الميلادي الغربي (الغريغوري)؟", "gold_passage_id": "ar-wiki-1380-0", "gold_passage_text": "11 سبتمبر أو 11 أيلول أو يوم 11 \\ 9 (اليوم الحادي عشر من الشهر التاسع) هو اليوم الرابع والخمسون بعد المئتين (254) من السنوات البسيطة، أو اليوم الخامس والخمسون بعد المئتين (255) من السنوات الكبيسة وفقًا للتقويم الميلادي الغربي (الغريغوري). يبقى بعده 111 يوما لانتهاء السنة.", "gold_answer": "هو يوم الخامس والخمسين من السنة الكبيسة.", "source_citation": "https://ar.wikipedia.org/?curid=1380 (Wikipedia, CC BY-SA, article id 1380)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1380-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الأعياد والمناسبات المذكورة في النص؟", "gold_passage_id": "ar-wiki-1380-1", "gold_passage_text": "أعياد ومناسبات\n* رأس السنة في التقويم القبطي.\n* رأس السنة في التقويم الإثيوبي.\n* اليوم الوطني في منطقة كتالونيا.\n* يوم المعلم في أمريكا اللاتينية.", "gold_answer": "رأس السنة في التقويم القبطي، رأس السنة في التقويم الإثيوبي، اليوم الوطني في منطقة كتالونيا، ويوم المعلم في أمريكا اللاتينية.", "source_citation": "https://ar.wikipedia.org/?curid=1380 (Wikipedia, CC BY-SA, article id 1380)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1380-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي تقويم يتم احتفال رأس السنة؟", "gold_passage_id": "ar-wiki-1380-1", "gold_passage_text": "أعياد ومناسبات\n* رأس السنة في التقويم القبطي.\n* رأس السنة في التقويم الإثيوبي.\n* اليوم الوطني في منطقة كتالونيا.\n* يوم المعلم في أمريكا اللاتينية.", "gold_answer": "التقويم القبطي أو التقويم الإثيوبي.", "source_citation": "https://ar.wikipedia.org/?curid=1380 (Wikipedia, CC BY-SA, article id 1380)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1382-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الموقع الجغرافي والدول التي حدودها للأفганиستان؟", "gold_passage_id": "ar-wiki-1382-0", "gold_passage_text": "أَفْغَانِسْتَان () ورسميًّا «إِمَـارَةُ أَفْغَانِسْتَـانُ الْإِسْلَامِيَّـة» () هي دولة حبيسة غير ساحلية تقع في جنوب آسيا، تحدها كل من طاجيكستان وأوزبكستان وتركمانستان من الشمال وإيران من الغرب والصين من الشمالي الشرقي، فيما تحدها باكستان من الجنوب والشرق.", "gold_answer": "تقع في جنوب آسيا وتحدّها طاجيكستان وأوزبكستان وتركمانستان من الشمال وإيران من الغرب والصين من الشمالي الشرقي، كما تحدها باكستان من الجنوب والشرق.", "source_citation": "https://ar.wikipedia.org/?curid=1382 (Wikipedia, CC BY-SA, article id 1382)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1382-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي اللغة الرسمية للأفганиستان؟", "gold_passage_id": "ar-wiki-1382-0", "gold_passage_text": "أَفْغَانِسْتَان () ورسميًّا «إِمَـارَةُ أَفْغَانِسْتَـانُ الْإِسْلَامِيَّـة» () هي دولة حبيسة غير ساحلية تقع في جنوب آسيا، تحدها كل من طاجيكستان وأوزبكستان وتركمانستان من الشمال وإيران من الغرب والصين من الشمالي الشرقي، فيما تحدها باكستان من الجنوب والشرق.", "gold_answer": "الرسمي تُسمى «إِمَـارَةُ أَفْغَانِسْتَـانُ الْإِسْلَامِيَّـة».", "source_citation": "https://ar.wikipedia.org/?curid=1382 (Wikipedia, CC BY-SA, article id 1382)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1382-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "من كانت من بين الأمم القديمة والحديثة التي كانت تُعجَّب في أفغانستان؟", "gold_passage_id": "ar-wiki-1382-1", "gold_passage_text": "ومعنى كلمة أفغانستان هي أرض الأفغان، وتعتبر إحدى نقاط الاتصال القديمة لطريق الحرير والهجرات البشرية السابقة. وتلك الدولة ذات الموقع جيوإستراتيجي تربط شرق وغرب وجنوب ووسط آسيا، وهي موطن لكثير من الأمم القديمة والحديثة خلال العصور المتتالية. وكانت المنطقة هدفًا لكثير من الشعوب الغازية والفاتحين منذ القدم، منذ عهد الإغريق تحت حكم الإسكندر الأكبر، ومروراً بالفتوحات الإسلامية وحكم المغول وغيرهم. أفغانستان تُلقب بـ \"مقبرة الإمبراطوريات\" بسبب تاريخها الطويل في مقاومة الغزاة والإمبراطوريات الكبرى التي حاولت السيطرة عليها. وقد كانت أفغانستان منبع للعديد من الممالك، مثل مملكة باكتريا الإغريقية والكوشانيين والهياطلة والصفاريين والسامانيين والغزنويين التيموريين، وممالك أخرى ظهرت في أفغانستان فشكّلت دولًا عظمى هيمنت على جيرانها من الممالك الأخرى.", "gold_answer": "مملكة باكتريا الإغريقية، الكوشانيين، الهياطلة، الصفاريين، السامانيين، الغزنويين، والتموريين", "source_citation": "https://ar.wikipedia.org/?curid=1382 (Wikipedia, CC BY-SA, article id 1382)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1382-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو الكاتب الذي وصف الرحالة ابن بطوطة بأنه صاحب القوة والبأس الشديد أثناء زيارته لمدينة كابل وما جاورها؟", "gold_passage_id": "ar-wiki-1382-2", "gold_passage_text": "الأفغان بهذا المصطلح شعب معروف في التاريخ الإسلامي من الشعوب الآرية، هم أخوة الفرس والكرد والطاجيك يسكنون هذه البقاع، ولقد ذكرهم عدد كبير من المؤرخين، ووصفهم الرحالة ابن بطوطة بالقوة والبأس الشديد، عند زيارته لمدينة كابل وما جاورها.", "gold_answer": "عدد كبير من المؤرخين وصفهم الرحالة ابن بطوطة بالقوة والبأس الشديد.", "source_citation": "https://ar.wikipedia.org/?curid=1382 (Wikipedia, CC BY-SA, article id 1382)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1382-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي مكان سافر الرحالة ابن بطوطة ووصفه بشدة؟", "gold_passage_id": "ar-wiki-1382-2", "gold_passage_text": "الأفغان بهذا المصطلح شعب معروف في التاريخ الإسلامي من الشعوب الآرية، هم أخوة الفرس والكرد والطاجيك يسكنون هذه ا notator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1430-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو الذي يعتبر لاعب كرة قدم فرنسي محترف سابق لعب كلاعب خط وسط مهاجم وحقق عدة جوائز فردية؟", "gold_passage_id": "ar-wiki-1430-0", "gold_passage_text": "زين الدين يزيد زيدان (؛ مواليد 23 يونيو 1972) المعروف شعبيا باسم زيزو، هو لاعب كرة قدم فرنسي محترف سابق لعب كلاعب خط وسط مهاجم. وهو المدير الفني السابق لنادي ريال مدريد. درب مؤخرًا ريال مدريد وهو أحد أكثر المدربين نجاحًا في العالم. يُعتبر على نطاق واسع أحد أعظم اللاعبين في التاريخ، كان زيدان صانع ألعاب من النخبة اشتهر بأناقته ورؤيته وتمريراته وتحكمه في الكرة وبراعته الفنية. حصل على العديد من الجوائز الفردية كلاعب، بما في ذلك حصوله على جائزة أفضل لاعب في العالم في أعوام 1998 و2000 و2003، كما فاز بجائزة الكرة الذهبية لعام 1998.", "gold_answer": "زين الدين يزيد زيدان، المعروف شعبيا باسم زيزو، وهو المدير الفني السابق لنادي ريال مدريد ودرب مؤخرًا الفريق.", "source_citation": "https://ar.wikipedia.org/?curid=1430 (Wikipedia, CC BY-SA, article id 1430)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1430-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي عام حصل على جائزة الكرة الذهبية؟", "gold_passage_id": "ar-wiki-1430-0", "gold_passage_text": "زين الدين يزيد زيدان (؛ مواليد 23 يونيو 1972) المعروف شعبيا باسم زيزو، هو لاعب كرة قدم فرنسي محترف سابق لعب كلاعب خط وسط مهاجم. وهو المدير الفني السابق لنادي ريال مدريد. درب مؤخرًا ريال مدريد وهو أحد أكثر المدربين نجاحًا في العالم. يُعتبر على نطاق واسع أحد أعظم اللاعبين في التاريخ، كان زيدان صانع ألعاب من النخبة اشتهر بأناقته ورؤيته وتمريراته وتحكمه في الكرة وبراعته الفنية. حصل على العديد من الجوائز الفردية كلاعب، بما في ذلك حصوله على جائزة أفضل لاعب في العالم في أعوام 1998 و2000 و2003، كما فاز بجائزة الكرة الذهبية لعام 1998.", "gold_answer": "عام 1998.", "source_citation": "https://ar.wikipedia.org/?curid=1430 (Wikipedia, CC BY-SA, article id 1430)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text"}, {"id": "ar-wiki-1430-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو نادي بدأ مسيرته المهنية فيه قبل أن يتأهل ليوفنتوس?", "gold_passage_id": "ar-wiki-1430-1", "gold_passage_text": "بدأ زيدان مسيرته المهنية في نادي كان قبل أن يثبت نفسه كواحد من أفضل اللاعبين في الدوري الفرنسي مع بوردو. في عام 1996، انتقل إلى يوفنتوس حيث فاز معهم بألقاب من بينها لقبان في الدوري الإيطالي. انتقل إلى ريال مدريد مقابل رسوم انتقال قياسية في ذلك الوقت بلغت 77.5 مليون يورو في عام 2001، والذي ظل مسجل باسمه على مدار السنوات الثماني التالية. في إسبانيا، فاز زيدان بالعديد من الألقاب، بما في ذلك لقب الدوري الإسباني ودوري أبطال أوروبا. في نهائي دوري أبطال أوروبا 2002، سجل هدفًا بالقدم اليسرى والذي يُعتبر أحد أعظم الأهداف في تاريخ المسابقة.", "gold_answer": "كان (نادي يانكريك في هولندا)", "source_citation": "https://ar.wikipedia.org/?curid=1430 (Wikipedia, CC BY-SA, article id 1430)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1430-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي عام فاز زidane بكأس العالم وكم هدف سجل في النهائي ضد Italy?", "gold_passage_id": "ar-wiki-1430-2", "gold_passage_text": "لعب مع فرنسا 108 مباراة، وفاز زيدان بكأس العالم 1998، وسجل هدفين في النهائي، وتم اختياره ضمن فريق كل النجوم. جعله هذا الانتصار بطلاً قومياً في فرنسا، وحصل على وسام جوقة الشرف في عام 1998. وفاز ببطولة أمم أوروبا 2000، وحصل على جائزة أفضل لاعب في البطولة. حصل أيضًا على t_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1433-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي مدينة يقع المقر الرئيسيّ لشركة فايزر؟", "gold_passage_id": "ar-wiki-1433-1", "gold_passage_text": "يقع المقر الرئيسيّ لشركة فايزر في مانهاتن، وهي تُطور وتُنتج الأدوية واللقاحات لمجموعة واسعة من التخصّصات الطبيَّة، بما في ذلك علم المناعة، والأورام، وأمراض القلب، والغدد الصماء، وعلم الأعصاب. وتشمل منتجاتها العقار الرائج ليبيتور (أتورفاستاتين)، الذي يستخدم لخفض نسبة الكوليسترول الضار في الدم. ليريكا (بريجابالين) لألم الأعصاب والألم العضلي الليفي. ديفلوكان (فلوكونازول)، دواء مضاد للفطريات يؤخذ عن طريق الفم. زيثروماكس (أزيثروميسين)، مضاد حيوي. الفياجرا (سيلدينافيل) لعلاج ضعف الانتصاب. سيليبريكس (أيضًا سيليبرا وسيليكوكسيب)، دواء مضاد للالتهابات؛ وبريفنار13، لقاح متقارن ضد المكورات الرئوية.", "gold_answer": "مانهاتن.", "source_citation": "https://ar.wikipedia.org/?curid=1433 (Wikipedia, CC BY-SA, article id 1433)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1433-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الأدوية التي تنتجها شركة فايزر بناءً على نص المعطيات؟", "gold_passage_id": "ar-wiki-1433-1", "gold_passage_text": "يقع المقر الرئيسيّ لشركة فايزر في مانهاتن، وهي تُطور وتُنتج الأدوية واللقاحات لمجموعة واسعة من التخصّصات الطبيَّة، بما في ذلك علم المناعة، والأورام، وأمراض القلب، والغدد الصماء، وعلم الأعصاب. وتشمل منتجاتها العقار الرائج ليبيتور (أتورفاستاتين)، الذي يستخدم لخفض نسبة الكوليسترول الضار في الدم. ليريكا (بريجابالين) لألم الأعصاب والألم العضلي الليفي. ديفلوكان (فلوكونازول)، دواء مضاد للفطريات يؤخذ عن طريق الفم. زيثروماكس (أزيثروميسين)، مضاد حيوي. الفياجرا (سيلدينافيل) لعلاج ضعف الانتصاب. سيليبريكس (أيضًا سيليبرا وسيليكوكسيب)، دواء مضاد للالتهابات؛ وبريفنار13، لقاح متقارن ضد المكورات الرئ الخليفة العباسي الخامس هارون الرشيد وارتبطت باسمه في روايات ألف ليلة وليلة ذات الشهرة العالمية، حيث باتت عاصمة العالم القديم. وقد فقدت هذه المكانة منذ عام 1258 عندما غزاها المغول والتتار. مع حلول بدايات القرن السادس عشر، تبادل الصفويون والعثمانيون السيطرة على المدينة، حتى انتزعها العثمانيون أخيراً في عام 1535، فظلت تحت حكمهم قرابة 4 قرون. وفي عام 1917، سيطر الإنجليز على المدينة، وقد خضعت كمعظم مناطق العراق الأخرى تحت الانتداب البريطاني، ثم أصبحت عاصمة للمملكة العراقية عام 1921، والجمهورية العراقية عام 1958.", "gold_answer": "أخضعت بغداد كمعظم مناطق العراق تحت الانتداب البريطاني في عام 1921.", "source_citation": "https://ar.wikipedia.org/?curid=1438 (Wikipedia, CC BY-SA, article id 1438)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1442-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "في أي بيئة كانت غالبًا تُكتب المعالقات؟", "gold_passage_id": "ar-wiki-1442-0", "gold_passage_text": "المُعَلَّقاتُ وتُعرف أيضًا بـ المُذَهَّبات والسُّمُوط والجاهِلِيَّات والسَّبْع أو العشر الطِّوال، هي من أَشْهَرِ ما كتَب العَرَبُ في الشِّعرِ وسُمِّيَتْ مُعَلَّقَاتٍ. وقد قيل لها مُعَلَّقَاتٌ لأنها مثلُ العقود النفيسة تَعْلَقُ بالأذهان. ويقال إن هذه القصائد كانت تكتب بماء الذهب وتعلق على أستار الكَعْبَةِ قبل مجيء الإِسْلَامِ، وتعدّ هذه القصائدُ أروعَ ما قيل في الشِّعْرِ العربيِّ الْقَدِيمِ وأنفسَه؛ لِذلكَ اهْتَمَّ الناس قديمًا بها ودَوّنوها وكتبوا شُروحًا لها، وهي عادةً ما تبدأُ بذِكْرِ الْأَطْلَالِ وتَذْكُرُ ديارَ محبوبةِ الشاعرِ وكانتْ سَهْلةَ الحِفْظِ وتكون هذه المعلقات من محبته له شعاره الخاص.", "gold_answer": "تُكتب بماء الذهب وتعلق على أستار الكَعْبَةِ قبل مجيء الإِسْلَامِ.", "source_citation": "https://ar.wikipedia.org/?curid=1442 (Wikipedia, CC BY-SA, article id 1442)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1442-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو أول من جمع قصائد السبع الطويلة وسمها معلقات السموط؟", "gold_passage_id": "ar-wiki-1442-1", "gold_passage_text": "وقيل إن حَمَّادًا الرَّاويةَ هو أولُ مَن جمع القصائدَ السَّبْعَ الطِّوَالَ وسماها بالمعلقاتِ (السموط). وكان يقولُ إنها مِن أعذبِ ما قال العربُ وإنَّ العربَ كانوا يسمونها بالسُّموطِ (الْمُعَلَّقَاتِ). وقد ذهب الأُدباءُ والكُتَّابُ من بعدِه لدِراسَتِها. مثلُ ابنِ الكَلْبِيِّ. وابْنِ عَبْدِ رَبِّهِ صاحبِ العقد الفريد وأضاف بكِتَابِهَ أَمْرَ تَعْلِيقِهَا عَلَى الْكَعْبَةِ. قَدْ تَجِدُهُنَّ سَبْعَ قَصَائدَ في كلِّ كتابٍ قديمٍ لكِنَّ منهمْ مَن أضاف قصيدةً لشاعِرٍ وأهمل قصيدةً لِشاعرٍ آخَرَ. فاحتاروا مَن السبعةُ، فجعلوها عشرًا.", "gold_answer": "حَمَّادٌ الرّواي", "source_citation": "https://ar.wikipedia.org/?curid=1442 (Wikipedia, CC BY-SA, article id 1442)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1442-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو المصدر الذي يربط علقاً بالمال الذي يُكرَّم عليه، وما هو معنى هذا الربط؟", "gold_passage_id": "ar-wiki-1442-2", "gold_passage_text": "شرح المعنى\nالمُعلّقات لغةً من العِلْق: وهي المال الذي يُكرَم عليك، تضُنُّ به، تقول: هذا عِلْقُ مَضَنَّة. وما عليه عِلقةٌ إذا لم يكن عليه ثيابٌ فيها خير، والعِلْقُ: هو النفيس من كلّ شيء، وفي حديث حذيفة: «فما بالُ هؤلاء الذين يسرقون أعلاقنا» أي نفائسَ أموالنا. والعَلَق هو كلّ ما عُلِّق.", "gold_answer": "يعتبر العلق لغةً من العِلْق وهو المال الذي يكرَم عليك ويضنُّ به، أي نفائس أموالنا.", "source_citation": "https://ar.wikipedia.org/?curid=1442 (Wikipedia, CC BY-SA, article id 1442)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE ( _passage_id": "ar-wiki-1443-0", "gold_passage_text": "تتشابك مسيرة نجيب محفوظ الأدبية مع تاريخ الرواية الحديثة في مصر والعالم العربي. في مطلع القرن العشرين، خطت الرواية العربية خطواتها الأولى في مجتمع وثقافة اكتشفت هذا النوع الأدبي من خلال ترجمة الروايات الأوروبية من القرن التاسع عشر. ومع ذلك، بالنسبة لنجيب محفوظ، فإن مجتمعًا قويًا وقديمًا مثل المجتمع المصري، بعد أن حافظ على التقاليد القديمة أثناء التحديث، يمكنه أن يستوعب ويدمج، دون خوف، بعض جوانب الثقافة الغربية. لأن هذا الكاتب استمع قبل كل شيء، في عمله، إلى هذا الشعب المصري، وإلى مغامراته الحميمة وتاريخه.", "gold_answer": "أنه مجتمع قديم وقوي حافظ على التقاليد القديمة أثناء التحديث، مما يمكنه استيعاب وجدم جوانب الثقافة الغربية دون خوف.", "source_citation": "https://ar.wikipedia.org/?curid=1443 (Wikipedia, CC BY-SA, article id 1443)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-1443-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "كيف يتسم أسلوب روايات نجيب محفوظ من حيث التركيز والتجسيد؟", "gold_passage_id": "ar-wiki-1443-1", "gold_passage_text": "تتميز روايات نجيب محفوظ بأسلوب سردي كلاسيكي، يتميز بالتركيز على تصوير الشخصيات والمواقف بطريقة شديدة الواقعية، مع التركيز على العادات والتقاليد والقيم الاجتماعية في المجتمع المصري، والتجسيد الدقيق للحياة اليومية في مصر. كما يستخدم نجيب محفوظ نمط الرواية الداخلية الذي يسمح للقارئ بمشاهدة العالم من خلال عيون شخصية محورية في الرواية. كما يتميز أسلوب نجيب محفوظ بالتلاعب بالزمن والتركيز على التغيرات التي تحدث في الأحداث والأشخاص مع مرور الوقت. بشكل عام، تميزت حياته الأدبية بابتكاره أساليب جديدة تجمع بين الواقعية، والرمزية، والكتابة البوليسية، والكتابة الرومانسية.", "gold_answer": "يتسم بأسلوب سردي كلاسيكي يتميز بالتركيز على العادات والتقاليد والقيم الاجتماعية في المجتمع المصري، والتجسيد الدقيق للحياة اليومية في مصر.", "source_citation": "https://ar.wikipedia.org/?curid=1443 (Wikipedia, CC BY-S .wikipedia.org/?curid=38 (Wikipedia, CC BY-SA, article id 38)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-38-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "هل يوجد تعريف عام للمصطلح \"الرِّيَاضِيَّات\"؟", "gold_passage_id": "ar-wiki-38-0", "gold_passage_text": "الرِّيَاضِيَّاتُ هي مجموعة من المعارف المجردة الناتجة عن الاستنتاجات المنطقية المطبقة على مُختلف الكائنات الرياضية مثل المجموعات، والأعداد، والأشكال والبنيات والتحويلات. وتهتم الرياضيات أيضًا بدراسة مواضيع مثل الكمية والبنية والفضاء والتغير. ولا يوجد حتى الآن تعريف عام متفق عليه للمصطلح.", "gold_answer": "لا، النص يشير إلى عدم وجود تعريف عام متفق عليه حالياً للمصطلح.", "source_citation": "https://ar.wikipedia.org/?curid=38 (Wikipedia, CC BY-SA, article id 38)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-38-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي الوظائف الأساسية التي تم تحقيقها للرياضيات بناءً على النص؟", "gold_passage_id": "ar-wiki-38-1", "gold_passage_text": "يسعى علماء الرياضيات إلى استخدام أنماط رياضية لصياغة فرضيات جديدة؛ من خلال استعمال إثباتات رياضية بهدف الوصول للحقيقة وذرء الفرضيات السابقة أو الخاطئة. فمن خلال استخدام التجريد والمنطق، طُوِّرت الرياضيات من العد والحساب والقياس إلى الدراسة المنهجية للأشكال وحركات الأشياء المادية. لقد كانت الرياضيات العملية نشاطًا إنسانيًا يعود إلى تاريخ وجود السجلات المكتوبة. يمكن أن يستغرق البحث المطلوب لحل المسائل الرياضية سنوات، أو حتى قرونًا من البحث المستمر.", "gold_answer": "تتمثل في الانتقال من العد والحساب والقياس إلى الدراسة المنهجية للأشكال وحركات الأشياء المادية، بالإضافة إلى استعمال إثباتات رياضية للوصول للحقيقة وتطوير فرضيات جديدة بدلاً من الاعتماد عليها.", "source_citation": "https://ar.wikipedia.org/?curid=38 (Wikipedia, CC BY-SA, article id 38)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-38-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "كم قد يستغرق البحث المطلوب لحل مسائل الرياضيات وفقًا للنص؟", "gold_passage_id": "ar-wiki-38-1", "gold_passage_text": "يسعى علماء الرياضيات إلى استخدام أنماط رياضية لصياغة فرضيات جديدة؛ من خلال استعمال إثباتات رياضية بهدف الوصول للحقيقة وذرء الفرضيات السابقة أو الخاطئة. فمن خلال استخدام التجريد والمنطق، طُوِّرت الرياضيات من العد والحساب والقياس إلى الدراسة المنهجية للأشكال وحركات الأشياء المادية. لقد كانت الرياضيات العملية نشاطًا إنسانيًا يعود إلى تاريخ وجود السجلات المكتوبة. يمكن أن يستغرق البحث المطلوب لحل المسائل الرياضية سنوات، أو حتى قرونًا من البحث المستمر.", "gold_answer": "قد يستغرق هذا البحث سنوات أو حتى قرون من البحث المستمر.", "source_citation": "https://ar.wikipedia.org/?curid=38 (Wikipedia, CC BY-SA, article id 38)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-38-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "كيف أثرت الابتكارات الرياضية الجديدة على تطور الرياضيات خلال عصر النهضة وما بعدها؟", "gold_passage_id": "ar-wiki-38-2", "gold_passage_text": "ظهرت الحجج الصارمة أولًا في الرياضيات اليونانية، وعلى الأخص في أصول إقليدس. منذ العمل الرائد لجوزيبه بيانو (1858-1932)، وديفيد هيلبرت (1862-1943)، وغيرهم في النظم البديهية في أواخر القرن التاسع عشر، أصبح من المعتاد النظر إلى الأبحاث الرياضية كإثبات للحقيقة عن طريق الاستنتاج الدقيق للبديهيات والتعاريف المختارة بشكل مناسب. وتطورت الرياضيات بوتيرة بطيئة نسبيًا حتى عصر النهضة، عندما أدت الابتكارات الرياضية التي تتفاعل مع الاكتشافات العلمية الجديدة إلى زيادة سريعة في معدل الاكتشافات الرياضية التي استمرت حتى يومنا هذا.", "gold_answer": "أدت إلى زيادة سريعة في معدل الاكتشافات الرياضية", "source_citation": "https://ar.wikipedia.org/?curid=38 (Wikipedia, CC BY-SA, article id 38)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-62-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هو الكاتب الروماني الذي اعتمدت عليه الدولة لإستونيا لتسمية نفسها في كتابه جيرمانيا؟", "gold_passage_id": "ar-wiki-62-0", "gold_passage_text": "التأثيل\nتسمى رسمياً جمهورية إستونيا (بالإستونية: Eesti Vabariik - إيسْتي ڤابارِيك) وترجع تسميتها بهذا الاسم إلى الكاتب الروماني تاسيتس حيث وصف في كتابه جيرمانيا جماعة من الناس يسمون آيستي. الملاحم الإسكندنافية القديمة تشير إلى بلد اسمها إستلَند (Estland) وهو اسم إستونيا في اللغات الجرمانية الحديثة.", "gold_answer": "تاسيتس.", "source_citation": "https://ar.wikipedia.org/?curid=62 (Wikipedia, CC BY-SA, article id 62)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-62-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "من أين تم توسيع حدود إستونيا مع روسيا بين عامي 1920 و 1945؟", "gold_passage_id": "ar-wiki-62-1", "gold_passage_text": "الجغرافيا\n[[ملف:Satellite_image_of_Estonia_in_April_2004.jpg|يمين|تصغير|صورة إستونيا من القمر الصناعي]]\n[[ملف:Haanja_Upland.jpg|يمين|تصغير|عرض من أعلى نقطة من إستونيا.]]\n[[ملف:Aurora_Borealis_in_Vormsi,_Estonia.jpg|تصغير|شفق قطبي فوق البحر والمنارة في ساكسبي، إستونيا]]\nالحدود البرية مع إستونيا ولاتفيا تمتد 267 كيلومترا من الحدود الروسية تمتد 290 كيلومترا. من 1920 إلى 1945، وحدود إستونيا مع روسيا، التي وضعتها معاهدة سلام تارتو 1920، وسعت وراء نهر نارفا في شمال شرق البلاد وخارجها من بلدة بيتشوري (بيتسيري) في جنوب شرق البلاد. وقد تأسست هذه الأرض، التي تبلغ حوالي 2300 كيلو متر مربع (888 ميل مربع)، إلى روسيا من قبل ستالين في نهاية الحرب العالمية الثانية. لهذا السبب لم يتم تعريف الحدود بين إستونيا وروسيا حتى اليوم.", "gold_answer": "تم توسيع حدود إستونيا مع روسيا من قبل نهر نارفا في شمال شرق البلاد وخارجها من بلدة بيتشوري (بيتسيري) في جنوب شرق البلاد.", "source_citation": "https://ar.wikipedia.org/?curid=62 (Wikipedia, CC BY-SA, article id 62)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-62-1-q1", "language": "ar", "domain": "wikipedia_general", "question": "من أي عام حتى أي عام تمتد الحدود البرية مع إستونيا ولاتفيا؟", "gold_passage_id": "ar-wiki-62-1", "gold_passage_text": "الجغرافيا\n[[ملف:Satellite_image_of_Estonia_in_April_2004.jpg|يمين|تصغير|صورة إستونيا من القمر الصناعي]]\n[[ملف:Haanja_Upland.jpg|يمين|تصغير|عرض من أعلى نقطة من إستونيا.]]\n[[ملف:Aurora_Borealis_in_Vormsi,_Estonia.jpg|تصغير|شفق قطبي فوق البحر والمنارة في ساكسبي، إستونيا]]\nالحدود البرية مع إستونيا ولاتفيا تمتد 267 كيلومترا من الحدود الروسية تمتد 290 كيلومترا. من 1920 إلى 1945، وحدود إستونيا مع روسيا، التي وضعتها معاهدة سلام تارتو 1920، وسعت وراء نهر نارفا في شمال شرق البلاد وخارجها من بلدة بيتشوري (بيتسيري) في جنوب شرق البلاد. وقد تأسست هذه الأرض، التي تبلغ حوالي 2300 كيلو متر مربع (888 ميل مربع)، إلى روسيا من قبل ستالين في نهاية الحرب العالمية الثانية. لهذا السبب لم يتم تعريف الحدود بين إستونيا وروسيا حتى اليوم.", "gold_answer": "الحدود البرية مع إستونيا ولاتفيا تمتد منذ عام 1920.", "source_citation": "https://ar.wikipedia.org/?curid=62 (Wikipedia, CC BY-SA, article id 62)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-62-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "في أي منطقة جغرافية تقع إستونيا بالنسبة لبحر البلطيق؟", "gold_passage_id": "ar-wiki-62-2", "gold_passage_text": "إستونيا تقع على السواحل الشرقية لبحر البلطيق مباشرة عبر خليج فنلندا من فنلندا على مستوى الجزء الشمالي الغربي من منصة ارتفاع الشرق الأوروبي بين 57.3 درجة و 59.5 درجة شمالا و 21.5 درجة و 28.1 شرقا متوسط ارتفاع يصل إلى 50 مترا فقط (164 قدم) وأعلى نقطة في البلاد هي موناماغي سور في جنوب شرق البلاد على 318 متر (1043 قدم). هناك 3794 كيلومتر (2357 ميل) من الساحل تميزت الخلجان العديدة، المضيق، ومداخل. ويقدر عدد من الجزر والجزر الصغيرة في بعض 1500. اثنان منهم كبيرة بما يكفي لتشكل مقاطعات منفصلة: ساريما وهيوما. ويسمى الصغيرة، والكتلة الأخيرة من الفوهات النيزكية، وهي أكبر من الذي عُثِر عليه في كالي ساريما، إستونيا.", "gold_answer": "تقع إستونيا على السواحل الشرقية لبحر البلطيق مباشرة عبر خليج فنلندا.", "source_citation": "https://ar.wikipedia.org/?curid=62 (Wikipedia, CC BY-SA, article id 62)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-62-2-q1", "language": "ar", "domain": "wikipedia_general", "question": "ما هو ارتفاع أعلى نقطة في إستونيا؟", "gold_passage_id": "ar-wiki-62-2", "gold_passage_text": "إستونيا تقع على السواحل الشرقية لبحر البلطيق مباشرة عبر خليج فنلندا من فنلندا على مستوى الجزء الشمالي الغربي من منصة ارتفاع الشرق الأوروبي بين 57.3 درجة و 59.5 درجة شمالا و 21.5 درجة و 28.1 شرقا متوسط ارتفاع يصل إلى 50 مترا فقط (164 قدم) وأعلى نقطة في البلاد هي موناماغي سور في جنوب شرق البلاد على 318 متر (1043 قدم). هناك 3794 كيلومتر (2357 ميل) من الساحل تميزت الخلجان العديدة، المضيق، ومداخل. ويقدر عدد من الجزر والجزر الصغيرة في بعض 1500. اثنان منهم كبيرة بما يكفي لتشكل مقاطعات منفصلة: ساريما وهيوما. ويسمى الصغيرة، والكتلة الأخيرة من الفوهات النيزكية، وهي أكبر من الذي عُثِر عليه في كالي ساريما، إستونيا.", "gold_answer": "أعلى نقطة في البلاد هي موناماغي سور، والتي تقع على 318 متر (1043 قدم).", "source_citation": "https://ar.wikipedia.org/?curid=62 (Wikipedia, CC BY-SA, article id 62)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-7-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "كيف يتكون الجزيء الكيميائي للماء؟", "gold_passage_id": "ar-wiki-7-0", "gold_passage_text": "[[ملف:2006-02-13 Drop-impact.jpg|يسار|تصغير|250x250بك|الماء هو المركب الكيميائي الأكثر وفرةً في الأرض.]]\n[[ملف:Iceberg_with_hole_near_Sandersons_Hope_2007-07-28_2.jpg|يسار|تصغير|250x250بك|الماء في حالاته الثلاث: السائلة والصلبة (جليد) والغازية (بخار ماء/سحاب).]]\nالماء مادةٌ شفافةٌ عديمة اللون والرائحة، وهو المكوّن الأساسي للجداول والبحيرات والبحار والمحيطات وكذلك للسوائل في جميع الكائنات الحيّة، وهو أكثر المركّبات الكيميائيّة انتشاراً على سطح الأرض. يتألّف جزيء الماء من ذرّة أكسجين مركزية ترتبط بها ذرّتا هيدروجين على طرفيها برابطة تساهميّة بحيث تكون صيغته الكيميائية H2O. عند الظروف القياسية من الضغط ودرجة الحرارة يكون الماء سائلاً؛ أمّا الحالة الصلبة فتتشكّل عند نقطة التجمّد، وتدعى بالجليد؛ أمّا الحالة الغازية فتتشكّل عند نقطة الغليان، وتسمّى بخار الماء.", "gold_answer": "يتألّف جزيء الماء من ذرة أكسجين مركزية ترتبط بها ذرتا هيدروجين على طرفيها برابطة تساهميّة.", "source_citation": "https://ar.wikipedia.org/?curid=7 (Wikipedia, CC BY-SA, article id 7)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-7-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "من هي الجهة التي يتم فيها تغيير حالة الماء إلى الحالات الثلاثة على سطح الأرض؟", "gold_passage_id": "ar-wiki-7-2", "gold_passage_text": "أما في الطبيعة، فتتغيّر حالة الماء بين الحالات الثلاثة للمادة على سطح الأرض باستمرار من خل N_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-80-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو معنى الرمز الكيميائي K وعلاقته بالعنصر الكيميائي البوتاسيوم؟", "gold_passage_id": "ar-wiki-80-0", "gold_passage_text": "تصغير\nK \\ كي \\ هو الحرف الحادي العشر في الأبجدية اللاتينية. ويمثل هذا الحرف الصوت الطبقي الوقفي المهموس\n* في الكيمياء، يرمز K لعنصر البوتاسيوم\nمراجع", "gold_answer": "يعني الرمز الكيميائي K لعنصر البوتاسيوم في الكيمياء", "source_citation": "https://ar.wikipedia.org/?curid=80 (Wikipedia, CC BY-SA, article id 80)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-90-0-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هي بعض الأنواع التي لا تسبب أذى للإنسان؟", "gold_passage_id": "ar-wiki-90-0", "gold_passage_text": "الضرر\nلا تسبب أذى للإنسان، باستثناء بعض الأنواع (حوالي 200 من 40,000 نوع فقط) ومن أشهرها الأرملة السوداء. فالعناكب، وإن كانت مخلوقات غير محبوبة لدى الإنسان، إلا أنها صديقة له، بل وذهب البعض إلى حد القول بأنه لولاها لما كان للإنسان مستقر على الأرض؛ ذلك لأنها تقضي معظم وقتها في اصطياد الحشرات والفتك بها. فلولاها لتكاثرت الحشرات وأتت على الأخضر واليابس.", "gold_answer": "من أشهرها الأرملة السوداء، ولكن هناك حوالي 200 نوع من 40,000 نوع فقط لا تسبب أذى للإنسان.", "source_citation": "https://ar.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_answer; REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-90-0-q1", "language": "ar", "domain": "wikipedia_general", "question": "لماذا تفضل بعض العلماء أن العناكب صديق للإنسان على الرغم من أن الإنسان لا يحبها؟", "gold_passage_id": "ar-wiki-90-0", "gold_passage_text": "الضرر\nلا تسبب أذى للإنسان، باستثناء بعض الأنواع (حوالي 200 من 40,000 نوع فقط) ومن أشهرها الأرملة السوداء. فالعناكب، وإن كانت مخلوقات غير محبوبة لدى الإنسان، إلا أنها صديقة له، بل وذهب البعض إلى حد القول بأنه لولاها لما كان للإنسان مستقر على الأرض؛ ذلك لأنها تقضي معظم وقتها في اصطياد الحشرات والفتك بها. فلولاها لتكاثرت الحشرات وأتت على الأخضر واليابس.", "gold_answer": "لأن العناكب تقضي معظم وقتها في اصطياد الحشرات والفتك بها، مما يجعلها ضرورية لتوازن النظم البيئي.", "source_citation": "https://ar.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "REPEATED_CHAR in gold_passage_text; ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-90-1-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الاسم الذي يُطلق عليه الخيط الذي يصفه العنكبوت؟", "gold_passage_id": "ar-wiki-90-1", "gold_passage_text": "الشبكة واللزق\nالخيط الحريري، الذي تحيك به العنكبوت بتفنن شبكتها، هو في الحقيقة مجموعة خيوط ملتفة على بعضها، فسمك شعرة الإنسان يزيد عن سمك خيط العنكبوت ب400 مرة. إلا أن هذه الخيوط، اللينة والقابلة للتمطيط بعشرين في المائة من حجمها دون أن تتمزق، ورغم شدة رقتها وشفافيتها، تعد أصلب الألياف الطبيعية على الإطلاق، ولها قوة تحمل للضغط أقوى حتى من قوة تحمل الفولاذ، ولذلك يطلق عليها الفولاذ البيولوجي. وأنثى العنكبوت هي التي تقوم بنسج هذا الخيط الحريري، بواسطة ثلاثة مغازل أسفل البطن، متصلة بغدد صغيرة، تفرز المادة التي تتشكل منها الخيوط.", "gold_answer": "الغرض الفولاذي", "source_citation": "https://ar.wikipedia.org/?curid=90 (Wikipedia, CC BY-SA, article id 90)", "annotator_id": "ollama_draft", "draft_model": "qwen3.5:2b", "verification_pass": "draft_unverified", "lint_flags": "ANSWER_NOT_VERBATIM_IN_PASSAGE (may be a fine paraphrase -- check by hand)"}, {"id": "ar-wiki-90-2-q0", "language": "ar", "domain": "wikipedia_general", "question": "ما هو الشكل الذي يأخذه عنقبة صغيرة
